function drawBiwheelPlanets(g, planets, asc, rDot, rGlyphL0, rGlyphL1, dotColor = '#c6c300', glyphColor = '#111') {
  const MIN_GAP = CHART.BW_GLYPH_MIN_GAP;
  const outward = rGlyphL0 > rDot;  // направление роста уровней (от центра или к центру)

  // Сортируем по углу
  const items = planets
    .map(p => ({ ...p, angle: lonToRad(p.longitude, asc) }))
    .sort((a, b) => a.longitude - b.longitude);

  // Шаг 1: кластеры
  const clusters = [];
  let cur = [items[0]];
  for (let i = 1; i < items.length; i++) {
    let da = Math.abs(items[i].angle - items[i - 1].angle);
    da = Math.min(da, Math.PI * 2 - da);
    if (da < MIN_GAP) cur.push(items[i]);
    else { clusters.push(cur); cur = [items[i]]; }
  }
  clusters.push(cur);

  // Шаг 2: назначаем уровни (жадное распределение для 3+ планет)
  // Чётные по счёту (2-я, 4-я…) — уровень 1 (внешний), нечётные — уровень 0 (внутренний)
  const labeled = clusters.flatMap(cluster =>
    cluster.map((p, i) => ({ ...p, level: i % 2 }))
  );

  // 1. Точки на rDot (истинная позиция)
  labeled.forEach(p => {
    const pos = polar(p.angle, rDot);
    g.appendChild(circ(pos.x, pos.y, 2.5, { fill: dotColor, stroke: '#000', 'stroke-width': 0.6 }));
  });

  // (линии-лидеры убраны)

  // 3. Глифы на своём уровне (угол не меняется)
  labeled.forEach(p => {
    const r   = p.level === 0 ? rGlyphL0 : rGlyphL1;
    const pos = polar(p.angle, r);
    const deg = Math.floor(p.longitude % 30);
    const tipText = `${p.glyph} ${p.name}  ${fmtLon(p.longitude)}${p.house ? `  Дом ${ROMAN[p.house - 1]}` : ''}${p.retrograde ? '  R' : ''}`;
    const t = el('text', {
      x: pos.x, y: pos.y + 9,
      'font-size': 20, fill: glyphColor,
      'text-anchor': 'middle',
      style: 'font-family:HamburgSymbols;cursor:default',
    });
    t.appendChild(el('tspan', {}, p.hamburgGlyph));
    t.appendChild(el('tspan', { x: pos.x + (p.degOffset ?? 12), dy: '-10', 'font-size': '9', 'font-weight': 'semi-bold', fill: '#111', 'text-anchor': 'start', style: 'font-family:sans-serif' }, String(deg)));
    t.addEventListener('mouseover', e => showChartTip(tipText, e));
    t.addEventListener('mousemove', moveChartTip);
    t.addEventListener('mouseout', hideChartTip);
    g.appendChild(t);
    if (p.retrograde) {
      g.appendChild(txt(pos.x + 10, pos.y + 9, '>', {
        'font-size': 10, fill: '#111', style: 'font-family:HamburgSymbols',
      }));
    }
  });
}

function drawTransitAspects(g, natal, transit, asc) {
  for (const tr of transit) {
    const orb = getTransitOrb(tr.id);   // per-planet transit orb
    for (const na of natal) {
      // Skip trivial N.Node ↔ S.Node opposition
      if ((tr.id === 10 && na.id === -10) || (tr.id === -10 && na.id === 10)) continue;
      const diff = angDiff(tr.longitude, na.longitude);
      for (const asp of ASPECTS) {
        if (Math.abs(diff - asp.angle) <= orb) {
          const actualOrb = Math.abs(diff - asp.angle);
          const tipText = `тр${tr.glyph} ${asp.name} нат${na.glyph}  ${fmtOrb(actualOrb)}`;
          if (asp.type === 'conj') {
            let l1 = tr.longitude, l2 = na.longitude;
            if (Math.abs(l1 - l2) > 180) { if (l1 < l2) l1 += 360; else l2 += 360; }
            const midLon = ((l1 + l2) / 2) % 360;
            const midA = lonToRad(midLon, asc);
            const center = polar(midA, R_BW_INNER);
            const spanRad = diff * Math.PI / 180;
            const rx = Math.max(8, spanRad * R_BW_INNER / 2 + 6);
            const rotDeg = midA * 180 / Math.PI + 90;
            const ellipseEl = el('ellipse', {
              cx: center.x, cy: center.y, rx, ry: 3.5,
              transform: `rotate(${rotDeg}, ${center.x}, ${center.y})`,
              fill: 'none', stroke: asp.color, 'stroke-width': 1.5, style: 'cursor:default',
            });
            ellipseEl.addEventListener('mouseover', e => showChartTip(tipText, e));
            ellipseEl.addEventListener('mousemove', moveChartTip);
            ellipseEl.addEventListener('mouseout', hideChartTip);
            g.appendChild(ellipseEl);
          } else {
            const pt  = polar(lonToRad(tr.longitude, asc), R_BW_INNER);
            const pn  = polar(lonToRad(na.longitude, asc), R_BW_INNER);
            const mid = { x: (pt.x + pn.x) / 2, y: (pt.y + pn.y) / 2 };
            const attrs = { stroke: asp.color, 'stroke-width': asp.width, opacity: '0.6' };
            if (asp.dash) attrs['stroke-dasharray'] = asp.dash;
            g.appendChild(ln(pt.x, pt.y, pn.x, pn.y, attrs));
            const hitLine = ln(pt.x, pt.y, pn.x, pn.y, { stroke: 'transparent', 'stroke-width': 8, style: 'cursor:default' });
            hitLine.addEventListener('mouseover', e => showChartTip(tipText, e));
            hitLine.addEventListener('mousemove', moveChartTip);
            hitLine.addEventListener('mouseout', hideChartTip);
            g.appendChild(hitLine);
            if (asp.angle === 180) break;
            g.appendChild(el('circle', { cx: mid.x, cy: mid.y, r: 5.5, fill: 'white' }));
            g.appendChild(txt(mid.x, mid.y, asp.hg ?? asp.symbol, {
              'font-size': 10, fill: asp.color,
              'text-anchor': 'middle', 'dominant-baseline': 'central',
              ...(asp.hg ? { style: 'font-family:HamburgSymbols' } : {}),
            }));
          }
          break;
        }
      }
    }
  }
}

// ── Transit Timeline ──────────────────────────────────────────────────────────

const SLOW_IDS = [5, 6, 7, 8, 9, 10, 12, 15]; // Jupiter, Saturn, Uranus, Neptune, Pluto, Node, Lilith, Chiron
const FAST_IDS = [0, 2, 3, 4];            // Sun, Mercury, Venus, Mars

// Orb per transiting planet (degrees)
function getTransitOrb(planetId) {
  if (planetId === 7 || planetId === 8 || planetId === 9) return 1;              // Uranus, Neptune, Pluto
  if (planetId === 5 || planetId === 6 || planetId === 15) return 3;             // Jupiter, Saturn, Chiron
  if (planetId === 10 || planetId === 12 || planetId === -10) return 3;          // Node, Lilith, S.Node
  return 5;  // Sun, Mercury, Venus, Mars
}

const T_ASPECTS = [
  { angle: 0,   color: AC_CONJ,    symbol: '☌', hg: 'q' },
  { angle: 60,  color: AC_TL_SOFT, symbol: '✶', hg: 't' },
  { angle: 90,  color: AC_TL_HARD, symbol: '□', hg: 'r' },
  { angle: 120, color: AC_TL_SOFT, symbol: '△', hg: 'e' },
  { angle: 180, color: AC_TL_HARD, symbol: '☍', hg: 'w' },
];

const D_ASPECTS = [
  { angle: 0,   color: AC_CONJ,       symbol: '☌', hg: 'q' },
  { angle: 60,  color: AC_CHART_SOFT, symbol: '✶', hg: 't' },
  { angle: 90,  color: AC_CHART_HARD, symbol: '□', hg: 'r' },
  { angle: 120, color: AC_CHART_SOFT, symbol: '△', hg: 'e' },
  { angle: 180, color: AC_CHART_HARD, symbol: '☍', hg: 'w' },
];

// ── Progressed Events ─────────────────────────────────────────────────────────
// Scans every real-time day in [jdStart, jdEnd].
// For each day X: progressedJD = birthJD + (X - birthJD) / 365.25
// Finds: sign changes, house changes, exact aspects to natal, Moon/Sun phases (×45°).

function computeProgressedEvents(natalPlanets, cusps, birthJD, jdStart, jdEnd) {
  if (!birthJD) return [];
  const flags = (swe.SEFLG_SWIEPH ?? 2) | (swe.SEFLG_SPEED ?? 256);
  const DAYS  = Math.ceil(jdEnd - jdStart) + 2;

  // Precompute progressed longitudes for every real-time day
  const progLons = new Map();
  for (const p of PLANETS) progLons.set(p.id, new Float64Array(DAYS));
  for (let i = 0; i < DAYS; i++) {
    const ageInYears   = (jdStart + i - birthJD) / 365.25;
    const progressedJD = birthJD + ageInYears;
    for (const p of PLANETS) {
      const r = swe.calc_ut(progressedJD, p.id, flags);
      progLons.get(p.id)[i] = ((r[0] % 360) + 360) % 360;
    }
  }

  const events = []; // { planetId, type, jd, exactJD, label, color }
  const plById = new Map(PLANETS.map(p => [p.id, p]));

  // Extrapolate the true exact date when the minimum is at the window boundary.
  // orbFn(i) returns the orb in degrees at day i.
  // bestI is the index with minimum orb found in the scan.
  const orbExact = (orbFn, bestI) => {
    if (bestI >= DAYS - 2) {
      // Orb still decreasing at end → exact date is after window
      const d1 = orbFn(DAYS - 2), d2 = orbFn(DAYS - 1);
      const rate = d2 - d1; // negative = decreasing
      if (rate < -1e-9) return jdStart + (DAYS - 1) + d2 / (-rate);
    } else if (bestI <= 1) {
      // Orb was decreasing before window → exact date is before window
      const d0 = orbFn(0), d1 = orbFn(1);
      const rate = d1 - d0; // positive = now increasing = was exact before window
      if (rate > 1e-9) return jdStart - d0 / rate;
    }
    return jdStart + bestI; // minimum inside window — no extrapolation needed
  };

  // 1. Sign changes — all planets; label: plGlyph + → + signGlyph
  for (const p of PLANETS) {
    const lons = progLons.get(p.id);
    for (let i = 1; i < DAYS; i++) {
      if (Math.floor(lons[i-1] / 30) !== Math.floor(lons[i] / 30)) {
        const newSign = Math.floor(lons[i] / 30);
        events.push({ planetId: p.id, type: 'sign', jd: jdStart + i,
          label: p.glyph + '→' + SIGNS[newSign], color: '#777' });
      }
    }
  }

  // 2. House changes — all planets; label: plGlyph + → + romanNumeral
  for (const p of PLANETS) {
    const lons = progLons.get(p.id);
    for (let i = 1; i < DAYS; i++) {
      const h0 = findHouse(lons[i-1], cusps);
      const h1 = findHouse(lons[i],   cusps);
      if (h0 !== h1) {
        events.push({ planetId: p.id, type: 'house', jd: jdStart + i,
          label: p.glyph + '→' + ROMAN[h1-1], color: '#2244bb' });
      }
    }
  }

  // 3. Exact aspects — Sun, Mercury, Venus, Mars only (Moon excluded)
  // State-machine scan: shows bar whenever orb < limit, even if exact date is outside window.
  // Orb: 2° if Sun (id=0) or Moon (id=1) is involved, else 1°
  const PROG_ASPECTS = [
    { angle: 0,   color: '#2244bb', symbol: '☌' },
    { angle: 60,  color: AC_TL_SOFT, symbol: '✶' },
    { angle: 90,  color: AC_TL_HARD, symbol: '□' },
    { angle: 120, color: AC_TL_SOFT, symbol: '△' },
    { angle: 180, color: AC_TL_HARD, symbol: '☍' },
  ];
  for (const pid of [0, 2, 3, 4]) {
    const pl   = plById.get(pid);
    const lons = progLons.get(pid);
    for (const na of natalPlanets) {
      const progOrb = (pid === 0 || na.id === 0 || na.id === 1) ? 2.0 : 1.0;
      for (const asp of PROG_ASPECTS) {
        let inPeriod = false, iS = 0, bestI = 0, bestD = Infinity;
        const flushPN = iE => {
          const exactJD = orbExact(j => Math.abs(angDiff(lons[j], na.longitude) - asp.angle), bestI);
          events.push({ planetId: pid, type: 'aspect', jd: jdStart + bestI, exactJD,
            startJD: jdStart + iS, endJD: jdStart + iE,
            label: pl.glyph + asp.symbol + na.glyph, color: asp.color });
          inPeriod = false; bestI = 0; bestD = Infinity;
        };
        for (let i = 0; i < DAYS; i++) {
          const d = Math.abs(angDiff(lons[i], na.longitude) - asp.angle);
          if (d < progOrb) {
            if (!inPeriod) { inPeriod = true; iS = i; }
            if (d < bestD) { bestD = d; bestI = i; }
          } else if (inPeriod) { flushPN(i - 1); }
        }
        if (inPeriod) flushPN(DAYS - 1);
      }
    }
  }

  // 4. Progressed → progressed aspects (at least one planet id ≤ 4 = fast)
  // Same state-machine: bar shown as soon as orb < 1°, even if exact date is outside window.
  const PROG_ORB_PP = 1.0;
  for (let pi = 0; pi < PLANETS.length; pi++) {
    for (let pj = pi + 1; pj < PLANETS.length; pj++) {
      const p1 = PLANETS[pi], p2 = PLANETS[pj];
      // Moon is handled separately in the moon band — exclude from here entirely
      if (p1.id === 1 || p2.id === 1) continue;
      // At least one must be a fast non-Moon planet (Sun/Mercury/Venus/Mars)
      const FAST_NO_MOON = [0, 2, 3, 4];
      if (!FAST_NO_MOON.includes(p1.id) && !FAST_NO_MOON.includes(p2.id)) continue;
      const l1 = progLons.get(p1.id), l2 = progLons.get(p2.id);
      if (!l1 || !l2) continue;
      for (const asp of PROG_ASPECTS) {
        let inPeriod = false, iS = 0, bestI = 0, bestD = Infinity;
        const flushPP = iE => {
          const exactJD = orbExact(j => Math.abs(angDiff(l1[j], l2[j]) - asp.angle), bestI);
          events.push({ type: 'aspect', jd: jdStart + bestI, exactJD,
            startJD: jdStart + iS, endJD: jdStart + iE,
            label: 'p' + p1.glyph + asp.symbol + 'p' + p2.glyph, color: asp.color });
          inPeriod = false; bestI = 0; bestD = Infinity;
        };
        for (let i = 0; i < DAYS; i++) {
          const d = Math.abs(angDiff(l1[i], l2[i]) - asp.angle);
          if (d < PROG_ORB_PP) {
            if (!inPeriod) { inPeriod = true; iS = i; }
            if (d < bestD) { bestD = d; bestI = i; }
          } else if (inPeriod) { flushPP(i - 1); }
        }
        if (inPeriod) flushPP(DAYS - 1);
      }
    }
  }

  // 5. Progressed Moon → natal planets + progressed planets (Moon band, orb 1°)
  const moonLons = progLons.get(1);
  if (moonLons) {
    // 5a. Moon → natal
    for (const na of natalPlanets) {
      for (const asp of PROG_ASPECTS) {
        let inPeriod = false, iS = 0, bestI = 0, bestD = Infinity;
        const flushMoon = iE => {
          const exactJD = orbExact(j => Math.abs(angDiff(moonLons[j], na.longitude) - asp.angle), bestI);
          events.push({ type: 'moon_aspect', jd: jdStart + bestI, exactJD,
            startJD: jdStart + iS, endJD: jdStart + iE,
            label: '☽\uFE0E' + asp.symbol + na.glyph, color: asp.color });
          inPeriod = false; bestI = 0; bestD = Infinity;
        };
        for (let i = 0; i < DAYS; i++) {
          const d = Math.abs(angDiff(moonLons[i], na.longitude) - asp.angle);
          if (d < 1.0) {
            if (!inPeriod) { inPeriod = true; iS = i; }
            if (d < bestD) { bestD = d; bestI = i; }
          } else if (inPeriod) { flushMoon(i - 1); }
        }
        if (inPeriod) flushMoon(DAYS - 1);
      }
    }

    // 5b. Moon → progressed planets (skip Moon↔Moon)
    for (const p2 of PLANETS) {
      if (p2.id === 1) continue; // skip self
      const l2 = progLons.get(p2.id);
      if (!l2) continue;
      for (const asp of PROG_ASPECTS) {
        let inPeriod = false, iS = 0, bestI = 0, bestD = Infinity;
        const flushMoonP = iE => {
          const exactJD = orbExact(j => Math.abs(angDiff(moonLons[j], l2[j]) - asp.angle), bestI);
          events.push({ type: 'moon_aspect', jd: jdStart + bestI, exactJD,
            startJD: jdStart + iS, endJD: jdStart + iE,
            label: 'p☽\uFE0E' + asp.symbol + 'p' + p2.glyph, color: asp.color });
          inPeriod = false; bestI = 0; bestD = Infinity;
        };
        for (let i = 0; i < DAYS; i++) {
          const d = Math.abs(angDiff(moonLons[i], l2[i]) - asp.angle);
          if (d < 1.0) {
            if (!inPeriod) { inPeriod = true; iS = i; }
            if (d < bestD) { bestD = d; bestI = i; }
          } else if (inPeriod) { flushMoonP(i - 1); }
        }
        if (inPeriod) flushMoonP(DAYS - 1);
      }
    }

  }

  // 6. Progressed Moon / Sun phases — every 45°; label: ☽ phaseSymbol ☉
  const moonL = progLons.get(1);
  const sunL  = progLons.get(0);
  const PHASES = [
    { angle:   0, symbol: '☌', color: '#2244bb' },
    { angle:  45, symbol: '∠', color: '#997700' },
    { angle:  90, symbol: '□', color: AC_TL_HARD },
    { angle: 135, symbol: '∠', color: '#997700' },
    { angle: 180, symbol: '☍', color: AC_TL_HARD },
    { angle: 225, symbol: '∠', color: '#997700' },
    { angle: 270, symbol: '□', color: AC_TL_HARD },
    { angle: 315, symbol: '∠', color: '#997700' },
  ];
  for (const ph of PHASES) {
    for (let i = 1; i < DAYS - 1; i++) {
      const elong = j => ((moonL[j] - sunL[j]) % 360 + 360) % 360;
      const dist  = (e, a) => { const d = Math.abs(e - a); return Math.min(d, 360 - d); };
      const d0 = dist(elong(i-1), ph.angle);
      const d1 = dist(elong(i),   ph.angle);
      const d2 = dist(elong(i+1), ph.angle);
      if (d1 < d0 && d1 < d2 && d1 < 0.6) {
        events.push({ planetId: 1, type: 'phase', jd: jdStart + i,
          label: '☽\uFE0E' + ph.symbol + '☉\uFE0E', color: ph.color });
      }
    }
  }

  return events;
}

// ── Direction Events ──────────────────────────────────────────────────────────
// Solar arc directions: every planet and cusp moves by arc = (jd − birthJD) / 365.25 degrees.
// No swe calls needed — just natal longitude + arc.
// Finds: aspects (all planets), sign changes (planets + cusps),
//        directed-cusp ☌ natal-planet, directed-planet ☌ natal-cusp.

function computeDirectionEvents(natalPlanets, natalCusps, birthJD, jdStart, jdEnd) {
  if (!birthJD || !natalCusps) return [];
  const DAYS   = Math.ceil(jdEnd - jdStart) + 2;
  const plById = new Map(PLANETS.map(p => [p.id, p]));

  const arcAt  = i => (jdStart + i - birthJD) / 365.25;
  const dirLon = (natalLon, i) => ((natalLon + arcAt(i)) % 360 + 360) % 360;

  const events = [];

  const DIR_ASP = [
    { angle: 0,   color: '#2244bb', symbol: '☌\uFE0E' },
    { angle: 60,  color: AC_TL_SOFT, symbol: '✶' },
    { angle: 90,  color: AC_TL_HARD, symbol: '□' },
    { angle: 120, color: AC_TL_SOFT, symbol: '△' },
    { angle: 180, color: AC_TL_HARD, symbol: '☍\uFE0E' },
  ];

  // 1. Aspects: all directed planets → all natal planets
  for (const dirPl of PLANETS) {
    const natalDirLon = natalPlanets.find(p => p.id === dirPl.id)?.longitude;
    if (natalDirLon == null) continue;
    for (const na of natalPlanets) {
      const natPl = plById.get(na.id);
      if (!natPl) continue;
      const orbLimit = (dirPl.id === 0 || dirPl.id === 1 || na.id === 0 || na.id === 1) ? 2.0 : 1.0;
      for (const asp of DIR_ASP) {
        for (let i = 1; i < DAYS - 1; i++) {
          const orb = j => Math.abs(angDiff(dirLon(natalDirLon, j), na.longitude) - asp.angle);
          const d0 = orb(i-1), d1 = orb(i), d2 = orb(i+1);
          if (d1 < d0 && d1 < d2 && d1 < orbLimit) {
            events.push({ type: 'dir_aspect', jd: jdStart + i,
              label: dirPl.glyph + asp.symbol + natPl.glyph, color: asp.color });
          }
        }
      }
    }
  }

  // 2. Sign changes of directed planets
  for (const p of PLANETS) {
    const natalLon = natalPlanets.find(pl => pl.id === p.id)?.longitude;
    if (natalLon == null) continue;
    for (let i = 1; i < DAYS; i++) {
      const s0 = Math.floor(dirLon(natalLon, i-1) / 30);
      const s1 = Math.floor(dirLon(natalLon, i)   / 30);
      if (s0 !== s1)
        events.push({ type: 'dir_sign', jd: jdStart + i,
          label: p.glyph + '→' + SIGNS[s1 % 12], color: '#777' });
    }
  }

  // 3. Sign changes of directed cusps — emit pairs (1/7, 2/8, … 6/12) as one event
  for (let ci = 0; ci < 6; ci++) {
    const natalCusp = natalCusps[ci];
    for (let i = 1; i < DAYS; i++) {
      const s0 = Math.floor(dirLon(natalCusp, i-1) / 30);
      const s1 = Math.floor(dirLon(natalCusp, i)   / 30);
      if (s0 !== s1) {
        const s1opp = (s1 + 6) % 12;
        events.push({ type: 'dir_cusp_sign', jd: jdStart + i,
          label: ROMAN[ci] + '/' + ROMAN[ci+6] + '→' + SIGNS[s1 % 12] + SIGNS[s1opp], color: '#555' });
      }
    }
  }

  // 4. Directed cusps ☌ natal planets
  for (let ci = 0; ci < 12; ci++) {
    const natalCusp = natalCusps[ci];
    for (const na of natalPlanets) {
      const natPl = plById.get(na.id);
      if (!natPl) continue;
      const orbLimit = (na.id === 0 || na.id === 1) ? 2.0 : 1.0;
      for (let i = 1; i < DAYS - 1; i++) {
        const orb = j => Math.abs(angDiff(dirLon(natalCusp, j), na.longitude));
        const d0 = orb(i-1), d1 = orb(i), d2 = orb(i+1);
        if (d1 < d0 && d1 < d2 && d1 < orbLimit)
          events.push({ type: 'dir_cusp_planet', jd: jdStart + i,
            label: ROMAN[ci] + '☌\uFE0E' + natPl.glyph, color: '#2244bb' });
      }
    }
  }

  // 5. Directed planets ☌ natal cusps
  for (const dirPl of PLANETS) {
    const natalDirLon = natalPlanets.find(p => p.id === dirPl.id)?.longitude;
    if (natalDirLon == null) continue;
    const orbLimit = (dirPl.id === 0 || dirPl.id === 1) ? 2.0 : 1.0;
    for (let ci = 0; ci < 12; ci++) {
      const natCusp = natalCusps[ci];
      for (let i = 1; i < DAYS - 1; i++) {
        const orb = j => Math.abs(angDiff(dirLon(natalDirLon, j), natCusp));
        const d0 = orb(i-1), d1 = orb(i), d2 = orb(i+1);
        if (d1 < d0 && d1 < d2 && d1 < orbLimit)
          events.push({ type: 'dir_planet_cusp', jd: jdStart + i,
            label: dirPl.glyph + '☌\uFE0E' + ROMAN[ci], color: '#8833bb' });
      }
    }
  }

  return events;
}

function computeAndRenderTimeline(natalPlanets, centerOverride = null) {
  const tl = document.getElementById('transit-tl');
  if (cachedTimeline) {
    renderTimeline({ ...cachedTimeline, jdCursor: currentTransitJD ?? computeJDNow() });
    return;
  }
  tl.innerHTML = '<div class="tl-status">Вычисление транзитов…</div>';
  setTimeout(() => {
    try {
      const now     = new Date();
      const jdToday = swe.julday(now.getUTCFullYear(), now.getUTCMonth() + 1,
        now.getUTCDate(), now.getUTCHours() + now.getUTCMinutes() / 60);
      const center  = centerOverride ?? currentTransitJD ?? jdToday;
      const baseHalf = tlYearScale ? 5 * 365 : 182;
      const jdStart = center - baseHalf - tlPastYears * 365;
      const jdEnd   = center + baseHalf + 1 + tlFutureYears * 365;
      const transitData = computeTransits(natalPlanets, jdStart, jdEnd);
      const returnPeriods = computeReturnPeriods(natalPlanets, transitData.jdStart, transitData.jdEnd);
      transitData.periods.push(...returnPeriods);
      const progEvents  = natalData?.birthJD
        ? computeProgressedEvents(natalPlanets, natalData.cusps, natalData.birthJD, transitData.jdStart, transitData.jdEnd)
        : [];
      const dirEvents   = natalData?.birthJD
        ? computeDirectionEvents(natalPlanets, natalData.cusps, natalData.birthJD, transitData.jdStart, transitData.jdEnd)
        : [];
      cachedTimeline = { ...transitData, progEvents, dirEvents, center };
      renderTimeline({ ...cachedTimeline, jdCursor: currentTransitJD ?? jdToday });
    } catch (e) {
      tl.innerHTML = `<div class="tl-status">Ошибка: ${e.message}</div>`;
    }
  }, 30);
}

function computeTransits(natalPlanets, jdWindowStart, jdWindowEnd) {
  const now     = new Date();
  const jdToday = swe.julday(now.getUTCFullYear(), now.getUTCMonth() + 1,
    now.getUTCDate(), now.getUTCHours() + now.getUTCMinutes() / 60);
  const jdStart = jdWindowStart ?? jdToday - 182;
  const jdEnd   = jdWindowEnd   ?? jdToday + 183;
  const flags   = (swe.SEFLG_SWIEPH ?? 2) | (swe.SEFLG_SPEED ?? 256);
  const DAYS    = Math.ceil(jdEnd - jdStart) + 2;

  // Precompute slow planet longitudes for every day
  const slowLons = {};
  for (const id of SLOW_IDS) {
    slowLons[id] = new Float64Array(DAYS);
    for (let i = 0; i < DAYS; i++) {
      const r = swe.calc_ut(jdStart + i, id, flags);
      slowLons[id][i] = ((r[0] % 360) + 360) % 360;
    }
  }

  // Find retrograde/direct station days between two exact aspect dates
  const stationsBetween = (lons, jd1, jd2) => {
    const d1 = Math.max(1, Math.round(jd1 - jdStart));
    const d2 = Math.min(DAYS - 2, Math.round(jd2 - jdStart));
    const result = [];
    for (let d = d1 + 1; d < d2; d++) {
      const sp = ((lons[d]   - lons[d-1] + 540) % 360) - 180;
      const sn = ((lons[d+1] - lons[d]   + 540) % 360) - 180;
      if (sp !== 0 && sn !== 0 && sp * sn < 0)
        result.push({ jd: jdStart + d, type: sn > 0 ? 'D' : 'R' });
    }
    return result;
  };

  const periods = [];

  for (const id of SLOW_IDS) {
    const tPlanet  = PLANETS.find(p => p.id === id);
    const lons     = slowLons[id];
    const orbLimit = getTransitOrb(id);

    for (const na of natalPlanets) {
      // Node / Lilith (transiting OR natal) → only conjunctions
      const aspects = (id === 10 || id === 12 || na.id === 10 || na.id === 12)
        ? T_ASPECTS.filter(a => a.angle === 0)
        : T_ASPECTS;
      for (const asp of aspects) {
        let inPeriod = false, pStart = 0;
        let prevDiff = Infinity, wasDecreasing = false;
        let curMinDay = -1, curMinDiff = Infinity;
        let localMinima = [];   // { day, diff } collected within current period

        const closePeriod = (endIdx) => {
          // flush last pending local minimum
          if (wasDecreasing && curMinDay >= 0)
            localMinima.push({ day: curMinDay, diff: curMinDiff });
          const exactJDs = refineExactAspects(localMinima, id, na.longitude, asp.angle, jdStart, flags);
          const stations = [];
          if (exactJDs.length > 1)
            for (let ei = 0; ei < exactJDs.length - 1; ei++)
              stations.push(...stationsBetween(lons, exactJDs[ei], exactJDs[ei + 1]));
          periods.push({ tPlanet, na, asp,
            startJD: jdStart + pStart, endJD: jdStart + endIdx, exactJDs, stations });
          inPeriod = false; prevDiff = Infinity; wasDecreasing = false;
          curMinDay = -1; curMinDiff = Infinity; localMinima = [];
        };

        for (let i = 0; i < DAYS; i++) {
          const diff = Math.abs(angDiff(lons[i], na.longitude) - asp.angle);
          if (diff <= orbLimit) {
            if (!inPeriod) {
              inPeriod = true; pStart = i;
              prevDiff = diff; wasDecreasing = false;
              curMinDay = i; curMinDiff = diff;
            } else {
              if (diff < prevDiff) {
                wasDecreasing = true;
                curMinDay = i; curMinDiff = diff;
              } else if (diff > prevDiff + 0.005 && wasDecreasing) {
                // local minimum was at curMinDay
                localMinima.push({ day: curMinDay, diff: curMinDiff });
                wasDecreasing = false;
              }
              prevDiff = diff;
            }
          } else if (inPeriod) {
            closePeriod(i - 1);
          }
        }
        if (inPeriod) closePeriod(DAYS - 1);
      }
    }
  }

  return { periods, jdStart, jdEnd, jdToday };
}

// Refine each daily local minimum to sub-day precision and filter non-perfecting aspects.
// Returns array of Julian Dates where the aspect truly perfects (diff < EXACT_THRESH).
function refineExactAspects(localMinima, planetId, natalLon, aspAngle, jdStart, flags) {
  const EXACT_THRESH = 0.1;  // 6 arc-minutes — aspect must reach within this to be "exact"
  const exactJDs = [];
  for (const { day, diff } of localMinima) {
    if (diff > EXACT_THRESH) continue;  // daily minimum too large → aspect doesn't perfect
    // Hourly scan ±1 day around the minimum to find true closest approach
    const jdCenter = jdStart + day;
    let minD = Infinity, minJD = jdCenter;
    for (let h = -24; h <= 24; h++) {
      const jd  = jdCenter + h / 24;
      const r   = swe.calc_ut(jd, planetId, flags);
      const lon = ((r[0] % 360) + 360) % 360;
      const d   = Math.abs(angDiff(lon, natalLon) - aspAngle);
      if (d < minD) { minD = d; minJD = jd; }
    }
    if (minD < EXACT_THRESH) exactJDs.push(minJD);
  }
  return exactJDs;
}

// Compute transits of fast planets (Sun/Mercury/Venus/Mars) to one natal planet.
// Uses same algorithm as computeTransits but for FAST_IDS and a single natal planet.
function computeFastTransits(natalPlanet, jdStart, jdEnd) {
  const flags  = (swe.SEFLG_SWIEPH ?? 2) | (swe.SEFLG_SPEED ?? 256);
  const DAYS   = Math.ceil(jdEnd - jdStart) + 2;
  const periods = [];

  // Node/Lilith natal → conjunctions only; otherwise all T_ASPECTS
  const aspects = (natalPlanet.id === 10 || natalPlanet.id === 12)
    ? T_ASPECTS.filter(a => a.angle === 0)
    : T_ASPECTS;

  for (const id of FAST_IDS) {
    const tPlanet  = PLANETS.find(p => p.id === id);
    const orbLimit = getTransitOrb(id);
    const lons     = new Float64Array(DAYS);
    for (let i = 0; i < DAYS; i++) {
      const r = swe.calc_ut(jdStart + i, id, flags);
      lons[i] = ((r[0] % 360) + 360) % 360;
    }

    for (const asp of aspects) {
      let inPeriod = false, pStart = 0;
      let prevDiff = Infinity, wasDecreasing = false;
      let curMinDay = -1, curMinDiff = Infinity;
      let localMinima = [];

      const closePeriod = (endIdx) => {
        if (wasDecreasing && curMinDay >= 0)
          localMinima.push({ day: curMinDay, diff: curMinDiff });
        const exactJDs = refineExactAspects(localMinima, id, natalPlanet.longitude, asp.angle, jdStart, flags);
        periods.push({ tPlanet, na: natalPlanet, asp,
          startJD: jdStart + pStart, endJD: jdStart + endIdx, exactJDs });
        inPeriod = false; prevDiff = Infinity; wasDecreasing = false;
        curMinDay = -1; curMinDiff = Infinity; localMinima = [];
      };

      for (let i = 0; i < DAYS; i++) {
        const diff = Math.abs(angDiff(lons[i], natalPlanet.longitude) - asp.angle);
        if (diff <= orbLimit) {
          if (!inPeriod) {
            inPeriod = true; pStart = i;
            prevDiff = diff; wasDecreasing = false;
            curMinDay = i; curMinDiff = diff;
          } else {
            if (diff < prevDiff) {
              wasDecreasing = true; curMinDay = i; curMinDiff = diff;
            } else if (diff > prevDiff + 0.005 && wasDecreasing) {
              localMinima.push({ day: curMinDay, diff: curMinDiff });
              wasDecreasing = false;
            }
            prevDiff = diff;
          }
        } else if (inPeriod) {
          closePeriod(i - 1);
        }
      }
      if (inPeriod) closePeriod(DAYS - 1);
    }
  }
  return periods;
}

// ── Planet Returns ────────────────────────────────────────────────────────────
// Computes solar/planetary returns for Sun, Mercury, Venus, Mars.
// A return = transiting planet ☌ its own natal position (orb 1°).
// Results are in the same period format as computeTransits — they integrate
// into the transit rows automatically.

const RETURN_ASP = { angle: 0, color: '#cc7700', symbol: '↩', type: 'return' };

function computeReturnPeriods(natalPlanets, jdStart, jdEnd) {
  const flags  = (swe.SEFLG_SWIEPH ?? 2) | (swe.SEFLG_SPEED ?? 256);
  const DAYS   = Math.ceil(jdEnd - jdStart) + 2;
  const ORB    = 1.0;
  const periods = [];

  for (const id of FAST_IDS) {
    const natalPl = natalPlanets.find(p => p.id === id);
    if (!natalPl) continue;
    const tPlanet = PLANETS.find(p => p.id === id);
    const lons    = new Float64Array(DAYS);
    for (let i = 0; i < DAYS; i++) {
      const r = swe.calc_ut(jdStart + i, id, flags);
      lons[i] = ((r[0] % 360) + 360) % 360;
    }

    let inPeriod = false, pStart = 0;
    let prevDiff = Infinity, wasDecreasing = false;
    let curMinDay = -1, curMinDiff = Infinity;
    let localMinima = [];

    const closePeriod = endIdx => {
      if (wasDecreasing && curMinDay >= 0)
        localMinima.push({ day: curMinDay, diff: curMinDiff });
      if (localMinima.length) {
        // Fast planets move ~1°/day so daily minimum may be 0.3-0.7° — too large for
        // refineExactAspects (EXACT_THRESH=0.1°). Use our own hourly scan instead.
        const best = localMinima.reduce((a, b) => a.diff < b.diff ? a : b);
        let minD = Infinity, minJD = jdStart + best.day;
        for (let h = -24; h <= 24; h++) {
          const jd  = jdStart + best.day + h / 24;
          const r   = swe.calc_ut(jd, id, flags);
          const lon = ((r[0] % 360) + 360) % 360;
          const d   = Math.abs(angDiff(lon, natalPl.longitude));
          if (d < minD) { minD = d; minJD = jd; }
        }
        if (minD < 0.5) // planet genuinely returns to within 0.5° of natal
          periods.push({ tPlanet, na: natalPl, asp: RETURN_ASP,
            startJD: jdStart + pStart, endJD: jdStart + endIdx, exactJDs: [minJD] });
      }
      inPeriod = false; prevDiff = Infinity; wasDecreasing = false;
      curMinDay = -1; curMinDiff = Infinity; localMinima = [];
    };

    for (let i = 0; i < DAYS; i++) {
      const diff = Math.abs(angDiff(lons[i], natalPl.longitude));
      if (diff <= ORB) {
        if (!inPeriod) {
          inPeriod = true; pStart = i;
          prevDiff = diff; wasDecreasing = false;
          curMinDay = i; curMinDiff = diff;
        } else {
          if (diff < prevDiff) { wasDecreasing = true; curMinDay = i; curMinDiff = diff; }
          else if (diff > prevDiff + 0.005 && wasDecreasing) {
            localMinima.push({ day: curMinDay, diff: curMinDiff });
            wasDecreasing = false;
          }
          prevDiff = diff;
        }
      } else if (inPeriod) { closePeriod(i - 1); }
    }
    if (inPeriod) closePeriod(DAYS - 1);
  }
  return periods;
}

function renderTimeline({ periods, jdStart, jdEnd, jdToday, progEvents = [], dirEvents = [], jdCursor = null }) {
  const tl = document.getElementById('transit-tl');
  if (!periods.length) {
    tl.innerHTML = '<div class="tl-status">Нет активных транзитов в этом периоде.</div>';
    return;
  }

  const PX_PER_DAY = tlYearScale ? 70 / 365.25 : 3;  // year mode: 70px/yr; month mode: 3px/day
  const LABEL_W    = 44;
  const HDR_H      = 28;
  const BAR_H      = 4;
  const SUB_H      = 18;
  const SPAN       = jdEnd - jdStart;
  const BARS_W     = Math.ceil(SPAN * PX_PER_DAY);

  const xOf = jd => Math.min(Math.max((jd - jdStart) * PX_PER_DAY, 0), BARS_W);

  const tooltip = document.getElementById('tl-tooltip');
  const addTip = (elem, text) => {
    elem.addEventListener('mouseover', () => { tooltip.textContent = text; tooltip.style.display = 'block'; });
    elem.addEventListener('mousemove', e => { tooltip.style.left = (e.clientX + 14) + 'px'; tooltip.style.top = (e.clientY - 30) + 'px'; });
    elem.addEventListener('mouseout',  () => { tooltip.style.display = 'none'; });
    return elem;
  };

  // ── Row layout ──────────────────────────────────────────────────────────────
  const byNatal = {};
  for (const p of periods) {
    if (!p.exactJDs?.length) continue;               // skip non-perfecting
    if (hiddenTPlants.has(p.tPlanet.id)) continue;   // skip filtered planets
    if (tlYearScale && p.asp.type === 'return' && [0,2,3,4].includes(p.tPlanet.id)) continue; // hide fast-planet returns in year view
    (byNatal[p.na.id] ??= []).push(p);
  }

  // Fixed lane assignment: same transit (planet + aspect) → always same sub-row
  const assignLanes = (ps) => {
    const keys = [...new Set(
      [...ps]
        .sort((a, b) => a.tPlanet.id - b.tPlanet.id || a.asp.angle - b.asp.angle)
        .map(p => `${p.tPlanet.id}-${p.asp.angle}`)
    )];
    const laneOf = new Map(keys.map((k, i) => [k, i]));
    for (const p of ps) p.sub = laneOf.get(`${p.tPlanet.id}-${p.asp.angle}`);
    return { ps, nSubs: Math.max(laneOf.size, 1) };
  };

  // Greedy lane packing: sort by start, reuse lane once previous transit ended + gap days
  const packRows = (ps, gap = 1) => {
    const sorted = [...ps].sort((a, b) => a.startJD - b.startJD);
    const laneEnds = [];
    for (const p of sorted) {
      let placed = false;
      for (let s = 0; s < laneEnds.length; s++) {
        if (p.startJD > laneEnds[s] + gap) { p.sub = s; laneEnds[s] = p.endJD; placed = true; break; }
      }
      if (!placed) { p.sub = laneEnds.length; laneEnds.push(p.endJD); }
    }
    return { ps: sorted, nSubs: Math.max(laneEnds.length, 1) };
  };

  const rows = PLANETS
    .filter(pl => byNatal[pl.id]?.length)
    .map(pl => {
      // Month mode: fixed lanes; year mode: greedy packing
      const { ps, nSubs } = tlYearScale ? packRows(byNatal[pl.id], 30) : assignLanes(byNatal[pl.id]);
      const slowH = nSubs * SUB_H + 20;

      // Fast planets section (if expanded)
      const isExpanded = expandedRows.has(pl.id);
      let fastPs = [], fastNSubs = 0, fastH = 0;
      if (isExpanded) {
        const cached = fastCache[pl.id];
        if (cached) {
          const fp = packRows(cached);
          fastPs = fp.ps; fastNSubs = fp.nSubs;
          fastH = fastNSubs * SUB_H + 20;
        } else {
          fastH = 22; // "loading…" placeholder height
        }
      }

      return { pl, natalPl: byNatal[pl.id][0].na,
               ps, nSubs, slowH, fastPs, fastNSubs, fastH, isExpanded,
               h: slowH + fastH };
    });

  // ── Progressed events section layout ──────────────────────────────────────────
  const progAspects   = progEvents.filter(e => e.type === 'aspect');
  const progMoonAsps  = progEvents.filter(e => e.type === 'moon_aspect');
  const progPoints    = progEvents.filter(e => e.type !== 'aspect' && e.type !== 'moon_aspect');

  // Greedy-pack helper
  const greedyPack = arr => {
    const sorted = [...arr].sort((a,b) => a.startJD - b.startJD);
    const ends = [];
    for (const p of sorted) {
      let placed = false;
      for (let s = 0; s < ends.length; s++) {
        if (p.startJD > ends[s] + 1) { p.sub = s; ends[s] = p.endJD; placed = true; break; }
      }
      if (!placed) { p.sub = ends.length; ends.push(p.endJD); }
    }
    return sorted.length ? Math.max(...sorted.map(p => p.sub + 1)) : 0;
  };

  const nProgAspSubs  = greedyPack(progAspects);
  const nMoonAspSubs  = greedyPack(progMoonAsps);

  const PROG_ASP_H       = nProgAspSubs > 0 ? nProgAspSubs * SUB_H + 10 : 0;
  const PROG_MOON_FULL_H = nMoonAspSubs > 0 ? nMoonAspSubs * SUB_H + 10 : 0;
  const PROG_MOON_H      = PROG_MOON_FULL_H > 0 ? (moonBandCollapsed ? 16 : PROG_MOON_FULL_H) : 0;
  const PROG_TICK_H      = progPoints.length > 0 ? 28 : 0;
  const PROG_SECTION_H = PROG_ASP_H + PROG_MOON_H + PROG_TICK_H;

  const DIR_TICK_H = dirEvents.length > 0 ? 48 : 0;

  let y = HDR_H + PROG_SECTION_H + DIR_TICK_H;
  for (const r of rows) { r.y = y; y += r.h; }
  const TL_H = y + 4;

  // ── Timeline range label ────────────────────────────────────────────────────
  const hel = (tag, cls) => { const e = document.createElement(tag); if (cls) e.className = cls; return e; };
  const fmtMon = jd => new Date((jd - 2440587.5) * 86400000)
    .toLocaleDateString('ru', { month: 'short', year: 'numeric' });
  const fmtDate = jd => new Date((jd - 2440587.5) * 86400000)
    .toLocaleDateString('ru', { day: 'numeric', month: 'short', year: 'numeric' });
  const nav = hel('div'); nav.id = 'tl-nav';
  const navLbl = hel('span'); navLbl.id = 'tl-nav-lbl';
  navLbl.textContent = `${fmtMon(jdStart)} — ${fmtMon(jdEnd)}`;
  nav.appendChild(navLbl);

  // ── Left panel SVG (sticky planet labels) ───────────────────────────────────
  const svgL = el('svg', { id: 'tl-svg-left', width: LABEL_W, height: TL_H });
  svgL.appendChild(el('rect', { x:0, y:0, width:LABEL_W, height:TL_H, fill:'#fff' }));
  if (PROG_SECTION_H > 0) {
    svgL.appendChild(el('rect', { x:0, y:HDR_H, width:LABEL_W, height:PROG_SECTION_H, fill:'#eeeaf5' }));
    // "Пр" label centred on non-moon part
    const prH = PROG_ASP_H + PROG_TICK_H;
    if (prH > 0)
      svgL.appendChild(txt(LABEL_W/2, HDR_H + prH/2, 'Пр', {
        'font-size': 9, fill: '#aaa', 'text-anchor': 'middle', 'dominant-baseline': 'central',
        'font-style': 'italic',
      }));
    // Moon band label + collapse toggle
    if (PROG_MOON_H > 0) {
      const moonBandY = HDR_H + PROG_ASP_H;
      svgL.appendChild(el('rect', { x:0, y:moonBandY, width:LABEL_W, height:PROG_MOON_H, fill:'#dde8f5' }));
      svgL.appendChild(txt(LABEL_W/2, moonBandY + PROG_MOON_H/2, '☽\uFE0E', {
        'font-size': 13, fill: '#7799cc', 'text-anchor': 'middle', 'dominant-baseline': 'central',
      }));
      svgL.appendChild(txt(LABEL_W/2, moonBandY + PROG_MOON_H - 3,
        moonBandCollapsed ? '▸' : '▾', {
        'font-size': 8, fill: '#7799cc',
        'text-anchor': 'middle', 'dominant-baseline': 'auto',
      }));
      svgL.appendChild(ln(0, moonBandY, LABEL_W, moonBandY, { stroke: '#c8d8ee', 'stroke-width': 0.8 }));
      svgL.appendChild(ln(0, moonBandY + PROG_MOON_H, LABEL_W, moonBandY + PROG_MOON_H,
        { stroke: '#c8d8ee', 'stroke-width': 0.8 }));
      // Invisible hit area for toggle
      const moonHit = el('rect', {
        x: 0, y: moonBandY, width: LABEL_W, height: PROG_MOON_H,
        fill: 'transparent', style: 'cursor:pointer',
      });
      moonHit.addEventListener('click', () => {
        moonBandCollapsed = !moonBandCollapsed;
        renderTimeline(cachedTimeline);
      });
      svgL.appendChild(moonHit);
    }
    svgL.appendChild(ln(0, HDR_H + PROG_SECTION_H, LABEL_W, HDR_H + PROG_SECTION_H,
      { stroke: '#bbb', 'stroke-width': 1 }));
  }
  if (DIR_TICK_H > 0) {
    const dirY = HDR_H + PROG_SECTION_H;
    svgL.appendChild(el('rect', { x:0, y:dirY, width:LABEL_W, height:DIR_TICK_H, fill:'#f5ede0' }));
    svgL.appendChild(txt(LABEL_W/2, dirY + DIR_TICK_H/2, 'Дир', {
      'font-size': 9, fill: '#aaa', 'text-anchor': 'middle', 'dominant-baseline': 'central',
      'font-style': 'italic',
    }));
    svgL.appendChild(ln(0, dirY + DIR_TICK_H, LABEL_W, dirY + DIR_TICK_H,
      { stroke: '#bbb', 'stroke-width': 1 }));
  }
  rows.forEach((r, i) => {
    if (i % 2 === 0)
      svgL.appendChild(el('rect', { x:0, y:r.y, width:LABEL_W, height:r.h, fill:'#f7f7f4' }));
    svgL.appendChild(ln(0, r.y, LABEL_W, r.y, { stroke: '#e8e8e4', 'stroke-width': 0.5 }));

    // Planet glyph (centered in slow section)
    svgL.appendChild(txt(LABEL_W / 2, r.y + r.slowH / 2, r.pl.glyph, {
      'font-size': 18, fill: '#333',
      'text-anchor': 'middle', 'dominant-baseline': 'central',
    }));

    // Expand toggle indicator (▸ collapsed / ▾ expanded)
    svgL.appendChild(txt(LABEL_W / 2, r.y + r.slowH - 5, r.isExpanded ? '▾' : '▸', {
      'font-size': 9, fill: '#aaa',
      'text-anchor': 'middle', 'dominant-baseline': 'auto',
    }));

    // Separator between slow and fast sections when expanded
    if (r.isExpanded && r.fastH > 0) {
      svgL.appendChild(ln(4, r.y + r.slowH, LABEL_W - 4, r.y + r.slowH,
        { stroke: '#d0d0cc', 'stroke-width': 0.8, 'stroke-dasharray': '2,2' }));
    }

    // Invisible click target over the whole row
    const hit = el('rect', {
      x: 0, y: r.y, width: LABEL_W, height: r.h,
      fill: 'transparent', style: 'cursor:pointer',
    });
    hit.addEventListener('click', () => {
      const id = r.pl.id;
      if (expandedRows.has(id)) {
        expandedRows.delete(id);
        renderTimeline(cachedTimeline);
      } else {
        expandedRows.add(id);
        if (!fastCache[id]) {
          fastCache[id] = computeFastTransits(r.natalPl, jdStart, jdEnd);
        }
        renderTimeline(cachedTimeline);
      }
    });
    svgL.appendChild(hit);
  });
  svgL.appendChild(ln(0, HDR_H, LABEL_W, HDR_H, { stroke: '#ccc', 'stroke-width': 0.8 }));
  svgL.appendChild(ln(LABEL_W - 0.5, 0, LABEL_W - 0.5, TL_H, { stroke: '#ccc', 'stroke-width': 1 }));

  // ── Settings gear in header ──────────────────────────────────────────────────
  const gearG = el('g', { style: 'cursor:pointer' });
  gearG.appendChild(txt(LABEL_W / 2, HDR_H / 2, '⚙\uFE0E', {
    'font-size': 14, fill: '#aaa', 'text-anchor': 'middle', 'dominant-baseline': 'central',
  }));
  const gearHit = el('rect', { x: 0, y: 0, width: LABEL_W, height: HDR_H, fill: 'transparent' });
  gearHit.addEventListener('click', e => {
    e.stopPropagation();
    let menu = document.getElementById('tl-settings-menu');
    if (!menu) return;
    const rect = svgL.getBoundingClientRect();
    menu.style.left = rect.left + 'px';
    menu.style.top  = (rect.top + HDR_H) + 'px';
    menu.style.display = menu.style.display === 'none' ? 'block' : 'none';
  });
  gearG.appendChild(gearHit);
  svgL.appendChild(gearG);

  // ── Settings dropdown menu (created once, reused) ────────────────────────────
  let menu = document.getElementById('tl-settings-menu');
  if (!menu) {
    menu = hel('div'); menu.id = 'tl-settings-menu'; menu.style.display = 'none';
    document.body.appendChild(menu);
    document.addEventListener('click', () => { menu.style.display = 'none'; }, { capture: true });
  }
  // Rebuild menu items each render so active state is current
  menu.innerHTML = '';
  const mkItem = (label, active, onClick) => {
    const item = hel('div'); item.className = 'tl-sm-item' + (active ? ' tl-sm-active' : '');
    item.textContent = label;
    item.addEventListener('click', e => { e.stopPropagation(); menu.style.display = 'none'; onClick(); });
    menu.appendChild(item);
  };
  mkItem('по месяцам', !tlYearScale, () => { if (tlYearScale) { tlYearScale = false; const c = cachedTimeline?.center; cachedTimeline = null; fastCache = {}; computeAndRenderTimeline(natalData.planets, c); } });
  mkItem('по годам',  tlYearScale,  () => { if (!tlYearScale) { tlYearScale = true; const c = cachedTimeline?.center; cachedTimeline = null; fastCache = {}; computeAndRenderTimeline(natalData.planets, c); } });

  // ── Right SVG (scrollable bars + grid) ──────────────────────────────────────
  const svgR = el('svg', { id: 'tl-svg-right', width: BARS_W, height: TL_H, style: 'display:block' });

  svgR.appendChild(el('rect', { x:0, y:0, width:BARS_W, height:TL_H, fill:'#fff' }));
  rows.forEach((r, i) => {
    if (i % 2 === 0)
      svgR.appendChild(el('rect', { x:0, y:r.y, width:BARS_W, height:r.h, fill:'#f7f7f4' }));
  });
  // Helper: attach click + touch navigation to any SVG element
  const makeNavHit = (elem, cb) => {
    let _ts = 0;
    elem.addEventListener('touchstart', e => { _ts = e.touches[0].clientX; }, { passive: true });
    elem.addEventListener('touchend', e => {
      if (Math.abs(e.changedTouches[0].clientX - _ts) < 8) cb();
    });
    elem.addEventListener('click', () => cb());
    return elem;
  };

  if (PROG_SECTION_H > 0) {
    svgR.appendChild(el('rect', { x:0, y:HDR_H, width:BARS_W, height:PROG_SECTION_H, fill:'#eeeaf5', opacity:'0.55' }));
    svgR.appendChild(ln(0, HDR_H + PROG_SECTION_H, BARS_W, HDR_H + PROG_SECTION_H,
      { stroke: '#bbb', 'stroke-width': 1 }));

    // ── Aspect bars (top zone) ─────────────────────────────────────────────────
    for (const p of progAspects) {
      const x1   = xOf(p.startJD);
      const x2   = xOf(p.endJD + 1);
      const barW = Math.max(x2 - x1, 2);
      const barY = HDR_H + 6 + p.sub * SUB_H + (SUB_H - BAR_H) / 2;

      const bar = el('rect', { x: x1, y: barY, width: barW, height: BAR_H, fill: p.color, rx: 1, opacity: '0.82' });
      addTip(bar, `пр ${p.label}  ·  ${fmtDate(p.exactJD ?? p.jd)}`);
      svgR.appendChild(bar);

      // Exact dot — clickable
      const xE  = xOf(p.jd);
      const dotY = barY + BAR_H / 2;
      svgR.appendChild(circ(xE, dotY, 3, { fill: '#fff', stroke: p.color, 'stroke-width': 1.2 }));
      svgR.appendChild(makeNavHit(circ(xE, dotY, 10, { fill: 'transparent', style: 'cursor:pointer' }), () => switchModeAndNavigate('progressed', p.jd)));

      // Label
      const lblX = barW >= 14 ? x1 + barW / 2 : xE;
      svgR.appendChild(txt(lblX, barY - 3, p.label, {
        'font-size': 10, fill: p.color,
        'text-anchor': 'middle', 'dominant-baseline': 'auto',
      }));
    }

    // ── Progressed Moon → natal aspect bars ───────────────────────────────────
    if (PROG_MOON_H > 0 && !moonBandCollapsed) {
      const moonBandY = HDR_H + PROG_ASP_H;
      svgR.appendChild(el('rect', { x:0, y:moonBandY, width:BARS_W, height:PROG_MOON_H, fill:'#dde8f5', opacity:'0.55' }));
      svgR.appendChild(ln(0, moonBandY, BARS_W, moonBandY, { stroke: '#c8d8ee', 'stroke-width': 0.8 }));
      svgR.appendChild(ln(0, moonBandY + PROG_MOON_H, BARS_W, moonBandY + PROG_MOON_H, { stroke: '#c8d8ee', 'stroke-width': 0.8 }));
      for (const p of progMoonAsps) {
        const x1   = xOf(p.startJD);
        const x2   = xOf(p.endJD + 1);
        const barW = Math.max(x2 - x1, 2);
        const barY = moonBandY + 6 + p.sub * SUB_H + (SUB_H - BAR_H) / 2;
        const mBar = el('rect', { x: x1, y: barY, width: barW, height: BAR_H, fill: p.color, rx: 1, opacity: '0.82' });
        addTip(mBar, `пр ${p.label}  ·  ${fmtDate(p.exactJD ?? p.jd)}`);
        svgR.appendChild(mBar);
        const xE  = xOf(p.jd);
        const dotY = barY + BAR_H / 2;
        svgR.appendChild(circ(xE, dotY, 3, { fill: '#fff', stroke: p.color, 'stroke-width': 1.2 }));
        svgR.appendChild(makeNavHit(circ(xE, dotY, 10, { fill: 'transparent', style: 'cursor:pointer' }), () => switchModeAndNavigate('progressed', p.jd)));
        const lblX = barW >= 14 ? x1 + barW / 2 : xE;
        svgR.appendChild(txt(lblX, barY - 3, p.label, {
          'font-size': 10, fill: p.color,
          'text-anchor': 'middle', 'dominant-baseline': 'auto',
        }));
      }
    }

    // ── Point ticks (bottom zone) — sign / house / phase ──────────────────────
    if (PROG_TICK_H > 0) {
      const tickBase  = HDR_H + PROG_ASP_H + PROG_MOON_H;
      const rowY      = [ tickBase + 2, tickBase + 14 ];
      const sortedPts = [...progPoints].sort((a, b) => a.jd - b.jd);
      let lastX = -999, rowIdx = 0;
      for (const ev of sortedPts) {
        const xE   = xOf(ev.jd);
        if (xE - lastX < 36) rowIdx = 1 - rowIdx; else rowIdx = 0;
        lastX = xE;
        const lblY = rowY[rowIdx];
        const dotY = lblY + 12;
        svgR.appendChild(txt(xE, lblY, ev.label, {
          'font-size': 10, fill: ev.color,
          'text-anchor': 'middle', 'dominant-baseline': 'hanging',
        }));
        svgR.appendChild(circ(xE, dotY, 3, { fill: ev.color, opacity: '0.85' }));
        const pHit = makeNavHit(circ(xE, dotY, 8, { fill: 'transparent', style: 'cursor:pointer' }), () => switchModeAndNavigate('progressed', ev.jd));
        addTip(pHit, `пр ${ev.label}  ·  ${fmtDate(ev.jd)}`);
        svgR.appendChild(pHit);
      }
    }
  }

  // ── Direction events section ─────────────────────────────────────────────────
  if (DIR_TICK_H > 0) {
    const dirY = HDR_H + PROG_SECTION_H;
    svgR.appendChild(el('rect', { x:0, y:dirY, width:BARS_W, height:DIR_TICK_H, fill:'#f5ede0', opacity:'0.55' }));
    svgR.appendChild(ln(0, dirY + DIR_TICK_H, BARS_W, dirY + DIR_TICK_H,
      { stroke: '#bbb', 'stroke-width': 1 }));

    const rowY  = [ dirY + 2, dirY + 18, dirY + 34 ]; // three rows with 16px spacing
    const sorted = [...dirEvents].sort((a, b) => a.jd - b.jd);
    let lastX = -999, rowIdx = 0;
    for (const ev of sorted) {
      const xE   = xOf(ev.jd);
      if (xE - lastX < 36) rowIdx = (rowIdx + 1) % 3; else rowIdx = 0;
      lastX = xE;
      const lblY = rowY[rowIdx];
      const dotY = lblY + 12;
      svgR.appendChild(txt(xE, lblY, ev.label, {
        'font-size': 10, fill: ev.color,
        'text-anchor': 'middle', 'dominant-baseline': 'hanging',
      }));
      svgR.appendChild(circ(xE, dotY, 3, { fill: ev.color, opacity: '0.85' }));
      const dHit = makeNavHit(circ(xE, dotY, 8, { fill: 'transparent', style: 'cursor:pointer' }), () => switchModeAndNavigate('direction', ev.jd));
      addTip(dHit, `дир ${ev.label}  ·  ${fmtDate(ev.jd)}`);
      svgR.appendChild(dHit);
    }
  }

  // Grid + labels — drawn into svgHdr (sticky) + vertical lines into svgR
  const svgHdr = el('svg', { id: 'tl-svg-hdr', width: BARS_W, height: HDR_H, style: 'display:block' });
  svgHdr.appendChild(el('rect', { x:0, y:0, width:BARS_W, height:HDR_H, fill:'#fff' }));

  if (tlYearScale) {
    const startYear = new Date((jdStart - 2440587.5) * 86400000).getFullYear();
    const endYear   = new Date((jdEnd   - 2440587.5) * 86400000).getFullYear() + 1;
    for (let yr = startYear; yr <= endYear; yr++) {
      const xYr = xOf(swe.julday(yr, 1, 1, 0));
      svgHdr.appendChild(ln(xYr, 0, xYr, HDR_H, { stroke: '#ddd', 'stroke-width': 0.7 }));
      svgHdr.appendChild(txt(xYr + 3, 16, String(yr), { 'font-size': 11, fill: '#999' }));
      svgR.appendChild(ln(xYr, 0, xYr, TL_H, { stroke: '#ddd', 'stroke-width': 0.7 }));
    }
  } else {
    const MS = ['Янв','Фев','Мар','Апр','Май','Июн','Июл','Авг','Сен','Окт','Ноя','Дек'];
    const sd = new Date((jdStart - 2440587.5) * 86400000);
    sd.setDate(1); sd.setHours(0, 0, 0, 0);
    const numMonths = Math.ceil(SPAN / 28) + 3;
    for (let m = 0; m <= numMonths; m++) {
      const md  = new Date(sd); md.setMonth(sd.getMonth() + m);
      const mJD = swe.julday(md.getFullYear(), md.getMonth() + 1, 1, 0);
      if (mJD < jdStart - 1 || mJD > jdEnd + 1) continue;
      const x   = xOf(mJD);
      svgHdr.appendChild(ln(x, 0, x, HDR_H, { stroke: '#ddd', 'stroke-width': 0.7 }));
      const monLbl = md.getMonth() === 0 ? `Янв ${md.getFullYear()}` : MS[md.getMonth()];
      svgHdr.appendChild(txt(x + 3, 16, monLbl, { 'font-size': 11, fill: '#999' }));
      svgR.appendChild(ln(x, 0, x, TL_H, { stroke: '#ddd', 'stroke-width': 0.7 }));
    }
  }
  svgHdr.appendChild(ln(0, HDR_H - 1, BARS_W, HDR_H - 1, { stroke: '#ccc', 'stroke-width': 0.8 }));

  // Clickable header strip — in svgHdr
  const hdrHit = el('rect', {
    x: 0, y: 0, width: BARS_W, height: HDR_H,
    fill: 'transparent', style: 'cursor:pointer',
  });
  const hdrXtoJD = clientX => {
    const x = clientX - svgHdr.getBoundingClientRect().left;
    return jdStart + x / PX_PER_DAY;
  };
  let hdrTouchStartX = 0;
  hdrHit.addEventListener('touchstart', e => { hdrTouchStartX = e.touches[0].clientX; }, { passive: true });
  hdrHit.addEventListener('touchend', e => {
    if (Math.abs(e.changedTouches[0].clientX - hdrTouchStartX) < 8) applyNavigatedJD(hdrXtoJD(e.changedTouches[0].clientX));
  });
  hdrHit.addEventListener('click', e => applyNavigatedJD(hdrXtoJD(e.clientX)));
  svgHdr.appendChild(hdrHit);

  // Current date line (full height in svgR) + marker in svgHdr
  const xT = xOf(jdCursor ?? jdToday);
  svgR.appendChild(ln(xT, 0, xT, TL_H, { stroke: '#e44', 'stroke-width': 1.2, 'stroke-dasharray': '4,2', opacity: '0.8' }));
  svgHdr.appendChild(ln(xT, 0, xT, HDR_H, { stroke: '#e44', 'stroke-width': 1.2, 'stroke-dasharray': '4,2', opacity: '0.8' }));
  svgHdr.appendChild(txt(xT + 2, 11, '▼', { 'font-size': 8, fill: '#e44' }));

  // Helper: draw bars + dots + labels for a set of periods
  const drawBars = (ps, baseY, opacity = '0.82') => {
    for (const p of ps) {
      const x1   = xOf(p.startJD);
      const x2   = xOf(p.endJD + 1);
      const barW = Math.max(x2 - x1, 2);
      const isReturn = p.asp.type === 'return';
      const barH = isReturn ? 6 : BAR_H;
      const barY = baseY + 10 + p.sub * SUB_H + (SUB_H - barH) / 2;

      const bar = el('rect', {
        x: x1, y: barY, width: Math.max(barW, isReturn ? 4 : 2), height: barH,
        fill: p.asp.color, rx: 1, opacity,
      });

      // Floating tooltip on hover
      const nearest = p.exactJDs?.length
        ? p.exactJDs.reduce((b, j) => Math.abs(j - jdToday) < Math.abs(b - jdToday) ? j : b)
        : null;
      const tipText = `${p.na.glyph} ${p.asp.symbol} ${p.tPlanet.glyph}` +
        (nearest ? `  ·  ${fmtDate(nearest)}` : '');
      bar.addEventListener('mouseover', () => {
        tooltip.textContent = tipText;
        tooltip.style.display = 'block';
      });
      bar.addEventListener('mousemove', e => {
        tooltip.style.left = (e.clientX + 14) + 'px';
        tooltip.style.top  = (e.clientY - 30) + 'px';
      });
      bar.addEventListener('mouseout', () => { tooltip.style.display = 'none'; });
      svgR.appendChild(bar);

      // Exact aspect dots — clickable, with large touch target
      for (const ejd of (p.exactJDs ?? [])) {
        const xE = xOf(ejd);
        if (xE >= x1 - 1 && xE <= x2 + 1) {
          const dotY = barY + barH / 2;
          svgR.appendChild(circ(xE, dotY, isReturn ? 4 : 3, {
            fill: '#fff', stroke: p.asp.color, 'stroke-width': 1.2,
          }));
          svgR.appendChild(makeNavHit(
            circ(xE, dotY, 10, { fill: 'transparent', style: 'cursor:pointer' }),
            () => switchModeAndNavigate('transit', ejd)
          ));
        }
      }


      {
        const isReturn = p.asp.type === 'return';
        const lblX = (isReturn || barW < 10) ? xOf(p.exactJDs?.[0] ?? (p.startJD + p.endJD) / 2) : x1 + barW / 2;
        const barLbl = p.tPlanet.glyph + p.asp.symbol;
        if (barW >= 10 || isReturn) {
          svgR.appendChild(txt(lblX, barY - 3, barLbl, {
            'font-size': isReturn ? 12 : 10, fill: p.asp.color,
            'text-anchor': 'middle', 'dominant-baseline': 'auto',
            'font-weight': isReturn ? 'bold' : 'normal',
          }));
        }
      }
    }
  };

  // Bars, dots, labels
  for (const r of rows) {
    svgR.appendChild(ln(0, r.y, BARS_W, r.y, { stroke: '#e8e8e4', 'stroke-width': 0.5 }));

    // Slow planet bars
    drawBars(r.ps, r.y, '0.82');

    // Fast planet section (if expanded)
    if (r.isExpanded) {
      const fastBaseY = r.y + r.slowH;
      // Separator line
      svgR.appendChild(ln(0, fastBaseY, BARS_W, fastBaseY,
        { stroke: '#d0d0cc', 'stroke-width': 0.8, 'stroke-dasharray': '3,3' }));

      if (r.fastPs.length) {
        // Subtle background tint for the fast section
        svgR.appendChild(el('rect', {
          x: 0, y: fastBaseY, width: BARS_W, height: r.fastH,
          fill: '#f0f0f8', opacity: '0.5',
        }));
        drawBars(r.fastPs, fastBaseY, '0.65');
      } else if (!fastCache[r.pl.id]) {
        // Computing… text (shouldn't normally show; computation is sync)
        svgR.appendChild(txt(BARS_W / 2, fastBaseY + 11, 'вычисление…', {
          'font-size': 9, fill: '#bbb', 'text-anchor': 'middle',
        }));
      } else {
        svgR.appendChild(txt(BARS_W / 2, fastBaseY + 11, 'нет быстрых транзитов', {
          'font-size': 9, fill: '#bbb', 'text-anchor': 'middle',
        }));
      }
    }
  }

  // ── "+" extend buttons inside the SVG at left / right data boundaries ────────
  const midY = HDR_H + (TL_H - HDR_H) / 2;
  const R_PLUS = 15;

  const mkPlusBtn = (cx, onClickFn) => {
    const g = el('g', { style: 'cursor:pointer' });
    g.appendChild(circ(cx, midY, R_PLUS, {
      fill: '#f4f4ef', stroke: '#bbb', 'stroke-width': 1.5,
    }));
    g.appendChild(txt(cx, midY, '+', {
      'font-size': 20, fill: '#888',
      'text-anchor': 'middle', 'dominant-baseline': 'central',
      style: 'pointer-events:none; user-select:none;',
    }));
    g.addEventListener('click', onClickFn);
    return g;
  };

  svgR.appendChild(mkPlusBtn(R_PLUS + 4, () => {
    tlPastYears++;
    const savedCenter = cachedTimeline?.center;
    cachedTimeline = null; fastCache = {};
    computeAndRenderTimeline(natalData.planets, savedCenter);
  }));
  svgR.appendChild(mkPlusBtn(BARS_W - R_PLUS - 4, () => {
    tlFutureYears++;
    const savedCenter = cachedTimeline?.center;
    cachedTimeline = null; fastCache = {};
    computeAndRenderTimeline(natalData.planets, savedCenter);
  }));

  // ── Planet filter bar ────────────────────────────────────────────────────────
  const FILTER_PLANETS = [
    { id: 7,  glyph: '♅\uFE0E', name: 'Уран'    },
    { id: 8,  glyph: '♆\uFE0E', name: 'Нептун'  },
    { id: 9,  glyph: '♇\uFE0E', name: 'Плутон'  },
    { id: 6,  glyph: '♄\uFE0E', name: 'Сатурн'  },
    { id: 5,  glyph: '♃\uFE0E', name: 'Юпитер'  },
    { id: 15, glyph: '⚷\uFE0E', name: 'Хирон'   },
    { id: 12, glyph: '⚸\uFE0E', name: 'Лилит'   },
    { id: 10, glyph: '☊\uFE0E', name: 'Узлы'    },
  ];
  const filterBar = hel('div'); filterBar.id = 'tl-filter';
  for (const fp of FILTER_PLANETS) {
    const lbl = hel('label');
    if (hiddenTPlants.has(fp.id)) lbl.classList.add('tl-f-off');
    const cb = hel('input'); cb.type = 'checkbox'; cb.checked = !hiddenTPlants.has(fp.id);
    cb.addEventListener('change', () => {
      if (cb.checked) hiddenTPlants.delete(fp.id);
      else            hiddenTPlants.add(fp.id);
      lbl.classList.toggle('tl-f-off', !cb.checked);
      if (cachedTimeline) renderTimeline(cachedTimeline);
    });
    lbl.append(cb, document.createTextNode(' ' + fp.glyph));
    lbl.title = fp.name;
    filterBar.appendChild(lbl);
  }

  // ── Assemble ────────────────────────────────────────────────────────────────
  const scrollWrap = hel('div'); scrollWrap.id = 'tl-scroll';
  scrollWrap.appendChild(svgR);

  const body = hel('div'); body.id = 'tl-body';
  body.append(svgL, scrollWrap);

  // Sticky header row
  const hdrScrollWrap = hel('div'); hdrScrollWrap.id = 'tl-hdr-scroll';
  hdrScrollWrap.appendChild(svgHdr);
  const hdrLeft = hel('div');
  hdrLeft.style.cssText = `width:${LABEL_W}px; flex-shrink:0; background:#fff`;
  const hdrSticky = hel('div'); hdrSticky.id = 'tl-hdr-sticky';
  hdrSticky.append(hdrLeft, hdrScrollWrap);

  // Sync horizontal scroll between header and body
  scrollWrap.addEventListener('scroll', () => { hdrScrollWrap.scrollLeft = scrollWrap.scrollLeft; });
  hdrScrollWrap.addEventListener('scroll', () => { scrollWrap.scrollLeft = hdrScrollWrap.scrollLeft; });

  // filterBar → transit-mode-content in left panel
  const modeContent = document.getElementById('transit-mode-content');
  modeContent.querySelector('#tl-filter')?.remove();
  modeContent.appendChild(filterBar);

  tl.replaceChildren(hdrSticky, body);

  // Scroll so "today" is ~30 % from the left edge
  requestAnimationFrame(() => {
    scrollWrap.scrollLeft = xT - scrollWrap.clientWidth * 0.3;
    hdrScrollWrap.scrollLeft = scrollWrap.scrollLeft;
  });
}

function setStatus(msg) { document.getElementById('status').textContent = msg; }
