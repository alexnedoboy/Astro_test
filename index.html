  document.getElementById('fc-calc-btn').onclick = computeAndRenderForecast;
  updateForecastInfo();
}

function updateForecastInfo() {
  if (!natalData) return;
  const houseIdx  = currentForecastHouse - 1;
  const cusp      = natalData.cusps[houseIdx];
  const signIdx   = Math.floor(((cusp % 360) + 360) % 360 / 30);
  const rulers    = getHouseRulerPlanets(houseIdx, natalData.cusps);
  const rulerTxt  = rulers.map(r => r.glyph + '\u00A0' + r.name).join(', ');
  const pInH      = natalData.planets.filter(p => p.house === currentForecastHouse);
  const plTxt     = pInH.length ? '  ·  ' + pInH.map(p => p.glyph).join('\u202F') : '';
  document.getElementById('forecast-info').innerHTML =
    `${tr('housePrefix')}${ROMAN[houseIdx]}: ${SIGNS[signIdx]}\u202F${SIGN_NAMES[signIdx]}&nbsp;&middot;&nbsp;${tr('rulerLabel')}&nbsp;${rulerTxt}${plTxt}`;
}

function computeAndRenderForecast() {
  const ftl = document.getElementById('forecast-tl');
  if (!natalData || !swe) { ftl.innerHTML = `<div class="tl-status">${tr('noChartData')}</div>`; return; }
  const houseNum  = currentForecastHouse;
  const houseIdx  = houseNum - 1;
  const rulers    = getHouseRulerPlanets(houseIdx, natalData.cusps);
  const rulerIds  = rulers.map(r => r.id);
  const startYear = parseInt(document.getElementById('fc-start-year').value) || new Date().getFullYear();
  const duration  = Math.max(5, Math.min(50, parseInt(document.getElementById('fc-duration').value) || 20));
  const jdStart   = swe.julday(startYear, 1, 1, 0);
  const jdEnd     = swe.julday(startYear + duration, 1, 1, 0);
  ftl.innerHTML   = `<div class="tl-status">${tr('computingForecast')}</div>`;
  setTimeout(() => {
    try {
      const dirEvents      = computeLongTermDirections(houseNum, natalData.planets, natalData.cusps, natalData.birthJD, jdStart, jdEnd);
      const progEvents     = computeLongTermProgressions(houseNum, rulerIds, natalData.planets, natalData.cusps, natalData.birthJD, jdStart, jdEnd);
      const transitData    = computeLongTermTransits(houseNum, rulerIds, natalData.planets, natalData.cusps, jdStart, jdEnd);
      renderLongTermTimeline({ dirEvents, progEvents, transitData, jdStart, jdEnd, houseNum });
    } catch (e) {
      ftl.innerHTML = `<div class="tl-status">${tr('error')}${e.message}</div>`;
      console.error(e);
    }
  }, 30);
}

// ── Directions computation (solar arc) ───────────────────────────────────────

function computeLongTermDirections(houseNum, natalPlanets, natalCusps, birthJD, jdStart, jdEnd) {
  if (!birthJD || !natalCusps) return [];
  const DAYS        = Math.ceil(jdEnd - jdStart) + 2;
  const houseIdx    = houseNum - 1;
  const houseCuspLon = natalCusps[houseIdx];
  const planetsInH  = natalPlanets.filter(p => findHouse(p.longitude, natalCusps) === houseNum);
  const rulers      = getHouseRulerPlanets(houseIdx, natalCusps)
                        .map(r => natalPlanets.find(p => p.id === r.id)).filter(Boolean);
  const ascLon      = natalCusps[0];
  const ascSignIdx  = Math.floor(((ascLon % 360) + 360) % 360 / 30);
  const ascRulers   = (SIGN_RULERS[ascSignIdx] ?? [])
                        .map(id => natalPlanets.find(p => p.id === id)).filter(Boolean);

  const arcAt  = i  => (jdStart + i - birthJD) / 365.25;
  const dirLon = (natLon, i) => ((natLon + arcAt(i)) % 360 + 360) % 360;

  const DIR_ASP = [
    { angle: 0,   color: '#2244bb', symbol: '☌\uFE0E' },
    { angle: 60,  color: COLORS.tlSoft, symbol: '✶' },
    { angle: 90,  color: COLORS.tlHard, symbol: '□' },
    { angle: 120, color: COLORS.tlSoft, symbol: '△' },
    { angle: 180, color: COLORS.tlHard, symbol: '☍\uFE0E' },
  ];

  const events = [];

  // Find exact day then compute analytic orb window (arc moves 1°/year → ±orb years)
  const findDirAspects = (dirNatLon, natTargetLon, dirLbl, natLbl, orbLimit) => {
    for (const asp of DIR_ASP) {
      for (let i = 1; i < DAYS - 1; i++) {
        const orb = j => Math.abs(angDiff(dirLon(dirNatLon, j), natTargetLon) - asp.angle);
        const d0 = orb(i - 1), d1 = orb(i), d2 = orb(i + 1);
        if (d1 < d0 && d1 < d2 && d1 < orbLimit) {
          const jdEx = jdStart + i;
          events.push({ type: 'bar', jd: jdEx,
            startJD: Math.max(jdStart, jdEx - orbLimit * 365.25),
            endJD:   Math.min(jdEnd,   jdEx + orbLimit * 365.25),
            label: dirLbl + asp.symbol + natLbl, color: asp.color });
        }
      }
    }
  };

  // Sign changes: directed house cusp
  for (let i = 1; i < DAYS; i++) {
    const s0 = Math.floor(dirLon(houseCuspLon, i - 1) / 30);
    const s1 = Math.floor(dirLon(houseCuspLon, i)     / 30);
    if (s0 !== s1)
      events.push({ type: 'tick', jd: jdStart + i, label: ROMAN[houseIdx] + '→' + SIGNS[s1 % 12], color: '#555' });
  }

  // Sign changes: directed rulers
  for (const ruler of rulers) {
    for (let i = 1; i < DAYS; i++) {
      const s0 = Math.floor(dirLon(ruler.longitude, i - 1) / 30);
      const s1 = Math.floor(dirLon(ruler.longitude, i)     / 30);
      if (s0 !== s1)
        events.push({ type: 'tick', jd: jdStart + i, label: ruler.glyph + '→' + SIGNS[s1 % 12], color: '#555' });
    }
  }

  // Aspects: directed house cusp ↔ natal rulers / planets in house (both directions)
  for (const ruler of rulers) {
    const orb = (ruler.id === 0 || ruler.id === 1) ? 2 : 1;
    findDirAspects(houseCuspLon, ruler.longitude, ROMAN[houseIdx], ruler.glyph, orb);
    findDirAspects(ruler.longitude, houseCuspLon, ruler.glyph, ROMAN[houseIdx], orb);
  }

  // Aspects between co-rulers (both directions)
  for (let i = 0; i < rulers.length; i++) {
    for (let j = i + 1; j < rulers.length; j++) {
      const rA = rulers[i], rB = rulers[j];
      const orb = (rA.id === 0 || rA.id === 1 || rB.id === 0 || rB.id === 1) ? 2 : 1;
      findDirAspects(rA.longitude, rB.longitude, rA.glyph, rB.glyph, orb);
      findDirAspects(rB.longitude, rA.longitude, rB.glyph, rA.glyph, orb);
    }
  }

  // Aspects: directed planet-in-house ↔ natal rulers / cusp (both directions for each)
  for (const pl of planetsInH) {
    const orb = (pl.id === 0 || pl.id === 1) ? 2 : 1;
    // directed cusp ↔ natal planet, AND directed planet ↔ natal cusp
    findDirAspects(houseCuspLon, pl.longitude, ROMAN[houseIdx], pl.glyph, orb);
    findDirAspects(pl.longitude, houseCuspLon, pl.glyph, ROMAN[houseIdx], orb);
    for (const ruler of rulers) {
      const orbLim = (ruler.id === 0 || ruler.id === 1 || pl.id === 0 || pl.id === 1) ? 2 : 1;
      // directed ruler ↔ natal planet, AND directed planet ↔ natal ruler
      findDirAspects(ruler.longitude, pl.longitude, ruler.glyph, pl.glyph, orbLim);
      findDirAspects(pl.longitude, ruler.longitude, pl.glyph, ruler.glyph, orbLim);
    }
  }

  // Aspects: directed ASC ↔ natal house cusp, rulers, planets in house
  findDirAspects(ascLon, houseCuspLon, 'As', ROMAN[houseIdx], 1);
  for (const ruler of rulers)
    findDirAspects(ascLon, ruler.longitude, 'As', ruler.glyph, (ruler.id === 0 || ruler.id === 1) ? 2 : 1);
  for (const pl of planetsInH)
    findDirAspects(ascLon, pl.longitude, 'As', pl.glyph, (pl.id === 0 || pl.id === 1) ? 2 : 1);

  // Aspects: directed ASC rulers ↔ natal house cusp, rulers, planets in house
  for (const ar of ascRulers) {
    const aOrb = (ar.id === 0 || ar.id === 1) ? 2 : 1;
    findDirAspects(ar.longitude, houseCuspLon, ar.glyph, ROMAN[houseIdx], aOrb);
    for (const ruler of rulers)
      findDirAspects(ar.longitude, ruler.longitude, ar.glyph, ruler.glyph, aOrb);
    for (const pl of planetsInH)
      findDirAspects(ar.longitude, pl.longitude, ar.glyph, pl.glyph, aOrb);
  }

  return events;
}

// ── Progressions computation (secondary) ─────────────────────────────────────

function computeLongTermProgressions(houseNum, rulerIds, natalPlanets, natalCusps, birthJD, jdStart, jdEnd) {
  if (!birthJD) return [];
  const flags    = (swe.SEFLG_SWIEPH ?? 2) | (swe.SEFLG_SPEED ?? 256);
  const STEP     = 7;
  const DAYS     = Math.ceil((jdEnd - jdStart) / STEP) + 2;
  const houseIdx = houseNum - 1;
  const houseCuspLon = natalCusps[houseIdx];
  const rulers   = rulerIds.map(id => PLANETS.find(p => p.id === id)).filter(Boolean);

  // Precompute all progressed positions weekly
  const progLons   = new Map();
  const progSpeeds = new Map();
  for (const p of PLANETS) {
    progLons.set(p.id, new Float64Array(DAYS));
    progSpeeds.set(p.id, new Float64Array(DAYS));
  }
  for (let i = 0; i < DAYS; i++) {
    const ageYrs = (jdStart + i * STEP - birthJD) / 365.25;
    const progJD = birthJD + ageYrs;
    for (const p of PLANETS) {
      const r = swe.calc_ut(progJD, p.id, flags);
      progLons.get(p.id)[i]   = ((r[0] % 360) + 360) % 360;
      progSpeeds.get(p.id)[i] = r[3];
    }
  }

  const PROG_ASP = [
    { angle: 0,   color: '#2244bb', symbol: '☌\uFE0E' },
    { angle: 60,  color: COLORS.tlSoft, symbol: '✶' },
    { angle: 90,  color: COLORS.tlHard, symbol: '□' },
    { angle: 120, color: COLORS.tlSoft, symbol: '△' },
    { angle: 180, color: COLORS.tlHard, symbol: '☍\uFE0E' },
  ];

  const events = [];

  const findProgAsp = (lons, natalLon, progLbl, natalLbl, orbLimit) => {
    for (const asp of PROG_ASP) {
      let inPeriod = false, pStart = 0, minIdx = -1, minDiff = Infinity;
      for (let i = 0; i < DAYS; i++) {
        const diff = Math.abs(angDiff(lons[i], natalLon) - asp.angle);
        if (diff <= orbLimit) {
          if (!inPeriod) { inPeriod = true; pStart = i; minIdx = i; minDiff = diff; }
          else if (diff < minDiff) { minIdx = i; minDiff = diff; }
        } else if (inPeriod) {
          events.push({ type: 'bar', jd: jdStart + minIdx * STEP,
            startJD: jdStart + pStart * STEP, endJD: jdStart + (i - 1) * STEP,
            label: progLbl + asp.symbol + natalLbl, color: asp.color });
          inPeriod = false; minIdx = -1; minDiff = Infinity;
        }
      }
      if (inPeriod) events.push({ type: 'bar', jd: jdStart + minIdx * STEP,
        startJD: jdStart + pStart * STEP, endJD: jdEnd,
        label: progLbl + asp.symbol + natalLbl, color: asp.color });
    }
  };

  const findProgProgAsp = (lons, otherLons, progLbl, otherLbl, orbLimit) => {
    for (const asp of PROG_ASP) {
      let inPeriod = false, pStart = 0, minIdx = -1, minDiff = Infinity;
      for (let i = 0; i < DAYS; i++) {
        const diff = Math.abs(angDiff(lons[i], otherLons[i]) - asp.angle);
        if (diff <= orbLimit) {
          if (!inPeriod) { inPeriod = true; pStart = i; minIdx = i; minDiff = diff; }
          else if (diff < minDiff) { minIdx = i; minDiff = diff; }
        } else if (inPeriod) {
          events.push({ type: 'bar', jd: jdStart + minIdx * STEP,
            startJD: jdStart + pStart * STEP, endJD: jdStart + (i - 1) * STEP,
            label: 'пр' + progLbl + asp.symbol + otherLbl, color: asp.color });
          inPeriod = false; minIdx = -1; minDiff = Infinity;
        }
      }
      if (inPeriod) events.push({ type: 'bar', jd: jdStart + minIdx * STEP,
        startJD: jdStart + pStart * STEP, endJD: jdEnd,
        label: 'пр' + progLbl + asp.symbol + otherLbl, color: asp.color });
    }
  };

  for (const ruler of rulers) {
    const lons   = progLons.get(ruler.id);
    const speeds = progSpeeds.get(ruler.id);

    // Sign changes (progressed ruler)
    for (let i = 1; i < DAYS; i++) {
      if (Math.floor(lons[i - 1] / 30) !== Math.floor(lons[i] / 30)) {
        const ns = Math.floor(lons[i] / 30) % 12;
        events.push({ type: 'tick', jd: jdStart + i * STEP, label: ruler.glyph + '→' + SIGNS[ns], color: '#777' });
      }
    }

    // Direction changes (retrograde / direct)
    if (ruler.id !== 10 && ruler.id !== 12) {
      for (let i = 1; i < DAYS; i++) {
        const s0 = speeds[i - 1], s1 = speeds[i];
        if (s0 !== 0 && s1 !== 0 && s0 * s1 < 0) {
          const isR = s1 < 0;
          events.push({ type: 'tick', jd: jdStart + i * STEP,
            label: ruler.glyph + (isR ? 'R' : 'D'), color: isR ? COLORS.tlHard : COLORS.tlSoft });
        }
      }
    }

    // Progressed ruler ↔ natal house cusp
    findProgAsp(lons, houseCuspLon, ruler.glyph, ROMAN[houseIdx], (ruler.id === 0 || ruler.id === 1) ? 2 : 1);

    // Progressed ruler ↔ all natal planets
    for (const na of natalPlanets) {
      const orb = (ruler.id === 0 || ruler.id === 1 || na.id === 0 || na.id === 1) ? 2 : 1;
      findProgAsp(lons, na.longitude, ruler.glyph, na.glyph, orb);
    }

    // Progressed ruler ↔ other progressed planets
    for (const other of PLANETS) {
      if (other.id === ruler.id) continue;
      const orb = (ruler.id === 0 || ruler.id === 1 || other.id === 0 || other.id === 1) ? 2 : 1;
      findProgProgAsp(lons, progLons.get(other.id), ruler.glyph, other.glyph, orb);
    }
  }

  return events;
}

// ── Transits computation (slow planets) ──────────────────────────────────────

function computeLongTermTransits(houseNum, rulerIds, natalPlanets, natalCusps, jdStart, jdEnd) {
  const flags    = (swe.SEFLG_SWIEPH ?? 2) | (swe.SEFLG_SPEED ?? 256);
  const STEP     = 7;
  const DAYS     = Math.ceil((jdEnd - jdStart) / STEP) + 2;
  const houseIdx = houseNum - 1;

  const planetsInH  = natalPlanets.filter(p => findHouse(p.longitude, natalCusps) === houseNum);
  const rulers      = rulerIds.map(id => natalPlanets.find(p => p.id === id)).filter(Boolean)
                               .filter(r => !planetsInH.find(p => p.id === r.id));
  const cuspTarget  = { id: -(houseNum * 100), name: tr('cuspWord') + ' ' + ROMAN[houseIdx],
                        glyph: ROMAN[houseIdx], longitude: natalCusps[houseIdx] };

  // Precompute slow planet positions weekly
  const slowLons = {};
  for (const id of SLOW_IDS) {
    slowLons[id] = new Float64Array(DAYS);
    for (let i = 0; i < DAYS; i++) {
      const r = swe.calc_ut(jdStart + i * STEP, id, flags);
      slowLons[id][i] = ((r[0] % 360) + 360) % 360;
    }
  }

  const periods = [];

  const findTrPeriods = (id, targets, aspList) => {
    const lons     = slowLons[id];
    const tPlanet  = PLANETS.find(p => p.id === id);
    const orbLimit = getTransitOrb(id);
    for (const na of targets) {
      const asps = (id === 10 || id === 12 || na.id === 10 || na.id === 12)
        ? aspList.filter(a => a.angle === 0) : aspList;
      for (const asp of asps) {
        let inPeriod = false, pStart = 0, minIdx = -1, minDiff = Infinity;
        for (let i = 0; i < DAYS; i++) {
          const diff = Math.abs(angDiff(lons[i], na.longitude) - asp.angle);
          if (diff <= orbLimit) {
            if (!inPeriod) { inPeriod = true; pStart = i; minIdx = i; minDiff = diff; }
            else if (diff < minDiff) { minIdx = i; minDiff = diff; }
          } else if (inPeriod) {
            const exactJDs = refineLongTermExact(minIdx, id, na.longitude, asp.angle, jdStart, STEP, flags);
            if (exactJDs.length)
              periods.push({ tPlanet, na, asp, startJD: jdStart + pStart * STEP, endJD: jdStart + (i - 1) * STEP, exactJDs });
            inPeriod = false; minIdx = -1; minDiff = Infinity;
          }
        }
        if (inPeriod) {
          const exactJDs = refineLongTermExact(minIdx, id, na.longitude, asp.angle, jdStart, STEP, flags);
          if (exactJDs.length)
            periods.push({ tPlanet, na, asp, startJD: jdStart + pStart * STEP, endJD: jdEnd, exactJDs });
        }
      }
    }
  };

  const OUTER_IDS = [9, 8, 7, 6]; // Pluto, Neptune, Uranus, Saturn
  const ALL_ASP   = T_ASPECTS;
  const CONJ_ASP  = T_ASPECTS.filter(a => a.angle === 0);
  for (const id of OUTER_IDS) {
    findTrPeriods(id, [...planetsInH, ...rulers], ALL_ASP);
    findTrPeriods(id, [cuspTarget], CONJ_ASP);
  }

  return { periods, planetsInH, rulers, cuspTarget };
}

function refineLongTermExact(weekIdx, planetId, natalLon, aspAngle, jdStart, STEP, flags) {
  const centerJD = jdStart + weekIdx * STEP;
  let minDiff = Infinity, minJD = centerJD;
  for (let d = -14; d <= 14; d++) {
    const r   = swe.calc_ut(centerJD + d, planetId, flags);
    const lon = ((r[0] % 360) + 360) % 360;
    const diff = Math.abs(angDiff(lon, natalLon) - aspAngle);
    if (diff < minDiff) { minDiff = diff; minJD = centerJD + d; }
  }
  return minDiff <= 0.4 ? [minJD] : [];
}

// ── Long-term timeline rendering ──────────────────────────────────────────────

function renderLongTermTimeline({ dirEvents, progEvents, transitData, jdStart, jdEnd, houseNum }) {
  const ftl = document.getElementById('forecast-tl');
  const { periods, planetsInH, rulers, cuspTarget } = transitData;
  const houseIdx = houseNum - 1;

  const PX_PER_YEAR = 70;
  const PX_PER_DAY  = PX_PER_YEAR / 365.25;
  const LABEL_W     = 52;
  const HDR_H       = 28;
  const BAR_H       = 4;
  const SUB_H       = 18;
  const SPAN_DAYS   = jdEnd - jdStart;
  const BARS_W      = Math.ceil(SPAN_DAYS * PX_PER_DAY);

  const xOf = jd => Math.min(Math.max((jd - jdStart) * PX_PER_DAY, 0), BARS_W);

  const hel = (tag, cls) => { const e = document.createElement(tag); if (cls) e.className = cls; return e; };
  const fmtYear = jd => new Date((jd - 2440587.5) * 86400000).getFullYear();

  // ── Greedy bar packing ───────────────────────────────────────────────────────
  const packBars = bars => {
    const sorted = [...bars].sort((a, b) => a.startJD - b.startJD);
    const ends = [];
    for (const p of sorted) {
      let placed = false;
      for (let s = 0; s < ends.length; s++) {
        if (p.startJD > ends[s] + 1) { p.sub = s; ends[s] = p.endJD; placed = true; break; }
      }
      if (!placed) { p.sub = ends.length; ends.push(p.endJD); }
    }
    return Math.max(ends.length, 1);
  };

  // ── Direction section layout ─────────────────────────────────────────────────
  const dirBars  = dirEvents.filter(e => e.type === 'bar');
  const dirTicks = dirEvents.filter(e => e.type === 'tick');
  const nDirSubs = dirBars.length ? packBars(dirBars) : 0;
  const DIR_BAR_H  = nDirSubs > 0 ? nDirSubs * SUB_H + 10 : 0;
  const DIR_TICK_H = dirTicks.length > 0 ? 30 : 0;
  const DIR_H      = DIR_BAR_H + DIR_TICK_H + (dirEvents.length > 0 ? 6 : 0);

  // ── Progression section layout ───────────────────────────────────────────────
  const progBars  = progEvents.filter(e => e.type === 'bar');
  const progTicks = progEvents.filter(e => e.type === 'tick');
  const nProgSubs = progBars.length ? packBars(progBars) : 0;
  const PROG_BAR_H  = nProgSubs > 0 ? nProgSubs * SUB_H + 10 : 0;
  const PROG_TICK_H = progTicks.length > 0 ? 30 : 0;
  const PROG_H      = PROG_BAR_H + PROG_TICK_H + (progEvents.length > 0 ? 6 : 0);

  // ── Transit section layout (rows per target) ─────────────────────────────────
  const targets  = [...planetsInH, ...rulers, cuspTarget];
  const byTarget = {};
  for (const p of periods) (byTarget[p.na.id] ??= []).push(p);

  // Fixed lane assignment per target row (same transit type → same sub-row)
  const assignLanes = ps => {
    const keys = [...new Set([...ps].sort((a, b) => a.tPlanet.id - b.tPlanet.id || a.asp.angle - b.asp.angle)
                    .map(p => `${p.tPlanet.id}-${p.asp.angle}`))];
    const laneOf = new Map(keys.map((k, i) => [k, i]));
    for (const p of ps) p.sub = laneOf.get(`${p.tPlanet.id}-${p.asp.angle}`);
    return Math.max(laneOf.size, 1);
  };

  const trRows = targets.map(tgt => {
    const ps    = byTarget[tgt.id] ?? [];
    const nSubs = ps.length ? assignLanes(ps) : 1;
    return { tgt, ps, nSubs, h: nSubs * SUB_H + 20 };
  }).filter(r => r.ps.length > 0);

  // ── Y positions ──────────────────────────────────────────────────────────────
  const dirY  = HDR_H;
  const progY = dirY  + DIR_H;
  let   trY   = progY + PROG_H;
  for (const r of trRows) { r.y = trY; trY += r.h; }
  const TL_H = trY + 4;

  // ── Left panel SVG ───────────────────────────────────────────────────────────
  const svgL = el('svg', { id: 'tl-svg-left', width: LABEL_W, height: TL_H });
  svgL.appendChild(el('rect', { x: 0, y: 0, width: LABEL_W, height: TL_H, fill: '#fff' }));

  const addSectionLbl = (y, h, bgColor, lbl) => {
    svgL.appendChild(el('rect', { x: 0, y, width: LABEL_W, height: h, fill: bgColor }));
    svgL.appendChild(txt(LABEL_W / 2, y + h / 2, lbl, {
      'font-size': 9, fill: '#aaa', 'text-anchor': 'middle', 'dominant-baseline': 'central', 'font-style': 'italic',
    }));
    svgL.appendChild(ln(0, y + h, LABEL_W, y + h, { stroke: '#bbb', 'stroke-width': 1 }));
  };

  if (DIR_H > 0) addSectionLbl(dirY, DIR_H, COLORS.tlDir, tr('dirLabel'));
  if (PROG_H > 0) addSectionLbl(progY, PROG_H, COLORS.tlProg, tr('prLabel'));

  trRows.forEach((r, i) => {
    if (i % 2 === 0) svgL.appendChild(el('rect', { x: 0, y: r.y, width: LABEL_W, height: r.h, fill: COLORS.tlRowAlt }));
    svgL.appendChild(ln(0, r.y, LABEL_W, r.y, { stroke: '#e8e8e4', 'stroke-width': 0.5 }));
    svgL.appendChild(txt(LABEL_W / 2, r.y + r.h / 2, r.tgt.glyph, {
      'font-size': 15, fill: '#333', 'text-anchor': 'middle', 'dominant-baseline': 'central',
    }));
  });
  svgL.appendChild(ln(0, HDR_H, LABEL_W, HDR_H, { stroke: '#ccc', 'stroke-width': 0.8 }));
  svgL.appendChild(ln(LABEL_W - 0.5, 0, LABEL_W - 0.5, TL_H, { stroke: '#ccc', 'stroke-width': 1 }));

  // ── Right panel SVG ───────────────────────────────────────────────────────────
  const svgR = el('svg', { id: 'tl-svg-right', width: BARS_W, height: TL_H, style: 'display:block' });
  svgR.appendChild(el('rect', { x: 0, y: 0, width: BARS_W, height: TL_H, fill: '#fff' }));

  // Section backgrounds
  if (DIR_H > 0) {
    svgR.appendChild(el('rect', { x: 0, y: dirY, width: BARS_W, height: DIR_H, fill: COLORS.tlDir, opacity: '0.55' }));
    svgR.appendChild(ln(0, dirY + DIR_H, BARS_W, dirY + DIR_H, { stroke: '#bbb', 'stroke-width': 1 }));
  }
  if (PROG_H > 0) {
    svgR.appendChild(el('rect', { x: 0, y: progY, width: BARS_W, height: PROG_H, fill: COLORS.tlProg, opacity: '0.55' }));
    svgR.appendChild(ln(0, progY + PROG_H, BARS_W, progY + PROG_H, { stroke: '#bbb', 'stroke-width': 1 }));
  }
  trRows.forEach((r, i) => {
    if (i % 2 === 0) svgR.appendChild(el('rect', { x: 0, y: r.y, width: BARS_W, height: r.h, fill: COLORS.tlRowAlt }));
    svgR.appendChild(ln(0, r.y, BARS_W, r.y, { stroke: '#e8e8e4', 'stroke-width': 0.5 }));
  });

  // ── Helper: draw bar events (shared for dir / prog / transit) ────────────────
  const drawBarsSection = (bars, baseY) => {
    for (const p of bars) {
      const x1   = xOf(p.startJD);
      const x2   = xOf(p.endJD + 1);
      const barW = Math.max(x2 - x1, 2);
      const barY = baseY + 6 + p.sub * SUB_H + (SUB_H - BAR_H) / 2;
      const color = p.color ?? p.asp?.color ?? '#888';
      svgR.appendChild(el('rect', { x: x1, y: barY, width: barW, height: BAR_H,
        fill: color, rx: 1, opacity: '0.82' }));
      const xE = xOf(p.jd ?? (p.exactJDs?.[0] ?? (p.startJD + p.endJD) / 2));
      const dY = barY + BAR_H / 2;
      svgR.appendChild(circ(xE, dY, 3, { fill: '#fff', stroke: color, 'stroke-width': 1.2 }));
      if (barW >= 10) {
        const lbl = p.label ?? (p.tPlanet?.glyph + p.asp?.symbol);
        svgR.appendChild(txt(x1 + barW / 2, barY - 3, lbl, {
          'font-size': 10, fill: color, 'text-anchor': 'middle', 'dominant-baseline': 'auto',
        }));
      }
    }
  };

  // ── Helper: draw tick events (sign changes, direction changes) ───────────────
  const drawTicks = (ticks, baseY, sectionH) => {
    const sorted = [...ticks].sort((a, b) => a.jd - b.jd);
    const rowYs = [baseY + 2, baseY + 14];
    let lastX = -999, rowIdx = 0;
    for (const ev of sorted) {
      const xE = xOf(ev.jd);
      if (xE - lastX < 36) rowIdx = 1 - rowIdx; else rowIdx = 0;
      lastX = xE;
      svgR.appendChild(txt(xE, rowYs[rowIdx], ev.label, {
        'font-size': 10, fill: ev.color, 'text-anchor': 'middle', 'dominant-baseline': 'hanging',
      }));
      svgR.appendChild(circ(xE, rowYs[rowIdx] + 12, 3, { fill: ev.color, opacity: '0.85' }));
    }
  };

  // ── Direction events ─────────────────────────────────────────────────────────
  if (dirBars.length)  drawBarsSection(dirBars, dirY);
  if (dirTicks.length) drawTicks(dirTicks, dirY + DIR_BAR_H, DIR_TICK_H);

  // ── Progression events ───────────────────────────────────────────────────────
  if (progBars.length)  drawBarsSection(progBars, progY);
  if (progTicks.length) drawTicks(progTicks, progY + PROG_BAR_H, PROG_TICK_H);

  // ── Transit rows ─────────────────────────────────────────────────────────────
  for (const r of trRows) {
    for (const p of r.ps) {
      const x1   = xOf(p.startJD);
      const x2   = xOf(p.endJD + 1);
      const barW = Math.max(x2 - x1, 2);
      const barY = r.y + 10 + p.sub * SUB_H + (SUB_H - BAR_H) / 2;
      svgR.appendChild(el('rect', { x: x1, y: barY, width: barW, height: BAR_H,
        fill: p.asp.color, rx: 1, opacity: '0.82' }));
      for (const ejd of (p.exactJDs ?? [])) {
        const xE = xOf(ejd);
        if (xE >= x1 - 1 && xE <= x2 + 1)
          svgR.appendChild(circ(xE, barY + BAR_H / 2, 3, { fill: '#fff', stroke: p.asp.color, 'stroke-width': 1.2 }));
      }
      if (barW >= 10) {
        svgR.appendChild(txt(x1 + barW / 2, barY - 3, p.tPlanet.glyph + p.asp.symbol, {
          'font-size': 10, fill: p.asp.color, 'text-anchor': 'middle', 'dominant-baseline': 'auto',
        }));
      }
    }
  }

  // ── Year grid + labels ───────────────────────────────────────────────────────
  const startDate = new Date((jdStart - 2440587.5) * 86400000);
  const startYear = startDate.getFullYear();
  const endYear   = fmtYear(jdEnd) + 1;
  for (let yr = startYear; yr <= endYear; yr++) {
    const jdYr = swe.julday(yr, 1, 1, 0);
    if (jdYr < jdStart - 1 || jdYr > jdEnd + 1) continue;
    const x = xOf(jdYr);
    svgR.appendChild(ln(x, HDR_H - 4, x, TL_H, { stroke: '#ddd', 'stroke-width': 0.7 }));
    svgR.appendChild(txt(x + 3, 16, String(yr), { 'font-size': 11, fill: '#999' }));
  }
  svgR.appendChild(ln(0, HDR_H, BARS_W, HDR_H, { stroke: '#ccc', 'stroke-width': 0.8 }));

  // ── Today marker ─────────────────────────────────────────────────────────────
  const now    = new Date();
  const jdNow  = swe.julday(now.getUTCFullYear(), now.getUTCMonth() + 1, now.getUTCDate(), 0);
  if (jdNow >= jdStart && jdNow <= jdEnd) {
    const xN = xOf(jdNow);
    svgR.appendChild(ln(xN, 0, xN, TL_H, { stroke: '#e44', 'stroke-width': 1.2, 'stroke-dasharray': '4,2', opacity: '0.8' }));
    svgR.appendChild(txt(xN + 2, 11, '▼', { 'font-size': 8, fill: '#e44' }));
  }

  // ── Assemble ─────────────────────────────────────────────────────────────────
  const scrollWrap = hel('div'); scrollWrap.id = 'tl-scroll';
  scrollWrap.appendChild(svgR);
  const body = hel('div'); body.id = 'tl-body';
  body.append(svgL, scrollWrap);
  ftl.replaceChildren(body);

  // Scroll so today is ~25% from left
  requestAnimationFrame(() => {
    const xN = xOf(swe.julday(now.getUTCFullYear(), now.getUTCMonth() + 1, now.getUTCDate(), 0));
    scrollWrap.scrollLeft = Math.max(0, xN - scrollWrap.clientWidth * 0.25);
  });
}

// Подпись контроллера: локальные дата и время «DD.MM.YYYY HH:MM» (с учётом utcOff).
// Округляем до минуты — снимаем артефакт округления JD (10:30 не показывается как 10:29).
function fmtNavDateTime(jd, utcOff = 0) {
  const ms = Math.round(((jd - 2440587.5) * 86400000 + utcOff * 3600000) / 60000) * 60000;
  const d = new Date(ms);
  const p = n => String(n).padStart(2, '0');
  return `${p(d.getUTCDate())}.${p(d.getUTCMonth() + 1)}.${d.getUTCFullYear()} ${p(d.getUTCHours())}:${p(d.getUTCMinutes())}`;
}

function renderLeftPanelList() {
  const list = document.getElementById('left-panel-list');
  list.innerHTML = '';
  let an = lpAnalyzeQuery(_panelSearch);
  if (an.mode === 'dsl' && !swe) an = { mode: 'loading' };
  lpUpdateHint(an, null);
  if (!_homeCharts || !_homeCharts.length) {
    list.innerHTML = `<div class="left-panel-empty">Нет сохранённых карт</div>`;
    return;
  }
  let arr = [..._homeCharts];
  if (_panelGroup === '★') arr = arr.filter(c => c.pinned);
  else if (_panelGroup) arr = arr.filter(c => c.folder === _panelGroup);

  let matchesById = null;
  if (an.mode === 'dsl') {
    // Аспект-поиск: скоуп-операторы + факты; WYSIWYG-скоуп (чип папки уже применён выше)
    arr = arr.filter(c => lpScopePass(c, an.scope) && c.birth_date && c.birth_time && c.lat != null);
    const found = [];
    for (const c of arr) {
      const facts = lpGetFacts(c);
      if (!facts) continue;
      if (!an.orGroups) { found.push({ c, matches: [], bestOrb: 0 }); continue; }
      for (const group of an.orGroups) {
        const perClause = group.map(cl => lpMatchClause(facts, cl));
        if (perClause.every(m => m.length)) {
          const matches = perClause.flat();
          found.push({ c, matches, bestOrb: Math.min(...matches.map(m => m.orb)) });
          break;   // первая совпавшая OR-группа
        }
      }
    }
    found.sort((a, b) => a.bestOrb - b.bestOrb);   // точные совпадения сверху
    lpUpdateHint(an, found.length);
    arr = found.map(r => r.c);
    matchesById = new Map(found.map(r => [r.c.id, r.matches]));
  } else {
    if (an.mode === 'name' || an.mode === 'partial') {
      const q = _panelSearch.trim().toLowerCase();
      if (q) arr = arr.filter(c => (c.name ?? '').toLowerCase().includes(q) || (c.city ?? '').toLowerCase().includes(q));
    }
    if (_panelSort === 'name') arr.sort((a, b) => (a.name ?? '').localeCompare(b.name ?? '', 'ru'));
    else if (_panelSort === 'birth') arr.sort((a, b) => (a.birth_date ?? '').localeCompare(b.birth_date ?? ''));
    else arr.sort((a, b) => ((b.pinned ? 1 : 0) - (a.pinned ? 1 : 0)) || (homeChartTs(b) - homeChartTs(a)));
  }

  if (!arr.length) {
    list.innerHTML = `<div class="left-panel-empty">Ничего не найдено</div>`;
    return;
  }
  for (const c of arr) {
    const div = document.createElement('div');
    div.className = 'chart-item';
    const fmtD = c.birth_date ? c.birth_date.split('-').reverse().join('.') : '';
    const meta = [fmtD, c.city ?? ''].filter(Boolean).join(' · ');
    const matches = matchesById?.get(c.id);
    div.innerHTML = `
      <div class="chart-item-info">
        <div class="chart-item-name">${escapeHtml(c.name ?? '')}</div>
        ${meta ? `<div class="chart-item-meta">${meta}</div>` : ''}
        ${matches?.length ? `<div class="lp-match">${matches.map(m => `<span class="lp-fact">${m.html}</span>`).join('')}</div>` : ''}
      </div>
      ${c.pinned ? '<span style="color:var(--accent);font-size:0.8em">★</span>' : ''}`;
    // Обычный клик — открыть в текущей вкладке (replace) и закрыть панель.
    // При аспект-поиске панель не закрываем — идём по результатам (WORKSPACE_CONCEPT §12).
    // Правый клик / долгий тап — меню с «Открыть в новой вкладке».
    div.addEventListener('click', () => {
      if (div.dataset.lpFired) { div.dataset.lpFired = ''; return; }  // был долгий тап

      openChartInTab(c, false);
    });
    attachChartCtxMenu(div, c);
    list.appendChild(div);
  }
}

/* ── Аспект-поиск в табе карт (DSL, WORKSPACE_CONCEPT §12) ────────────────── */

// Токены двуязычные; матч — точный или по префиксу от 3 символов
const LP_PLANET_TOKENS = [
  { id: 0,     tokens: ['sun', 'солнце', '☉'] },
  { id: 1,     tokens: ['moon', 'луна', '☽'] },
  { id: 2,     tokens: ['mercury', 'меркурий', '☿'] },
  { id: 3,     tokens: ['venus', 'венера', '♀'] },
  { id: 4,     tokens: ['mars', 'марс', '♂'] },
  { id: 5,     tokens: ['jupiter', 'юпитер', '♃'] },
  { id: 6,     tokens: ['saturn', 'сатурн', '♄'] },
  { id: 7,     tokens: ['uranus', 'уран', '♅'] },
  { id: 8,     tokens: ['neptune', 'нептун', '♆'] },
  { id: 9,     tokens: ['pluto', 'плутон', '♇'] },
  { id: 10,    tokens: ['node', 'узел', 'раху', '☊'] },
  { id: 12,    tokens: ['lilith', 'лилит', '⚸'] },
  { id: 15,    tokens: ['chiron', 'хирон', '⚷'] },
  { id: 'asc', tokens: ['asc', 'ascendant', 'асц', 'асцендент', 'as'] },
  { id: 'mc',  tokens: ['mc', 'midheaven', 'мц'] },
];
const LP_ASPECT_TOKENS = [
  { angle: 0,   tokens: ['conjunction', 'conj', 'соединение', 'соед', '☌'] },
  { angle: 60,  tokens: ['sextile', 'секстиль', '✶', '⚹'] },
  { angle: 90,  tokens: ['square', 'квадрат', 'квадратура', '□'] },
  { angle: 120, tokens: ['trine', 'трин', 'тригон', '△'] },
  { angle: 180, tokens: ['opposition', 'opp', 'оппозиция', '☍'] },
  { angle: -1,  tokens: ['asp', 'aspect', 'аспект'] },   // любой мажорный
];
const LP_SIGN_TOKENS = [
  ['aries', 'овен'], ['taurus', 'телец'], ['gemini', 'близнецы'], ['cancer', 'рак'],
  ['leo', 'лев'], ['virgo', 'дева'], ['libra', 'весы'], ['scorpio', 'скорпион'],
  ['sagittarius', 'стрелец'], ['capricorn', 'козерог'], ['aquarius', 'водолей'], ['pisces', 'рыбы'],
];
const LP_RX_TOKENS = ['rx', 'r', 'retro', 'retrograde', 'ретро', 'ретроградный', 'р'];

function lpTokenHit(word, token) {
  return word === token || (word.length >= 3 && token.startsWith(word));
}
function lpMatchPlanet(word) {
  if (!word) return null;
  const hit = LP_PLANET_TOKENS.find(p => p.tokens.some(t => lpTokenHit(word, t)));
  return hit ? hit.id : null;
}
function lpMatchAspect(word) {
  if (!word) return null;
  const num = Number(word);
  if (!isNaN(num)) {
    const a = ASPECTS.find(a => a.angle === num);
    return a ? a.angle : null;
  }
  const hit = LP_ASPECT_TOKENS.find(a => a.tokens.some(t => lpTokenHit(word, t)));
  return hit ? hit.angle : null;
}
function lpMatchSign(word) {
  if (!word) return null;
  const i = LP_SIGN_TOKENS.findIndex(pair => pair.some(t => lpTokenHit(word, t)));
  return i >= 0 ? i : null;
}

// Разбор одного условия: «планета [аспект] планета», «планета в знак»,
// «планета дом N», «планета rx». Возвращает предикат или null.
function lpParseClause(raw) {
  let maxOrb = null;
  const clause = raw.replace(/(?:orb|орб)\s*<=?\s*(\d+(?:[.,]\d+)?)/i, (_, v) => {
    maxOrb = parseFloat(v.replace(',', '.'));
    return ' ';
  });
  const words = clause.trim().toLowerCase().split(/\s+/).filter(Boolean);
  if (!words.length) return null;
  const p1 = lpMatchPlanet(words[0]);
  if (p1 === null || words.length < 2) return null;
  let i = 1, w = words[i];

  if (w === 'in' || w === 'в') { i++; w = words[i]; }
  const sign = lpMatchSign(w);
  if (sign !== null && lpMatchPlanet(w) === null) return { type: 'sign', p: p1, sign };

  const hm = w && w.match(/^(?:house|дом|h|д)(\d{1,2})?$/);
  if (hm) {
    const n = hm[1] ? Number(hm[1]) : Number(words[i + 1]);
    return (n >= 1 && n <= 12) ? { type: 'house', p: p1, house: n } : null;
  }
  if (LP_RX_TOKENS.includes(w)) return { type: 'rx', p: p1 };

  let angle = lpMatchAspect(w);
  if (angle !== null && lpMatchPlanet(w) === null) i++;
  else angle = -1;                                  // «saturn pluto» = любой аспект
  const p2 = lpMatchPlanet(words[i]);
  if (p2 === null || p2 === p1) return null;
  return { type: 'aspect', a: p1, b: p2, angle, maxOrb };
}

// Запрос → массив OR-групп, каждая — массив AND-условий; null если не разобран
function lpParseQuery(q) {
  const orGroups = q.split(/\s+(?:or|или)\s+/i).map(part => {
    const clauses = part.split(/\s*,\s*|\s+(?:and|и)\s+/i)
      .map(lpParseClause);
    return clauses.every(Boolean) ? clauses : null;
  });
  return orGroups.every(Boolean) && orGroups.length ? orGroups : null;
}

/* ── Индекс фактов: chart.id → { sig, facts } ─────────────────────────────── */

const _lpFactsCache = new Map();

function lpChartSig(c) {
  return [c.birth_date, c.birth_time, c.lat, c.lon, c.utc_offset,
          c.house_system ?? houseSysForType(c.case_type ?? 'natal')].join('|');
}

function lpGetFacts(c) {
  const sig = lpChartSig(c);
  const hit = _lpFactsCache.get(c.id);
  if (hit && hit.sig === sig) return hit.facts;
  const data = computeChartData({
    birthDate: c.birth_date, birthTime: c.birth_time,
    lat: c.lat, lon: c.lon, utcOff: c.utc_offset,
  }, c.house_system ?? houseSysForType(c.case_type ?? 'natal'));
  if (!data) return null;
  const pts = data.planets.map(p => ({
    id: p.id, lon: p.longitude, rx: p.retrograde,
    house: p.house, sign: Math.floor(p.longitude / 30),
  }));
  pts.push({ id: 'asc', lon: data.asc, sign: Math.floor(data.asc / 30) });
  pts.push({ id: 'mc',  lon: data.mc,  sign: Math.floor(data.mc / 30) });
  const aspects = [];
  for (let i = 0; i < pts.length; i++) for (let j = i + 1; j < pts.length; j++) {
    const a = pts[i], b = pts[j];
    if (typeof a.id === 'string' && typeof b.id === 'string') continue;  // asc–mc не аспект
    const d = angDiff(a.lon, b.lon);
    for (const asp of ASPECTS) {
      const orb = Math.abs(d - asp.angle);
      if (orb <= getNatalOrb(asp, a.id, b.id)) {
        aspects.push({ a: a.id, b: b.id, angle: asp.angle, orb });
        break;
      }
    }
  }
  const facts = { pts, aspects };
  _lpFactsCache.set(c.id, { sig, facts });
  return facts;
}

/* ── Матчинг и рендер ─────────────────────────────────────────────────────── */

function lpGlyph(id) {
  if (id === 'asc') return 'As';
  if (id === 'mc')  return 'Mc';
  return PLANETS.find(p => p.id === id)?.glyph ?? '?';
}
function lpAspSymbol(angle) {
  return ASPECTS.find(a => a.angle === angle)?.symbol ?? '∠';
}

// Условие против фактов карты → массив строк-описаний совпадений (пустой = не сматчилось)
function lpMatchClause(facts, cl) {
  if (cl.type === 'sign') {
    return facts.pts.filter(p => p.id === cl.p && p.sign === cl.sign)
      .map(p => ({ orb: 0, html: `${lpGlyph(p.id)} ${SIGNS[p.sign]} ${SIGN_NAMES[p.sign]}` }));
  }
  if (cl.type === 'house') {
    return facts.pts.filter(p => p.id === cl.p && p.house === cl.house)
      .map(p => ({ orb: 0, html: `${lpGlyph(p.id)} · ${tr('lpHouseShort')} ${cl.house}` }));
  }
  if (cl.type === 'rx') {
    return facts.pts.filter(p => p.id === cl.p && p.rx)
      .map(p => ({ orb: 0, html: `${lpGlyph(p.id)} R` }));
  }
  // aspect
  return facts.aspects.filter(x =>
    ((x.a === cl.a && x.b === cl.b) || (x.a === cl.b && x.b === cl.a)) &&
    (cl.angle === -1 || x.angle === cl.angle) &&
    (cl.maxOrb == null || x.orb <= cl.maxOrb)
  ).map(x => ({
    orb: x.orb,
    html: `${lpGlyph(x.a)} ${lpAspSymbol(x.angle)} ${lpGlyph(x.b)} · ${x.orb.toFixed(1)}°`,
  }));
}

/* ── Скоуп-операторы type:/folder: и анализ строки поиска ─────────────────── */

const LP_TYPE_TOKENS = {
  natal:    ['natal', 'натал', 'наталы'],
  horary:   ['horary', 'хорар', 'хорары'],
  election: ['election', 'элекция', 'элекции', 'электив'],
  synastry: ['synastry', 'синастрия', 'синастрии'],
};
function lpMatchType(word) {
  for (const t in LP_TYPE_TOKENS)
    if (LP_TYPE_TOKENS[t].some(tk => lpTokenHit(word, tk))) return t;
  return null;
}

// Вырезать из запроса операторы type:/тип: и folder:/папка: (и их -отрицания)
function lpExtractScope(q) {
  const scope = { types: [], notTypes: [], folders: [], notFolders: [], hasOps: false };
  let rest = q.replace(/(^|\s)(-?)(?:type|тип):(\S+)/gi, (_, sp, neg, val) => {
    scope.hasOps = true;
    val.split(',').forEach(v => {
      const t = lpMatchType(v.toLowerCase());
      if (t) (neg ? scope.notTypes : scope.types).push(t);
    });
    return sp;
  });
  rest = rest.replace(/(^|\s)(-?)(?:folder|папка):("[^"]*"|\S+)/gi, (_, sp, neg, val) => {
    scope.hasOps = true;
    (neg ? scope.notFolders : scope.folders).push(val.replace(/^"|"$/g, '').toLowerCase());
    return sp;
  });
  return { rest: rest.trim(), scope };
}

function lpScopePass(c, scope) {
  const ct = c.case_type ?? 'natal';
  if (scope.types.length && !scope.types.includes(ct)) return false;
  if (scope.notTypes.includes(ct)) return false;
  const f = (c.folder ?? '').toLowerCase();
  if (scope.folders.length && !scope.folders.includes(f)) return false;
  if (scope.notFolders.includes(f)) return false;
  return true;
}

// Строка поиска → { mode: 'empty'|'name'|'dsl'|'partial'|'temporal', … }
// 'partial' — начали с планеты или оператора, но запрос ещё не собрался
function lpAnalyzeQuery(raw) {
  const q = (raw ?? '').trim();
  if (!q) return { mode: 'empty' };
  if (/^(tr|transit|prog|dir|транз\S*|прог\S*|дир\S*):/i.test(q)) return { mode: 'temporal' };
  const { rest, scope } = lpExtractScope(q);
  if (!rest) return scope.hasOps ? { mode: 'dsl', orGroups: null, scope } : { mode: 'name' };
  const orGroups = lpParseQuery(rest);
  if (orGroups) return { mode: 'dsl', orGroups, scope };
  if (scope.hasOps || lpMatchPlanet(rest.toLowerCase().split(/\s+/)[0]) !== null)
    return { mode: 'partial' };
  return { mode: 'name' };
}

/* ── Строка-индикатор и шпаргалка ─────────────────────────────────────────── */

function lpDescribeClause(cl) {
  if (cl.type === 'sign')  return `${lpGlyph(cl.p)} ${SIGNS[cl.sign]}`;
  if (cl.type === 'house') return `${lpGlyph(cl.p)} · ${tr('lpHouseShort')} ${cl.house}`;
  if (cl.type === 'rx')    return `${lpGlyph(cl.p)} R`;
  return `${lpGlyph(cl.a)} ${cl.angle === -1 ? '∠' : lpAspSymbol(cl.angle)} ${lpGlyph(cl.b)}`;
}
function lpDescribeQuery(orGroups) {
  return orGroups.map(g => g.map(lpDescribeClause).join(' + ')).join('  |  ');
}

function lpUpdateHint(an, found) {

// ── Render sky wheel ──────────────────────────────────────────────────────────

function renderSkyAt(jd) {
  if (!swe) return;
  const flags = (swe.SEFLG_SWIEPH ?? 2) | (swe.SEFLG_SPEED ?? 256);
  const planets = PLANETS.map(p => {
    const r = safeCalcUt(jd, p.id, flags);   // Хирон вне диапазона — пропуск
    if (!r) return null;
    return { ...p, longitude: ((r[0] % 360) + 360) % 360, speed: r[3], retrograde: r[3] < 0 && p.id !== 10 && p.id !== 12 };
  }).filter(Boolean);
  skyJD = jd;
  renderSkyWheel(planets);
  buildSkyAspectGrid(planets);
}

function renderSkyWheel(planets) {
  const svg = el('svg', { viewBox: VIEWBOX, width: '100%', style: 'display:block' });

  const clipRect = el('rect', { width: W, height: H });
  const clipPath = el('clipPath', { id: 'skyCanvasClip' });
  clipPath.appendChild(clipRect);
  const defs = el('defs');
  defs.appendChild(clipPath);
  svg.appendChild(defs);

  const g = el('g', { 'clip-path': 'url(#skyCanvasClip)' });
  svg.appendChild(g);

  // House cusps for the astrologer's place (if chosen)
  let cusps = null;
  const place = getSkyPlace();
  if (place) {
    try { cusps = Array.from(swe.houses_ex(skyJD, (swe.SEFLG_SWIEPH ?? 2), place.lat, place.lon, houseSysForType('sky')).cusps).slice(1, 13); }
    catch { cusps = null; }
  }

  // 1. Background
  g.appendChild(el('rect', { x: 0, y: 0, width: W, height: H, fill: '#fff' }));

  // 1.5 House axes (behind the ring)
  if (cusps) drawHouseAxes(g, cusps, 0);

  // 2. Zodiac ring
  drawZodiacRing(g);

  // 3. Sign dividers + glyphs
  drawSignDividers(g, 0);
  drawZodiacGlyphs(g, 0);

  // 4. Inner circle
  g.appendChild(circ(CX, CY, R_INNER, { fill: '#fff', stroke: COLORS.ringLine, 'stroke-width': 0.8 }));
  drawDegreeRing(g, R_INNER, CHART.DEG_RING_W, CHART.DEG_SIGN_EXT);

  // 5. Transit-transit aspect lines
  drawSkyAspects(g, addSouthNode(planets));

  // 6. Planets
  drawPlanets(g, addSouthNode(planets), 0);

  // 7. House labels (on top)
  if (cusps) drawHouseLabels(g, cusps, 0);

  document.getElementById('sky-chart-block').replaceChildren(svg);
}

function drawSkyAspects(g, planets) {
  for (let i = 0; i < planets.length; i++) {
    for (let j = i + 1; j < planets.length; j++) {
      const pi = planets[i], pj = planets[j];
      const ids = [pi.id, pj.id];
      if (ids.includes(10) && ids.includes(-10)) continue; // skip Node ↔ S.Node
      const diff = angDiff(pi.longitude, pj.longitude);
      const orb = Math.max(getTransitOrb(pi.id), getTransitOrb(pj.id));
      for (const asp of T_ASPECTS) {
        const actualOrb = Math.abs(diff - asp.angle);
        if (actualOrb <= orb) {
          const p1 = polar(lonToRad(pi.longitude, 0), R_INNER);
          const p2 = polar(lonToRad(pj.longitude, 0), R_INNER);
          if (asp.angle === 0) {
            // Conjunction: ellipse
            let l1 = pi.longitude, l2 = pj.longitude;
            if (Math.abs(l1 - l2) > 180) { if (l1 < l2) l1 += 360; else l2 += 360; }
            const midLon = ((l1 + l2) / 2) % 360;
            const midA = lonToRad(midLon, 0);
            const center = polar(midA, R_INNER);
            const spanRad = diff * Math.PI / 180;
            const rx = Math.max(10, spanRad * R_INNER / 2 + 8);
            const rotDeg = midA * 180 / Math.PI + 90;
            g.appendChild(el('ellipse', {
              cx: center.x, cy: center.y, rx, ry: 3.5,
              transform: `rotate(${rotDeg}, ${center.x}, ${center.y})`,
              fill: 'none', stroke: asp.color, 'stroke-width': 1.5,
            }));
          } else {
            g.appendChild(ln(p1.x, p1.y, p2.x, p2.y, {
              stroke: asp.color, 'stroke-width': 0.9, opacity: '0.85',
            }));
            if (asp.angle !== 180) {
              const mid = { x: (p1.x + p2.x) / 2, y: (p1.y + p2.y) / 2 };
              g.appendChild(el('circle', { cx: mid.x, cy: mid.y, r: 5, fill: 'white' }));
              g.appendChild(txt(mid.x, mid.y, asp.hg ?? asp.symbol, {
                'font-size': 9, fill: asp.color,
                'text-anchor': 'middle', 'dominant-baseline': 'central',
                ...(asp.hg ? { style: 'font-family:HamburgSymbols' } : {}),
              }));
            }
          }
          break;
        }
      }
    }
  }
}

// ── Sky aspect grid (transit-transit, square) ─────────────────────────────────

function findSkyGridAspect(lon1, lon2, id1, id2) {
  const diff = angDiff(lon1, lon2);
  const orb = Math.max(getTransitOrb(id1), getTransitOrb(id2));
  for (const asp of T_ASPECTS) {
    const d = Math.abs(diff - asp.angle);
    if (d <= orb) return { asp, orb: d };
  }
  return null;
}

function buildSkyAspectGrid(planets) {
  const container = document.getElementById('sky-aspect-grid');
  if (!container) return;
  const n = planets.length;
  // Lower-triangle table: rows[1..n-1], cols[0..n-2]
  let html = '<table><thead><tr><th></th>';
  for (let ci = 0; ci < n - 1; ci++) {
    html += `<th class="ag-hdr">${planets[ci].hamburgGlyph}</th>`;
  }
  html += '</tr></thead><tbody>';
  for (let ri = 1; ri < n; ri++) {
    const rp = planets[ri];
    html += `<tr><th class="ag-hdr">${rp.hamburgGlyph}</th>`;
    for (let ci = 0; ci < n - 1; ci++) {
      if (ci >= ri) {
        html += `<td class="${ci === ri ? 'ag-self' : 'ag-empty'}"></td>`;
      } else {
        const cp = planets[ci];
        const m = findSkyGridAspect(rp.longitude, cp.longitude, rp.id, cp.id);
        if (m) {
          html += `<td style="color:${m.asp.color}">` +
            `<span class="ag-sym">${m.asp.symbol}</span>` +
            `<span class="ag-orb">${m.orb.toFixed(1)}°</span></td>`;
        } else {
          html += `<td></td>`;
        }
      }
    }
    html += '</tr>';
  }
  html += '</tbody></table>';
  container.innerHTML = html;
}

// ── Navigation ────────────────────────────────────────────────────────────────

function syncSkyDateLabel() {
  const jd = skyJD ?? computeJDNow();
  const d = new Date((jd - 2440587.5) * 86400000);
  const date = d.toISOString().slice(0, 10);
  const time = d.toISOString().slice(11, 16);
  document.getElementById('sky-nav-date-text').textContent = `${date} ${time}`;
}

function navigateSkyBy(unit, delta) {
  const base = skyJD ?? computeJDNow();
  let newJD;
  if (unit === 'hour') {
    newJD = base + delta / 24;
  } else if (unit === 'minute') {
    newJD = base + delta / (24 * 60);
  } else if (unit === 'second') {
    newJD = base + delta / (24 * 3600);
  } else if (unit === 'day') {
    newJD = base + delta;
  } else if (unit === 'month') {
    const d = new Date((base - 2440587.5) * 86400000);
    d.setUTCMonth(d.getUTCMonth() + delta);
    newJD = d.getTime() / 86400000 + 2440587.5;
  } else {
    const d = new Date((base - 2440587.5) * 86400000);
    d.setUTCFullYear(d.getUTCFullYear() + delta);
    newJD = d.getTime() / 86400000 + 2440587.5;
  }
  renderSkyAt(newJD);
  syncSkyDateLabel();
  syncSkyTimelineCursor();
  clearSkySnapActive();
}

function renderSkySnapshots() {

// ── Timeline (sky / mundane — собственные принципы, не натальные) ──────────────

// Иерархия Zet: аспект якорится на планете, что НИЖЕ по списку (бOльший ранг).
// У ☉ (ранг 0) своей строки нет — он всегда «в гостях». Луна (id 1) — вне списка,
// идёт отдельной полосой.
const ZET_RANK = { 0:0, 2:1, 3:2, 4:3, 5:4, 6:5, 7:6, 8:7, 9:8, 10:9, 15:10, 12:11 };
const ZET_ORDER = [2, 3, 4, 5, 6, 7, 8, 9, 10, 15, 12]; // строки сверху вниз (без ☉ и ☽)

// Точный момент аспекта = реальное пересечение (перфекция), а не «ближайший подход».
// phiA/phiB — знаковая разница долгот (-180,180] на двух соседних выборках;
// возвращает JD пересечения цели ±A между ними или null (нет перфекции — напр. планета
// развернулась в ретро, не дойдя до точного аспекта).
function aspectCrossJD(phiA, phiB, A, jdA, jdB) {
  const lerp = (T, a, b) => jdA + ((T - a) / (b - a)) * (jdB - jdA);
  if (A === 180) {
    // оппозиция: пересечение границы ±180 (скачок знака с большим разрывом)
    if (Math.abs(phiA - phiB) > 180) {
      const pb = phiB + (phiB < phiA ? 360 : -360);
      const T = phiA < 0 ? -180 : 180;
      return lerp(T, phiA, pb);
    }
    return null;
  }
  const targets = A === 0 ? [0] : [A, -A];
  for (const T of targets) {
    if (Math.abs(phiA - phiB) < 180 && (phiA - T) * (phiB - T) <= 0 && phiA !== phiB) {
      return lerp(T, phiA, phiB);
    }
  }
  return null;
}

// Генерик-скан: ищет периоды аспекта по выборкам долгот lons1/lons2 с шагом step (в днях).
// idxToJD(i) → JD выборки i. Возвращает массив периодов {asp, startJD, endJD, exactJDs}.
function scanAspectPeriods(lons1, lons2, N, idxToJD, aspects, orb) {
  const phi = new Float64Array(N);
  for (let i = 0; i < N; i++) phi[i] = (((lons1[i] - lons2[i] + 180) % 360) + 360) % 360 - 180;

  const out = [];
  for (const asp of aspects) {
    let inP = false, startJD = 0, lastJD = 0, exacts = [], prevInOrb = false;
    const close = () => { out.push({ asp, startJD, endJD: lastJD, exactJDs: exacts }); inP = false; exacts = []; };
    for (let i = 0; i < N; i++) {
      const jd = idxToJD(i);
      const inOrb = Math.abs(Math.abs(phi[i]) - asp.angle) <= orb;
      if (inOrb) {
        if (!inP) { inP = true; startJD = jd; }
        lastJD = jd;
        if (prevInOrb) {
          const ex = aspectCrossJD(phi[i - 1], phi[i], asp.angle, idxToJD(i - 1), jd);
          if (ex != null) exacts.push(ex);
        }
      } else if (inP) { close(); }
      prevInOrb = inOrb;
    }
    if (inP) close();
  }
  return out;
}

// Какие пары считать на данном масштабе (Луна обрабатывается отдельно).
function skyPairIncluded(id1, id2, scale) {
  if (id1 === 1 || id2 === 1) return false;
  if (scale === '10Y') return SLOW_IDS.includes(id1) && SLOW_IDS.includes(id2);
  if (scale === '1Y' || scale === '2Y') return !(FAST_IDS.includes(id1) && FAST_IDS.includes(id2));
  return true; // 1M — всё
}

function computeSkyMutualAspects(jdStart, jdEnd, scale) {
  const flags = (swe.SEFLG_SWIEPH ?? 2) | (swe.SEFLG_SPEED ?? 256);
  const DAYS = Math.ceil(jdEnd - jdStart) + 2;

  // Долготы планет (без Луны) по дням
  const allLons = {};
  for (const p of PLANETS) {
    if (p.id === 1) continue;
    if (!safeCalcUt(jdStart, p.id, flags)) continue;   // тело вне эпохи (Хирон < 1800) — пропуск
    allLons[p.id] = new Float64Array(DAYS);
    for (let i = 0; i < DAYS; i++) {
      const r = safeCalcUt(jdStart + i, p.id, flags);
      allLons[p.id][i] = r ? (((r[0] % 360) + 360) % 360) : (allLons[p.id][i - 1] ?? 0);
    }
  }

  const periods = [];
  const density = new Float64Array(DAYS); // число активных пар в день (без Луны)
  const idxToJD = i => jdStart + i;

  for (let pi = 0; pi < PLANETS.length; pi++) {
    for (let pj = pi + 1; pj < PLANETS.length; pj++) {
      const p1 = PLANETS[pi], p2 = PLANETS[pj];
      if (!skyPairIncluded(p1.id, p2.id, scale)) continue;
      const lons1 = allLons[p1.id], lons2 = allLons[p2.id];
      if (!lons1 || !lons2) continue;   // одно из тел недоступно на эту эпоху
      const orb = Math.max(getTransitOrb(p1.id), getTransitOrb(p2.id));
      const aspects = (p1.id === 10 || p1.id === 12 || p2.id === 10 || p2.id === 12)
        ? T_ASPECTS.filter(a => a.angle === 0)
        : T_ASPECTS;

      // anchor = бOльший ранг (ниже по списку), mover = меньший ранг
      const anchor = ZET_RANK[p1.id] >= ZET_RANK[p2.id] ? p1 : p2;
      const mover  = anchor === p1 ? p2 : p1;

      for (const per of scanAspectPeriods(lons1, lons2, DAYS, idxToJD, aspects, orb)) {
        periods.push({ anchorId: anchor.id, mover, asp: per.asp,
                       startJD: per.startJD, endJD: per.endJD, exactJDs: per.exactJDs });
        // плотность: отметить дни внутри периода
        const a = Math.max(0, Math.floor(per.startJD - jdStart));
        const b = Math.min(DAYS - 1, Math.ceil(per.endJD - jdStart));
        for (let d = a; d <= b; d++) density[d] += 1;
      }
    }
  }

  return { periods, density, jdStart, jdEnd, DAYS };
}

// Лунные аспекты — отдельный проход с мелким шагом (Луна ~13°/день, окно орбиса < суток).
function computeSkyMoonAspects(jdStart, jdEnd) {
  const flags = (swe.SEFLG_SWIEPH ?? 2) | (swe.SEFLG_SPEED ?? 256);
  const STEP = 2 / 24; // 2 часа
  const N = Math.ceil((jdEnd - jdStart) / STEP) + 2;
  const idxToJD = i => jdStart + i * STEP;
  const moonLon = new Float64Array(N);
  for (let i = 0; i < N; i++) moonLon[i] = ((swe.calc_ut(idxToJD(i), 1, flags)[0] % 360) + 360) % 360;

  const partners = [0, 2, 3, 4, 5, 6, 7, 8, 9, 10, 15, 12];
  const MOON_ORB = 3;
  const periods = [];
  for (const pid of partners) {
    const pObj = PLANETS.find(p => p.id === pid);
    if (!safeCalcUt(jdStart, pid, flags)) continue;   // Хирон < 1800 — пропуск
    const lon2 = new Float64Array(N);
    for (let i = 0; i < N; i++) {
      const r = safeCalcUt(idxToJD(i), pid, flags);
      lon2[i] = r ? (((r[0] % 360) + 360) % 360) : (lon2[i - 1] ?? 0);
    }
    const aspects = (pid === 10 || pid === 12) ? T_ASPECTS.filter(a => a.angle === 0) : T_ASPECTS;
    for (const per of scanAspectPeriods(moonLon, lon2, N, idxToJD, aspects, MOON_ORB)) {
      periods.push({ anchorId: 1, mover: pObj, asp: per.asp,
                     startJD: per.startJD, endJD: per.endJD, exactJDs: per.exactJDs });
    }
  }
  return periods;
}

// ── Layout таймлайна неба ─────────────────────────────────────────────────────
// Версия A: строки = более медленная планета пары (якорь), у ☉ строки нет.
// Версия B: строки = более быстрая (первая в списке) планета — ☉ сначала, затем
//           ☿, ♀… На полосах подписаны обе планеты, левой панели нет.
function computeSkyTlLayout(periods, moonPeriods, density) {
  const { HDR_H, SUB_H } = TL;
  const gap = (skyScale === '10Y' || skyScale === '2Y') ? 7 : 1;
  const variantB = skyTlVariant === 'B';
  const variantC = skyTlVariant === 'C';

  const packSeries = (ps, keyFn) => {
    const seriesMap = new Map();
    for (const p of ps) {
      const key = keyFn(p);
      (seriesMap.get(key) ?? seriesMap.set(key, []).get(key)).push(p);
    }
    const seriesList = [...seriesMap.values()]
      .sort((a, b) => Math.min(...a.map(p => p.startJD)) - Math.min(...b.map(p => p.startJD)));
    const lanes = [];
    for (const sps of seriesList) {
      let placed = false;
      for (let lane = 0; lane < lanes.length; lane++) {
        const conflict = sps.some(p => lanes[lane].some(iv => p.startJD <= iv.end + gap && p.endJD >= iv.start - gap));
        if (!conflict) {
          for (const p of sps) { p.sub = lane; lanes[lane].push({ start: p.startJD, end: p.endJD }); }
          placed = true; break;
        }
      }
      if (!placed) { const lane = lanes.length; lanes.push(sps.map(p => ({ start: p.startJD, end: p.endJD }))); for (const p of sps) p.sub = lane; }
    }
    return Math.max(lanes.length, 1);
  };

  let rows;
  if (variantC) {
    // «По очереди»: без строк-планет, всё компактно упаковано в минимум дорожек.
    // Быстрые планеты сверху — сортируем по рангу более быстрой (mover) планеты пары.
    const all = periods.slice();
    all.sort((a, b) => (ZET_RANK[a.mover.id] - ZET_RANK[b.mover.id]) || (a.startJD - b.startJD));
    const lanes = [];
    for (const p of all) {
      let lane = lanes.findIndex(iv => !iv.some(s => p.startJD <= s.end + gap && p.endJD >= s.start - gap));
      if (lane < 0) { lane = lanes.length; lanes.push([]); }
      p.sub = lane; lanes[lane].push({ start: p.startJD, end: p.endJD });
    }
    const nSubs = Math.max(lanes.length, 1);
    rows = all.length ? [{ groupId: null, pl: null, ps: all, nSubs, h: nSubs * SUB_H + 16 }] : [];
  } else {
    // Группировка: A — по якорю (медленной); B — по первой/быстрой планете (mover).
    const groupOf  = p => variantB ? p.mover.id : p.anchorId;
    const seriesOf = p => variantB ? `${p.anchorId}-${p.asp.angle}` : `${p.mover.id}-${p.asp.angle}`;
    const order    = variantB ? [0, ...ZET_ORDER] : ZET_ORDER; // B: ☉ сначала

    const byGroup = {};
    for (const p of periods) {
      (byGroup[groupOf(p)] ??= []).push(p);
    }
    rows = order.filter(id => byGroup[id]?.length).map(id => {
      const ps = byGroup[id];
      const nSubs = packSeries(ps, seriesOf);
      return { groupId: id, pl: PLANETS.find(p => p.id === id), ps, nSubs, h: nSubs * SUB_H + 16 };
    });
  }

  // Полоса плотности («волны» аспектов) убрана из отображения.
  const DENSITY_H = 0;

  // Лунная секция (в B — без полоски-тумблера слева, тумблер в шапке)
  const hasMoon = moonPeriods && moonPeriods.length > 0;
  let moonNSubs = 0, moonH = 0;
  if (hasMoon) {
    if (skyMoonOn) { moonNSubs = packSeries(moonPeriods, p => `${p.mover.id}-${p.asp.angle}`); moonH = moonNSubs * SUB_H + 16; }
    else moonH = (variantB || variantC) ? 0 : 16;
  }

  const densityY = HDR_H;
  const moonY    = HDR_H + DENSITY_H;
  let y = moonY + moonH;
  for (const r of rows) { r.y = y; y += r.h; }
  const TL_H = y + 4;

  return { rows, DENSITY_H, densityY, hasMoon, moonY, moonH, moonNSubs, moonPeriods, density, TL_H, variantB, variantC };
}

// ── Рендер таймлайна неба ─────────────────────────────────────────────────────
function renderSkyTimeline({ periods, moonPeriods = [], density = null, jdStart, jdEnd, jdToday,
                             jdCoreStart = null, jdCoreEnd = null, jdCursor = null }) {
  const ctx = skyTlCtx;
  const tl = tlHostContentEl();
  const layout = computeSkyTlLayout(periods, moonPeriods, density);
  const { rows, DENSITY_H, densityY, hasMoon, moonY, moonH, moonPeriods: moonPs, TL_H, variantB, variantC } = layout;

  if (!rows.length && !hasMoon) {
    tl.innerHTML = `<div class="tl-status">${tr('noTransits')}</div>`;
    return;
  }

  const { HDR_H, BAR_H, SUB_H } = TL;
  const noLeftPanel = variantB || variantC;          // B и C — без левой панели
  const bothGlyphs  = variantB || variantC;          // обе планеты на полосе
  const LABEL_W = noLeftPanel ? 0 : TL.LABEL_W;
  const SPAN = jdEnd - jdStart;
  // Как в натальном таймлайне: всегда вписываем окно по ширине панели —
  // горизонтального скролла нет, красная линия свободно ездит по фиксированной сетке.
  const PX_PER_DAY = Math.max(((tl.clientWidth || 800) - LABEL_W - 18), 200) / SPAN;
  const BARS_W = Math.ceil(SPAN * PX_PER_DAY);
  const xOf = jd => Math.min(Math.max((jd - jdStart) * PX_PER_DAY, 0), BARS_W);

  const hel = (tag, cls) => { const e = document.createElement(tag); if (cls) e.className = cls; return e; };
  const fmtDate = jd => new Date((jd - 2440587.5) * 86400000)
    .toLocaleDateString(currentLang, { day: 'numeric', month: 'short', year: 'numeric' });
  const tooltip = document.getElementById('tl-tooltip');
  const showTip = (elem, text) => {
    elem.addEventListener('mouseover', () => { tooltip.textContent = text; tooltip.style.display = 'block'; });
    elem.addEventListener('mousemove', e => { tooltip.style.left = (e.clientX + 14) + 'px'; tooltip.style.top = (e.clientY - 30) + 'px'; });
    elem.addEventListener('mouseout', () => { tooltip.style.display = 'none'; });
    return elem;
  };
  const makeNavHit = (elem, cb) => {
    let sx = 0, sy = 0;
    elem.addEventListener('touchstart', e => { sx = e.touches[0].clientX; sy = e.touches[0].clientY; }, { passive: true });
    elem.addEventListener('touchend', e => {
      const dx = e.changedTouches[0].clientX - sx, dy = e.changedTouches[0].clientY - sy;
      if (dx * dx + dy * dy < 144) cb();
    });
    elem.addEventListener('click', () => cb());
    return elem;
  };
  const moonGlyph = PLANETS.find(p => p.id === 1).glyph;
  const emph = p => skyHighlightPlanet === null || p.anchorId === skyHighlightPlanet || p.mover.id === skyHighlightPlanet;

  // ── Навигация / масштабы ────────────────────────────────────────────────────
  const fmtYear = jd => new Date((jd - 2440587.5) * 86400000).getUTCFullYear();
  const fmtMon  = jd => new Date((jd - 2440587.5) * 86400000).toLocaleDateString(currentLang, { month: 'short', year: 'numeric' });
  const nav = hel('div'); nav.id = 'tl-nav';
  const shiftStep = ctx.isYearScale() ? 10 * 365 : ctx.isMonthScale() ? 30 : 365;
  const prevBtn = hel('button', 'tl-nav-btn'); prevBtn.textContent = '◀';
  prevBtn.addEventListener('click', () => ctx.onShift(-shiftStep));
  const navLbl = hel('span'); navLbl.id = 'tl-nav-lbl';
  navLbl.textContent = !jdCoreStart
    ? `${fmtYear(jdStart)} — ${fmtYear(jdEnd - 1)}`
    : ctx.isMonthScale() ? fmtMon(jdCoreStart)
    : ctx.is2YScale() ? `${fmtYear(jdCoreStart)} — ${fmtYear(jdCoreEnd - 1)}`
    : String(fmtYear(jdCoreStart));
  if (jdCoreStart) {
    navLbl.style.cssText += 'cursor:pointer; text-decoration:underline dotted;';
    navLbl.addEventListener('click', () => ctx.onScale(ctx.isMonthScale() ? '1Y' : '10Y', skyJD ?? computeJDNow()));
  }
  const nextBtn = hel('button', 'tl-nav-btn'); nextBtn.textContent = '▶';
  nextBtn.addEventListener('click', () => ctx.onShift(shiftStep));
  const scaleWrap = hel('div', 'tl-scale-btns');
  const isBase1Y = !ctx.isYearScale() && !ctx.is2YScale() && !ctx.isMonthScale();
  const mkScale = (label, active, scale) => {
    const b = hel('button', 'tl-scale-btn' + (active ? ' tl-scale-active' : ''));
    b.textContent = label;
    b.addEventListener('click', () => { if (!active) ctx.onScale(scale, skyJD ?? computeJDNow()); });
    return b;
  };
  scaleWrap.append(
    mkScale('1M', ctx.isMonthScale(), '1M'),
    mkScale('1Y', isBase1Y, '1Y'),
    mkScale('2Y', ctx.is2YScale(), '2Y'),
    mkScale('10Y', ctx.isYearScale(), '10Y'),
  );
  nav.append(prevBtn, navLbl, nextBtn, scaleWrap);

  // Переключатель версии таймлайна A/B
  const verWrap = hel('div', 'tl-scale-btns');
  verWrap.style.marginLeft = '8px';
  const mkVer = v => {
    const b = hel('button', 'tl-scale-btn' + (skyTlVariant === v ? ' tl-scale-active' : ''));
    b.textContent = v;
    b.title = { A: 'Версия A: строки по медленной планете',
                B: 'Версия B: группы по первой планете, без левой панели',
                C: 'Версия C: по очереди, быстрые планеты сверху' }[v];
    b.addEventListener('click', () => { if (skyTlVariant !== v) { skyTlVariant = v; ctx.onRerender(); } });
    return b;
  };
  verWrap.append(mkVer('A'), mkVer('B'), mkVer('C'));
  nav.append(verWrap);
  // В версиях без левой панели тумблер Луны — в шапке
  if (noLeftPanel && hasMoon) {
    const moonBtn = hel('button', 'tl-scale-btn' + (skyMoonOn ? ' tl-scale-active' : ''));
    moonBtn.textContent = moonGlyph;
    moonBtn.title = 'Луна';
    moonBtn.style.marginLeft = '4px';
    moonBtn.addEventListener('click', () => { skyMoonOn = !skyMoonOn; ctx.onRerender(); });
    nav.append(moonBtn);
  }

  // ── Левая панель (sticky подписи) ───────────────────────────────────────────
  const svgL = el('svg', { id: 'tl-svg-left', width: LABEL_W, height: TL_H });
  svgL.appendChild(el('rect', { x: 0, y: 0, width: LABEL_W, height: TL_H, fill: '#fff' }));

  if (!noLeftPanel) {
    // density label
    if (DENSITY_H > 0) {
      svgL.appendChild(el('rect', { x: 0, y: densityY, width: LABEL_W, height: DENSITY_H, fill: COLORS.tlRowAlt }));
      svgL.appendChild(txt(LABEL_W / 2, densityY + DENSITY_H / 2, '∿', {
        'font-size': 13, fill: '#aaa', 'text-anchor': 'middle', 'dominant-baseline': 'central',
      }));
      svgL.appendChild(ln(0, densityY + DENSITY_H, LABEL_W, densityY + DENSITY_H, { stroke: '#ddd', 'stroke-width': 0.6 }));
    }
    // moon strip + toggle
    if (hasMoon) {
      svgL.appendChild(el('rect', { x: 0, y: moonY, width: LABEL_W, height: moonH, fill: COLORS.tlMoon }));
      svgL.appendChild(txt(LABEL_W / 2, moonY + Math.min(moonH, 16) / 2, moonGlyph, {
        'font-size': 13, fill: COLORS.tlMoonGlyph, 'text-anchor': 'middle', 'dominant-baseline': 'central',
      }));
      svgL.appendChild(txt(LABEL_W - 6, moonY + Math.min(moonH, 16) / 2, skyMoonOn ? '▾' : '▸', {
        'font-size': 9, fill: COLORS.tlMoonGlyph, 'text-anchor': 'middle', 'dominant-baseline': 'central',
      }));
      const moonHit = el('rect', { x: 0, y: moonY, width: LABEL_W, height: Math.min(moonH, 16), fill: 'transparent', style: 'cursor:pointer' });
      moonHit.addEventListener('click', () => { skyMoonOn = !skyMoonOn; ctx.onRerender(); });
      svgL.appendChild(moonHit);
      svgL.appendChild(ln(0, moonY + moonH, LABEL_W, moonY + moonH, { stroke: COLORS.tlMoonLine, 'stroke-width': 0.8 }));
    }
    // planet rows
    rows.forEach((r, i) => {
      if (i % 2 === 0) svgL.appendChild(el('rect', { x: 0, y: r.y, width: LABEL_W, height: r.h, fill: COLORS.tlRowAlt }));
      const isHl = skyHighlightPlanet === r.groupId;
      if (isHl) svgL.appendChild(el('rect', { x: 0, y: r.y, width: LABEL_W, height: r.h, fill: COLORS.conj, opacity: '0.10' }));
      svgL.appendChild(ln(0, r.y, LABEL_W, r.y, { stroke: '#e8e8e4', 'stroke-width': 0.5 }));
      svgL.appendChild(txt(LABEL_W / 2, r.y + r.h / 2, r.pl.glyph, {
        'font-size': 17, fill: isHl ? COLORS.conj : '#333',
        'font-weight': isHl ? 'bold' : 'normal',
        'text-anchor': 'middle', 'dominant-baseline': 'central',
      }));
      const hit = el('rect', { x: 0, y: r.y, width: LABEL_W, height: r.h, fill: 'transparent', style: 'cursor:pointer' });
      hit.addEventListener('click', () => { skyHighlightPlanet = isHl ? null : r.groupId; ctx.onRerender(); });
      svgL.appendChild(hit);
    });
    svgL.appendChild(ln(0, HDR_H, LABEL_W, HDR_H, { stroke: '#ccc', 'stroke-width': 0.8 }));
    svgL.appendChild(ln(LABEL_W - 0.5, 0, LABEL_W - 0.5, TL_H, { stroke: '#ccc', 'stroke-width': 1 }));
  }

  // ── Правая SVG (полосы) ─────────────────────────────────────────────────────
  const svgR = el('svg', { id: 'tl-svg-right', width: BARS_W, height: TL_H, style: 'display:block' });
  svgR.appendChild(el('rect', { x: 0, y: 0, width: BARS_W, height: TL_H, fill: '#fff' }));
  rows.forEach((r, i) => {
    if (i % 2 === 0) svgR.appendChild(el('rect', { x: 0, y: r.y, width: BARS_W, height: r.h, fill: COLORS.tlRowAlt }));
    if (skyHighlightPlanet !== null && skyHighlightPlanet === r.groupId)
      svgR.appendChild(el('rect', { x: 0, y: r.y, width: BARS_W, height: r.h, fill: COLORS.conj, opacity: '0.06' }));
  });

  // density ribbon
  if (DENSITY_H > 0) {
    const maxD = Math.max(1, ...density);
    const baseY = densityY + DENSITY_H - 2;
    const usableH = DENSITY_H - 6;
    const dayW = Math.max(PX_PER_DAY, 1);
    for (let i = 0; i < density.length; i++) {
      if (!density[i]) continue;
      const x = xOf(jdStart + i);
      const h = (density[i] / maxD) * usableH;
      svgR.appendChild(el('rect', { x, y: baseY - h, width: dayW + 0.5, height: h, fill: COLORS.tlMuted ?? '#b7c4d4', opacity: '0.65' }));
    }
    svgR.appendChild(ln(0, densityY + DENSITY_H, BARS_W, densityY + DENSITY_H, { stroke: '#ddd', 'stroke-width': 0.6 }));
  }

  // helper для рисования полос аспектов
  const drawBars = (ps, baseY) => {
    for (const p of ps) {
      // Аспект, не доходящий до точности (нет перфекции) — рисуем тускло.
      const perfects = p.exactJDs?.length > 0;
      const op = emph(p) ? (perfects ? 0.85 : 0.3) : 0.1;
      const x1 = xOf(p.startJD), x2 = xOf(p.endJD);
      const barW = Math.max(x2 - x1, 3);
      const barY = baseY + 10 + p.sub * SUB_H + (SUB_H - BAR_H) / 2;
      const bar = el('rect', { x: x1, y: barY, width: barW, height: BAR_H, fill: p.asp.color, rx: 1, opacity: String(op) });
      const anchorGlyph = p.anchorId === 1 ? moonGlyph : PLANETS.find(q => q.id === p.anchorId).glyph;
      const nearest = p.exactJDs?.length
        ? p.exactJDs.reduce((b, j) => Math.abs(j - jdToday) < Math.abs(b - jdToday) ? j : b) : null;
      showTip(bar, `${p.mover.glyph} ${p.asp.symbol} ${anchorGlyph}` + (nearest ? `  ·  ${fmtDate(nearest)}` : '  ·  без перфекции'));
      svgR.appendChild(bar);
      for (const ejd of (p.exactJDs ?? [])) {
        const xE = xOf(ejd);
        if (xE < x1 - 1 || xE > x2 + 1) continue;
        const dotY = barY + BAR_H / 2;
        svgR.appendChild(circ(xE, dotY, 3, { fill: '#fff', stroke: p.asp.color, 'stroke-width': 1.2, opacity: String(op) }));
        svgR.appendChild(makeNavHit(circ(xE, dotY, 10, { fill: 'transparent', style: 'cursor:pointer' }), () => ctx.onBarClick(ejd)));
      }
      if (barW >= 10 && emph(p)) {
        const lblX = x1 + barW / 2;
        // B/C — подписываем обе планеты (левой панели нет); A — только вторую.
        const label = bothGlyphs ? (p.mover.glyph + p.asp.symbol + anchorGlyph) : (p.mover.glyph + p.asp.symbol);
        svgR.appendChild(txt(lblX, barY - 3, label, {
          'font-size': 10, fill: p.asp.color, 'text-anchor': 'middle', 'dominant-baseline': 'auto',
          opacity: String(perfects ? 1 : 0.4),
        }));
      }
    }
  };

  // moon band bars
  if (hasMoon && skyMoonOn) {
    svgR.appendChild(el('rect', { x: 0, y: moonY, width: BARS_W, height: moonH, fill: COLORS.tlMoon, opacity: '0.5' }));
    svgR.appendChild(ln(0, moonY + moonH, BARS_W, moonY + moonH, { stroke: COLORS.tlMoonLine, 'stroke-width': 0.8 }));
    drawBars(moonPs, moonY);
  }

  // planet row bars
  for (const r of rows) {
    // В B группы разделяем чуть заметнее и ставим глиф группы у левого края (панели нет)
    svgR.appendChild(ln(0, r.y, BARS_W, r.y, { stroke: variantB ? '#d8d8d4' : '#e8e8e4', 'stroke-width': variantB ? 0.8 : 0.5 }));
    if (variantB) {
      svgR.appendChild(el('rect', { x: 0, y: r.y, width: 18, height: r.h, fill: '#fff', opacity: '0.75', style: 'pointer-events:none' }));
      svgR.appendChild(txt(9, r.y + r.h / 2, r.pl.glyph, {
        'font-size': 14, fill: '#999', 'text-anchor': 'middle', 'dominant-baseline': 'central', style: 'pointer-events:none',
      }));
    }
    drawBars(r.ps, r.y);
  }

  // ── Заголовок (месяцы/дни/годы) ─────────────────────────────────────────────
  const svgHdr = el('svg', { id: 'tl-svg-hdr', width: BARS_W, height: HDR_H, style: 'display:block' });
  svgHdr.appendChild(el('rect', { x: 0, y: 0, width: BARS_W, height: HDR_H, fill: '#fff' }));
  const MS = STRINGS[currentLang].months;
  if (ctx.isMonthScale()) {
    let d = new Date((jdStart - 2440587.5) * 86400000);
    d = new Date(Date.UTC(d.getUTCFullYear(), d.getUTCMonth(), d.getUTCDate()));
    let curMonth = -1;
    while (d.getTime() / 86400000 + 2440587.5 <= jdEnd + 1) {
      const jdDay = d.getTime() / 86400000 + 2440587.5;
      const x = xOf(jdDay), dayNum = d.getUTCDate(), mon = d.getUTCMonth();
      const boundary = dayNum === 1;
      const sc = boundary ? '#bbb' : '#e8e8e8';
      svgHdr.appendChild(ln(x, 0, x, HDR_H, { stroke: sc, 'stroke-width': boundary ? 1 : 0.5 }));
      svgR.appendChild(ln(x, 0, x, TL_H, { stroke: sc, 'stroke-width': boundary ? 0.7 : 0.3 }));
      svgHdr.appendChild(txt(x + 2, 19, String(dayNum), { 'font-size': boundary ? 10 : 9, fill: boundary ? '#777' : '#aaa', 'font-weight': boundary ? 'bold' : 'normal' }));
      if (boundary && mon !== curMonth) { svgHdr.appendChild(txt(x + 2, 10, MS[mon], { 'font-size': 9, fill: '#666' })); curMonth = mon; }
      d.setUTCDate(d.getUTCDate() + 1);
    }
  } else if (ctx.isYearScale()) {
    const sy = new Date((jdStart - 2440587.5) * 86400000).getFullYear();
    const ey = new Date((jdEnd - 2440587.5) * 86400000).getFullYear() + 1;
    for (let yr = sy; yr <= ey; yr++) {
      const xYr = xOf(swe.julday(yr, 1, 1, 0));
      svgHdr.appendChild(ln(xYr, 0, xYr, HDR_H, { stroke: '#ddd', 'stroke-width': 0.7 }));
      svgHdr.appendChild(txt(xYr + 3, 16, String(yr), { 'font-size': 11, fill: '#999' }));
      svgR.appendChild(ln(xYr, 0, xYr, TL_H, { stroke: '#ddd', 'stroke-width': 0.7 }));
    }
  } else {
    const sd = new Date((jdStart - 2440587.5) * 86400000);
    sd.setDate(1); sd.setHours(0, 0, 0, 0);
    const numMonths = Math.ceil(SPAN / 28) + 3;
    for (let m = 0; m <= numMonths; m++) {
      const md = new Date(sd); md.setMonth(sd.getMonth() + m);
      const mJD = swe.julday(md.getFullYear(), md.getMonth() + 1, 1, 0);
      if (mJD < jdStart - 1 || mJD > jdEnd + 1) continue;
      const x = xOf(mJD);
      svgHdr.appendChild(ln(x, 0, x, HDR_H, { stroke: '#ddd', 'stroke-width': 0.7 }));
      svgHdr.appendChild(txt(x + 3, 16, MS[md.getMonth()], { 'font-size': 11, fill: '#999' }));
      svgR.appendChild(ln(x, 0, x, TL_H, { stroke: '#ddd', 'stroke-width': 0.7 }));
    }
  }
  svgHdr.appendChild(ln(0, HDR_H - 1, BARS_W, HDR_H - 1, { stroke: '#ccc', 'stroke-width': 0.8 }));
  const hdrHit = el('rect', { x: 0, y: 0, width: BARS_W, height: HDR_H, fill: 'transparent', style: 'cursor:pointer' });
  const hdrXtoJD = clientX => jdStart + (clientX - svgHdr.getBoundingClientRect().left) / PX_PER_DAY;
  hdrHit.addEventListener('click', e => ctx.onNavigate(hdrXtoJD(e.clientX)));
  svgHdr.appendChild(hdrHit);

  // курсор
  const xT = xOf(jdCursor ?? jdToday);
  svgR.appendChild(ln(xT, 0, xT, TL_H, { stroke: '#e44', 'stroke-width': 1.2, 'stroke-dasharray': '4,2', opacity: '0.8' }));
  svgHdr.appendChild(ln(xT, 0, xT, HDR_H, { stroke: '#e44', 'stroke-width': 1.2, 'stroke-dasharray': '4,2', opacity: '0.8' }));
  svgHdr.appendChild(txt(xT + 2, 11, '▼', { 'font-size': 8, fill: '#e44' }));

  // dim вне основного окна
  if (jdCoreStart && jdCoreEnd) {
    const xC1 = xOf(jdCoreStart), xC2 = xOf(jdCoreEnd);
    const dim = { y: 0, height: TL_H, fill: 'rgba(0,0,0,0.07)', style: 'pointer-events:none' };
    if (xC1 > 0) svgR.appendChild(el('rect', { x: 0, width: xC1, ...dim }));
    if (xC2 < BARS_W) svgR.appendChild(el('rect', { x: xC2, width: BARS_W - xC2, ...dim }));
    const hdim = { y: 0, height: HDR_H, fill: 'rgba(0,0,0,0.07)', style: 'pointer-events:none' };
    if (xC1 > 0) svgHdr.appendChild(el('rect', { x: 0, width: xC1, ...hdim }));
    if (xC2 < BARS_W) svgHdr.appendChild(el('rect', { x: xC2, width: BARS_W - xC2, ...hdim }));
  }

  // ── Сборка ──────────────────────────────────────────────────────────────────
  const scrollWrap = hel('div'); scrollWrap.id = 'tl-scroll';
  scrollWrap.appendChild(svgR);
  const body = hel('div'); body.id = 'tl-body';
  body.append(svgL, scrollWrap);
  const hdrScrollWrap = hel('div'); hdrScrollWrap.id = 'tl-hdr-scroll';
  hdrScrollWrap.appendChild(svgHdr);
  const hdrLeft = hel('div'); hdrLeft.style.cssText = `width:${LABEL_W}px; flex-shrink:0; background:#fff`;
  const hdrSticky = hel('div'); hdrSticky.id = 'tl-hdr-sticky';
  hdrSticky.append(hdrLeft, hdrScrollWrap);
  scrollWrap.addEventListener('scroll', () => { hdrScrollWrap.scrollLeft = scrollWrap.scrollLeft; });
  hdrScrollWrap.addEventListener('scroll', () => { scrollWrap.scrollLeft = hdrScrollWrap.scrollLeft; });

  const prevBodyScrollTop = document.getElementById('tl-body')?.scrollTop ?? 0;
  tl.replaceChildren(nav, hdrSticky, body);
  requestAnimationFrame(() => {
    scrollWrap.scrollLeft = xT - scrollWrap.clientWidth * 0.3;
    hdrScrollWrap.scrollLeft = scrollWrap.scrollLeft;
    if (prevBodyScrollTop > 0) body.scrollTop = prevBodyScrollTop;
  });
}

function computeAndRenderSkyTimeline(centerJD) {
  const container = tlHostContentEl();
  container.innerHTML = `<div class="tl-status">Вычисление аспектов…</div>`;
  setTimeout(() => {
    try {
      const now = new Date();
      const jdToday = swe.julday(now.getUTCFullYear(), now.getUTCMonth() + 1,
        now.getUTCDate(), now.getUTCHours() + now.getUTCMinutes() / 60);
      const center = centerJD ?? jdToday;
      const cd = new Date((center - 2440587.5) * 86400000);
      let jdStart, jdEnd, jdCoreStart, jdCoreEnd;

      if (skyScale === '1M') {
        const y = cd.getUTCFullYear(), m = cd.getUTCMonth() + 1;
        jdCoreStart = swe.julday(y, m, 1, 0);
        const daysInMonth = new Date(Date.UTC(y, m, 0)).getUTCDate();
        jdCoreEnd   = swe.julday(y, m, daysInMonth, 24);
        jdStart = jdCoreStart - 4;
        jdEnd   = jdCoreEnd   + 4;
      } else if (skyScale === '10Y') {
        const ds = Math.floor(cd.getUTCFullYear() / 10) * 10;
        jdStart = swe.julday(ds, 1, 1, 0);
        jdEnd   = swe.julday(ds + 11, 1, 1, 0);
        jdCoreStart = null; jdCoreEnd = null;
      } else {
        const numYears = skyScale === '2Y' ? 2 : 1;
        const cy = cd.getUTCFullYear();
        jdCoreStart = swe.julday(cy, 1, 1, 0);
        jdCoreEnd   = swe.julday(cy + numYears, 1, 1, 0);
        jdStart = jdCoreStart - 30;
        jdEnd   = jdCoreEnd   + 30;
      }

      const { periods, density } = computeSkyMutualAspects(jdStart, jdEnd, skyScale);
      const moonPeriods = skyScale === '1M' ? computeSkyMoonAspects(jdStart, jdEnd) : [];
      skyCachedTimeline = { periods, moonPeriods, density, jdStart, jdEnd, jdToday, jdCoreStart, jdCoreEnd, center };
      renderSkyTimeline({ ...skyCachedTimeline, jdCursor: center });
    } catch (e) {
      container.innerHTML = `<div class="tl-status">Ошибка: ${e.message}</div>`;
    }
  }, 30);
}

// Таймлайн элекции = таймлайн неба (взаимные аспекты движущегося неба),
// но рисует в общий #right-timeline-content и двигает сам момент карты.
function renderElectionTimeline() {
  if (!natalData) return;
  skyTlHost = {
    contentId: 'right-timeline-content',
    getJD: () => natalData?.birthJD ?? computeJDNow(),
    setJD: jd => applyNatalJD(jd),
  };
  skyCachedTimeline = null;
  computeAndRenderSkyTimeline(natalData.birthJD);
}

function syncSkyTimelineCursor() {
  if (!skyCachedTimeline) return;
  const jd = tlHostJD();
  const { jdStart, jdEnd } = skyCachedTimeline;
  if (jd >= jdStart && jd <= jdEnd) {
    renderSkyTimeline({ ...skyCachedTimeline, jdCursor: jd });
  } else {
    skyCachedTimeline = null;
    computeAndRenderSkyTimeline(jd);
  }
}

// Контекст масштабов/навигации таймлайна неба (callbacks переиспользуются в renderSkyTimeline).
const skyTlCtx = {
  isYearScale:  () => skyScale === '10Y',
  is2YScale:    () => skyScale === '2Y',
  isMonthScale: () => skyScale === '1M',
  onNavigate:   jd => { tlHostSetJD(jd); syncSkyTimelineCursor(); },
  onBarClick:   jd => { tlHostSetJD(jd); syncSkyTimelineCursor(); },
  onShift: days => {
    const newCenter = (skyCachedTimeline?.center ?? computeJDNow()) + days;
    skyCachedTimeline = null;
    computeAndRenderSkyTimeline(newCenter);
  },
  onScale: (scale, center) => { skyScale = scale; skyCachedTimeline = null; computeAndRenderSkyTimeline(center); },
  onDrillYear: yr => {
    skyScale = '1Y';
    skyCachedTimeline = null;
    computeAndRenderSkyTimeline(swe.julday(yr, 7, 2, 0));
  },
  onRerender: () => { if (skyCachedTimeline) renderSkyTimeline({ ...skyCachedTimeline, jdCursor: tlHostJD() }); },
};
