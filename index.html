function jdToDate(jd) { return new Date((jd - 2440587.5) * 86400000); }

function fmtJDTime(jd) {
  const d = jdToDate(jd);
  const now = new Date();
  const hm = `${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
  const sameDay = d.getDate() === now.getDate() && d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
  return sameDay ? hm : `${String(d.getDate()).padStart(2, '0')}.${String(d.getMonth() + 1).padStart(2, '0')} ${hm}`;
}

function renderHomeSkyInfo(planets, jd) {
  const box = document.getElementById('home-sky-info');
  const sun  = planets.find(p => p.id === 0);
  const moon = planets.find(p => p.id === 1);
  const lines = [];
  const phase = (Math.round((((moon.longitude - sun.longitude) + 360) % 360) / 45) % 8) * 45;
  lines.push(`<div>☽︎ ${fmtLon(moon.longitude)} · ${tr('phaseName_' + phase)}</div>`);
  try {
    const voc = computeMoonVoC(jd);
    if (voc.hasUpcoming && voc.lastExact !== null) {
      lines.push(`<div class="sky-muted">${tr('vocFromTo', { from: fmtJDTime(voc.lastExact), to: fmtJDTime(voc.exitJD) })}</div>`);
    } else if (!voc.hasUpcoming) {
      lines.push(`<div>${tr('vocUntil', { to: fmtJDTime(voc.exitJD) })}</div>`);
    }
  } catch (e) { console.warn('VoC:', e); }
  const retro = planets.filter(p => p.retrograde).map(p => p.glyph).join(' ');
  if (retro) lines.push(`<div class="sky-muted">R: ${retro}</div>`);
  box.innerHTML = lines.join('');
}

// ── Холостая Луна (void of course) ────────────────────────────────────────────
// Ищем точные мажорные аспекты Луны к Солнцу–Плутону до её выхода из знака.
// Последний точный аспект = начало VoC, выход из знака = конец.
// Планеты моделируются линейно (на отрезке ≤2.5 суток погрешность минуты).

function computeMoonVoC(jdNow) {
  if (_vocCache && (jdNow - _vocCache.computedJD) * 1440 < 10) return _vocCache;
  const flags = (swe.SEFLG_SWIEPH ?? 2) | (swe.SEFLG_SPEED ?? 256);
  const mLon = jd => ((swe.calc_ut(jd, 1, flags)[0] % 360) + 360) % 360;
  const norm180 = x => ((x % 360) + 360) % 360 - 180;

  // момент выхода Луны из текущего знака (Ньютон)
  const lon0 = mLon(jdNow);
  const exitTarget = ((Math.floor(lon0 / 30) + 1) * 30) % 360;
  let jdExit = jdNow;
  for (let i = 0; i < 6; i++) {
    const fwd = (((exitTarget - mLon(jdExit)) % 360) + 360) % 360; // 0…360 вперёд до границы
    const dd  = fwd > 180 ? fwd - 360 : fwd;                       // после перелёта — назад
    const spd = swe.calc_ut(jdExit, 1, flags)[3] || 13.2;
    jdExit += dd / spd;
    if (Math.abs(dd) < 0.001) break;
  }

  // линейные модели планет-целей
  const models = [0, 2, 3, 4, 5, 6, 7, 8, 9].map(id => {
    const r = swe.calc_ut(jdNow, id, flags);
    return { lon: ((r[0] % 360) + 360) % 360, spd: r[3] };
  });
  const signedTargets = [0, 60, 90, 120, 180, -60, -90, -120];

  // сэмплы Луны каждые 2 часа
  const step = 2 / 24;
  const ts = [], ml = [];
  for (let t = jdNow; t < jdExit; t += step) { ts.push(t); ml.push(mLon(t)); }
  ts.push(jdExit); ml.push(mLon(jdExit));

  let lastExact = null, hasUpcoming = false;
  for (const pm of models) {
    for (const target of signedTargets) {
      const u = (t, moonL) => norm180(moonL - (pm.lon + pm.spd * (t - jdNow)) - target);
      let prev = u(ts[0], ml[0]);
      for (let i = 1; i < ts.length; i++) {
        const cur = u(ts[i], ml[i]);
        if ((prev < 0) !== (cur < 0) && Math.abs(prev - cur) < 180) {
          let a = ts[i - 1], b = ts[i], ua = prev;
          for (let k = 0; k < 22; k++) {
            const mid = (a + b) / 2;
            const um = u(mid, mLon(mid));
            if ((ua < 0) !== (um < 0)) b = mid; else { a = mid; ua = um; }
          }
          const root = (a + b) / 2;
          hasUpcoming = true;
          if (lastExact === null || root > lastExact) lastExact = root;
        }
        prev = cur;
      }
    }
  }
  _vocCache = { computedJD: jdNow, exitJD: jdExit, lastExact, hasUpcoming };
  return _vocCache;
}

// Общий пикер города: кнопка + input + дропдаун, пишет в localStorage.skyPlace
function wirePlacePicker({ btnId, geoId, inputId, ddId, onApply }) {
  const btn = document.getElementById(btnId);
  const geo = document.getElementById(geoId);
  const input = document.getElementById(inputId);
  const dd = document.getElementById(ddId);
  if (!btn || !geo || !input || !dd) return;

  btn.addEventListener('click', e => {
    e.stopPropagation();
    geo.classList.toggle('open');
    if (geo.classList.contains('open')) input.focus();
  });

  const apply = item => {
    const name = item.display_name.split(',')[0].trim();
    localStorage.setItem('skyPlace', JSON.stringify({ name, lat: parseFloat(item.lat), lon: parseFloat(item.lon) }));
    geo.classList.remove('open');
    dd.style.display = 'none';
    input.value = '';
    onApply();
  };

  let timer = null;
  input.addEventListener('input', () => {
    clearTimeout(timer);
    const q = input.value.trim();
    if (q.length < 2) { dd.style.display = 'none'; return; }
    timer = setTimeout(async () => {
      try {
        const items = await geoSearch(q);
        dd.innerHTML = '';
        if (!items.length) { dd.style.display = 'none'; return; }
        for (const item of items) {
          const parts = item.display_name.split(',');
          const div = document.createElement('div');
          div.className = 'geo-item';
          div.innerHTML = `<div class="geo-main">${escapeHtml(parts[0].trim())}</div><div class="geo-sub">${escapeHtml(parts.slice(1, 3).join(',').trim())}</div>`;
          div.addEventListener('mousedown', ev => { ev.preventDefault(); apply(item); });
          dd.appendChild(div);
        }
        dd.style.display = 'block';
      } catch { dd.style.display = 'none'; }
    }, 380);
  });

  input.addEventListener('blur', () => {
    setTimeout(() => { dd.style.display = 'none'; }, 180);
  });
}

const _natalLonsCache = new Map();

function natalLonsFor(c) {
  if (!swe || !c.birth_date) return null;
  const key = `${c.id}|${c.birth_date}|${c.birth_time}|${c.utc_offset}`;
  if (_natalLonsCache.has(key)) return _natalLonsCache.get(key);
  let out = null;
  try {
    const [y, m, d] = c.birth_date.split('-').map(Number);
    const [hr, mn] = (c.birth_time ?? '12:00').split(':').map(Number);
    const jd = swe.julday(y, m, d, hr + mn / 60 - (c.utc_offset ?? 0));
    const flags = swe.SEFLG_SWIEPH ?? 2;
    out = PLANETS
      .filter(p => c.birth_time || p.id !== 1)  // без точного времени Луну не берём
      .map(p => ({ id: p.id, glyph: p.glyph, lon: ((swe.calc_ut(jd, p.id, flags)[0] % 360) + 360) % 360 }));
  } catch { out = null; }
  _natalLonsCache.set(key, out);
  return out;
}

// Транзиты медленных планет (♃–♇) к наталам закреплённых (или недавних) карт,
// орбис ≤1°, только сходящиеся — с оценкой даты точного аспекта
function homeTransitEvents() {
  const flags = (swe.SEFLG_SWIEPH ?? 2) | (swe.SEFLG_SPEED ?? 256);
  const jd = computeJDNow();
  const trans = [5, 6, 7, 8, 9].map(id => {
    const r = swe.calc_ut(jd, id, flags);
    return { glyph: PLANETS.find(p => p.id === id).glyph, lon: ((r[0] % 360) + 360) % 360, spd: r[3] };
  });
  let pool = _homeCharts.filter(c => c.pinned);
  if (!pool.length) pool = [..._homeCharts].sort((a, b) => homeChartTs(b) - homeChartTs(a));
  pool = pool.slice(0, 12);
  const out = [];
  for (const c of pool) {
    const natal = natalLonsFor(c);
    if (!natal) continue;
    for (const t of trans) {
      for (const n of natal) {
        for (const asp of ASPECTS) {
          const orb = Math.abs(angDiff(t.lon, n.lon) - asp.angle);
          if (orb > 1) continue;
          const orbNext = Math.abs(angDiff(((t.lon + t.spd) % 360 + 360) % 360, n.lon) - asp.angle);
          const applying = orbNext < orb;
          if (!applying && orb > 0.25) continue;   // расходящиеся показываем только почти точные
          const days = applying ? Math.round(orb / Math.max(1e-4, orb - orbNext)) : 0;
          if (days > 45) continue;
          const d = new Date(); d.setDate(d.getDate() + days);
          const when = days === 0 ? tr('today') : `${String(d.getDate()).padStart(2, '0')}.${String(d.getMonth() + 1).padStart(2, '0')}`;
          out.push({ ord: days, chart: c, ico: '⚡',
            html: `<span class="home-event-name">${escapeHtml(c.name ?? '')}</span> — ${t.glyph} ${asp.symbol} ${n.glyph} · ${tr('exactOn')} ${when}` });
        }
      }
    }
  }
  return out;
}

function renderHomeEvents() {
  const wrap = document.getElementById('home-events');
  const list = document.getElementById('home-events-list');
  if (!currentUser || !_homeCharts.length) { wrap.classList.remove('visible'); return; }
  const items = [];
  // 🎂 дни рождения в ближайшие 14 дней
  const now = new Date();
  const today0 = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  for (const c of _homeCharts) {
    if (!c.birth_date) continue;
    const [by, bm, bd] = c.birth_date.split('-').map(Number);
    let next = new Date(now.getFullYear(), bm - 1, bd);
    if (next < today0) next = new Date(now.getFullYear() + 1, bm - 1, bd);
    const days = Math.round((next - today0) / 86400000);
    if (days > 14) continue;
    const when = days === 0 ? tr('today') : `${String(bd).padStart(2, '0')}.${String(bm).padStart(2, '0')}`;
    items.push({ ord: days, chart: c, ico: '🎂',
      html: `<span class="home-event-name">${escapeHtml(c.name ?? '')}</span> — ${when} · ${tr('turnsYears', { n: next.getFullYear() - by })}` });
  }
  // ⚡ транзиты
  if (swe) {
    try { items.push(...homeTransitEvents()); } catch (e) { console.warn('events:', e); }
  }
  items.sort((a, b) => a.ord - b.ord);
  const top = items.slice(0, 8);
  if (!top.length) { wrap.classList.remove('visible'); return; }
  list.innerHTML = '';
  for (const it of top) {
    const div = document.createElement('div');
    div.className = 'home-event';
    div.innerHTML = `<span class="home-event-ico">${it.ico}</span><span>${it.html}</span>`;
    div.addEventListener('click', () => loadChartFromDB(it.chart));
    list.appendChild(div);
  }
  wrap.classList.add('visible');
}

// ── Event listeners ───────────────────────────────────────────────────────────

document.getElementById('sky-exit-btn').addEventListener('click', exitSkyMode);
document.getElementById('sky-logo').addEventListener('click', exitSkyMode);
document.getElementById('sky-snap-add').addEventListener('click', addSkySnapshot);

document.getElementById('sky-settings-btn').addEventListener('click', e => {
  openSettingsDropdown(e.currentTarget, e);
});

document.getElementById('sky-tl-toggle').addEventListener('click', () => {
  skyTlHidden = !skyTlHidden;
  const layout = document.getElementById('sky-layout');
  if (skyTlHidden) {
    layout.classList.add('sky-tl-hidden');
    document.getElementById('sky-tl-toggle').textContent = '▼';
  } else {
    layout.classList.remove('sky-tl-hidden');
    document.getElementById('sky-tl-toggle').textContent = '▲';
    if (skyCachedTimeline) {
      requestAnimationFrame(() => requestAnimationFrame(() =>
        renderSkyTimeline({ ...skyCachedTimeline, jdCursor: skyJD ?? computeJDNow() })
      ));
    }
  }
});

// Nav mode toggle (Дата / Время)
document.querySelectorAll('.sky-navmode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    skyNavMode = btn.dataset.skymode;
    document.querySelectorAll('.sky-navmode-btn').forEach(b => b.classList.toggle('active', b === btn));
  });
});

// Nav arrows
document.querySelectorAll('[data-skynav]').forEach(btn => {
  btn.addEventListener('click', () => {
    const nav = btn.dataset.skynav;
    if (nav === 'today') {
      skyJD = computeJDNow();
      renderSkyAt(skyJD);
      syncSkyDateLabel();
      clearSkySnapActive();
      skyCachedTimeline = null;
      computeAndRenderSkyTimeline(skyJD);
      return;
    }
    if (skyNavMode === 'date') {
      if (nav === 'prev-big')   navigateSkyBy('year',  -1);
      else if (nav === 'next-big')   navigateSkyBy('year',  +1);
      else if (nav === 'prev-mid')   navigateSkyBy('month', -1);
      else if (nav === 'next-mid')   navigateSkyBy('month', +1);
      else if (nav === 'prev-small') navigateSkyBy('day',   -1);
      else if (nav === 'next-small') navigateSkyBy('day',   +1);
    } else {
      if (nav === 'prev-big')   navigateSkyBy('hour',   -1);
      else if (nav === 'next-big')   navigateSkyBy('hour',   +1);
      else if (nav === 'prev-mid')   navigateSkyBy('minute', -1);
      else if (nav === 'next-mid')   navigateSkyBy('minute', +1);
      else if (nav === 'prev-small') navigateSkyBy('second', -1);
      else if (nav === 'next-small') navigateSkyBy('second', +1);
    }
  });
});

// ── Apply saved language on startup ───────────────────────────────────────────
applyLang();

// ── PWA: service worker (нужен для установки на домашний экран) ───────────────
if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
