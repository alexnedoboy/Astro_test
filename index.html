function updateHashForActiveTab(push = false) {
  const t = tabs[activeTab];
  if (!t || !t.chartId) {
    if (parseChartHash()) history.replaceState('', document.title, window.location.pathname + window.location.search);
    return;
  }
  const newHash = `#chart/${t.chartId}`;
  if (window.location.hash === newHash) return;
  if (push) history.pushState({ chartId: t.chartId }, '', newHash);
  else      history.replaceState({ chartId: t.chartId }, '', newHash);
}

// Ленивая вкладка (после перезагрузки): пересчитать карту из полей и применить
// сохранённое «лёгкое» состояние вида (t.view).
function rebuildTabFromFields(t) {
  // Синастрия — композит: пересчёт из t.refs, а не из полей формы
  if (t.type === 'synastry') {
    const v = t.view || {};
    chartExpanded  = !!v.chartExpanded;
    layout2TlState = v.layout2TlState ?? 0;
    currentTransitJD = null;
    synView = v.synView || 'both';
    paintSynastryFromRefs(t);
    t.st = captureState();
    t.view = null;
    return;
  }
  writeFormFields(t.fields);
  currentChartId = t.chartId ?? null;
  const v = t.view || {};
  chartExpanded  = !!v.chartExpanded;
  layout2TlState = v.layout2TlState ?? 0;
  tlYearScale    = !!v.tlYearScale;
  currentTransitJD = null;
  if (!computeAndRenderNatal()) return;
  // Наложить сохранённый вид поверх дефолтного транзита «сегодня»
  if (v.currentMode) currentMode = v.currentMode;
  if (v.currentTransitJD != null) currentTransitJD = v.currentTransitJD;
  tlPastYears   = v.tlPastYears   ?? 0;
  tlFutureYears = v.tlFutureYears ?? 0;
  if (Array.isArray(v.expandedRows))  expandedRows  = new Set(v.expandedRows);
  if (Array.isArray(v.hiddenTPlants)) hiddenTPlants = new Set(v.hiddenTPlants);
  moonBandCollapsed = !!v.moonBandCollapsed;
  rightPanelTabs = sanitizeRpTabs(v.rightPanelTabs);
  rightPanelTab = v.rightPanelTab || 'grades';
  chartModeTabs = sanitizeChartModeTabs(v.chartModeTabs);
  if (t.header) setV2ChartInfo(t.header.name, t.header.dateTime, t.header.city);
  applyCaseType(t.type);
  cachedTimeline = null;
  paintActiveChart();
  t.st = captureState();
  t.view = null;
}

// ── Персистентность вкладок (localStorage) ───────────────────────────────────
// Сохраняем только «лёгкое»: источник (fields) + шапку + состояние вида.
// natalData/кэши не сериализуем — пересчитываются из fields при активации.
const TABS_LS_KEY = 'chartTabs';
let _pendingTabPaint = false;

function stateToView(s) {
  if (!s) return null;
  const layer = s.layers && s.layers[0];
  const u = s.ui || {};
  return {
    currentMode: layer ? layer.method : 'natal',
    currentTransitJD: s.T,
    tlPastYears: u.tlPastYears,
    tlFutureYears: u.tlFutureYears,
    expandedRows: [...(u.expandedRows || [])],
    hiddenTPlants: [...(u.hiddenTPlants || [])],
    moonBandCollapsed: u.moonBandCollapsed,
    tlYearScale: u.tlYearScale,
    chartExpanded: u.chartExpanded,
    layout2TlState: u.layout2TlState,
    rightPanelTab: u.rightPanelTab,
    rightPanelTabs: u.rightPanelTabs ? [...u.rightPanelTabs] : undefined,
    chartModeTabs: u.chartModeTabs ? [...u.chartModeTabs] : undefined,
    synView: u.synView,
  };
}

function tabToStorage(t, live) {
  if (t.kind === 'palette') return { kind: 'palette' };
  if (live) {
    return { chartId: currentChartId ?? null, fields: readFormFields(), header: readHeader(), view: stateToView(captureState()), type: t.type ?? 'natal', outcome: t.outcome ?? null, snapshots: t.snapshots ?? [], refs: t.refs ?? null, houseSystem: t.houseSystem ?? null };
  }
  return { chartId: t.chartId ?? null, fields: t.fields, header: t.header, view: t.st ? stateToView(t.st) : (t.view || null), type: t.type ?? 'natal', outcome: t.outcome ?? null, snapshots: t.snapshots ?? [], refs: t.refs ?? null, houseSystem: t.houseSystem ?? null };
}

function persistTabs() {
  try {
    const showingChart = !dashboardOpen && activeTab >= 0;
    const data = {
      activeTab,
      dashboardOpen,
      tabs: tabs.map((t, i) => tabToStorage(t, showingChart && i === activeTab)),
    };
    localStorage.setItem(TABS_LS_KEY, JSON.stringify(data));
  } catch (e) { /* квота/доступ — молча игнорируем */ }
}

function restoreTabs() {
  let data;
  try { data = JSON.parse(localStorage.getItem(TABS_LS_KEY)); } catch { return; }
  if (!data || !Array.isArray(data.tabs) || !data.tabs.length) return;
  tabs = data.tabs.map(d => d.kind === 'palette'
    ? { uid: ++_tabUid, kind: 'palette' }
    : {
        uid: ++_tabUid,
        chartId: d.chartId ?? null,
        fields: d.fields || null,
        header: d.header || null,
        st: null,                 // ленивая — построим при первом показе
        view: d.view || null,
        type: d.type ?? 'natal',
        outcome: d.outcome ?? null,
        snapshots: Array.isArray(d.snapshots) ? d.snapshots : [],
        refs: d.refs ?? null,
        houseSystem: d.houseSystem ?? null,
      });
  activeTab = (typeof data.activeTab === 'number' && data.activeTab < tabs.length) ? data.activeTab : 0;
  dashboardOpen = data.dashboardOpen !== false;   // по умолчанию показываем дашборд
  renderTabBar();
  if (!dashboardOpen && tabs[activeTab]) {
    if (sweReady) showTab(activeTab);
    else _pendingTabPaint = true;   // дождёмся инициализации swisseph
  }
}

// Перед перезагрузкой/закрытием — зафиксировать актуальный вид активной вкладки
window.addEventListener('beforeunload', persistTabs);

restoreTabs();

// Видимость главного экрана управляется классом home-off на body (см. CSS).
function hideHome() {
  document.body.classList.add('home-off');
  stopHomeSky();
}

function showHome() {
  document.body.classList.remove('home-off');
  startHomeSky();
  if (currentUser) loadHomeCharts();   // база могла измениться, пока была открыта карта
}

function fmtUtcOff(off) {
  const h = Math.floor(Math.abs(off));
  const m = Math.round((Math.abs(off) - h) * 60);
  const sign = off >= 0 ? '+' : '-';
  return m ? `GMT${sign}${h}:${String(m).padStart(2,'0')}` : `GMT${sign}${h}`;
}

function setV2ChartInfo(name, dateTime, city) {
  document.getElementById('v2-chart-name').textContent = name || '';
  document.getElementById('v2-chart-date').textContent = dateTime || '';
  if (city !== undefined) document.getElementById('v2-chart-place').textContent = city;
}

// Селектор системы домов на карточке кейса: показывает фактическую систему
// (оверрайд → дефолт типа), смена = оверрайд кейса + пересчёт + запись в БД.
function syncHouseSysChip() {
  const sel = document.getElementById('v2-house-sys');
  if (!sel) return;
  if (!sel.options.length) {
    for (const [v] of HOUSE_SYSTEMS) {
      const o = document.createElement('option');
      o.value = v;
      sel.appendChild(o);
    }
  }
  [...sel.options].forEach(o => { o.textContent = tr('hsys' + o.value); });
  sel.title = tr('hsTitle');
  sel.value = houseSysFor(tabs[activeTab]);
}

document.getElementById('v2-house-sys').addEventListener('change', async e => {
  const t = tabs?.[activeTab];
  if (!t || t.kind === 'palette' || t.type === 'synastry') return;
  t.houseSystem = e.target.value;
  if (t.fields) {
    t.view = stateToView(captureState());   // сохранить вид (режим, T, раскрытия)
    t.st = null;
    rebuildTabFromFields(t);
  }
  persistTabs();
  if (t.chartId && currentUser) {
    const { error } = await sb.from('charts').update({ house_system: t.houseSystem }).eq('id', t.chartId);
    if (error) console.warn('house_system:', error.message);  // до миграции колонки может не быть
    else {
      const row = _homeCharts.find(x => x.id === t.chartId);
      if (row) row.house_system = t.houseSystem;
    }
  }
});

// Метка типа кейса (натал / синастрия / хорар / …) — см. WORKSPACE_CONCEPT.md §7.
// Тип фиксируется при создании кейса; межтипового переключения нет.
const CASE_TYPE_LABELS = { natal:'натал', synastry:'синастрия', horary:'хорар', election:'элекция', event:'событие', sky:'небо' };
let currentCaseType = 'natal';
function applyCaseType(type) {
  currentCaseType = type || 'natal';
  const el = document.getElementById('v2-case-type');
  if (el) el.textContent = CASE_TYPE_LABELS[type] || '';
  syncHouseSysChip();
  // Пресет хорара: без таймлайна, режимов и контроллера времени (всё anchored)
  document.getElementById('layout-v2')?.classList.toggle('case-horary', type === 'horary');
  // Пресет элекции: карта момента (самосущая). Таймлайн source=sky и контроллер T — фаза 2.
  document.getElementById('layout-v2')?.classList.toggle('case-election', type === 'election');
  // Пресет синастрии: две карточки субъектов, без таймлайна/режимов/контроллера (§6).
  document.getElementById('layout-v2')?.classList.toggle('case-synastry', type === 'synastry');
  applyOutcomeChips();
}

// Заполнить две карточки субъектов синастрии из refs = { a, b } (поля субъектов).
function fillSynSubjectCards(refs) {
  const fill = (sel, subj) => {
    const card = document.querySelector(`#v2-syn-subjects .v2-syn-card[data-syn="${sel}"]`);
    if (!card || !subj) return;
    card.querySelector('.v2-syn-card-name').textContent = subj.name || tr('chartFallback');
    const dt = subj.birth_date ? subj.birth_date.split('-').reverse().join('.') : '';
    const off = subj.utc_offset != null && subj.utc_offset !== '' ? ` (${fmtUtcOff(parseFloat(subj.utc_offset) || 0)})` : '';
    card.querySelector('.v2-syn-card-date').textContent = [dt, subj.birth_time || ''].filter(Boolean).join(' ') + off;
    card.querySelector('.v2-syn-card-place').textContent = subj.city || '';
  };
  fill('a', refs?.a);
  fill('b', refs?.b);
  const ct = document.getElementById('v2-syn-case-type');
  if (ct) ct.textContent = CASE_TYPE_LABELS.synastry || '';
}

// ── Исход хорара: сбылся / нет / частично (charts.outcome) ────────────────────
function applyOutcomeChips() {
  const cur = tabs[activeTab]?.outcome ?? null;
  document.querySelectorAll('#v2-outcome .outcome-chip').forEach(b =>
    b.classList.toggle('active', b.dataset.outcome === cur));
}
document.getElementById('v2-outcome')?.addEventListener('click', e => {
  const btn = e.target.closest('.outcome-chip');
  const t = tabs[activeTab];
  if (!btn || !t) return;
  t.outcome = t.outcome === btn.dataset.outcome ? null : btn.dataset.outcome;
  applyOutcomeChips();
  persistTabs();
  if (t.chartId && currentUser) {
    sb.from('charts').update({ outcome: t.outcome }).eq('id', t.chartId)
      .then(({ error }) => { if (error) console.warn('outcome:', error.message); });
    const row = _homeCharts.find(x => x.id === t.chartId);
    if (row) row.outcome = t.outcome;
  }
});

// ── Правая группа панелей: виджеты-табы (см. WORKSPACE_CONCEPT.md §6, §13).
// Состав группы (rightPanelTabs) и активный виджет (rightPanelTab) — часть
// context.ui, персистятся per-case. Реестр RP_WIDGETS — точка добавления новых
// виджетов (достоинства, мидпойнты и т.д.).
const RP_WIDGETS = {
  grades:    { i18n: 'panelTabGrades'     },
  aspects:   { i18n: 'panelTabAspects'    },
  dignities: { i18n: 'panelTabDignities'  },
  aspflow:   { i18n: 'panelTabAspFlow'    },
};
const RP_DEFAULT_TABS = ['grades', 'aspects'];
let rightPanelTabs = [...RP_DEFAULT_TABS];
let rightPanelTab  = 'grades';

function sanitizeRpTabs(arr) {
  const ok = Array.isArray(arr) ? arr.filter(id => RP_WIDGETS[id]) : [];
  return ok.length ? ok : [...RP_DEFAULT_TABS];
}

function applyRightPanelTab() {

// ── Снимки элекции (варианты): закреплённые значения T на вкладке-кейсе ────────
// Снимок = момент (jd). Живёт на tabs[activeTab].snapshots, персист в localStorage
// (Supabase-персист — отдельная фаза). Прыжок = applyNatalJD → двигает и карту,
// и курсор таймлайна (единый сеттер T).
let _electionSnapActive = null;   // id снимка, на котором сейчас стоит момент
let _electionJumping = false;     // прыжок по снимку (не сбрасывать подсветку)

function electionSnaps() {
  const t = tabs[activeTab];
  if (!t) return [];
  return (t.snapshots ||= []);
}

// Синхронизация снимков в Supabase (только если элекция уже сохранена).
// Толерантно к отсутствию колонки snapshots — просто молчит.
function persistElectionSnapshotsToDb(t) {
  if (!t?.chartId || !currentUser) return;
  sb.from('charts').update({ snapshots: t.snapshots ?? [] }).eq('id', t.chartId)
    .then(({ error }) => { if (error) console.warn('snapshots update:', error.message); });
}

function addElectionSnapshot() {
  if (currentCaseType !== 'election' || !natalData) return;
  const id = 's' + Date.now();
  electionSnaps().push({ id, jd: natalData.birthJD });
  _electionSnapActive = id;
  renderElectionSnaps();
  persistTabs();
  persistElectionSnapshotsToDb(tabs[activeTab]);
}

function jumpElectionSnapshot(snap) {
  _electionSnapActive = snap.id;
  _electionJumping = true;
  applyNatalJD(snap.jd);
  _electionJumping = false;
  renderElectionSnaps();
}

function deleteElectionSnapshot(id) {
  const t = tabs[activeTab];
  if (!t) return;
  t.snapshots = (t.snapshots || []).filter(s => s.id !== id);
  if (_electionSnapActive === id) _electionSnapActive = null;
  renderElectionSnaps();
  persistTabs();
  persistElectionSnapshotsToDb(t);
}

function renderElectionSnaps() {
  const list = document.getElementById('v2-snap-list');
  if (!list) return;
  list.replaceChildren();
  const snaps = (tabs[activeTab]?.snapshots) || [];
  if (!snaps.length) {
    const empty = document.createElement('div');
    empty.id = 'v2-snap-empty';
    empty.textContent = tr('snapEmpty');
    list.appendChild(empty);
    return;
  }
  for (const snap of snaps) {
    const parts = fmtSkySnapParts(snap.jd);
    const item = document.createElement('div');
    item.className = 'sky-snap-item' + (snap.id === _electionSnapActive ? ' active' : '');
    item.title = `${parts.date} ${parts.time}`;
    item.addEventListener('click', () => jumpElectionSnapshot(snap));
    const dateSpan = document.createElement('span');
    dateSpan.className = 'sky-snap-date';
    dateSpan.textContent = parts.date;
    const timeSpan = document.createElement('span');
    timeSpan.className = 'sky-snap-time';
    timeSpan.textContent = parts.time;
    const del = document.createElement('button');
    del.type = 'button';
    del.className = 'sky-snap-del';
    del.textContent = '✕';
    del.title = tr('delete');
    del.addEventListener('click', e => { e.stopPropagation(); deleteElectionSnapshot(snap.id); });
    item.append(dateSpan, timeSpan, del);
    list.appendChild(item);
  }
}

// ── Calculate ─────────────────────────────────────────────────────────────────

// Обёртка calc_ut, которая не роняет расчёт, если тело недоступно на данную дату
// (напр. Хирон вне диапазона астероидных файлов seas_*.se1 до 1800 г. — Мошье
// астероиды не считает). Возвращает массив результата либо null.
function safeCalcUt(jd, id, flags) {
  try { return swe.calc_ut(jd, id, flags); }
  catch (e) { return null; }
}

// Чистый расчёт карты из набора полей (без DOM). Возвращает объект данных карты
// либо null, если полей не хватает. fields = { birthDate, birthTime, lat, lon, utcOff }.
// houseSys — система домов ('P' Плацидус по умолчанию, 'R' Региомонтан у хорара).
function computeChartData(fields, houseSys = 'P') {
  if (!swe || !fields) return null;
  const lat    = parseFloat(fields.lat);
  const lon    = parseFloat(fields.lon);
  const utcOff = parseFloat(fields.utcOff) || 0;
  if (!fields.birthDate || !fields.birthTime || isNaN(lat) || isNaN(lon)) return null;

  const [y, m, d] = fields.birthDate.split('-').map(Number);
  const [hr, mn]  = fields.birthTime.split(':').map(Number);
  const jd        = swe.julday(y, m, d, hr + mn / 60 - utcOff);
  const flags     = (swe.SEFLG_SWIEPH ?? 2) | (swe.SEFLG_SPEED ?? 256);

  const planets = PLANETS.map(p => {
    const r = safeCalcUt(jd, p.id, flags);   // вне диапазона астероидных файлов (Хирон < 1800) — пропуск
    if (!r) return null;
    return { ...p, longitude: ((r[0] % 360) + 360) % 360, speed: r[3], retrograde: r[3] < 0 && p.id !== 10 && p.id !== 12 };
  }).filter(Boolean);

  // ВАЖНО: swe.houses() (4 аргумента) в swisseph-wasm игнорирует параметр системы
  // домов и всегда считает Плацидус — используем houses_ex(), которая учитывает hsys.
  const hRes  = swe.houses_ex(jd, flags, lat, lon, houseSys);
  const cusps = Array.from(hRes.cusps).slice(1, 13);
  const ascmc = Array.from(hRes.ascmc);
  const asc   = ((ascmc[0] % 360) + 360) % 360;
  const mc    = ((ascmc[1] % 360) + 360) % 360;

  planets.forEach(p => { p.house = findHouse(p.longitude, cusps); });
  return { planets, cusps, asc, mc, birthJD: jd, lat, lon, originalBirthJD: jd, utcOff };
}

// Построить натальные данные из формы и отрисовать в V2.
// Не управляет вкладками — это делают вызывающие. Возвращает true при успехе.
function computeAndRenderNatal() {
  if (!swe) return false;
  const utcOff  = parseFloat(document.getElementById('utcOff').value) || 0;

  const caseType = tabs[activeTab]?.type || 'natal';
  try {
    // Система домов: оверрайд кейса → дефолт типа из настроек (houseSysFor)
    const data = computeChartData(readFormFields(), houseSysFor(tabs[activeTab]));
    if (!data) { setStatus(tr('fillAllFields')); return false; }
    const { planets, cusps, asc, mc } = data;

    // Save for transit tab; invalidate timeline cache and reset window
    natalData = data;
    cachedTimeline = null;
    tlPastYears = 0; tlFutureYears = 0;
    expandedRows = new Set(); fastCache = {}; hiddenTPlants = new Set(); moonBandCollapsed = false;

    const chartName = document.getElementById('chartName').value.trim()
                   || document.getElementById('birthPlace').value
                   || tr('chartFallback');
    const rawDate = document.getElementById('birthDate').value;
    const fmtDate = rawDate ? rawDate.split('-').reverse().join('.') : '';
    const fmtTime = document.getElementById('birthTime').value || '';
    const dateTime = [fmtDate, fmtTime, `(${fmtUtcOff(utcOff)})`].filter(Boolean).join(' ');

    closeNewChartModal();
    setV2ChartInfo(chartName, dateTime, document.getElementById('birthPlace').value.trim());
    applyCaseType(tabs[activeTab]?.type || 'natal');
    applyRightPanelTab();
    applyChartModeTabs();
    applyLayout2Classes();

    renderChart(planets, cusps, asc, mc);
    buildInfoTable(planets, cusps);
    buildAspectGrid(addSouthNode(planets, cusps));
    currentMode = 'natal';
    syncV2ModeButtons();
    syncV2DateLabel();
    setInfoTableMode('natal');
    renderHoraryBlock();
    if (caseType === 'election') { renderElectionTimeline(); _electionSnapActive = null; renderElectionSnaps(); }
    else if (caseType !== 'horary') computeAndRenderTimeline(natalData.planets);
    setStatus('');
    return true;
  } catch (e) { setStatus(tr('error') + e.message); return false; }
}

// ── Helpers ───────────────────────────────────────────────────────────────────

function findHouse(lon, cusps) {
  for (let i = 0; i < 12; i++) {
    const s = cusps[i], e = cusps[(i + 1) % 12];
    if (s <= e ? (lon >= s && lon < e) : (lon >= s || lon < e)) return i + 1;
  }
  return 1;
}

// Ecliptic longitude → SVG angle (ASC at 9 o'clock, CCW = increasing lon)
function lonToRad(lon, asc) { return (180 - (lon - asc)) * Math.PI / 180; }
function polar(a, r)         { return { x: CX + r * Math.cos(a), y: CY + r * Math.sin(a) }; }
function angDiff(a, b)       { const d = Math.abs(a - b) % 360; return d > 180 ? 360 - d : d; }

// ── South Node helper ─────────────────────────────────────────────────────────
// South Node is always exactly opposite the North Node (id=10).
function addSouthNode(planets, cusps = null) {
  const nn = planets.find(p => p.id === 10);
  if (!nn) return planets;
  const lon = (nn.longitude + 180) % 360;
  const sn = {
    id: -10,
    name: tr('pl_snode'),
    glyph: '☋\uFE0E', hamburgGlyph: '}',
    longitude: lon,
    retrograde: false,
    house: cusps ? findHouse(lon, cusps) : undefined,
  };
  return [...planets, sn];
}

// ── Format helpers ────────────────────────────────────────────────────────────

function fmtLon(lon) {
  const norm = ((lon % 360) + 360) % 360;
  const signIdx = Math.floor(norm / 30) % 12;
  const inSign  = norm % 30;
  const deg = Math.floor(inSign);
  const min = Math.floor((inSign - deg) * 60);
  return `${deg}°${String(min).padStart(2,'0')}' ${SIGN_NAMES[signIdx]}`;
}

function fmtOrb(orbDeg) {
  const d = Math.floor(orbDeg);
  const m = Math.round((orbDeg - d) * 60);
  return `(${d}°${String(m).padStart(2,'0')}')`;
}

// Mean daily motion (°/day) — geocentric absolute mean (direct + retrograde phases)
// Sun/Moon/Mars: orbital period (geocentric ≈ heliocentric for these)
// Mercury/Venus: traditional geocentric mean (Houlding)
// Jupiter+: empirical geocentric absolute mean (Sotis-derived, accounts for Earth parallax)
// Epoch means computed from SwissEph 2010–2030 (every 5 days, abs value avg)
const AVG_SPEED = {
  0:  (59 + 8/60) / 60,    // Sun      0°59'08"
  1:  13 + 10/60,           // Moon     13°10'
  2:  1 + 12/60,            // Mercury  1°12'
  3:  1 + 2/60,             // Venus    1°02'
  4:  (34 + 8/60) / 60,    // Mars     0°34'08"
  5:  (8 + 2/60) / 60,     // Jupiter  0°08'02"
  6:  (4 + 4/60) / 60,     // Saturn   0°04'04"
  7:  (1 + 58/60) / 60,    // Uranus   0°01'58"
  8:  (1 + 17/60) / 60,    // Neptune  0°01'17"
  9:  (1 + 7/60) / 60,     // Pluto    0°01'07"
  10: 360 / 6793.5,         // North Node 0°03'11"
  12: 360 / 3232.5,         // Lilith   0°06'41"
  15: (2 + 8/60) / 60,     // Chiron   0°02'08"
};

function fmtSpeedDeg(degPerDay) {
  if (degPerDay == null) return '';
  const sign = degPerDay < 0 ? '−' : '';
  const abs = Math.abs(degPerDay);
  const totalSec = Math.round(abs * 3600);
  const d = Math.floor(totalSec / 3600);
  const m = Math.floor((totalSec % 3600) / 60);
  const s = totalSec % 60;
  if (d >= 1) {
    return `${sign}${d}°${String(m).padStart(2,'0')}′`;
  } else {
    return `${sign}${m}′${String(s).padStart(2,'0')}″`;
  }
}

function fmtSpeed(degPerDay, planetId) {
  if (degPerDay == null) return '';
  const avg = AVG_SPEED[planetId];
  if (!avg) return '';
  const pct = Math.round(Math.abs(degPerDay) / avg * 100);
  return `${pct}%`;
}

// ── Chart tooltip ─────────────────────────────────────────────────────────────

const _ctEl = () => document.getElementById('chart-tooltip');
function showChartTip(text, e) {
  const el = _ctEl();
  el.textContent = text;
  el.style.display = 'block';
  el.style.left = (e.clientX + 14) + 'px';
  el.style.top  = (e.clientY - 30) + 'px';
}
function moveChartTip(e) {
  const el = _ctEl();
  el.style.left = (e.clientX + 14) + 'px';
  el.style.top  = (e.clientY - 30) + 'px';
}
function hideChartTip() { _ctEl().style.display = 'none'; }

// ── SVG factory ───────────────────────────────────────────────────────────────

const NS = 'http://www.w3.org/2000/svg';
function el(tag, attrs = {}, text) {
  const e = document.createElementNS(NS, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, String(v));
  if (text !== undefined) e.textContent = text;
  return e;
}
const circ = (cx, cy, r, a)       => el('circle', { cx, cy, r, ...a });
const ln   = (x1, y1, x2, y2, a) => el('line', { x1, y1, x2, y2, ...a });
const txt  = (x, y, s, a)        => el('text', { x, y, ...a }, s);

// Label + superscript degree (e.g. "VI¹³")
function lblSup(x, y, main, deg, attrs) {
  const t = el('text', { x, y, ...attrs });
  t.appendChild(el('tspan', {}, main));
  t.appendChild(el('tspan', { dy: '-5', 'font-size': '0.68em' }, String(deg)));
  return t;
}

// ── Render ────────────────────────────────────────────────────────────────────
// Drawing order mirrors the SVG template exactly:
// 1. white background
// 2. house axis lines (full diameter, behind ring)
// 3. zodiac ring (opacity 0.5, on top of house lines at edges)
// 4. white sign dividers (visible only where ring is gray)
// 5. zodiac glyphs + ticks
// 6. inner circle (white fill covers center of house lines)
// 7. aspect lines (on top of inner circle)
// 8. planets
// 9. clusters
// 10. cusp labels

// ── Degree ring (10° ticks, longer tick at each 30° sign boundary) ────────────
// rOuter  — внешний край кольца (уже нарисован основным кругом, не перерисовываем)
// ringW   — ширина кольца
// signExt — на сколько px знаковая черточка выходит за rOuter
function drawDegreeRing(g, rOuter, ringW, signExt) {
  const rInner = rOuter - ringW;

  // Только внутренний круг — внешний уже нарисован основным кругом карты
  g.appendChild(circ(CX, CY, rInner, { fill: 'none', stroke: COLORS.ringLine, 'stroke-width': 0.8 }));

  // Черточки через каждые 10°
  for (let deg = 0; deg < 360; deg += 10) {
    const isSign = deg % 30 === 0;
    const a  = lonToRad(deg, 0);
    const r1 = rInner;
    const r2 = isSign ? rOuter + signExt : rOuter;
    const p1 = polar(a, r1), p2 = polar(a, r2);
    g.appendChild(ln(p1.x, p1.y, p2.x, p2.y, {
      stroke: COLORS.ring,
      'stroke-width': 0.8,
    }));
  }
}

// ── Zodiac ring — solid gray or 12 element-colored arcs ───────────────────────
function drawZodiacRing(g) {
  if (!elementColorsMode) {
    g.appendChild(circ(CX, CY, R_RING, {
      fill: 'none', stroke: COLORS.ring, 'stroke-width': RING_W,
    }));
    return;
  }
  for (let i = 0; i < 12; i++) {
    const a1 = lonToRad(i * 30, 0);
    const a2 = lonToRad((i + 1) * 30, 0);
    const x1 = CX + R_RING * Math.cos(a1), y1 = CY - R_RING * Math.sin(a1);
    const x2 = CX + R_RING * Math.cos(a2), y2 = CY - R_RING * Math.sin(a2);
    g.appendChild(el('path', {
      d: `M ${x1} ${y1} A ${R_RING} ${R_RING} 0 0 1 ${x2} ${y2}`,
      fill: 'none', stroke: SIGN_ELEM_COLORS[i], 'stroke-width': RING_W,
    }));
  }
}

function renderChart(planets, cusps, asc, mc) {
  const svg = el('svg', { viewBox: VIEWBOX, width: '100%', style: 'display:block' });

  // Clip group
  const clipRect = el('rect', { width: W, height: H });
  const clipPath = el('clipPath', { id: 'canvasClip' });
  clipPath.appendChild(clipRect);
  const defs = el('defs');
  defs.appendChild(clipPath);
  svg.appendChild(defs);

  const g = el('g', { 'clip-path': 'url(#canvasClip)' });
  svg.appendChild(g);

  // 1. Background
  g.appendChild(el('rect', { x: 0, y: 0, width: W, height: H, fill: '#fff' }));

  // 2. House axes — behind the zodiac ring
  drawHouseAxes(g, cusps, 0);

  // 3. Zodiac ring (covers axes within ring area)
  drawZodiacRing(g);

  // 4. Sign dividers — short lines within ring only (R_ZOD_IN → R_ZOD_OUT)
  drawSignDividers(g, 0);

  // 5. Sign glyphs
  drawZodiacGlyphs(g, 0);

  // 6. Inner circle
  g.appendChild(circ(CX, CY, R_INNER, {
    fill: '#fff', stroke: COLORS.ringLine, 'stroke-width': 0.8,
  }));

  // 6a. Degree ring (10° ticks on inner circle boundary)
  drawDegreeRing(g, R_INNER, CHART.DEG_RING_W, CHART.DEG_SIGN_EXT);

  // 7. Aspects (include South Node)
  const planetsWithSN = addSouthNode(filterNatalPlanets(planets), cusps);
  drawAspects(g, planetsWithSN, 0);

  // 8. Planets (include South Node)
  drawPlanets(g, planetsWithSN, 0);

  // 9. Clusters drawClusters(g, planets, 0);

  // 10. Cusp labels
  drawHouseLabels(g, cusps, 0);

  document.getElementById('chart-block').replaceChildren(svg);
}

// ── House axes ────────────────────────────────────────────────────────────────
// 6 full-diameter lines, each connecting two opposite house cusps.
// Angular axes (ASC-DSC, IC-MC) are thicker.

function drawHouseAxes(g, cusps, asc, biwheel = false) {
  for (let i = 0; i < 6; i++) {
    const isAng = (i === 0 || i === 3);
    const a1 = lonToRad(cusps[i],     asc);
    const a2 = lonToRad(cusps[i + 6], asc);

    // In element colors mode, angular axes use per-cusp colors and are split at center
    const useColor = elementColorsMode && isAng;
    const c1 = useColor ? ANGULAR_COLORS[i]     : COLORS.ringLine;
    const c2 = useColor ? ANGULAR_COLORS[i + 6] : COLORS.ringLine;
    const w  = isAng ? 2 : 1;

    if (biwheel) {
      // Inner half-segments from each side to center
      const i1 = polar(a1, R_DIVIDER), i2 = polar(a2, R_DIVIDER);
      g.appendChild(ln(i1.x, i1.y, CX, CY, { stroke: c1, 'stroke-width': w }));
      g.appendChild(ln(CX, CY, i2.x, i2.y, { stroke: c2, 'stroke-width': w }));
      // Outer stubs outside zodiac ring
      const o1a = polar(a1, R_ZOD_OUT), o1b = polar(a1, R_LABEL);
      const o2a = polar(a2, R_ZOD_OUT), o2b = polar(a2, R_LABEL);
      g.appendChild(ln(o1a.x, o1a.y, o1b.x, o1b.y, { stroke: c1, 'stroke-width': w }));
      g.appendChild(ln(o2a.x, o2a.y, o2b.x, o2b.y, { stroke: c2, 'stroke-width': w }));
    } else {
      const p1 = polar(a1, R_LABEL), p2 = polar(a2, R_LABEL);
      if (useColor) {
        // Split at center: each half gets its own color
        g.appendChild(ln(p1.x, p1.y, CX, CY, { stroke: c1, 'stroke-width': w }));
        g.appendChild(ln(CX, CY, p2.x, p2.y, { stroke: c2, 'stroke-width': w }));
      } else {
        g.appendChild(ln(p1.x, p1.y, p2.x, p2.y, { stroke: c1, 'stroke-width': w }));
      }
    }
  }
}

// ── Sign dividers ─────────────────────────────────────────────────────────────
// Short white radial lines, only within the zodiac ring (R_ZOD_IN → R_ZOD_OUT).
// Never extend outside the ring, so they can't obscure house axis lines.

function drawSignDividers(g, asc) {
  for (let i = 0; i < 12; i++) {
    const a  = lonToRad(i * 30, asc);
    const p1 = polar(a, R_ZOD_IN);
    const p2 = polar(a, R_ZOD_OUT);
    g.appendChild(ln(p1.x, p1.y, p2.x, p2.y, {
      stroke: '#FAF7F5', 'stroke-width': 1.5,
    }));
  }
}

// ── Zodiac glyphs ─────────────────────────────────────────────────────────────

function drawZodiacGlyphs(g, asc) {
  for (let i = 0; i < 12; i++) {
    const a = lonToRad(i * 30 + 15, asc);
    const p = polar(a, R_RING); // centre of ring strip
    g.appendChild(txt(p.x, p.y, SIGNS[i], {
      'font-size': 17, fill: '#ffffff',
      'text-anchor': 'middle', 'dominant-baseline': 'central',
    }));
  }
}

// Zodiac ticks removed per design

// ── Cusp labels outside ring ──────────────────────────────────────────────────

const ANGULAR_NAMES = { 0: 'Асцендент', 3: 'IC', 6: 'Десцендент', 9: 'MC' };

function drawHouseLabels(g, cusps, asc) {
  cusps.forEach((cusp, i) => {
    const a    = lonToRad(cusp + 3, asc);   // +5 degrees offset past cusp line
    const p    = polar(a, R_LABEL - 5);
    const deg  = Math.floor(cusp % 30);
    const name = ANGULAR[i] ?? ROMAN[i];
    const isAng = ANGULAR[i] !== undefined;
    const tipText = `${ROMAN[i]} ${tr('houseWord')}${isAng ? `  ${ANGULAR_NAMES[i]}` : ''}  ${fmtLon(cusp)}`;

    const labelEl = lblSup(p.x, p.y, name, deg, {
      'font-size': 14,
      fill: isAng ? '#111' : '#555',
      'font-weight': 'bold',
      'text-anchor': 'middle',
      'dominant-baseline': 'central',
      style: 'cursor:default',
    });
    labelEl.addEventListener('mouseover', e => showChartTip(tipText, e));
    labelEl.addEventListener('mousemove', moveChartTip);
    labelEl.addEventListener('mouseout', hideChartTip);
    g.appendChild(labelEl);
  });
}

// ── Aspect lines ──────────────────────────────────────────────────────────────
// Connect planet positions on the inner circle boundary.

function drawAspects(g, planets, asc) {
  for (let i = 0; i < planets.length; i++) {
    for (let j = i + 1; j < planets.length; j++) {
      // Skip trivial N.Node ↔ S.Node opposition (always exact by definition)
      const ids = [planets[i].id, planets[j].id];
      if (ids.includes(10) && ids.includes(-10)) continue;
      const diff = angDiff(planets[i].longitude, planets[j].longitude);
      for (const asp of ASPECTS) {
        const orb = getNatalOrb(asp, planets[i].id, planets[j].id);
        const actualOrb = Math.abs(diff - asp.angle);
        if (actualOrb <= orb) {
          const tipText = `${planets[i].glyph} ${asp.name} ${planets[j].glyph}  ${fmtOrb(actualOrb)}`;
          if (asp.type === 'conj') {
            // Small ellipse on the inner circle boundary, under the planets
            let l1 = planets[i].longitude, l2 = planets[j].longitude;
            if (Math.abs(l1 - l2) > 180) { if (l1 < l2) l1 += 360; else l2 += 360; }
            const midLon = ((l1 + l2) / 2) % 360;
            const midA = lonToRad(midLon, asc);
            const center = polar(midA, R_INNER);
            const spanRad = diff * Math.PI / 180;
            const rx = Math.max(10, spanRad * R_INNER / 2 + 8);
            const rotDeg = midA * 180 / Math.PI + 90;
            const ellipseEl = el('ellipse', {
              cx: center.x, cy: center.y, rx, ry: 3.5,
              transform: `rotate(${rotDeg}, ${center.x}, ${center.y})`,
              fill: 'none', stroke: asp.color, 'stroke-width': 1.5, style: 'cursor:default',
            });
            ellipseEl.addEventListener('mouseover', e => showChartTip(tipText, e));
            ellipseEl.addEventListener('mousemove', moveChartTip);
            ellipseEl.addEventListener('mouseout', hideChartTip);
            g.appendChild(ellipseEl);
          } else {
            const pi = polar(lonToRad(planets[i].longitude, asc), R_INNER);
            const pj = polar(lonToRad(planets[j].longitude, asc), R_INNER);
            const attrs = { stroke: asp.color, 'stroke-width': asp.width, opacity: '1' };
            if (asp.dash) attrs['stroke-dasharray'] = asp.dash;
            g.appendChild(ln(pi.x, pi.y, pj.x, pj.y, attrs));
            // Invisible wider hit area for easier hover
            const hitLine = ln(pi.x, pi.y, pj.x, pj.y, { stroke: 'transparent', 'stroke-width': 8, style: 'cursor:default' });
            hitLine.addEventListener('mouseover', e => showChartTip(tipText, e));
            hitLine.addEventListener('mousemove', moveChartTip);
            hitLine.addEventListener('mouseout', hideChartTip);
            g.appendChild(hitLine);
            const mid = { x: (pi.x + pj.x) / 2, y: (pi.y + pj.y) / 2 };
            if (asp.angle === 180) break;
            g.appendChild(el('circle', { cx: mid.x, cy: mid.y, r: 5.5, fill: 'white' }));
            g.appendChild(txt(mid.x, mid.y, asp.hg ?? asp.symbol, {
              'font-size': 10, fill: asp.color,
              'text-anchor': 'middle', 'dominant-baseline': 'central',
              ...(asp.hg ? { style: 'font-family:HamburgSymbols' } : {}),
            }));
          }
          break;
        }
      }
    }
  }
}

// ── Planets ───────────────────────────────────────────────────────────────────

function drawPlanets(g, planets, asc) {
  const R_TICK  = CHART.R_TICK;
  const R_L0    = CHART.R_GLYPH_L0;
  const R_L1    = CHART.R_GLYPH_L1;
  const MIN_GAP = CHART.GLYPH_MIN_GAP;

  // Сортируем по углу
  const items = planets
    .map(p => ({ ...p, angle: lonToRad(p.longitude, asc) }))
    .sort((a, b) => a.longitude - b.longitude);

  // Шаг 1: находим кластеры (планеты ближе MIN_GAP друг к другу)
  const clusters = [];
  let cur = [items[0]];
  for (let i = 1; i < items.length; i++) {
    let da = Math.abs(items[i].angle - items[i - 1].angle);
    da = Math.min(da, Math.PI * 2 - da);
    if (da < MIN_GAP) cur.push(items[i]);
    else { clusters.push(cur); cur = [items[i]]; }
  }
  clusters.push(cur);

  // Шаг 2: назначаем уровни (0 = внутренний, 1 = внешний)
  // 1–2 планеты → все на уровень 0
  // 3+ планет → жадное распределение по двум уровням
  // Чётные по счёту (2-я, 4-я…) — уровень 1 (внешний), нечётные — уровень 0 (внутренний)
  const labeled = clusters.flatMap(cluster =>
    cluster.map((p, i) => ({ ...p, level: i % 2 }))
  );

  // 1. Точки истинной позиции на R_TICK
  labeled.forEach(p => {
    const pos = polar(p.angle, R_TICK);
    g.appendChild(circ(pos.x, pos.y, 2.5, {
      fill: '#c6c300', stroke: '#000', 'stroke-width': 0.6,
    }));
  });

  // (линии-лидеры убраны)

  // 3. Глифы на своём уровне (угол не меняется — только радиус)
  labeled.forEach(p => {
    const r   = p.level === 0 ? R_L0 : R_L1;
    const pos = polar(p.angle, r);
    const deg = Math.floor(p.longitude % 30);
    const tipText = `${p.glyph} ${p.name}  ${fmtLon(p.longitude)}${p.house ? `  ${tr('houseWord')} ${ROMAN[p.house - 1]}` : ''}${p.retrograde ? '  R' : ''}${p.speed != null ? `  ${fmtSpeedDeg(p.speed)} ${fmtSpeed(p.speed, p.id)}` : ''}`;
    const t = el('text', {
      x: pos.x, y: pos.y + 9,
      'font-size': 20, fill: '#111',
      'text-anchor': 'middle',
      style: 'font-family:HamburgSymbols;cursor:default',
    });
    t.appendChild(el('tspan', {}, p.hamburgGlyph));
    t.appendChild(el('tspan', { x: pos.x + (p.degOffset ?? 12), dy: '-12', 'font-size': '10', fill: '#111', 'font-weight': 'semi-bold', 'text-anchor': 'start', style: 'font-family:sans-serif' }, String(deg)));
    t.addEventListener('mouseover', e => showChartTip(tipText, e));
    t.addEventListener('mousemove', moveChartTip);
    t.addEventListener('mouseout', hideChartTip);
    g.appendChild(t);
    if (p.retrograde) {
      g.appendChild(txt(pos.x + 10, pos.y + 9, '>', {
        'font-size': 11, fill: '#111', style: 'font-family:HamburgSymbols',
      }));
    }
  });
}

// ── Conjunction clusters (blue ellipses) ─────────────────────────────────────

function drawClusters(g, planets, asc) {
  const CONJ_ORB = 8;
  const visited  = new Set();

  for (let i = 0; i < planets.length; i++) {
    if (visited.has(i)) continue;
    const group = [i];
    for (let j = i + 1; j < planets.length; j++) {
      if (!visited.has(j) && angDiff(planets[i].longitude, planets[j].longitude) <= CONJ_ORB) {
        group.push(j);
        visited.add(j);
      }
    }
    if (group.length < 2) { visited.add(i); continue; }

    const lons = group.map(k => planets[k].longitude);
    let minL = Math.min(...lons), maxL = Math.max(...lons);
    if (maxL - minL > 180) {
      lons.forEach((l, k) => { if (l < 180) lons[k] = l + 360; });
      minL = Math.min(...lons); maxL = Math.max(...lons);
    }

    const midL    = ((minL + maxL) / 2) % 360;
    const spanRad = (maxL - minL) * Math.PI / 180;
    const midA    = lonToRad(midL, asc);
    const center  = polar(midA, R_PLANET);
    const rx      = Math.max(16, (spanRad * R_PLANET) / 2 + 12);
    const rotDeg  = midA * 180 / Math.PI + 90;

    g.appendChild(el('ellipse', {
      cx: center.x, cy: center.y, rx, ry: 13,
      transform: `rotate(${rotDeg}, ${center.x}, ${center.y})`,
      fill: 'none', stroke: '#2255cc', 'stroke-width': 1.5,
    }));
    visited.add(i);
  }
}

// ── Info table ────────────────────────────────────────────────────────────────

const HOUSE_LABELS = ['As','II','III','Ic','V','VI','Ds','VIII','IX','Mc','XI','XII'];

function fmtDeg(lon) {
  const d = Math.floor(lon % 30);
  const f = lon % 1;
  const m = Math.floor(f * 60);
  const s = Math.floor(f * 3600) % 60;
  return `${d}°${String(m).padStart(2,'0')}'${String(s).padStart(2,'0')}"`;
}

function buildInfoTable(planets, cusps) {
  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = '';
  filterNatalPlanets(planets).forEach(p => {
    const si = Math.floor(p.longitude / 30) % 12;
    const retro = p.retrograde ? ' <span class="info-retro">R</span>' : '';
    const tr = document.createElement('tr');
    tr.innerHTML =
      `<td class="info-glyph">${p.hamburgGlyph}</td>` +
      `<td class="info-pos">${fmtDeg(p.longitude)}${retro} ${SIGNS[si]}</td>` +

      `<td class="col-second col-divider info-glyph">${p.hamburgGlyph}</td>` +
      `<td class="col-second info-pos" id="info-sp-${p.id}"></td>`;
    tbody.appendChild(tr);

  const sep = document.createElement('tr');

  sep.innerHTML = '<td colspan="4"></td>';

  cusps.forEach((lon, i) => {
    const si  = Math.floor(lon / 30) % 12;

    const tr  = document.createElement('tr');
    tr.innerHTML =
      `<td class="info-house-lbl ${cls}">${HOUSE_LABELS[i]}</td>` +
      `<td class="info-pos">${fmtDeg(lon)} ${SIGNS[si]}</td>` +
      `<td class="col-second-house col-divider info-house-lbl ${cls}">${HOUSE_LABELS[i]}</td>` +
      `<td class="col-second-house info-pos" id="info-shp-${i}"></td>`;
    tbody.appendChild(tr);
  });
}

// ── Виджет «Достоинства»: эссенциальные достоинства классической семёрки ──────
// Обитель +5 / изгнание −5, экзальтация +4 / падение −4, триплицитет (Доротей,
// день/ночь) +3, терм (египетские) +2, фас (халдейский ряд) +1. Перегрин — нет
// ни одного положительного достоинства. Читает наталData (натал, не транзиты).

const DIG_SIGN_RULERS = [4, 3, 2, 1, 0, 2, 3, 4, 5, 6, 6, 5]; // Овен..Рыбы → id управителя
const DIG_EXALT_SIGN  = { 0: 0, 1: 1, 2: 5, 3: 11, 4: 9, 5: 3, 6: 6 }; // планета → знак экзальтации
// Триплицитеты по стихии (sign % 4): [дневной, ночной] управитель
const DIG_TRIPLICITY  = [[0, 5], [3, 1], [6, 2], [3, 4]];
// Египетские термы: [верхняя граница градуса, id планеты]
const DIG_TERMS = [
  [[6,5],[12,3],[20,2],[25,4],[30,6]],  // Овен
  [[8,3],[14,2],[22,5],[27,6],[30,4]],  // Телец
  [[6,2],[12,5],[17,3],[24,4],[30,6]],  // Близнецы
  [[7,4],[13,3],[19,2],[26,5],[30,6]],  // Рак
  [[6,5],[11,3],[18,6],[24,2],[30,4]],  // Лев
  [[7,2],[17,3],[21,5],[28,4],[30,6]],  // Дева
  [[6,6],[14,2],[21,5],[28,3],[30,4]],  // Весы
  [[7,4],[11,3],[19,2],[24,5],[30,6]],  // Скорпион
  [[12,5],[17,3],[21,2],[26,6],[30,4]], // Стрелец
  [[7,2],[14,5],[22,3],[26,6],[30,4]],  // Козерог
  [[7,2],[13,3],[20,5],[25,4],[30,6]],  // Водолей
  [[12,3],[16,5],[19,2],[28,4],[30,6]], // Рыбы
];
const DIG_FACES = [4, 0, 3, 2, 1, 6, 5]; // халдейский ряд: Марс Солнце Венера Меркурий Луна Сатурн Юпитер

function digGlyph(id) { return PLANETS.find(p => p.id === id)?.glyph ?? ''; }

// Достоинства планеты id на долготе lon (isDay — дневная карта)
function computeDignities(id, lon, isDay) {
  const sign  = Math.floor((((lon % 360) + 360) % 360) / 30);
  const inDeg = ((lon % 360) + 360) % 360 - sign * 30;   // градус внутри знака
  const domicile = DIG_SIGN_RULERS[sign];
  const detriment = DIG_SIGN_RULERS[(sign + 6) % 12];
  const exaltHere = Object.entries(DIG_EXALT_SIGN).find(([, s]) => s === sign)?.[0];
  const exalt = exaltHere != null ? Number(exaltHere) : null;
  const fallHere = Object.entries(DIG_EXALT_SIGN).find(([, s]) => (s + 6) % 12 === sign)?.[0];
  const fall = fallHere != null ? Number(fallHere) : null;
  const trip = DIG_TRIPLICITY[sign % 4][isDay ? 0 : 1];
  const term = DIG_TERMS[sign].find(([limit]) => inDeg < limit)?.[1] ?? DIG_TERMS[sign][4][1];
  const face = DIG_FACES[(sign * 3 + Math.floor(inDeg / 10)) % 7];
  let score = 0;
  if (id === domicile) score += 5;
  if (id === detriment) score -= 5;
  if (exalt === id) score += 4;
  if (fall === id) score -= 4;
  if (id === trip) score += 3;
  if (id === term) score += 2;
  if (id === face) score += 1;
  const peregrine = id !== domicile && exalt !== id && id !== trip && id !== term && id !== face;
  return { sign, inDeg, domicile, detriment, exalt, fall, trip, term, face, score, peregrine };
}

// Виджет «Достоинства»: день/ночь + транспонированная таблица (планеты — колонки)
function renderDignities() {
  const view = document.getElementById('dignities-view');
  if (!view) return;
  view.innerHTML = '';
  if (!natalData) return;
  const sun = natalData.planets.find(p => p.id === 0);
  const isDay = sun ? findHouse(sun.longitude, natalData.cusps) >= 7 : true;

  const note = document.createElement('div');
  note.id = 'dig-daynight';
  note.textContent = tr(isDay ? 'digDayChart' : 'digNightChart');
  view.appendChild(note);
  view.appendChild(buildDignityTable(natalData.planets, natalData.cusps));
}

// ── Блок хорара под картой: градусная линейка + таблица достоинств ────────────
// Линейка: планеты по градусу внутри знака на одной шкале 0–30° (знак игнорируется)
// — виден порядок схождения аспектов. Семёрка сверху, высшие снизу.
function buildDegreeRuler(planets) {
  const W = 720, H = 88, X0 = 26, X1 = 694;
  const pxDeg = (X1 - X0) / 30;
  const LINE_Y = 40;
  const svg = el('svg', { id: 'horary-ruler', viewBox: `0 0 ${W} ${H}`,
    width: '100%', preserveAspectRatio: 'xMidYMid meet', style: 'display:block' });
  svg.appendChild(ln(X0, LINE_Y, X1, LINE_Y, { stroke: '#aaa', 'stroke-width': 1 }));
  for (let d = 0; d <= 30; d++) {
    const x = X0 + d * pxDeg;
    const big = d % 5 === 0;
    svg.appendChild(ln(x, LINE_Y - (big ? 5 : 2.5), x, LINE_Y + (big ? 5 : 2.5),
      { stroke: '#aaa', 'stroke-width': big ? 1 : 0.6 }));
    if (big) svg.appendChild(txt(x, LINE_Y + 12, String(d),
      { 'font-size': 9, fill: '#999', 'text-anchor': 'middle' }));
  }
  const row = (list, above) => {
    const items = list.map(p => {
      const lon = ((p.longitude % 360) + 360) % 360;
      const sign = Math.floor(lon / 30);
      return { p, sign, inDeg: lon - sign * 30 };
    }).sort((a, b) => a.inDeg - b.inDeg);
    let lastX = -Infinity;
    for (const it of items) {
      const exact = X0 + it.inDeg * pxDeg;
      const x = Math.max(exact, lastX + 17);   // расталкивание при скоплении
      lastX = x;
      // засечка на точном градусе
      svg.appendChild(ln(exact, LINE_Y - (above ? 8 : 0), exact, LINE_Y + (above ? 0 : 8),
        { stroke: '#777', 'stroke-width': 1 }));
      const gy = above ? 13 : LINE_Y + 27;
      const sy = above ? 29 : LINE_Y + 43;
      svg.appendChild(txt(x, gy, it.p.glyph,
        { 'font-size': 16, fill: '#333', 'text-anchor': 'middle', 'dominant-baseline': 'central' }));
      svg.appendChild(txt(x, sy, SIGNS[it.sign],
        { 'font-size': 10, fill: SIGN_ELEM_COLORS[it.sign], 'text-anchor': 'middle', 'dominant-baseline': 'central' }));
    }
  };
  row(planets.filter(p => p.id <= 6), true);
  row(planets.filter(p => [7, 8, 9].includes(p.id)), false);
  return svg;
}

// Транспонированная таблица достоинств: колонки — семёрка, строки — достоинства.
// В ячейке — управитель данного достоинства в позиции планеты; подсветка — планета
// в собственном достоинстве / слабости.
function buildDignityTable(planets, cusps) {
  const sun = planets.find(p => p.id === 0);
  const isDay = sun ? findHouse(sun.longitude, cusps) >= 7 : true;
  const seven = planets.filter(p => p.id <= 6);
  const digs  = seven.map(p => computeDignities(p.id, p.longitude, isDay));
  const table = document.createElement('table');
  table.className = 'dig-table';
  const head = document.createElement('tr');
  head.appendChild(document.createElement('th'));
  for (const p of seven) {
    const th = document.createElement('th');
    th.className = 'dig-planet-col';
    th.textContent = p.glyph;
    head.appendChild(th);
  }
  table.appendChild(head);
  const addRow = (label, cellFn) => {
    const trEl = document.createElement('tr');
    const lbl = document.createElement('td');
    lbl.className = 'dig-label';
    lbl.textContent = label;
    trEl.appendChild(lbl);
    seven.forEach((p, i) => trEl.appendChild(cellFn(p, digs[i])));
    table.appendChild(trEl);
  };
  const rulerCell = (ruler, ownId) => {
    const td = document.createElement('td');
    td.textContent = ruler != null ? digGlyph(ruler) : '—';
    if (ruler != null && ruler === ownId) td.classList.add('dig-hit', 'dig-own');
    return td;
  };
  addRow(tr('digRowDom'),   (p, d) => rulerCell(d.domicile, p.id));
  addRow(tr('digRowExalt'), (p, d) => rulerCell(d.exalt, p.id));
  addRow(tr('digRowTrip'),  (p, d) => rulerCell(d.trip, p.id));
  addRow(tr('digRowTerm'),  (p, d) => rulerCell(d.term, p.id));
  addRow(tr('digRowFace'),  (p, d) => rulerCell(d.face, p.id));
  addRow(tr('digRowDetr'),  (p, d) => rulerCell(d.detriment, p.id));
  addRow(tr('digRowFall'),  (p, d) => rulerCell(d.fall, p.id));
  addRow(tr('digRowScore'), (p, d) => {
    const td = document.createElement('td');
    td.className = 'dig-score ' + (d.score > 0 ? 'dig-score-pos' : d.score < 0 ? 'dig-score-neg' : '');
    td.textContent = d.score > 0 ? `+${d.score}` : String(d.score);
    return td;
  });
  return table;
}

// Градусная линейка живёт в нижней зоне (на месте таймлайна) — панель Карты чистая
function renderHoraryBlock() {
  const wrap = document.getElementById('horary-bottom');
  if (!wrap) return;
  wrap.innerHTML = '';
  if (currentCaseType !== 'horary' || !natalData) return;
  wrap.appendChild(buildDegreeRuler(natalData.planets));
}

// ── Виджет «События»: прошлые и будущие события карты (хорарная классика) ─────
// Только септенер (высшие игнорируются). Для каждой планеты — окно её текущего
// знака [вход; выход]. События: ингрессы (вход — в прошлом, выход — в будущем),
// стационарности R/D, точные аспекты между планетами септенера, пока обе в своих
// знаках. Колонки: дата/время · событие · позиция быстрой планеты · её дуга от
// момента карты (минус — прошлое).

const EV_SEPTENER = [0, 1, 2, 3, 4, 5, 6];
const EV_CAP_DAYS = 1100;   // предохранитель (Сатурн проходит знак ~2.5 года)
let _evCache = { key: null, events: null };

function fmtJdLocal(jd, utcOff) {
  const d = new Date((jd + (utcOff ?? 0) / 24 - 2440587.5) * 86400000);
  return String(d.getUTCDate()).padStart(2, '0') + '.'
       + String(d.getUTCMonth() + 1).padStart(2, '0') + '.'
       + String(d.getUTCFullYear() % 100).padStart(2, '0') + ' '
       + String(d.getUTCHours()).padStart(2, '0') + ':'
       + String(d.getUTCMinutes()).padStart(2, '0');
}

function fmtEvPos(lon) {
  const sign  = Math.floor(lon / 30);
  const inDeg = lon - sign * 30;
  const d = Math.floor(inDeg);
  const m = Math.round((inDeg - d) * 60);
  return `${String(d).padStart(2, '0')}° ${SIGNS[sign]} ${String(m).padStart(2, '0')}′`;
}

function fmtEvArc(arc) {
  const a = Math.abs(arc);
  const d = Math.floor(a);
  const m = Math.round((a - d) * 60);
  return `${arc < 0 ? '−' : ''}${d}°${String(m).padStart(2, '0')}′`;
}

// Все события в окнах знаков септенера. Возвращает отсортированный массив
// { jd, label, color?, pos?, arc }.
function computeHoraryEvents(jd0) {
  const flags = (swe.SEFLG_SWIEPH ?? 2) | (swe.SEFLG_SPEED ?? 256);
  const memo = new Map();
  const lonAt = (id, jd) => {
    const key = id + ':' + jd.toFixed(5);
    let v = memo.get(key);
    if (v === undefined) { v = ((swe.calc_ut(jd, id, flags)[0] % 360) + 360) % 360; memo.set(key, v); }
    return v;
  };
  const signAt = (id, jd) => Math.floor(lonAt(id, jd) / 30);
  const stepFor = ids => ids.includes(1) ? 1 / 24 : (ids.some(i => [0, 2, 3, 4].includes(i)) ? 0.25 : 1);

  // бисекция момента смены знака между jdA (текущий знак) и jdB (соседний)
  const refineSignChange = (id, jdA, jdB) => {
    const s0 = signAt(id, jdA);
    for (let k = 0; k < 26; k++) {
      const m = (jdA + jdB) / 2;
      if (signAt(id, m) === s0) jdA = m; else jdB = m;
    }
    return (jdA + jdB) / 2;
  };

  // окна текущего знака для каждой планеты
  const P = {};
  for (const id of EV_SEPTENER) {
    const pl = PLANETS.find(p => p.id === id);
    const st = stepFor([id]);
    const s0 = signAt(id, jd0);
    let back = jd0;
    while (jd0 - back < EV_CAP_DAYS && signAt(id, back - st) === s0) back -= st;
    const jdIn = refineSignChange(id, back, back - st);
    let fwd = jd0;
    while (fwd - jd0 < EV_CAP_DAYS && signAt(id, fwd + st) === s0) fwd += st;
    const jdOut = refineSignChange(id, fwd, fwd + st);
    const speed0 = Math.abs(natalData?.planets.find(p => p.id === id)?.speed ?? 0);
    P[id] = { pl, jdIn, jdOut, sign0: s0, lon0: lonAt(id, jd0), speed0 };
  }

  const arcOf = (id, jdEv) => (jdEv < jd0 ? -1 : 1) * angDiff(lonAt(id, jdEv), P[id].lon0);
  const events = [];

  // ингрессы: вход (прошлое) и выход (будущее) из текущего знака
  for (const id of EV_SEPTENER) {
    const { pl, jdIn, jdOut, sign0 } = P[id];
    events.push({ jd: jdIn,  label: `${pl.glyph} → ${SIGNS[sign0]}`, pos: null, arc: arcOf(id, jdIn) });
    events.push({ jd: jdOut, label: `${pl.glyph} ${SIGNS[sign0]} →`, pos: null, arc: arcOf(id, jdOut) });
  }

  // стационарности R/D (Солнце и Луна ретро не бывают)
  for (const id of [2, 3, 4, 5, 6]) {
    const { pl, jdIn, jdOut } = P[id];
    const st = stepFor([id]);
    let prevLon = lonAt(id, jdIn), prevV = null;
    for (let jd = jdIn + st; jd <= jdOut + 1e-9; jd += st) {
      const lon = lonAt(id, jd);
      const v = ((lon - prevLon + 540) % 360) - 180;
      if (prevV !== null && v !== 0 && prevV !== 0 && Math.sign(v) !== Math.sign(prevV)) {
        // станция = экстремум долготы на [jd−2st, jd]; тернарный поиск
        const wantMax = prevV > 0;
        let a = jd - 2 * st, b = jd;
        for (let k = 0; k < 30; k++) {
          const m1 = a + (b - a) / 3, m2 = b - (b - a) / 3;
          if ((lonAt(id, m1) < lonAt(id, m2)) === wantMax) a = m1; else b = m2;
        }
        const jdSt = (a + b) / 2;
        events.push({ jd: jdSt, label: `${pl.glyph} ${wantMax ? 'R' : 'D'}`,
                      pos: lonAt(id, jdSt), arc: arcOf(id, jdSt) });
      }
      prevV = v; prevLon = lon;
    }
  }

  // точные аспекты между парами септенера (пока обе планеты в своих знаках)
  for (let i = 0; i < EV_SEPTENER.length; i++) for (let j = i + 1; j < EV_SEPTENER.length; j++) {
    const a = EV_SEPTENER[i], b = EV_SEPTENER[j];
    const start = Math.max(P[a].jdIn, P[b].jdIn);
    const end   = Math.min(P[a].jdOut, P[b].jdOut);
    if (end <= start) continue;
    const st = stepFor([a, b]);
    const fast = P[a].speed0 >= P[b].speed0 ? a : b;
    const slow = fast === a ? b : a;
    // f-функции: ноль в точном аспекте, непрерывны в его окрестности
    const sepAt  = jd => ((lonAt(a, jd) - lonAt(b, jd) + 540) % 360) - 180;   // 0 = ☌
    const fFor = angle => angle === 0 ? sepAt
      : angle === 180 ? (jd => ((lonAt(a, jd) - lonAt(b, jd) + 360) % 360) - 180)
      : (jd => Math.abs(sepAt(jd)) - angle);
    const fns = T_ASPECTS.map(asp => ({ asp, f: fFor(asp.angle), prev: null }));
    const n = Math.ceil((end - start) / st);
    for (let k = 0; k <= n; k++) {
      const jd = Math.min(start + k * st, end);
      for (const e of fns) {
        const v = e.f(jd);
        if (e.prev !== null && v !== 0 && Math.sign(v) !== Math.sign(e.prev.v)
            && Math.abs(v - e.prev.v) < 90) {
          // бисекция до минут
          let lo = e.prev.jd, hi = jd, flo = e.prev.v;
          for (let q = 0; q < 26; q++) {
            const m = (lo + hi) / 2, fm = e.f(m);
            if (Math.sign(fm) === Math.sign(flo)) { lo = m; flo = fm; } else hi = m;
          }
          const hit = (lo + hi) / 2;
          events.push({ jd: hit, color: e.asp.color,
            label: `${P[fast].pl.glyph} ${e.asp.symbol} ${P[slow].pl.glyph}`,
            pos: lonAt(fast, hit), arc: arcOf(fast, hit) });
        }
        e.prev = { jd, v };
      }
    }
  }

  return events.sort((x, y) => x.jd - y.jd);
}

function renderAspFlow() {
  const view = document.getElementById('aspflow-view');
  if (!view) return;
  view.innerHTML = '';
  if (!natalData || !swe) return;
  const utcOff = natalData.utcOff ?? 0;
  const jd0 = natalData.birthJD;
  if (_evCache.key !== jd0) _evCache = { key: jd0, events: computeHoraryEvents(jd0) };

  const section = label => {
    const d = document.createElement('div');
    d.className = 'af-section';
    d.textContent = label;
    view.appendChild(d);
  };
  const mkTable = list => {
    const t = document.createElement('table');
    t.className = 'af-table';
    for (const e of list) {
      const row = document.createElement('tr');
      const td = (text, cls) => {
        const c = document.createElement('td');
        c.textContent = text;
        if (cls) c.className = cls;
        row.appendChild(c);
        return c;
      };
      td(fmtJdLocal(e.jd, utcOff), 'af-date');
      const ev = td(e.label, 'af-ev');
      if (e.color) ev.style.color = e.color;
      td(e.pos != null ? fmtEvPos(e.pos) : '', 'af-pos');
      td(fmtEvArc(e.arc), 'af-arc');
      t.appendChild(row);
    }
    view.appendChild(t);
  };
  const events = _evCache.events;
  section(tr('afPastEvents'));
  mkTable(events.filter(e => e.jd < jd0));
  section(tr('afFutureEvents'));
  mkTable(events.filter(e => e.jd >= jd0));
}

function findGridAspect(lon1, lon2, id1, id2, orbMode) {
  const diff = angDiff(lon1, lon2);
  for (const asp of ASPECTS) {
    let maxOrb;
    if (orbMode === 'natal') {
      maxOrb = getNatalOrb(asp, id1, id2);
    } else if (orbMode === 'progressed') {
      maxOrb = (id1 === 0 || id1 === 1 || id2 === 0 || id2 === 1) ? 2 : 1;
    } else {
      maxOrb = 3;
    }
    const orb = Math.abs(diff - asp.angle);
    if (orb <= maxOrb) return { asp, orb };
  }
  return null;
}

function buildAspectGrid(natalPlanets, secondPlanets = null, orbMode = 'natal') {
  const container = document.getElementById('aspect-grid');
  if (!container) return;
  natalPlanets = filterNatalPlanets(natalPlanets);
  const isNatal = !secondPlanets;
  const rows = isNatal ? natalPlanets.slice(1) : secondPlanets;
  const cols = natalPlanets;

  let html = '<table id="aspect-table"><thead><tr><th></th>';
  cols.forEach(p => { html += `<th class="ag-hdr">${p.hamburgGlyph}</th>`; });
  html += '</tr></thead><tbody>';

  rows.forEach((rowPlanet, ri) => {
    html += `<tr><th class="ag-hdr">${rowPlanet.hamburgGlyph}</th>`;
    cols.forEach((colPlanet, ci) => {
      if (isNatal && ci >= ri + 1) {
        html += `<td class="${ci === ri + 1 ? 'ag-self' : 'ag-empty'}"></td>`;
      } else {
        const m = findGridAspect(rowPlanet.longitude, colPlanet.longitude, rowPlanet.id, colPlanet.id, orbMode);
        if (m) {
          html += `<td style="color:${m.asp.color}">` +
            `<span class="ag-sym">${m.asp.symbol}</span>` +
            `<span class="ag-orb">${m.orb.toFixed(1)}°</span></td>`;
        } else {
          html += `<td></td>`;
        }
      }
    });
    html += '</tr>';
  });

  html += '</tbody></table>';
  container.innerHTML = html;
}

// ── Date navigator helpers ────────────────────────────────────────────────────

function computeJDNow() {
  if (!swe) return null;
  const now = new Date();
  return swe.julday(now.getUTCFullYear(), now.getUTCMonth() + 1,
    now.getUTCDate(), now.getUTCHours() + now.getUTCMinutes() / 60);
}

function applyNatalJD(jd) {
  if (!natalData || !swe) return;
  const { lat, lon, originalBirthJD } = natalData;
  const flags = (swe.SEFLG_SWIEPH ?? 2) | (swe.SEFLG_SPEED ?? 256);
  const planets = PLANETS.map(p => {
    const r = safeCalcUt(jd, p.id, flags);   // Хирон < 1800 недоступен — пропуск
    if (!r) return null;
    return { ...p, longitude: ((r[0] % 360) + 360) % 360, speed: r[3], retrograde: r[3] < 0 && p.id !== 10 && p.id !== 12 };
  }).filter(Boolean);
  const hRes = swe.houses_ex(jd, flags, lat, lon, houseSysFor(tabs[activeTab]));   // houses() игнорирует hsys — см. computeChartData
  const cusps = Array.from(hRes.cusps).slice(1, 13);
  const ascmc = Array.from(hRes.ascmc);
  const asc = ((ascmc[0] % 360) + 360) % 360;
  const mc  = ((ascmc[1] % 360) + 360) % 360;
  planets.forEach(p => { p.house = findHouse(p.longitude, cusps); });
  natalData = { ...natalData, planets, cusps, asc, mc, birthJD: jd, lat, lon, originalBirthJD };
  // округляем до минуты — снимаем артефакт округления JD (11:30 не как 11:29)
  const localMs = Math.round(((jd - 2440587.5) * 86400000 + (natalData.utcOff ?? 0) * 3600000) / 60000) * 60000;
  const nd = new Date(localMs);
  const fmtD = String(nd.getUTCDate()).padStart(2, '0') + '.' +
               String(nd.getUTCMonth() + 1).padStart(2, '0') + '.' +
               nd.getUTCFullYear();
  const fmtT = String(nd.getUTCHours()).padStart(2, '0') + ':' +
               String(nd.getUTCMinutes()).padStart(2, '0');
  document.getElementById('v2-chart-date').textContent = fmtD + ' · ' + fmtT;
  renderChart(planets, cusps, asc, mc);
  buildInfoTable(planets, cusps);
  buildAspectGrid(addSouthNode(planets, cusps));
  syncV2DateLabel();
  // Элекция: карта — это T, поэтому курсор таймлайна неба следует за моментом.
  if (currentCaseType === 'election') {
    syncSkyTimelineCursor();
    // ушли с сохранённого снимка вручную (контроллер/таймлайн) — снять подсветку
    if (!_electionJumping && _electionSnapActive !== null) { _electionSnapActive = null; renderElectionSnaps(); }
  }
}

function applyNavigatedJD(jd, unit = null) {
  currentTransitJD = jd;
  if (currentMode === 'transit') renderBiwheelAt(currentTransitJD);
  else if (currentMode === 'direction') renderDirectionBiwheel(currentTransitJD);
  else renderProgressedBiwheel(currentTransitJD);
  syncTimelineCursor(unit);
  syncV2DateLabel();
}

function switchModeAndNavigate(mode, jd) {
  if (!natalData || !swe) return;
  currentTransitJD = jd;
  switchToMode(mode);
  syncTimelineCursor();
}

function syncTimelineCursor(unit = null) {
  if (!cachedTimeline) return;
  const jd = currentTransitJD ?? computeJDNow();
  const { jdStart, jdEnd } = cachedTimeline;
  if (jd >= jdStart && jd <= jdEnd) {
    renderTimeline({ ...cachedTimeline, jdCursor: jd });
  } else {
    // Out of range: rebuild centered on new date, keep fixed window size
    cachedTimeline = null; fastCache = {};
    tlPastYears = 0; tlFutureYears = 0;
    if (natalData) computeAndRenderTimeline(natalData.planets, jd);
  }
}

function navigateDateBy(unit, delta) {
  if (currentMode === 'natal') {
    if (!natalData) return;
    const baseJD = natalData.birthJD;
    let newJD;
    if (unit === 'hour')        newJD = baseJD + delta / 24;
    else if (unit === 'minute') newJD = baseJD + delta / 1440;
    else if (unit === 'second') newJD = baseJD + delta / 86400;
    else if (unit === 'day')    newJD = baseJD + delta;
    else {
      const d = new Date((baseJD - 2440587.5) * 86400000);
      if (unit === 'month') d.setUTCMonth(d.getUTCMonth() + delta);
      else d.setUTCFullYear(d.getUTCFullYear() + delta);
      newJD = d.getTime() / 86400000 + 2440587.5;
    }
    applyNatalJD(newJD);
    return;
  }
  const baseJD = currentTransitJD ?? computeJDNow();
  if (!baseJD) return;
  let newJD;
  if (unit === 'day') {
    newJD = baseJD + delta;
  } else {
    const d = new Date((baseJD - 2440587.5) * 86400000);
    if (unit === 'month') d.setUTCMonth(d.getUTCMonth() + delta);
    else d.setUTCFullYear(d.getUTCFullYear() + delta);
    newJD = d.getTime() / 86400000 + 2440587.5;
  }
  applyNavigatedJD(newJD, unit);
}

document.getElementById('nav-date-input').addEventListener('change', () => {
  const val = document.getElementById('nav-date-input').value;
  if (!val) return;
  const [y, m, d] = val.split('-').map(Number);
  const jd = new Date(Date.UTC(y, m - 1, d)).getTime() / 86400000 + 2440587.5;
  if (currentMode === 'natal') applyNatalJD(jd);
  else applyNavigatedJD(jd);
});

function renderDirectionBiwheel(jd = null) {
  const { birthJD, planets: natal, cusps: natalCusps, asc } = natalData;
  const jdReal = jd ?? computeJDNow();
  // Symbolic directions: 1 year of life = 1 degree of arc
  const ageInYears = (jdReal - birthJD) / 365.25;
  const directed = natal.map(p => ({
    ...p,
    longitude: ((p.longitude + ageInYears) % 360 + 360) % 360,
    retrograde: false,
  }));
  const directedCusps = natalCusps.map(c => ((c + ageInYears) % 360 + 360) % 360);
  renderBiwheelDirected(natal, directed, natalCusps, directedCusps, asc);
  updateSecondColumn(directed);
  updateSecondHouses(directedCusps);
  setInfoTableMode('biwheel-houses');
  buildAspectGrid(addSouthNode(natal, natalCusps), addSouthNode(directed), 'direction');
  currentTransitJD = jd;
}

  drawDirectionAspects(g, addSouthNode(natal, natalCusps), addSouthNode(directed), 0);

  drawBiwheelPlanets(g, addSouthNode(natal, natalCusps), 0, R_BW_INNER, R_N_PLANET, CHART.BW_R_NATAL_GLYPH_L1);

  drawBiwheelPlanets(g, addSouthNode(directed),           0, R_DIVIDER, R_T_PLANET, CHART.BW_R_TRANSIT_GLYPH_L1, '#c6c300', '#111');

// ── Синастрия: совмещённое биколесо двух наталов (A внутри, B снаружи) ─────────
// A — субъект-каркас (его дома), B — наложенный. Аналог «дирекция + натал», но два
// самостоятельных субъекта (WORKSPACE_CONCEPT §3/§6). Читает natalData (A) и synastryB (B).
// Отрисовать текущий вид синастрии по synView ('a' | 'b' | 'both')
function renderSynastry() {
  if (!natalData || !synastryB) return;
  if (synView === 'a') { renderSynastrySingle(natalData); return; }
  if (synView === 'b') { renderSynastrySingle(synastryB); return; }
  const A = natalData, B = synastryB;
  renderSynastryBiwheel(A.planets, B.planets, A.cusps, B.cusps);
  buildInfoTable(A.planets, A.cusps);   // сперва строим таблицу (создаёт вторые ячейки)
  updateSecondColumn(B.planets);
  updateSecondHouses(B.cusps);
  setInfoTableMode('biwheel-houses');
  buildAspectGrid(addSouthNode(A.planets, A.cusps), addSouthNode(B.planets), 'natal');
}

// Одиночная карта субъекта (вид «Карта А» / «Карта Б») — обычное натальное колесо
function renderSynastrySingle(chart) {
  renderChart(chart.planets, chart.cusps, chart.asc, chart.mc);

// Переключение вкладок карты в синастрии

  g.appendChild(circ(CX, CY, R_BW_INNER, { fill: '#fff', stroke: COLORS.ringLine, 'stroke-width': 0.8 }));

  drawDirectedCusps(g, bCusps, 0);

  drawTransitAspects(g, addSouthNode(aPlanets, aCusps), addSouthNode(bPlanets), 0);

function drawDirectedCusps(g, directedCusps, asc) {
  for (let i = 0; i < 6; i++) {
    const isAng = (i === 0 || i === 3);
    const a1 = lonToRad(directedCusps[i],     asc);
    const a2 = lonToRad(directedCusps[i + 6], asc);
    const w = isAng ? 2 : 1;
    const useColor = elementColorsMode && isAng;
    const c1 = useColor ? ANGULAR_COLORS[i]     : COLORS.ringLine;
    const c2 = useColor ? ANGULAR_COLORS[i + 6] : COLORS.ringLine;
    // Visible only in the directed ring: R_DIVIDER → R_ZOD_IN (each side)
    const p1a = polar(a1, R_DIVIDER), p1b = polar(a1, R_ZOD_IN);
    const p2a = polar(a2, R_DIVIDER), p2b = polar(a2, R_ZOD_IN);
    g.appendChild(ln(p1a.x, p1a.y, p1b.x, p1b.y, { stroke: c1, 'stroke-width': w, opacity: '0.55' }));
    g.appendChild(ln(p2a.x, p2a.y, p2b.x, p2b.y, { stroke: c2, 'stroke-width': w, opacity: '0.55' }));
  }
}

function drawDirectionAspects(g, natal, directed, asc) {
  for (const dir of directed) {
    for (const na of natal) {
      // Skip trivial N.Node ↔ S.Node opposition
      if ((dir.id === 10 && na.id === -10) || (dir.id === -10 && na.id === 10)) continue;
      const orbLimit = (dir.id === 0 || dir.id === 1 || na.id === 0 || na.id === 1) ? 2 : 1;
      const diff = angDiff(dir.longitude, na.longitude);
      for (const asp of D_ASPECTS) {
        if (Math.abs(diff - asp.angle) <= orbLimit) {
          const actualOrb = Math.abs(diff - asp.angle);
          const aspName = ASPECTS.find(a => a.angle === asp.angle)?.name ?? asp.symbol;
          const tipText = `${tr('dirPrefix')}${dir.glyph} ${aspName} ${tr('natPrefix')}${na.glyph}  ${fmtOrb(actualOrb)}`;
          if (asp.angle === 0) {
            // Conjunction: ellipse arc on the natal circle
            let l1 = dir.longitude, l2 = na.longitude;
            if (Math.abs(l1 - l2) > 180) { if (l1 < l2) l1 += 360; else l2 += 360; }
            const midLon = ((l1 + l2) / 2) % 360;
            const midA = lonToRad(midLon, asc);
            const center = polar(midA, R_BW_INNER);
            const spanRad = diff * Math.PI / 180;
            const rx = Math.max(8, spanRad * R_BW_INNER / 2 + 6);
            const rotDeg = midA * 180 / Math.PI + 90;
            const ellipseEl = el('ellipse', {
              cx: center.x, cy: center.y, rx, ry: 3.5,
              transform: `rotate(${rotDeg}, ${center.x}, ${center.y})`,
              fill: 'none', stroke: asp.color, 'stroke-width': 1.5, style: 'cursor:default',
            });
            ellipseEl.addEventListener('mouseover', e => showChartTip(tipText, e));
            ellipseEl.addEventListener('mousemove', moveChartTip);
            ellipseEl.addEventListener('mouseout', hideChartTip);
            g.appendChild(ellipseEl);
          } else {
            const pd  = polar(lonToRad(dir.longitude, asc), R_BW_INNER);
            const pn  = polar(lonToRad(na.longitude, asc), R_BW_INNER);
            const mid = { x: (pd.x + pn.x) / 2, y: (pd.y + pn.y) / 2 };
            g.appendChild(ln(pd.x, pd.y, pn.x, pn.y, {
              stroke: asp.color, 'stroke-width': 1, opacity: '0.6',
            }));
            const hitLine = ln(pd.x, pd.y, pn.x, pn.y, { stroke: 'transparent', 'stroke-width': 8, style: 'cursor:default' });
            hitLine.addEventListener('mouseover', e => showChartTip(tipText, e));
            hitLine.addEventListener('mousemove', moveChartTip);
            hitLine.addEventListener('mouseout', hideChartTip);
            g.appendChild(hitLine);
            if (asp.angle === 180) break;
            g.appendChild(el('circle', { cx: mid.x, cy: mid.y, r: 5.5, fill: 'white' }));
            g.appendChild(txt(mid.x, mid.y, asp.hg ?? asp.symbol, {
              'font-size': 10, fill: asp.color,
              'text-anchor': 'middle', 'dominant-baseline': 'central',
              ...(asp.hg ? { style: 'font-family:HamburgSymbols' } : {}),
            }));
          }
          break;
        }
      }
    }
  }
}


function showTransitNow() {
  const now   = new Date();
  const jdNow = swe.julday(
    now.getUTCFullYear(), now.getUTCMonth() + 1,
    now.getUTCDate(), now.getUTCHours() + now.getUTCMinutes() / 60
  );
  const flags  = (swe.SEFLG_SWIEPH ?? 2) | (swe.SEFLG_SPEED ?? 256);
  const transit = PLANETS.map(p => {
    const r = safeCalcUt(jdNow, p.id, flags);
    if (!r) return null;
    return { ...p, longitude: ((r[0] % 360) + 360) % 360, speed: r[3], retrograde: r[3] < 0 && p.id !== 10 && p.id !== 12 };
  }).filter(Boolean);
  renderBiwheel(natalData.planets, transit, natalData.cusps, natalData.asc);
  updateSecondColumn(transit);
  setInfoTableMode('biwheel');
  buildAspectGrid(addSouthNode(natalData.planets, natalData.cusps), addSouthNode(transit), 'transit');
  currentTransitJD = null;
}

// ── Progressed aspects (orbs: 2° Sun/Moon, 1° others) ────────────────────────
function drawProgressedAspects(g, natal, progressed, asc) {
  for (const pr of progressed) {
    for (const na of natal) {
      // Skip trivial N.Node ↔ S.Node opposition
      if ((pr.id === 10 && na.id === -10) || (pr.id === -10 && na.id === 10)) continue;
      const progOrb = (pr.id === 0 || pr.id === 1 || na.id === 0 || na.id === 1) ? 2.0 : 1.0;
      const diff = angDiff(pr.longitude, na.longitude);
      for (const asp of ASPECTS) {
        if (Math.abs(diff - asp.angle) <= progOrb) {
          const actualOrb = Math.abs(diff - asp.angle);
          const tipText = `${tr('prPrefix')}${pr.glyph} ${asp.name} ${tr('natPrefix')}${na.glyph}  ${fmtOrb(actualOrb)}`;
          if (asp.type === 'conj') {
            let l1 = pr.longitude, l2 = na.longitude;
            if (Math.abs(l1 - l2) > 180) { if (l1 < l2) l1 += 360; else l2 += 360; }
            const midLon = ((l1 + l2) / 2) % 360;
            const midA = lonToRad(midLon, asc);
            const center = polar(midA, R_BW_INNER);
            const spanRad = diff * Math.PI / 180;
            const rx = Math.max(8, spanRad * R_BW_INNER / 2 + 6);
            const rotDeg = midA * 180 / Math.PI + 90;
            const ellipseEl = el('ellipse', {
              cx: center.x, cy: center.y, rx, ry: 3.5,
              transform: `rotate(${rotDeg}, ${center.x}, ${center.y})`,
              fill: 'none', stroke: asp.color, 'stroke-width': 1.5, style: 'cursor:default',
            });
            ellipseEl.addEventListener('mouseover', e => showChartTip(tipText, e));
            ellipseEl.addEventListener('mousemove', moveChartTip);
            ellipseEl.addEventListener('mouseout', hideChartTip);
            g.appendChild(ellipseEl);
          } else {
            const pp  = polar(lonToRad(pr.longitude, asc), R_BW_INNER);
            const pn  = polar(lonToRad(na.longitude, asc), R_BW_INNER);
            const mid = { x: (pp.x + pn.x) / 2, y: (pp.y + pn.y) / 2 };
            const attrs = { stroke: asp.color, 'stroke-width': asp.width, opacity: '0.6' };
            if (asp.dash) attrs['stroke-dasharray'] = asp.dash;
            g.appendChild(ln(pp.x, pp.y, pn.x, pn.y, attrs));
            const hitLine = ln(pp.x, pp.y, pn.x, pn.y, { stroke: 'transparent', 'stroke-width': 8, style: 'cursor:default' });
            hitLine.addEventListener('mouseover', e => showChartTip(tipText, e));
            hitLine.addEventListener('mousemove', moveChartTip);
            hitLine.addEventListener('mouseout', hideChartTip);
            g.appendChild(hitLine);
            if (asp.angle === 180) break;
            g.appendChild(el('circle', { cx: mid.x, cy: mid.y, r: 5.5, fill: 'white' }));
            g.appendChild(txt(mid.x, mid.y, asp.hg ?? asp.symbol, {
              'font-size': 10, fill: asp.color,
              'text-anchor': 'middle', 'dominant-baseline': 'central',
              ...(asp.hg ? { style: 'font-family:HamburgSymbols' } : {}),
            }));
          }
          break;
        }
      }
    }
  }
}

// ── Progressed biwheel renderer ───────────────────────────────────────────────
