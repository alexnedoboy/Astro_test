  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    /* ── Surfaces ─────────────────────────────────────────── */
    --bg-page:    #FDFDFC;   /* outer page background */
    --bg:         #fff;      /* cards, panels, modals */
    --bg-input:   #FAF7F5;   /* input fields, secondary surfaces */
    --bg-hover:   #F2EDEA;   /* button / item hover state */
    --bg-active:  #E9E3DF;   /* pressed / active, nav hover */
    --bg-row-alt: #FAF7F6;   /* alternating table rows */

    /* ── Borders ──────────────────────────────────────────── */
    --bd:         #E4DAD5;   /* standard border */
    --bd-light:   #EEE7E3;   /* subtle separator */
    --bd-input:   #D9CEC9;   /* input & button borders */

    /* ── Text (primary → muted) ───────────────────────────── */
    --tx:         #1A1410;   /* primary */
    --tx-2:       #2D2420;   /* secondary, headings */
    --tx-3:       #4A3E38;   /* muted */
    --tx-4:       #6A5E58;   /* more muted */
    --tx-5:       #8C8480;   /* labels */
    --tx-6:       #A69990;   /* helper text */
    --tx-7:       #C0B4AF;   /* placeholder */
    --tx-8:       #D4CBC6;   /* very muted */
    --tx-9:       #E2DDD9;   /* disabled / dimmed */

    /* ── Brand & actions ──────────────────────────────────── */
    --accent:     #2C2420;   /* primary buttons, active states */
    --accent-hv:  #1A1410;   /* action hover */
    --link:       #7A5C3A;   /* links, active date label */
    --link-bg:    #FBF3E8;   /* link hover background */

    /* ── Semantic ─────────────────────────────────────────── */
    --danger:     #C0392B;   /* errors, today cursor, delete */
    --danger-bg:  #FEF0EE;   /* danger hover background */
    --ok:         #2D8A4E;   /* auth success */
    --retro:      #B44444;   /* retrograde R marker */
    --err:        #C0392B;   /* save / form error */
    --tl-scale-act: #7A5C3A; /* active scale option in timeline menu */
    /* ── Extra surfaces ──────────────────────────────────── */
    --bg-nav:     #F9F6F4;   /* nav arrow / date picker buttons */
    --bg-hover-2: #EDE8E5;   /* geo-dropdown items, tl-sm-item hover */
    --bg-row-info:#FAF6F4;   /* info-table row hover */
    --bg-chart-item: #FAF7F5; /* home recent chart items */

    /* ── Aspect grid ──────────────────────────────────────── */
    --ag-empty:   #F5F0ED;   /* empty cell in aspect grid */
    --ag-self:    #EDE8E4;   /* diagonal (same planet) cell */
    --ag-hdr-bd:  #E4DAD4;   /* header cell border */
    --ag-cell-bd: #EDE7E2;   /* body cell border */

    /* ── Dark / Apple ─────────────────────────────────────── */
    --apple-bg:   #111;      /* Apple sign-in button */
    --apple-hv:   #2a2a2a;   /* Apple button hover */

  }

  body {
    font-family: ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif;
    background: var(--bg-page);
    color: var(--tx);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 8px 0 20px;
  }
  h1 { color: var(--accent); font-size: 1.35em; margin-bottom: 18px; letter-spacing: 0.04em; }

  #form-wrap {
    width: 100%; max-width: 480px;
    background: var(--bg);
    border: 1px solid var(--bd);
    border-radius: 12px;
    padding: 16px;
    margin: 0 8px 10px;
  }
  .row { display: flex; gap: 10px; margin-bottom: 10px; }
  .field { display: flex; flex-direction: column; gap: 4px; flex: 1; }
  label { font-size: 0.74em; color: var(--tx-7); text-transform: uppercase; letter-spacing: 0.03em; }
  input {
    background: var(--bg-input);
    border: 1px solid var(--bd);
    color: var(--tx);
    padding: 8px 10px;
    border-radius: 8px;
    font-size: 0.92em;
    width: 100%;
    outline: none;
  }
  input:focus { border-color: var(--tx-6); }

  .btn-row { display: flex; gap: 10px; margin-top: 6px; }
  button {
    flex: 1; padding: 9px; border: none;
    border-radius: 8px; font-size: 0.88em;
    cursor: pointer; font-weight: 600;
  }
  #geoBtn  { background: var(--bg-hover); color: var(--accent); border: 1px solid var(--bd-input); }
  #geoBtn:hover  { background: var(--bg-active); }
  #calcBtn { background: var(--accent); color: var(--bg); }
  #calcBtn:hover { background: var(--accent-hv); }
  #calcBtn:disabled { background: var(--tx-9); cursor: not-allowed; }

  #status { font-size: 0.79em; color: var(--tx-8); margin-top: 8px; min-height: 16px; }

  #chart-block { width: 100%; max-width: 740px; margin: 0 auto; line-height: 0; }

  #right-info-content { overflow-y: auto; }
  #info-table { width: 100%; border-collapse: collapse; font-size: 0.87em; }
  #info-table td { padding: 2px 5px; }
  #info-table tr:hover td { background: var(--bg-row-info); }
  .info-glyph { font-family: 'HamburgSymbols'; font-size: 1.15em; text-align: center; width: 26px; }
  .info-pos { font-variant-numeric: tabular-nums; white-space: nowrap; }
  .info-retro { color: var(--retro); font-style: italic; font-size: 0.78em; }
  .info-house-lbl { color: var(--tx-6); font-size: 0.8em; width: 28px; }
  .house-angular { font-weight: 700; color: var(--accent-hv); }
  .info-sep td { height: 5px; border-top: 1px solid var(--bd-light); padding: 0; }
  .col-second { display: none; }
  #info-table.mode-biwheel .col-second { display: table-cell; }
  .col-second-house { display: none; }
  #info-table.mode-biwheel-houses .col-second-house { display: table-cell; }
  .col-divider { border-left: 1px solid var(--bd); }

  /* ── Aspect grid ─────────────────────────────────────────────── */
  #aspect-grid { margin-top: 10px; overflow-x: auto; border-top: 1px solid var(--bd-light); padding-top: 8px; }
  #aspect-table { border-collapse: collapse; font-size: 0.75em; }
  #aspect-table th.ag-hdr { font-family: 'HamburgSymbols'; font-size: 1.1em; text-align: center; padding: 2px 3px; min-width: 24px; font-weight: normal; border: 1px solid var(--ag-hdr-bd); }
  #aspect-table td { text-align: center; padding: 1px 2px; min-width: 24px; height: 30px; vertical-align: middle; border: 1px solid var(--ag-cell-bd); }
  .ag-sym { display: block; font-size: 1.05em; line-height: 1.2; }
  .ag-orb { display: block; font-size: 0.78em; color: var(--tx-7); line-height: 1; }
  .ag-empty { background: var(--bg-nav); }
  .ag-self  { background: var(--ag-self); }


  /* ── Forecast (long-term) page ──────────────────────────── */
  #forecast-layout { display: none; width: 100%; margin: 0 auto; }
  #forecast-layout.forecast-active { display: block; }
  #forecast-left { width: 100%; }
  #forecast-tl { width: 100%; margin: 8px auto 0; }
  #forecast-tl .tl-status { padding: 16px; text-align: center; color: var(--tx-7); font-size: 0.85em; }
  #forecast-controls {
    display: none;
    padding: 8px 6px 4px;
    border-top: 1px solid var(--bg-active);
    margin-top: 4px;
  }
  #forecast-layout.forecast-active #forecast-controls { display: block; }
  #forecast-house-bar {
    display: flex; align-items: center; gap: 6px;
    padding: 4px 0; flex-wrap: wrap;
  }
  .fc-section-lbl { font-size: 0.82em; color: var(--tx-5); }
  #forecast-house-btns { display: flex; flex-wrap: wrap; gap: 3px; }
  .fc-house-btn {
    min-width: 28px; padding: 3px 6px;
    border: 1px solid var(--bd-input); border-radius: 4px;
    background: var(--bg-input); color: var(--tx-3);
    font-size: 0.82em; font-weight: 600; cursor: pointer;
  }
  .fc-house-btn.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }
  #forecast-info {
    padding: 3px 0; font-size: 0.81em; color: var(--tx-3); min-height: 18px;
  }
  #forecast-range-row {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 0;
    border-top: 1px solid var(--bg-active);
    margin-top: 4px; flex-wrap: wrap;
  }
  .fc-range-lbl { font-size: 0.82em; color: var(--tx-5); display: flex; align-items: center; gap: 4px; }
  .fc-input {
    padding: 4px 6px; font-size: 0.88em;
    border: 1px solid var(--bd-input); border-radius: 4px;
    background: var(--bg-input); color: var(--tx); outline: none;
  }
  .fc-input:focus { border-color: var(--tx-6); }
  #fc-calc-btn {
    padding: 6px 14px; background: var(--accent); color: var(--bg);
    border: none; border-radius: 4px;
    font-size: 0.85em; font-weight: 600; cursor: pointer;
  }
  #fc-calc-btn:hover { background: var(--accent-hv); }

  /* ── Header ───────────────────────────────────────────── */
  #header-top {
    display: flex; align-items: center;
    padding: 0 12px; height: 48px; gap: 8px;
  }
  #header-home { display: flex; align-items: center; }

  /* ── Icon buttons ──────────────────────────────────────── */
  .icon-btn {
    display: flex; align-items: center; justify-content: center;
    width: 32px; height: 32px; border-radius: 6px;
    border: none; background: none; color: var(--tx-3);
    font-size: 1em; cursor: pointer; flex-shrink: 0;
    transition: background 0.15s; line-height: 1;
  }
  .icon-btn:hover { background: var(--bg-hover); }
  .back-btn { font-size: 1.2em; color: var(--accent); }

  /* ── Settings dropdown ─────────────────────────────────── */
  #header-right { position: relative; flex-shrink: 0; margin-left: auto; }
  .settings-btn { font-size: 1.05em; }
  #settings-dropdown {
    display: none; position: fixed;
    background: var(--bg); border: 1px solid var(--bd); border-radius: 8px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.12); padding: 10px 14px;
    min-width: 180px; z-index: 400;
    flex-direction: column; gap: 8px;
  }
  body.settings-open #settings-dropdown { display: flex; }
  #settings-dropdown #auth-zone { display: flex; flex-direction: column; gap: 6px; }
  #settings-dropdown #user-info { display: flex; flex-direction: column; gap: 5px; }
  #settings-dropdown .auth-btn { width: 100%; text-align: center; }
  #settings-dropdown #user-email-short { font-size: 0.76em; color: var(--tx-6); }
  #lang-switcher { display: flex; gap: 4px; }
  .lang-btn { flex: 1; padding: 4px 0; font-size: 12px; font-weight: 600; border: 1px solid var(--bd); border-radius: 5px; background: var(--bg-nav); color: var(--tx-4); cursor: pointer; letter-spacing: 0.04em; }
  .lang-btn:hover { background: var(--bd-light); }
  .lang-btn-active { background: var(--accent); color: var(--bg); border-color: var(--accent); }


  @media (min-width: 700px) {
    #forecast-layout.forecast-active {
      max-width: none;
      display: flex !important;
      align-items: stretch;
      gap: 16px;
      height: calc(100vh - 60px);
    }
    #forecast-layout.forecast-active #forecast-left {
      flex: 0 0 50%;
      width: 50%;
      display: flex;
      flex-direction: column;
    }
    #forecast-layout.forecast-active #forecast-chart-wrap {
      flex: 1;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #forecast-layout.forecast-active #forecast-chart-wrap svg {
      width: 100%; height: 100%;
      max-width: 100%; max-height: 100%;
    }
    #forecast-layout.forecast-active #forecast-controls {
      flex-shrink: 0;
    }
    #forecast-layout.forecast-active #forecast-tl {
      flex: 1;
      min-width: 0;
      margin-top: 0;
      overflow-y: auto;
    }
  }
  #tl-tooltip, #chart-tooltip {
    position: fixed; z-index: 600; pointer-events: none;
    background: rgba(28,28,28,0.88); color: var(--bg);
    padding: 4px 9px; border-radius: 5px;
    font-size: 0.83em; white-space: nowrap;
    display: none; box-shadow: 0 2px 8px rgba(0,0,0,0.25);
  }

  #tl-filter {
    display: none; /* hidden — planet filter checkboxes, restore to: flex */
    flex-wrap: wrap; gap: 2px 4px;
    padding: 4px 0 4px;
  }
  #tl-filter label {
    display: inline-flex; align-items: center; gap: 3px;
    font-size: 1.0em; cursor: pointer;
    padding: 2px 6px; border-radius: 4px;
    user-select: none; color: var(--accent);
  }
  #tl-filter label:hover { background: var(--bg-hover); }
  #tl-filter label.tl-f-off { opacity: 0.35; }
  #tl-filter input[type=checkbox] { accent-color: var(--accent); width: 12px; height: 12px; margin: 0; }

  #tl-settings-menu {
    position: fixed; z-index: 9999;
    background: var(--bg); border: 1px solid var(--bd); border-radius: 8px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.12);
    padding: 4px 0; min-width: 130px;
  }
  .tl-sm-item {
    padding: 7px 16px; font-size: 0.85em; color: var(--accent); cursor: pointer;
  }
  .tl-sm-item:hover { background: var(--bg-hover-2); }
  .tl-sm-item.tl-sm-active { color: var(--tl-scale-act); font-weight: 600; }
  #tl-nav {
    padding: 2px 0 4px;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  #tl-nav-lbl { font-size: 0.76em; color: var(--tx-9); }
  .tl-nav-btn {
    background: none; border: none; cursor: pointer;
    font-size: 0.72em; color: var(--tx-7); padding: 1px 5px;
    border-radius: 3px; line-height: 1;
  }
  .tl-nav-btn:hover { background: var(--bg-hover); color: var(--tx-3); }
  .tl-scale-btns { display: flex; gap: 2px; margin-left: 8px; }
  .tl-scale-btn {
    background: none; border: 1px solid var(--bd-light); cursor: pointer;
    font-size: 0.68em; color: var(--tx-7); padding: 1px 6px;
    border-radius: 3px; line-height: 1.5; font-weight: 500;
  }
  .tl-scale-btn:hover { background: var(--bg-hover); color: var(--tx-3); }
  .tl-scale-btn.tl-scale-active { background: var(--bg-active); color: var(--tx-2); font-weight: 700; border-color: var(--bd); }
  #tl-body { display: flex; align-items: flex-start; }
  #tl-svg-left { flex-shrink: 0; display: block; }
  #tl-scroll {
    overflow-x: auto; flex: 1;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: thin;
  }
  #tl-hdr-sticky {
    position: sticky; top: 0; z-index: 10;
    display: flex; background: var(--bg);
  }
  #tl-hdr-scroll { overflow: hidden; flex: 1; }

  #geo-place-wrap { position: relative; }
  #geo-dropdown {
    position: absolute; top: 100%; left: 0; right: 0; z-index: 200;
    background: var(--bg); border: 1px solid var(--bd); border-top: none;
    border-radius: 0 0 6px 6px; box-shadow: 0 6px 16px rgba(0,0,0,0.12);
    display: none; max-height: 220px; overflow-y: auto;
  }
  .geo-item {
    padding: 9px 12px; cursor: pointer; font-size: 0.86em; color: var(--accent-hv);
    border-bottom: 1px solid var(--bg-hover); line-height: 1.35;
  }
  .geo-item:hover { background: var(--bg-hover-2); }
  .geo-item .geo-main { font-weight: 500; }
  .geo-item .geo-sub  { font-size: 0.82em; color: var(--tx-7); }
  .geo-item:last-child { border-bottom: none; }

  /* ── Auth bar ──────────────────────────────────────────── */
  #app-header {
    width: 100%; max-width: 480px;
    display: flex; flex-direction: column;
    position: relative; background: transparent;
    border-bottom: 1px solid var(--bd-light); margin-bottom: 0;
  }
  #app-header h1 { margin-bottom: 0; }
  #auth-zone { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
  #user-info { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; justify-content: flex-end; }
  #user-email-short {
    font-size: 0.76em; color: var(--tx-6); max-width: 110px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .auth-btn {
    padding: 6px 12px; border-radius: 5px; font-size: 0.82em; font-weight: 600;
    cursor: pointer; border: 1px solid var(--bd-input); background: var(--bg-input); color: var(--accent); white-space: nowrap;
  }
  .auth-btn:hover { background: var(--bd-light); }
  .auth-btn.primary { background: var(--accent); color: var(--bg); border-color: var(--accent); }
  .auth-btn.primary:hover { background: var(--accent-hv); }
  .auth-btn.ghost { background: none; border-color: transparent; color: var(--tx-8); font-size: 0.78em; padding: 4px 8px; }

  #save-wrap { display: none; }

  /* ── Save confirmation ─────────────────────────────────── */
  #save-confirm {
    font-size: 0.78em; color: var(--tx-6); white-space: nowrap;
    opacity: 0; transition: opacity 0.2s;
  }
  #save-confirm.show { opacity: 1; }
  #save-confirm.error { color: var(--err); }

  /* ── Edit mode: form floats over the chart ─────────────── */
  #edit-backdrop {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.35); z-index: 499;
  }
  #edit-backdrop.visible { display: block; }
  #form-wrap.editing {
    position: fixed; top: 0; left: 50%; transform: translateX(-50%);
    width: calc(100% - 32px); max-width: 480px;
    z-index: 500; border-radius: 0 0 12px 12px;
    margin: 0; max-height: 90vh; overflow-y: auto;
    box-shadow: 0 8px 32px rgba(0,0,0,0.22);
  }
  #cancelEditBtn {
    display: none; flex: 0 0 auto !important;
    background: var(--bg-hover); color: var(--tx-3); border: 1px solid var(--bd-input);
  }
  #cancelEditBtn:hover { background: var(--bg-active); }
  #form-wrap.editing #cancelEditBtn { display: block; }
  #form-wrap.editing #calcBtn { flex: 1; }

  /* ── Auth modal ─────────────────────────────────────────── */
  #modal-overlay {
    display: none; position: fixed; inset: 0; z-index: 1000;
    background: rgba(0,0,0,0.42); backdrop-filter: blur(3px);
    align-items: center; justify-content: center;
  }
  #modal-overlay.open { display: flex; }
  #auth-modal {
    background: var(--bg); border-radius: 14px; padding: 26px 24px 20px;
    width: 100%; max-width: 360px; margin: 16px;
    box-shadow: 0 24px 64px rgba(0,0,0,0.22);
  }
  .modal-hdr {
    display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;
  }
  .modal-title { font-size: 1.05em; font-weight: 700; color: var(--tx); }
  #closeModal { background: none; border: none; font-size: 1.2em; cursor: pointer; color: var(--tx-9); padding: 2px 6px; border-radius: 4px; }
  #closeModal:hover { color: var(--accent); background: var(--bg-hover); }

  .social-btn {
    width: 100%; padding: 11px 16px; border-radius: 8px; border: 1px solid var(--bd);
    font-size: 0.88em; font-weight: 600; cursor: pointer; margin-bottom: 10px;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    background: var(--bg); color: var(--tx); transition: background 0.12s;
  }
  .social-btn:hover { background: var(--bg-hover); }
  .social-btn.apple-btn { background: var(--apple-bg); color: var(--bg); border-color: var(--apple-bg); }
  .social-btn.apple-btn:hover { background: var(--apple-hv); }

  .auth-divider {
    display: flex; align-items: center; gap: 10px;
    color: var(--bd-input); font-size: 0.8em; margin: 14px 0;
  }
  .auth-divider::before, .auth-divider::after {
    content: ''; flex: 1; height: 1px; background: var(--bd-light);
  }
  .auth-input {
    width: 100%; padding: 10px 12px; border: 1px solid var(--bd); border-radius: 7px;
    font-size: 0.88em; margin-bottom: 10px; outline: none; background: var(--bg-input); color: var(--tx);
  }
  .auth-input:focus { border-color: var(--tx-6); background: var(--bg); }
  .modal-btns { display: flex; gap: 8px; }
  .modal-btns button {
    flex: 1; padding: 10px; border-radius: 7px; font-size: 0.88em;
    font-weight: 600; cursor: pointer; border: none;
  }
  #signinBtn  { background: var(--accent); color: var(--bg); }
  #signinBtn:hover  { background: var(--accent-hv); }
  #signupBtn  { background: var(--bg-hover); color: var(--tx-3); border: 1px solid var(--bd); }
  #signupBtn:hover  { background: var(--bg-active); }
  #auth-msg { font-size: 0.81em; color: var(--danger); margin-top: 12px; min-height: 14px; text-align: center; }
  #auth-msg.ok { color: var(--ok); }

  /* ── Planet filter modal ────────────────────────────────── */
  #planet-filter-overlay {
    display: none; position: fixed; inset: 0; z-index: 1000;
    background: rgba(0,0,0,0.42); backdrop-filter: blur(3px);
    align-items: center; justify-content: center;
  }
  #planet-filter-overlay.open { display: flex; }
  #planet-filter-modal {
    background: var(--bg); border-radius: 14px; padding: 22px 20px 18px;
    width: 100%; max-width: 280px; margin: 16px;
    box-shadow: 0 24px 64px rgba(0,0,0,0.22);
  }
  .pf-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 5px 20px;
    margin: 14px 0 16px;
  }
  .pf-item {
    display: flex; align-items: center; gap: 7px; font-size: 0.88em;
    cursor: pointer; padding: 4px 0; user-select: none;
  }
  .pf-item input[type="checkbox"] { width: 15px; height: 15px; cursor: pointer; accent-color: var(--accent); flex-shrink: 0; }
  .pf-glyph { font-size: 1.05em; width: 16px; text-align: center; }
  .pf-reset { font-size: 0.82em; color: var(--tx-6); background: none; border: none; cursor: pointer; padding: 0; text-decoration: underline; }
  .pf-reset:hover { color: var(--accent); }

  /* ── Saved charts panel ──────────────────────────────────── */
  #charts-panel {
    position: fixed; top: 0; right: 0; bottom: 0; width: 290px; max-width: 92vw;
    background: var(--bg); box-shadow: -4px 0 24px rgba(0,0,0,0.14); z-index: 900;
    display: flex; flex-direction: column;
    transform: translateX(110%); transition: transform 0.24s ease;
  }
  #charts-panel.open { transform: translateX(0); }
  .panel-hdr {
    display: flex; justify-content: space-between; align-items: center;
    padding: 16px 14px 12px; border-bottom: 1px solid var(--bd-light);
  }
  .panel-title { font-weight: 700; font-size: 0.94em; }
  #closePanelBtn { background: none; border: none; font-size: 1.1em; cursor: pointer; color: var(--tx-9); padding: 2px 6px; border-radius: 4px; }
  #closePanelBtn:hover { color: var(--accent); background: var(--bg-hover); }
  #charts-list { flex: 1; overflow-y: auto; padding: 6px; }
  .chart-item {
    display: flex; align-items: center; gap: 8px;
    padding: 9px 8px; border-radius: 7px; cursor: pointer;
    border-bottom: 1px solid var(--bg-hover-2);
  }
  .chart-item:hover { background: var(--bg-input); }
  .chart-item-info { flex: 1; min-width: 0; }
  .chart-item-name { font-size: 0.87em; font-weight: 600; color: var(--accent-hv); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .chart-item-meta { font-size: 0.75em; color: var(--tx-8); margin-top: 2px; }
  .chart-del { background: none; border: none; color: var(--bd); cursor: pointer; font-size: 0.9em; padding: 4px 6px; border-radius: 4px; flex-shrink: 0; }
  .chart-del:hover { color: var(--danger); background: var(--danger-bg); }
  .charts-empty { text-align: center; color: var(--bd-input); font-size: 0.84em; padding: 36px 16px; line-height: 1.6; }

  /* ── Home recent charts ───────────────────────────────────── */
  #home-charts {
    width: 100%; max-width: 480px;
    margin: 18px auto 0;
    display: none;
  }
  #home-charts.visible { display: block; }
  #home-charts-title {
    font-size: 0.72em; color: var(--tx-9); text-transform: uppercase; letter-spacing: 0.06em;
    margin-bottom: 6px; padding: 0 2px;
  }
  #home-charts-list .chart-item { border-radius: 9px; border-bottom: none; margin-bottom: 4px; background: var(--bg-chart-item); }
  #home-charts-list .chart-item:hover { background: var(--bg-hover); }
  svg text { font-family: 'Apple Symbols', 'Segoe UI Symbol', 'Noto Sans Symbols', serif; }


  /* ── Layout V2 (experimental horizontal split) ──────────────────────────── */
  #layout-v2 {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    flex-direction: column;
    overflow: hidden;
    background: #e4e3e3;
    z-index: 100;
  }
  #layout-v2.v2-visible { display: flex; }

  #v2-top {
    flex: 0 0 74vh;
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 8px 8px 8px;
    box-sizing: border-box;
    overflow: hidden;
  }
  #v2-chart-area {
    flex: 0 0 auto;
    width: calc(74vh - 16px);
    max-width: calc(100vw - 124px);
    aspect-ratio: 1 / 1;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    border-radius: 8px;
    padding: 8px;
    box-sizing: border-box;
    position: relative;
  }
  #v2-chart-expand-btn {
    position: absolute; bottom: 7px; right: 7px;
    width: 26px; height: 26px; z-index: 10;
    background: var(--bg); border: 1px solid var(--bd-light);
    border-radius: 5px; font-size: 0.85em; cursor: pointer;
    color: var(--tx-6); opacity: 0.6;
    display: flex; align-items: center; justify-content: center;
    padding: 0; line-height: 1;
  }
  #v2-chart-expand-btn:hover { opacity: 1; background: var(--bg-hover); color: var(--tx-2); }
  #layout-v2.tl-hidden #v2-chart-area {
    width: calc(100vh - 16px);
    max-width: calc(100vw - 124px);
  }
  #v2-chart-area #chart-block {
    width: 100% !important;
    max-width: none !important;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #v2-chart-area #chart-block svg {
    width: 100% !important;
    height: auto !important;
    max-height: 100%;
  }
  #v2-aspect-panel {
    flex: 1;
    min-width: 0;
    max-height: calc(74vh - 16px);
    overflow-y: auto;
    overflow-x: hidden;
    background: var(--bg);
    border-radius: 8px;
  }
  #layout-v2.tl-hidden #v2-aspect-panel {
    max-height: calc(100vh - 16px);
  }
  #v2-aspect-panel #right-info-content {
    width: 100%;
    overflow: hidden;
    display: block !important;
  }
  #v2-aspect-panel #aspect-grid {
    overflow-x: hidden;
  }
  #v2-control-panel {
    flex: 0 0 116px;
    align-self: flex-start;
    height: calc(74vh - 16px);
    display: flex;
    flex-direction: column;
    gap: 3px;
    background: var(--bg);
    border-radius: 8px;
    padding: 6px 4px;
    box-sizing: border-box;
    overflow-y: auto;
    overflow-x: hidden;
  }
  #v2-logo {
    display: block;
    width: 52px;
    height: 52px;
    margin: 2px auto 4px;
    object-fit: contain;
    flex-shrink: 0;
    cursor: pointer;
  }
  #v2-chart-info {
    flex-shrink: 0;
    padding: 2px 2px 4px;
    min-width: 0;
  }
  #v2-chart-info-top {
    display: flex; align-items: center; gap: 1px; min-width: 0;
  }
  #v2-chart-name {
    flex: 1; min-width: 0;
    font-size: 0.78em; font-weight: 600;
    color: var(--tx);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  #v2-chart-date {
    display: block;
    font-size: 0.68em; color: var(--tx-8);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    padding: 1px 0;
  }
  .v2-icon-btn {
    width: 22px; height: 22px;
    background: none; border: none; border-radius: 3px;
    cursor: pointer; font-size: 0.9em;
    color: var(--tx-4);
    display: flex; align-items: center; justify-content: center;
    padding: 0; flex-shrink: 0;
  }
  .v2-icon-btn:hover { background: var(--bg-hover); color: var(--tx-2); }
  .v2-mode-btn {
    width: 100%; height: 52px;
    background: none; border: none; border-radius: 6px;
    cursor: pointer; font-size: 0.9em;
    color: var(--tx-4); padding: 0 4px;
    white-space: nowrap; flex-shrink: 0;
  }
  .v2-nav-btn {
    width: 100%; height: 28px;
    background: none; border: none; border-radius: 4px;
    cursor: pointer; font-size: 0.8em;
    color: var(--tx-4); padding: 0 4px;
    white-space: nowrap;
  }
  .v2-mode-btn:hover, .v2-nav-btn:hover { background: var(--bg-hover); color: var(--tx-2); }
  .v2-mode-btn.active { background: var(--bg-active); color: var(--tx); font-weight: 600; }
  .v2-ctrl-sep { height: 1px; background: var(--bd-light); margin: 4px 0; flex-shrink: 0; }
  .v2-ctrl-spacer { flex: 1; min-height: 4px; }
  .v2-nav-row { display: flex; gap: 2px; }
  .v2-nav-row .v2-nav-btn { flex: 1; font-size: 0.72em; }
  .v2-today-btn { margin-top: 2px; }
  #v2-nav-date-lbl {
    position: relative; width: 100%; background: none; border: none; outline: none;
    color: var(--tx-6); font-size: 0.78em; padding: 4px 4px;
    cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 4px;
    opacity: 0.75; transition: opacity 0.15s, color 0.15s;
    line-height: 1.3; white-space: nowrap;
  }
  #v2-nav-date-lbl:hover { opacity: 1; color: var(--tx-2); }
  #v2-nav-date-lbl.v2-date-active { color: var(--accent); opacity: 0.9; }
  #nav-date-input {
    position: absolute; inset: 0; width: 100%; height: 100%;
    opacity: 0; cursor: pointer; border: none; padding: 0; margin: 0;
  }
  #v2-bottom-row {
    display: flex; flex-shrink: 0;
    border-top: 1px solid var(--bd-light);
    margin: 0 -4px -6px;
  }
  #v2-bottom-row .v2-icon-btn {
    flex: 1; width: auto; height: 34px;
    font-size: 1.05em; color: var(--tx-5);
    border-radius: 0;
  }

  /* compact toggle: sits at top-left of v2-bottom, over the timeline header's blank area */
  #v2-tl-tab {

    top: 0;
    left: 8px;
    z-index: 20;
    display: flex;
    background: var(--bg);
    overflow: hidden;
  }

    width: 24px; height: 28px;
    background: none; border: none;
    font-size: 12px; cursor: pointer;
    color: var(--tx-5); padding: 0;
    display: flex; align-items: center; justify-content: center;
  }

  /* tl-expanded: chart hidden, timeline fills screen */
  #layout-v2.tl-expanded #v2-top { flex: 0 0 0; padding: 0; overflow: hidden; }

  /* tl-hidden: timeline hidden, chart fills screen */
  #layout-v2.tl-hidden #v2-top { flex: 0 0 100vh; }
  #layout-v2.tl-hidden #v2-bottom { flex: 0 0 0; height: 0; overflow: hidden; }
  #layout-v2.tl-hidden #v2-tl-tab { display: none; }

  #v2-bottom {
    flex: 1;
    min-height: 0;
    overflow: hidden;
    padding: 0 8px 8px;
    box-sizing: border-box;
    position: relative;
  }
  #v2-timeline-wrap {
    height: 100%;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    background: var(--bg);
    border-radius: 8px;
  }
  #v2-timeline-wrap #right-timeline-content {
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
  }
  #v2-timeline-wrap #tl-hdr-sticky {
    flex-shrink: 0;
    position: static !important;
  }
  #v2-timeline-wrap #tl-body {
    flex: 1;
    min-height: 0;

function tr(key, vars) {
  let s = STRINGS[currentLang]?.[key] ?? STRINGS.ru[key] ?? key;
  if (vars) for (const [k, v] of Object.entries(vars)) s = s.replace(`{${k}}`, v);
  return s;
}

function applyLang() {
  // Update mutable data arrays
  PLANETS.forEach(p => { p.name = tr(PLANET_KEYS[p.id] ?? 'chartFallback'); });
  STRINGS[currentLang].signs.forEach((s, i) => { SIGN_NAMES[i] = s; });
  const aspKeys = ['asp_conjunction','asp_sextile','asp_square','asp_trine','asp_opposition'];
  ASPECTS.forEach((a, i) => { a.name = tr(aspKeys[i]); });
  Object.assign(ANGULAR_NAMES, STRINGS[currentLang].angularNames);
  // Update static HTML
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.textContent = tr(el.dataset.i18n);
  });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
    el.placeholder = tr(el.dataset.i18nPlaceholder);
  });
  document.querySelectorAll('[data-i18n-title]').forEach(el => {
    el.title = tr(el.dataset.i18nTitle);
  });
  // Update lang buttons active state
  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.classList.toggle('lang-btn-active', btn.dataset.lang === currentLang);
  });
  // Re-render if chart is loaded
  if (natalData) {
    buildInfoTable(natalData.planets, natalData.cusps);
    buildAspectGrid(addSouthNode(natalData.planets, natalData.cusps));
    if (cachedTimeline) {
      const savedCenter = cachedTimeline.center;
      cachedTimeline = null; fastCache = {};
      computeAndRenderTimeline(natalData.planets, savedCenter);
    }
  }
  // Sync calcBtn text with current mode
  const fw = document.getElementById('form-wrap');
  document.getElementById('calcBtn').textContent =
    fw?.classList.contains('editing') ? tr('saving') : tr('buildChart');
}

function positionSettingsDropdown(anchorBtn) {
  const dd = document.getElementById('settings-dropdown');
  const r = anchorBtn.getBoundingClientRect();
  const ddW = dd.offsetWidth || 200;
  let left = r.right - ddW;
  let top = r.bottom + 4;
  if (left < 8) left = r.left;
  if (left + ddW > window.innerWidth - 8) left = window.innerWidth - ddW - 8;
  if (top + 220 > window.innerHeight - 8) top = r.top - 220 - 4;
  dd.style.left = Math.max(8, left) + 'px';
  dd.style.top = Math.max(8, top) + 'px';
}

function openSettingsDropdown(anchorBtn, e) {
  if (e) e.stopPropagation();
  const isOpen = document.body.classList.toggle('settings-open');
  if (isOpen) positionSettingsDropdown(anchorBtn);
}

function closeSettingsDropdown() {
  document.body.classList.remove('settings-open');
}

document.getElementById('settingsBtn').addEventListener('click', e => {
  openSettingsDropdown(e.currentTarget, e);
});

// Close on outside click

  if (!document.body.classList.contains('settings-open')) return;
  const dd = document.getElementById('settings-dropdown');
  if (!dd.contains(e.target) &&
      e.target.id !== 'settingsBtn' && e.target.id !== 'v2-settings-btn') {
    closeSettingsDropdown();
  }
});

// Dynamic natal orb: conjunction 8°/6°, trine & opposition 7°/6°, square & sextile 6°
// +1° if Sun (0) or Moon (1) is involved
function getNatalOrb(asp, id1, id2) {
  const hasSunMoon = (id1 === 0 || id1 === 1 || id2 === 0 || id2 === 1);
  if (asp.angle === 0)   return hasSunMoon ? 8 : 6;
  if (asp.angle === 180 || asp.angle === 120) return hasSunMoon ? 7 : 6;
  return 6;
}

// ── House rulership (classical + modern outer planets) ────────────────────────
// Index = sign 0=Aries…11=Pisces. Scorpio: Mars+Pluto, Aquarius: Uranus+Saturn, Pisces: Neptune+Jupiter
const SIGN_RULERS = [
  [4],      // Aries → Mars
  [3],      // Taurus → Venus
  [2],      // Gemini → Mercury
  [1],      // Cancer → Moon
  [0],      // Leo → Sun
  [2],      // Virgo → Mercury
  [3],      // Libra → Venus
  [4, 9],   // Scorpio → Mars, Pluto
  [5],      // Sagittarius → Jupiter
  [6],      // Capricorn → Saturn
  [7, 6],   // Aquarius → Uranus, Saturn
  [8, 5],   // Pisces → Neptune, Jupiter
];

function getHouseRulerPlanets(houseIdx, cusps) {
  const signIdx = Math.floor(((cusps[houseIdx] % 360) + 360) % 360 / 30);
  return (SIGN_RULERS[signIdx] ?? []).map(id => PLANETS.find(p => p.id === id)).filter(Boolean);
}

// ── UTC offset helper ─────────────────────────────────────────────────────────

function getUTCOffsetHours(tzName, date) {
  const fmt = new Intl.DateTimeFormat('en', {
    timeZone: tzName, year: 'numeric', month: '2-digit', day: '2-digit',
    hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false,
  });
  const parts = Object.fromEntries(fmt.formatToParts(date).map(p => [p.type, p.value]));
  const localAsUTC = Date.UTC(
    +parts.year, +parts.month - 1, +parts.day,
    +parts.hour % 24, +parts.minute, +parts.second
  );
  return Math.round((localAsUTC - date.getTime()) / 36000) / 100;
}

function applyTimezoneOffset() {
  if (!detectedTimezone) return;
  const dateStr = document.getElementById('birthDate').value;
  const date = dateStr ? new Date(dateStr + 'T12:00:00Z') : new Date();
  try { document.getElementById('utcOff').value = getUTCOffsetHours(detectedTimezone, date); } catch {}
}

document.getElementById('birthDate').addEventListener('change', applyTimezoneOffset);

async function applyGeoResult(item) {
  const lat = parseFloat(item.lat), lon = parseFloat(item.lon);
  const parts = item.display_name.split(',');
  const shortName = parts.slice(0, 2).join(',').trim();
  document.getElementById('birthPlace').value = shortName;
  document.getElementById('lat').value    = lat.toFixed(4);
  document.getElementById('lonVal').value = lon.toFixed(4);
  closeGeoDropdown();
  setStatus(tr('detectingTimezone'));
  try {
    const ctrl = new AbortController();
    const tid  = setTimeout(() => ctrl.abort(), 6000);
    const tz   = await fetch(`https://timeapi.io/api/timezone/coordinate?latitude=${lat.toFixed(4)}&longitude=${lon.toFixed(4)}`, { signal: ctrl.signal });
    clearTimeout(tid);
    const tzd  = await tz.json();
    const zone = tzd.timeZone;
    if (!zone) throw new Error('no timeZone field');
    detectedTimezone = zone;
    applyTimezoneOffset();
    setStatus(`${shortName}  •  ${detectedTimezone}`);
  } catch {
    setStatus(`${shortName} (${tr('timezoneNotDetected')})`);
  }
}

document.getElementById('calcBtn').addEventListener('click', () => {
  if (!swe) return;
  const dateVal = document.getElementById('birthDate').value;

  const lat     = parseFloat(document.getElementById('lat').value);
  const lon     = parseFloat(document.getElementById('lonVal').value);

  }
  try {
    const [y, m, d] = dateVal.split('-').map(Number);
    const [hr, mn]  = timeVal.split(':').map(Number);
    const jd        = swe.julday(y, m, d, hr + mn / 60 - utcOff);
    const flags     = (swe.SEFLG_SWIEPH ?? 2) | (swe.SEFLG_SPEED ?? 256);

    const planets = PLANETS.map(p => {
      const r = swe.calc_ut(jd, p.id, flags);
      return { ...p, longitude: ((r[0] % 360) + 360) % 360, retrograde: r[3] < 0 && p.id !== 10 && p.id !== 12 };
    });

    const hRes  = swe.houses(jd, lat, lon, 'P');
    const cusps = Array.from(hRes.cusps).slice(1, 13);
    const ascmc = Array.from(hRes.ascmc);
    const asc   = ((ascmc[0] % 360) + 360) % 360;
    const mc    = ((ascmc[1] % 360) + 360) % 360;

    planets.forEach(p => { p.house = findHouse(p.longitude, cusps); });

    // Save for transit tab; invalidate timeline cache and reset window
    natalData = { planets, cusps, asc, mc, birthJD: jd, lat, lon };
    cachedTimeline = null;
    tlPastYears = 0; tlFutureYears = 0;
    expandedRows = new Set(); fastCache = {}; hiddenTPlants = new Set(); moonBandCollapsed = false;

    const chartName = document.getElementById('chartName').value.trim()
                   || document.getElementById('birthPlace').value
                   || tr('chartFallback');
    const rawDate = document.getElementById('birthDate').value;
    const fmtDate = rawDate ? rawDate.split('-').reverse().join('.') : '';
    const fmtTime = document.getElementById('birthTime').value || '';

    if (document.getElementById('form-wrap').classList.contains('editing')) {
      exitEditMode();
      const editedDateTime = [fmtDate, fmtTime].filter(Boolean).join(' · ');
      setV2ChartInfo(chartName, editedDateTime);
    } else {
      enterChartMode(chartName, fmtDate, fmtTime);
    }
    renderChart(planets, cusps, asc, mc);
    buildInfoTable(planets, cusps);
    buildAspectGrid(addSouthNode(planets, cusps));
    currentMode = 'transit';
    syncV2ModeButtons();
    if (currentTransitJD) renderBiwheelAt(currentTransitJD);
    else showTransitNow();
    computeAndRenderTimeline(natalData.planets);
    setStatus('');
  } catch (e) { setStatus(tr('error') + e.message); }
});

// ── Helpers ───────────────────────────────────────────────────────────────────

function findHouse(lon, cusps) {
  for (let i = 0; i < 12; i++) {
    const s = cusps[i], e = cusps[(i + 1) % 12];
    if (s <= e ? (lon >= s && lon < e) : (lon >= s || lon < e)) return i + 1;
  }
  return 1;
}

// Ecliptic longitude → SVG angle (ASC at 9 o'clock, CCW = increasing lon)
function lonToRad(lon, asc) { return (180 - (lon - asc)) * Math.PI / 180; }
function polar(a, r)         { return { x: CX + r * Math.cos(a), y: CY + r * Math.sin(a) }; }
function angDiff(a, b)       { const d = Math.abs(a - b) % 360; return d > 180 ? 360 - d : d; }

// ── South Node helper ─────────────────────────────────────────────────────────
// South Node is always exactly opposite the North Node (id=10).
function addSouthNode(planets, cusps = null) {
  const nn = planets.find(p => p.id === 10);
  if (!nn) return planets;
  const lon = (nn.longitude + 180) % 360;
  const sn = {
    id: -10,
    name: tr('pl_snode'),
    glyph: '☋\uFE0E', hamburgGlyph: '}',
    longitude: lon,
    retrograde: false,
    house: cusps ? findHouse(lon, cusps) : undefined,
  };
  return [...planets, sn];
}

// ── Format helpers ────────────────────────────────────────────────────────────

function fmtLon(lon) {
  const norm = ((lon % 360) + 360) % 360;
  const signIdx = Math.floor(norm / 30) % 12;
  const inSign  = norm % 30;
  const deg = Math.floor(inSign);
  const min = Math.floor((inSign - deg) * 60);
  return `${deg}°${String(min).padStart(2,'0')}' ${SIGN_NAMES[signIdx]}`;
}

function fmtOrb(orbDeg) {
  const d = Math.floor(orbDeg);
  const m = Math.round((orbDeg - d) * 60);
  return `(${d}°${String(m).padStart(2,'0')}')`;
}

// ── SVG factory ───────────────────────────────────────────────────────────────

const NS = 'http://www.w3.org/2000/svg';
function el(tag, attrs = {}, text) {
  const e = document.createElementNS(NS, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, String(v));
  if (text !== undefined) e.textContent = text;
  return e;
}
const circ = (cx, cy, r, a)       => el('circle', { cx, cy, r, ...a });
const ln   = (x1, y1, x2, y2, a) => el('line', { x1, y1, x2, y2, ...a });
const txt  = (x, y, s, a)        => el('text', { x, y, ...a }, s);

// Label + superscript degree (e.g. "VI¹³")
function lblSup(x, y, main, deg, attrs) {
  const t = el('text', { x, y, ...attrs });
  t.appendChild(el('tspan', {}, main));
  t.appendChild(el('tspan', { dy: '-5', 'font-size': '0.68em' }, String(deg)));
  return t;
}

// ── Render ────────────────────────────────────────────────────────────────────
// Drawing order mirrors the SVG template exactly:
// 1. white background
// 2. house axis lines (full diameter, behind ring)
// 3. zodiac ring (opacity 0.5, on top of house lines at edges)
// 4. white sign dividers (visible only where ring is gray)
// 5. zodiac glyphs + ticks
// 6. inner circle (white fill covers center of house lines)
// 7. aspect lines (on top of inner circle)
// 8. planets
// 9. clusters
// 10. cusp labels

// ── Degree ring (10° ticks, longer tick at each 30° sign boundary) ────────────
// rOuter  — внешний край кольца (уже нарисован основным кругом, не перерисовываем)
// ringW   — ширина кольца
// signExt — на сколько px знаковая черточка выходит за rOuter
function drawDegreeRing(g, rOuter, ringW, signExt) {
  const rInner = rOuter - ringW;

  // Только внутренний круг — внешний уже нарисован основным кругом карты
  g.appendChild(circ(CX, CY, rInner, { fill: 'none', stroke: COLORS.ringLine, 'stroke-width': 0.8 }));

  // Черточки через каждые 10°
  for (let deg = 0; deg < 360; deg += 10) {
    const isSign = deg % 30 === 0;
    const a  = lonToRad(deg, 0);
    const r1 = rInner;
    const r2 = isSign ? rOuter + signExt : rOuter;
    const p1 = polar(a, r1), p2 = polar(a, r2);
    g.appendChild(ln(p1.x, p1.y, p2.x, p2.y, {
      stroke: COLORS.ring,
      'stroke-width': 0.8,
    }));
  }
}

// ── Zodiac ring — solid gray or 12 element-colored arcs ───────────────────────
function drawZodiacRing(g) {
  if (!elementColorsMode) {
    g.appendChild(circ(CX, CY, R_RING, {
      fill: 'none', stroke: COLORS.ring, 'stroke-width': RING_W,
    }));
    return;
  }
  for (let i = 0; i < 12; i++) {
    const a1 = lonToRad(i * 30, 0);
    const a2 = lonToRad((i + 1) * 30, 0);
    const x1 = CX + R_RING * Math.cos(a1), y1 = CY - R_RING * Math.sin(a1);
    const x2 = CX + R_RING * Math.cos(a2), y2 = CY - R_RING * Math.sin(a2);
    g.appendChild(el('path', {
      d: `M ${x1} ${y1} A ${R_RING} ${R_RING} 0 0 1 ${x2} ${y2}`,
      fill: 'none', stroke: SIGN_ELEM_COLORS[i], 'stroke-width': RING_W,
    }));
  }
}

function renderChart(planets, cusps, asc, mc) {
  const svg = el('svg', { viewBox: VIEWBOX, width: '100%', style: 'display:block' });

  // Clip group
  const clipRect = el('rect', { width: W, height: H });
  const clipPath = el('clipPath', { id: 'canvasClip' });
  clipPath.appendChild(clipRect);
  const defs = el('defs');
  defs.appendChild(clipPath);
  svg.appendChild(defs);

  const g = el('g', { 'clip-path': 'url(#canvasClip)' });
  svg.appendChild(g);

  // 1. Background
  g.appendChild(el('rect', { x: 0, y: 0, width: W, height: H, fill: '#fff' }));

  // 2. House axes — behind the zodiac ring
  drawHouseAxes(g, cusps, 0);

  // 3. Zodiac ring (covers axes within ring area)
  drawZodiacRing(g);

  // 4. Sign dividers — short lines within ring only (R_ZOD_IN → R_ZOD_OUT)
  drawSignDividers(g, 0);

  // 5. Sign glyphs
  drawZodiacGlyphs(g, 0);

  // 6. Inner circle
  g.appendChild(circ(CX, CY, R_INNER, {
    fill: '#fff', stroke: COLORS.ringLine, 'stroke-width': 0.8,
  }));

  // 6a. Degree ring (10° ticks on inner circle boundary)
  drawDegreeRing(g, R_INNER, CHART.DEG_RING_W, CHART.DEG_SIGN_EXT);

  // 7. Aspects (include South Node)
  const planetsWithSN = addSouthNode(filterNatalPlanets(planets), cusps);
  drawAspects(g, planetsWithSN, 0);

  // 8. Planets (include South Node)
  drawPlanets(g, planetsWithSN, 0);

  // 9. Clusters drawClusters(g, planets, 0);

  // 10. Cusp labels
  drawHouseLabels(g, cusps, 0);

  document.getElementById('chart-block').replaceChildren(svg);
}

// ── House axes ────────────────────────────────────────────────────────────────
// 6 full-diameter lines, each connecting two opposite house cusps.
// Angular axes (ASC-DSC, IC-MC) are thicker.

function drawHouseAxes(g, cusps, asc, biwheel = false) {
  for (let i = 0; i < 6; i++) {
    const isAng = (i === 0 || i === 3);
    const a1 = lonToRad(cusps[i],     asc);
    const a2 = lonToRad(cusps[i + 6], asc);

    // In element colors mode, angular axes use per-cusp colors and are split at center
    const useColor = elementColorsMode && isAng;
    const c1 = useColor ? ANGULAR_COLORS[i]     : COLORS.ringLine;
    const c2 = useColor ? ANGULAR_COLORS[i + 6] : COLORS.ringLine;
    const w  = isAng ? 2 : 1;

    if (biwheel) {
      // Inner half-segments from each side to center
      const i1 = polar(a1, R_DIVIDER), i2 = polar(a2, R_DIVIDER);
      g.appendChild(ln(i1.x, i1.y, CX, CY, { stroke: c1, 'stroke-width': w }));
      g.appendChild(ln(CX, CY, i2.x, i2.y, { stroke: c2, 'stroke-width': w }));
      // Outer stubs outside zodiac ring
      const o1a = polar(a1, R_ZOD_OUT), o1b = polar(a1, R_LABEL);
      const o2a = polar(a2, R_ZOD_OUT), o2b = polar(a2, R_LABEL);
      g.appendChild(ln(o1a.x, o1a.y, o1b.x, o1b.y, { stroke: c1, 'stroke-width': w }));
      g.appendChild(ln(o2a.x, o2a.y, o2b.x, o2b.y, { stroke: c2, 'stroke-width': w }));
    } else {
      const p1 = polar(a1, R_LABEL), p2 = polar(a2, R_LABEL);
      if (useColor) {
        // Split at center: each half gets its own color
        g.appendChild(ln(p1.x, p1.y, CX, CY, { stroke: c1, 'stroke-width': w }));
        g.appendChild(ln(CX, CY, p2.x, p2.y, { stroke: c2, 'stroke-width': w }));
      } else {
        g.appendChild(ln(p1.x, p1.y, p2.x, p2.y, { stroke: c1, 'stroke-width': w }));
      }
    }
  }
}

// ── Sign dividers ─────────────────────────────────────────────────────────────
// Short white radial lines, only within the zodiac ring (R_ZOD_IN → R_ZOD_OUT).
// Never extend outside the ring, so they can't obscure house axis lines.

function drawSignDividers(g, asc) {
  for (let i = 0; i < 12; i++) {
    const a  = lonToRad(i * 30, asc);
    const p1 = polar(a, R_ZOD_IN);
    const p2 = polar(a, R_ZOD_OUT);
    g.appendChild(ln(p1.x, p1.y, p2.x, p2.y, {
      stroke: '#FAF7F5', 'stroke-width': 1.5,
    }));
  }
}

// ── Zodiac glyphs ─────────────────────────────────────────────────────────────

function drawZodiacGlyphs(g, asc) {
  for (let i = 0; i < 12; i++) {
    const a = lonToRad(i * 30 + 15, asc);
    const p = polar(a, R_RING); // centre of ring strip
    g.appendChild(txt(p.x, p.y, SIGNS[i], {
      'font-size': 17, fill: '#ffffff',
      'text-anchor': 'middle', 'dominant-baseline': 'central',
    }));
  }
}

// ── Cusp labels outside ring ──────────────────────────────────────────────────

const ANGULAR_NAMES = { 0: 'Асцендент', 3: 'IC', 6: 'Десцендент', 9: 'MC' };

function drawHouseLabels(g, cusps, asc) {
  cusps.forEach((cusp, i) => {
    const a    = lonToRad(cusp + 3, asc);   // +5 degrees offset past cusp line
    const p    = polar(a, R_LABEL - 5);
    const deg  = Math.floor(cusp % 30);
    const name = ANGULAR[i] ?? ROMAN[i];
    const isAng = ANGULAR[i] !== undefined;
    const tipText = `${ROMAN[i]} ${tr('houseWord')}${isAng ? `  ${ANGULAR_NAMES[i]}` : ''}  ${fmtLon(cusp)}`;

    const labelEl = lblSup(p.x, p.y, name, deg, {
      'font-size': 14,
      fill: isAng ? '#111' : '#555',
      'font-weight': 'bold',
      'text-anchor': 'middle',
      'dominant-baseline': 'central',
      style: 'cursor:default',
    });
    labelEl.addEventListener('mouseover', e => showChartTip(tipText, e));
    labelEl.addEventListener('mousemove', moveChartTip);
    labelEl.addEventListener('mouseout', hideChartTip);
    g.appendChild(labelEl);
  });
}

// ── Aspect lines ──────────────────────────────────────────────────────────────
// Connect planet positions on the inner circle boundary.

function drawAspects(g, planets, asc) {
  for (let i = 0; i < planets.length; i++) {
    for (let j = i + 1; j < planets.length; j++) {
      // Skip trivial N.Node ↔ S.Node opposition (always exact by definition)
      const ids = [planets[i].id, planets[j].id];
      if (ids.includes(10) && ids.includes(-10)) continue;
      const diff = angDiff(planets[i].longitude, planets[j].longitude);
      for (const asp of ASPECTS) {
        const orb = getNatalOrb(asp, planets[i].id, planets[j].id);
        const actualOrb = Math.abs(diff - asp.angle);
        if (actualOrb <= orb) {
          const tipText = `${planets[i].glyph} ${asp.name} ${planets[j].glyph}  ${fmtOrb(actualOrb)}`;
          if (asp.type === 'conj') {
            // Small ellipse on the inner circle boundary, under the planets
            let l1 = planets[i].longitude, l2 = planets[j].longitude;
            if (Math.abs(l1 - l2) > 180) { if (l1 < l2) l1 += 360; else l2 += 360; }
            const midLon = ((l1 + l2) / 2) % 360;
            const midA = lonToRad(midLon, asc);
            const center = polar(midA, R_INNER);
            const spanRad = diff * Math.PI / 180;
            const rx = Math.max(10, spanRad * R_INNER / 2 + 8);
            const rotDeg = midA * 180 / Math.PI + 90;
            const ellipseEl = el('ellipse', {
              cx: center.x, cy: center.y, rx, ry: 3.5,
              transform: `rotate(${rotDeg}, ${center.x}, ${center.y})`,
              fill: 'none', stroke: asp.color, 'stroke-width': 1.5, style: 'cursor:default',
            });
            ellipseEl.addEventListener('mouseover', e => showChartTip(tipText, e));
            ellipseEl.addEventListener('mousemove', moveChartTip);
            ellipseEl.addEventListener('mouseout', hideChartTip);
            g.appendChild(ellipseEl);
          } else {
            const pi = polar(lonToRad(planets[i].longitude, asc), R_INNER);
            const pj = polar(lonToRad(planets[j].longitude, asc), R_INNER);
            const attrs = { stroke: asp.color, 'stroke-width': asp.width, opacity: '1' };
            if (asp.dash) attrs['stroke-dasharray'] = asp.dash;
            g.appendChild(ln(pi.x, pi.y, pj.x, pj.y, attrs));
            // Invisible wider hit area for easier hover
            const hitLine = ln(pi.x, pi.y, pj.x, pj.y, { stroke: 'transparent', 'stroke-width': 8, style: 'cursor:default' });
            hitLine.addEventListener('mouseover', e => showChartTip(tipText, e));
            hitLine.addEventListener('mousemove', moveChartTip);
            hitLine.addEventListener('mouseout', hideChartTip);
            g.appendChild(hitLine);
            const mid = { x: (pi.x + pj.x) / 2, y: (pi.y + pj.y) / 2 };
            if (asp.angle === 180) break;
            g.appendChild(el('circle', { cx: mid.x, cy: mid.y, r: 5.5, fill: 'white' }));
            g.appendChild(txt(mid.x, mid.y, asp.hg ?? asp.symbol, {
              'font-size': 10, fill: asp.color,
              'text-anchor': 'middle', 'dominant-baseline': 'central',
              ...(asp.hg ? { style: 'font-family:HamburgSymbols' } : {}),
            }));
          }
          break;
        }
      }
    }
  }
}

// ── Planets ───────────────────────────────────────────────────────────────────

function drawPlanets(g, planets, asc) {
  const R_TICK  = CHART.R_TICK;
  const R_L0    = CHART.R_GLYPH_L0;
  const R_L1    = CHART.R_GLYPH_L1;
  const MIN_GAP = CHART.GLYPH_MIN_GAP;

  // Сортируем по углу
  const items = planets
    .map(p => ({ ...p, angle: lonToRad(p.longitude, asc) }))
    .sort((a, b) => a.longitude - b.longitude);

  // Шаг 1: находим кластеры (планеты ближе MIN_GAP друг к другу)
  const clusters = [];
  let cur = [items[0]];
  for (let i = 1; i < items.length; i++) {
    let da = Math.abs(items[i].angle - items[i - 1].angle);
    da = Math.min(da, Math.PI * 2 - da);
    if (da < MIN_GAP) cur.push(items[i]);
    else { clusters.push(cur); cur = [items[i]]; }
  }
  clusters.push(cur);

  // Шаг 2: назначаем уровни (0 = внутренний, 1 = внешний)
  // 1–2 планеты → все на уровень 0
  // 3+ планет → жадное распределение по двум уровням
  // Чётные по счёту (2-я, 4-я…) — уровень 1 (внешний), нечётные — уровень 0 (внутренний)
  const labeled = clusters.flatMap(cluster =>
    cluster.map((p, i) => ({ ...p, level: i % 2 }))
  );

  // 1. Точки истинной позиции на R_TICK
  labeled.forEach(p => {
    const pos = polar(p.angle, R_TICK);
    g.appendChild(circ(pos.x, pos.y, 2.5, {
      fill: '#c6c300', stroke: '#000', 'stroke-width': 0.6,
    }));
  });

  // (линии-лидеры убраны)

  // 3. Глифы на своём уровне (угол не меняется — только радиус)
  labeled.forEach(p => {
    const r   = p.level === 0 ? R_L0 : R_L1;
    const pos = polar(p.angle, r);
    const deg = Math.floor(p.longitude % 30);
    const tipText = `${p.glyph} ${p.name}  ${fmtLon(p.longitude)}${p.house ? `  ${tr('houseWord')} ${ROMAN[p.house - 1]}` : ''}${p.retrograde ? '  R' : ''}`;
    const t = el('text', {
      x: pos.x, y: pos.y + 9,
      'font-size': 20, fill: '#111',
      'text-anchor': 'middle',
      style: 'font-family:HamburgSymbols;cursor:default',
    });
    t.appendChild(el('tspan', {}, p.hamburgGlyph));
    t.appendChild(el('tspan', { x: pos.x + (p.degOffset ?? 12), dy: '-12', 'font-size': '10', fill: '#111', 'font-weight': 'semi-bold', 'text-anchor': 'start', style: 'font-family:sans-serif' }, String(deg)));
    t.addEventListener('mouseover', e => showChartTip(tipText, e));
    t.addEventListener('mousemove', moveChartTip);
    t.addEventListener('mouseout', hideChartTip);
    g.appendChild(t);
    if (p.retrograde) {
      g.appendChild(txt(pos.x + 10, pos.y + 9, '>', {
        'font-size': 11, fill: '#111', style: 'font-family:HamburgSymbols',
      }));
    }
  });
}

// ── Conjunction clusters (blue ellipses) ─────────────────────────────────────

function drawClusters(g, planets, asc) {
  const CONJ_ORB = 8;
  const visited  = new Set();

  for (let i = 0; i < planets.length; i++) {
    if (visited.has(i)) continue;
    const group = [i];
    for (let j = i + 1; j < planets.length; j++) {
      if (!visited.has(j) && angDiff(planets[i].longitude, planets[j].longitude) <= CONJ_ORB) {
        group.push(j);
        visited.add(j);
      }
    }
    if (group.length < 2) { visited.add(i); continue; }

    const lons = group.map(k => planets[k].longitude);
    let minL = Math.min(...lons), maxL = Math.max(...lons);
    if (maxL - minL > 180) {
      lons.forEach((l, k) => { if (l < 180) lons[k] = l + 360; });
      minL = Math.min(...lons); maxL = Math.max(...lons);
    }

    const midL    = ((minL + maxL) / 2) % 360;
    const spanRad = (maxL - minL) * Math.PI / 180;
    const midA    = lonToRad(midL, asc);
    const center  = polar(midA, R_PLANET);
    const rx      = Math.max(16, (spanRad * R_PLANET) / 2 + 12);
    const rotDeg  = midA * 180 / Math.PI + 90;

    g.appendChild(el('ellipse', {
      cx: center.x, cy: center.y, rx, ry: 13,
      transform: `rotate(${rotDeg}, ${center.x}, ${center.y})`,
      fill: 'none', stroke: '#2255cc', 'stroke-width': 1.5,
    }));
    visited.add(i);
  }
}

// ── Info table ────────────────────────────────────────────────────────────────

const HOUSE_LABELS = ['As','II','III','Ic','V','VI','Ds','VIII','IX','Mc','XI','XII'];

function fmtDeg(lon) {
  const d = Math.floor(lon % 30);
  const f = lon % 1;
  const m = Math.floor(f * 60);
  const s = Math.floor(f * 3600) % 60;
  return `${d}°${String(m).padStart(2,'0')}'${String(s).padStart(2,'0')}"`;
}

function buildInfoTable(planets, cusps) {
  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = '';
  filterNatalPlanets(planets).forEach(p => {
    const si = Math.floor(p.longitude / 30) % 12;
    const retro = p.retrograde ? ' <span class="info-retro">R</span>' : '';
    const tr = document.createElement('tr');
    tr.innerHTML =
      `<td class="info-glyph">${p.hamburgGlyph}</td>` +
      `<td class="info-pos">${fmtDeg(p.longitude)}${retro} ${SIGNS[si]}</td>` +
      `<td class="col-second col-divider info-glyph">${p.hamburgGlyph}</td>` +
      `<td class="col-second info-pos" id="info-sp-${p.id}"></td>`;
    tbody.appendChild(tr);
  });
  const sep = document.createElement('tr');
  sep.className = 'info-sep';
  sep.innerHTML = '<td colspan="4"></td>';
  tbody.appendChild(sep);
  cusps.forEach((lon, i) => {
    const si  = Math.floor(lon / 30) % 12;
    const cls = [0,3,6,9].includes(i) ? 'house-angular' : '';
    const tr  = document.createElement('tr');
    tr.innerHTML =
      `<td class="info-house-lbl ${cls}">${HOUSE_LABELS[i]}</td>` +
      `<td class="info-pos">${fmtDeg(lon)} ${SIGNS[si]}</td>` +
      `<td class="col-second-house col-divider info-house-lbl ${cls}">${HOUSE_LABELS[i]}</td>` +
      `<td class="col-second-house info-pos" id="info-shp-${i}"></td>`;
    tbody.appendChild(tr);
  });
}

function updateSecondColumn(planets) {
  planets.forEach(p => {
    const posEl = document.getElementById(`info-sp-${p.id}`);
    if (!posEl) return;
    const si = Math.floor(p.longitude / 30) % 12;
    const retro = p.retrograde ? ' <span class="info-retro">R</span>' : '';
    posEl.innerHTML = `${fmtDeg(p.longitude)}${retro} ${SIGNS[si]}`;
  });
}

function updateSecondHouses(cusps) {
  cusps.forEach((lon, i) => {
    const posEl = document.getElementById(`info-shp-${i}`);
    if (!posEl) return;
    const si = Math.floor(lon / 30) % 12;
    posEl.textContent = `${fmtDeg(lon)} ${SIGNS[si]}`;
  });
}

function setInfoTableMode(mode) {
  const t = document.getElementById('info-table');
  if (!t) return;
  t.classList.toggle('mode-biwheel', mode === 'biwheel' || mode === 'biwheel-houses');
  t.classList.toggle('mode-biwheel-houses', mode === 'biwheel-houses');
}

function findGridAspect(lon1, lon2, id1, id2, orbMode) {
  const diff = angDiff(lon1, lon2);
  for (const asp of ASPECTS) {
    let maxOrb;
    if (orbMode === 'natal') {
      maxOrb = getNatalOrb(asp, id1, id2);
    } else if (orbMode === 'progressed') {
      maxOrb = (id1 === 0 || id1 === 1 || id2 === 0 || id2 === 1) ? 2 : 1;
    } else {
      maxOrb = 3;
    }
    const orb = Math.abs(diff - asp.angle);
    if (orb <= maxOrb) return { asp, orb };
  }
  return null;
}

function buildAspectGrid(natalPlanets, secondPlanets = null, orbMode = 'natal') {
  const container = document.getElementById('aspect-grid');
  if (!container) return;
  natalPlanets = filterNatalPlanets(natalPlanets);
  const isNatal = !secondPlanets;
  const rows = isNatal ? natalPlanets.slice(1) : secondPlanets;
  const cols = natalPlanets;

  let html = '<table id="aspect-table"><thead><tr><th></th>';
  cols.forEach(p => { html += `<th class="ag-hdr">${p.hamburgGlyph}</th>`; });
  html += '</tr></thead><tbody>';

  rows.forEach((rowPlanet, ri) => {
    html += `<tr><th class="ag-hdr">${rowPlanet.hamburgGlyph}</th>`;
    cols.forEach((colPlanet, ci) => {
      if (isNatal && ci >= ri + 1) {
        html += `<td class="${ci === ri + 1 ? 'ag-self' : 'ag-empty'}"></td>`;
      } else {
        const m = findGridAspect(rowPlanet.longitude, colPlanet.longitude, rowPlanet.id, colPlanet.id, orbMode);
        if (m) {
          html += `<td style="color:${m.asp.color}">` +
            `<span class="ag-sym">${m.asp.symbol}</span>` +
            `<span class="ag-orb">${m.orb.toFixed(1)}°</span></td>`;
        } else {
          html += `<td></td>`;
        }
      }
    });
    html += '</tr>';
  });

  html += '</tbody></table>';
  container.innerHTML = html;
}

// ── Date navigator helpers ────────────────────────────────────────────────────

function computeJDNow() {
  if (!swe) return null;
  const now = new Date();
  return swe.julday(now.getUTCFullYear(), now.getUTCMonth() + 1,
    now.getUTCDate(), now.getUTCHours() + now.getUTCMinutes() / 60);
}

function applyNavigatedJD(jd, unit = null) {
  currentTransitJD = jd;
  if (currentMode === 'transit') renderBiwheelAt(currentTransitJD);
  else if (currentMode === 'direction') renderDirectionBiwheel(currentTransitJD);
  else renderProgressedBiwheel(currentTransitJD);
  syncTimelineCursor(unit);
  syncV2DateLabel();
}

function switchModeAndNavigate(mode, jd) {
  if (!natalData || !swe) return;
  currentTransitJD = jd;
  switchToMode(mode);
  syncTimelineCursor();
}

function syncTimelineCursor(unit = null) {
  if (!cachedTimeline) return;
  const jd = currentTransitJD ?? computeJDNow();
  const { jdStart, jdEnd } = cachedTimeline;
  if (jd >= jdStart && jd <= jdEnd) {
    renderTimeline({ ...cachedTimeline, jdCursor: jd });
  } else {
    // Out of range: rebuild centered on new date, keep fixed window size
    cachedTimeline = null; fastCache = {};
    tlPastYears = 0; tlFutureYears = 0;
    if (natalData) computeAndRenderTimeline(natalData.planets, jd);
  }
}

function navigateDateBy(unit, delta) {
  const baseJD = currentTransitJD ?? computeJDNow();
  if (!baseJD) return;
  let newJD;
  if (unit === 'day') {
    newJD = baseJD + delta;
  } else {
    const d = new Date((baseJD - 2440587.5) * 86400000);
    if (unit === 'month') d.setUTCMonth(d.getUTCMonth() + delta);
    else d.setUTCFullYear(d.getUTCFullYear() + delta);
    newJD = d.getTime() / 86400000 + 2440587.5;
  }
  applyNavigatedJD(newJD, unit);
}

document.getElementById('nav-date-input').addEventListener('change', () => {
  const val = document.getElementById('nav-date-input').value;
  if (!val) return;
  const [y, m, d] = val.split('-').map(Number);
  applyNavigatedJD(new Date(Date.UTC(y, m - 1, d)).getTime() / 86400000 + 2440587.5);
});

function renderDirectionBiwheel(jd = null) {
  const { birthJD, planets: natal, cusps: natalCusps, asc } = natalData;
  const jdReal = jd ?? computeJDNow();
  // Symbolic directions: 1 year of life = 1 degree of arc
  const ageInYears = (jdReal - birthJD) / 365.25;
  const directed = natal.map(p => ({
    ...p,
    longitude: ((p.longitude + ageInYears) % 360 + 360) % 360,
    retrograde: false,
  }));
  const directedCusps = natalCusps.map(c => ((c + ageInYears) % 360 + 360) % 360);
  renderBiwheelDirected(natal, directed, natalCusps, directedCusps, asc);
  updateSecondColumn(directed);
  updateSecondHouses(directedCusps);
  setInfoTableMode('biwheel-houses');
  buildAspectGrid(addSouthNode(natal, natalCusps), addSouthNode(directed), 'direction');
  currentTransitJD = jd;
}

function renderBiwheelDirected(natal, directed, natalCusps, directedCusps, asc) {
  const svg = el('svg', { viewBox: VIEWBOX, width: '100%', style: 'display:block' });

  const clipRect = el('rect', { width: W, height: H });
  const clipPath = el('clipPath', { id: 'canvasClip' });
  clipPath.appendChild(clipRect);
  const defs = el('defs');
  defs.appendChild(clipPath);
  svg.appendChild(defs);

  const g = el('g', { 'clip-path': 'url(#canvasClip)' });
  svg.appendChild(g);

  // 1. Background
  g.appendChild(el('rect', { x: 0, y: 0, width: W, height: H, fill: '#fff' }));

  // 2. House axes — behind zodiac ring
  drawHouseAxes(g, natalCusps, 0, true);

  // 3. Zodiac ring
  drawZodiacRing(g);

  // 4. Sign dividers (short, within ring) + glyphs
  drawSignDividers(g, 0);
  drawZodiacGlyphs(g, 0);

  // 5. Divider circle between directed / natal rings
  g.appendChild(circ(CX, CY, R_DIVIDER, {
    fill: 'none', stroke: COLORS.ringLine, 'stroke-width': 0.8,
  }));

  // 6. Inner circle
  g.appendChild(circ(CX, CY, R_BW_INNER, {
    fill: '#fff', stroke: COLORS.ringLine, 'stroke-width': 0.8,
  }));
  drawDegreeRing(g, R_BW_INNER, CHART.BW_DEG_RING_W, CHART.BW_DEG_SIGN_EXT);

  // 7. Directed cusp lines (inner zone: R_BW_INNER → R_DIVIDER)
  drawDirectedCusps(g, directedCusps, 0);

  // 8. Direction → natal aspect lines (include South Nodes)
  drawDirectionAspects(g, addSouthNode(natal, natalCusps), addSouthNode(directed), 0);

  // 9. Natal planets (inner ring) — include South Node
  drawBiwheelPlanets(g, addSouthNode(natal, natalCusps), 0, R_BW_INNER, R_N_PLANET, CHART.BW_R_NATAL_GLYPH_L1);

  // 10. Directed planets (outer ring) — include South Node
  drawBiwheelPlanets(g, addSouthNode(directed),           0, R_DIVIDER, R_T_PLANET, CHART.BW_R_TRANSIT_GLYPH_L1, '#c6c300', '#111');

  // 11. House labels outside ring (natal)
  drawHouseLabels(g, natalCusps, 0);

  document.getElementById('chart-block').replaceChildren(svg);
}

function drawDirectedCusps(g, directedCusps, asc) {
  for (let i = 0; i < 6; i++) {
    const isAng = (i === 0 || i === 3);
    const a1 = lonToRad(directedCusps[i],     asc);
    const a2 = lonToRad(directedCusps[i + 6], asc);
    const w = isAng ? 2 : 1;
    const useColor = elementColorsMode && isAng;
    const c1 = useColor ? ANGULAR_COLORS[i]     : COLORS.ringLine;
    const c2 = useColor ? ANGULAR_COLORS[i + 6] : COLORS.ringLine;
    // Visible only in the directed ring: R_DIVIDER → R_ZOD_IN (each side)
    const p1a = polar(a1, R_DIVIDER), p1b = polar(a1, R_ZOD_IN);
    const p2a = polar(a2, R_DIVIDER), p2b = polar(a2, R_ZOD_IN);
    g.appendChild(ln(p1a.x, p1a.y, p1b.x, p1b.y, { stroke: c1, 'stroke-width': w, opacity: '0.55' }));
    g.appendChild(ln(p2a.x, p2a.y, p2b.x, p2b.y, { stroke: c2, 'stroke-width': w, opacity: '0.55' }));
  }
}

function drawDirectionAspects(g, natal, directed, asc) {
  for (const dir of directed) {
    for (const na of natal) {
      // Skip trivial N.Node ↔ S.Node opposition
      if ((dir.id === 10 && na.id === -10) || (dir.id === -10 && na.id === 10)) continue;
      const orbLimit = (dir.id === 0 || dir.id === 1 || na.id === 0 || na.id === 1) ? 2 : 1;
      const diff = angDiff(dir.longitude, na.longitude);
      for (const asp of D_ASPECTS) {
        if (Math.abs(diff - asp.angle) <= orbLimit) {
          const actualOrb = Math.abs(diff - asp.angle);
          const aspName = ASPECTS.find(a => a.angle === asp.angle)?.name ?? asp.symbol;
          const tipText = `${tr('dirPrefix')}${dir.glyph} ${aspName} ${tr('natPrefix')}${na.glyph}  ${fmtOrb(actualOrb)}`;
          if (asp.angle === 0) {
            // Conjunction: ellipse arc on the natal circle
            let l1 = dir.longitude, l2 = na.longitude;
            if (Math.abs(l1 - l2) > 180) { if (l1 < l2) l1 += 360; else l2 += 360; }
            const midLon = ((l1 + l2) / 2) % 360;
            const midA = lonToRad(midLon, asc);
            const center = polar(midA, R_BW_INNER);
            const spanRad = diff * Math.PI / 180;
            const rx = Math.max(8, spanRad * R_BW_INNER / 2 + 6);
            const rotDeg = midA * 180 / Math.PI + 90;
            const ellipseEl = el('ellipse', {
              cx: center.x, cy: center.y, rx, ry: 3.5,
              transform: `rotate(${rotDeg}, ${center.x}, ${center.y})`,
              fill: 'none', stroke: asp.color, 'stroke-width': 1.5, style: 'cursor:default',
            });
            ellipseEl.addEventListener('mouseover', e => showChartTip(tipText, e));
            ellipseEl.addEventListener('mousemove', moveChartTip);
            ellipseEl.addEventListener('mouseout', hideChartTip);
            g.appendChild(ellipseEl);
          } else {
            const pd  = polar(lonToRad(dir.longitude, asc), R_BW_INNER);
            const pn  = polar(lonToRad(na.longitude, asc), R_BW_INNER);
            const mid = { x: (pd.x + pn.x) / 2, y: (pd.y + pn.y) / 2 };
            g.appendChild(ln(pd.x, pd.y, pn.x, pn.y, {
              stroke: asp.color, 'stroke-width': 1, opacity: '0.6',
            }));
            const hitLine = ln(pd.x, pd.y, pn.x, pn.y, { stroke: 'transparent', 'stroke-width': 8, style: 'cursor:default' });
            hitLine.addEventListener('mouseover', e => showChartTip(tipText, e));
            hitLine.addEventListener('mousemove', moveChartTip);
            hitLine.addEventListener('mouseout', hideChartTip);
            g.appendChild(hitLine);
            if (asp.angle === 180) break;
            g.appendChild(el('circle', { cx: mid.x, cy: mid.y, r: 5.5, fill: 'white' }));
            g.appendChild(txt(mid.x, mid.y, asp.hg ?? asp.symbol, {
              'font-size': 10, fill: asp.color,
              'text-anchor': 'middle', 'dominant-baseline': 'central',
              ...(asp.hg ? { style: 'font-family:HamburgSymbols' } : {}),
            }));
          }
          break;
        }
      }
    }
  }
}


function showTransitNow() {
  const now   = new Date();
  const jdNow = swe.julday(
    now.getUTCFullYear(), now.getUTCMonth() + 1,
    now.getUTCDate(), now.getUTCHours() + now.getUTCMinutes() / 60
  );
  const flags  = (swe.SEFLG_SWIEPH ?? 2) | (swe.SEFLG_SPEED ?? 256);
  const transit = PLANETS.map(p => {
    const r = swe.calc_ut(jdNow, p.id, flags);
    return { ...p, longitude: ((r[0] % 360) + 360) % 360, retrograde: r[3] < 0 && p.id !== 10 && p.id !== 12 };
  });
  renderBiwheel(natalData.planets, transit, natalData.cusps, natalData.asc);

}

          } else {
