<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#FDFDFC">
<link rel="icon" type="image/png" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Aspectus">
<title>Натальная карта</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- ── Auth modal ─────────────────────────────────────────── -->
<div id="modal-overlay">
  <div id="auth-modal">
    <div class="modal-hdr">
      <span class="modal-title" data-i18n="signIn">Войти в аккаунт</span>
      <button id="closeModal">✕</button>
    </div>
    <button id="googleBtn" class="social-btn">
      <svg width="17" height="17" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      <span data-i18n="continueWithGoogle">Войти через Google</span>
    </button>
    <button id="appleBtn" class="social-btn apple-btn">
      <svg width="15" height="18" viewBox="0 0 814 1000" fill="currentColor">
        <path d="M788.1 340.9c-5.8 4.5-108.2 62.2-108.2 190.5 0 148.4 130.3 200.9 134.2 202.2-.6 3.2-20.7 71.9-68.7 141.9-42.8 61.6-87.5 123.1-155.5 123.1s-85.5-39.5-164-39.5c-76 0-103.7 40.8-165.9 40.8s-105.6-57-155.5-127C46.7 790.7 0 663 0 541.8c0-207.5 135.4-317.3 270.1-317.3 67.9 0 124.6 44.5 166.5 44.5 39.6 0 101.7-47 180.3-47 28.5 0 130.9 2.6 198.3 99.2zm-234-181.5c31.1-36.9 53.1-88.1 53.1-139.3 0-7.1-.6-14.3-1.9-20.1-50.6 1.9-110.8 33.7-147.1 75.8-28.5 32.4-55.1 83.6-55.1 135.5 0 7.8 1.3 15.6 1.9 18.1 3.2.6 8.4 1.3 13.6 1.3 45.4 0 102.5-30.4 135.5-71.3z"/>
      </svg>
      <span data-i18n="continueWithApple">Войти через Apple</span>
    </button>
    <div class="auth-divider" data-i18n="or">или</div>
    <input class="auth-input" type="email"    id="authEmail"    placeholder="Email">
    <input class="auth-input" type="password" id="authPassword" data-i18n-placeholder="passwordPlaceholder" placeholder="Пароль (мин. 6 символов)">
    <div class="modal-btns">
      <button id="signinBtn" data-i18n="signin">Войти</button>
      <button id="signupBtn" data-i18n="signup">Регистрация</button>
    </div>
    <div id="auth-msg"></div>
  </div>
</div>

<!-- ── Folder picker popover ──────────────────────────────────── -->
<div id="folder-picker"></div>

<!-- ── Saved charts side panel ──────────────────────────────── -->
<div id="charts-panel">
  <div class="panel-hdr">
    <span class="panel-title" data-i18n="myCharts">Мои карты</span>
    <button id="closePanelBtn">✕</button>
  </div>
  <div class="charts-toolbar">
    <input id="charts-search" class="charts-search" type="search" placeholder="Поиск…">
    <select id="charts-sort" class="charts-sort">
      <option value="created">По дате</option>
      <option value="name">А–Я</option>
      <option value="birth">Дата рожд.</option>
      <option value="sign">Знак ☉</option>
    </select>
  </div>
  <div id="charts-list"></div>
</div>

<!-- ── Left panel ────────────────────────────────────────────── -->
<div id="left-panel">
  <div id="lp-top">
    <button class="lp-tab-btn" id="lp-home-btn" data-i18n-title="lpHomeTitle" title="Главная">⌂</button>
    <button class="lp-tab-btn active" data-i18n-title="lpTabLibrary" title="Библиотека">▤</button>
  </div>
  <div class="lp-view" id="lp-view-lib">
    <div id="left-panel-search-wrap">
      <input id="left-panel-search" type="text" data-i18n-placeholder="lpLibSearchPh" placeholder="Имя, город или: сатурн трин луна" autocomplete="off" spellcheck="false">
      <button id="lp-help-btn" data-i18n-title="lpHelpTitle" title="Справка по поиску">?</button>
      <select id="left-panel-sort">
        <option value="date">По дате</option>
        <option value="name">А–Я</option>
        <option value="birth">Дата рожд.</option>
      </select>
    </div>
    <div id="lp-cheatsheet" style="display:none"></div>
    <div id="lp-dsl-hint" style="display:none"></div>
    <div id="left-panel-groups"></div>
    <div id="left-panel-list"></div>
  </div>
</div>
<div id="left-panel-backdrop"></div>
<div id="chart-ctx-menu"></div>

<!-- ── Notes panel (slides from right) ───────────────────────── -->
<!-- ── App header ────────────────────────────────────────────── -->
<div id="app-header">
  <button id="panel-toggle-btn" title="Карты">
    <img src="Aspectus%20logo.png" alt="Aspectus">
  </button>
  <div id="tab-area">
    <div id="tab-bar">
      <!-- tabs injected here by JS -->
    </div>
    <button id="tab-add-btn" title="Новая карта">+</button>
  </div>
  <div id="header-right">
    <button id="notesToggleBtn" class="icon-btn" data-i18n-title="panelTabNotes" title="Заметки">🗒&#xFE0E;</button>
    <button id="settingsBtn" class="icon-btn settings-btn" data-i18n-title="settings" title="Настройки">⚙&#xFE0E;</button>
  </div>
</div>
<div id="settings-dropdown">
  <button class="auth-btn" id="openSettingsBtn" data-i18n="settings">Настройки</button>
  <div id="auth-zone">
    <button id="loginBtn" class="auth-btn primary" data-i18n="login">Войти</button>
    <div id="user-info" style="display:none">
      <span id="user-email-short"></span>
      <button id="chartsBtn" class="auth-btn" data-i18n="charts">📂 Карты</button>
      <button id="logoutBtn" class="auth-btn ghost" data-i18n="logout">Выйти</button>
    </div>
  </div>
</div>

<!-- ── Settings modal (контент генерится из реестра, js/settings.js) ── -->
<div id="settings-modal-overlay">
  <div id="settings-modal">
    <div id="sm-nav">
      <input id="sm-search" type="text" data-i18n-placeholder="smSearch" placeholder="Поиск настроек…" autocomplete="off">
      <div id="sm-sections"></div>
    </div>
    <div id="sm-main">
      <button id="sm-close" type="button">✕</button>
      <div id="sm-content"></div>
    </div>
  </div>
</div>

<div id="page-body">
<div id="edit-backdrop"></div>
<div id="form-wrap">
  <div class="row">
    <div class="field">
      <label data-i18n="nameLabel">Имя</label>
      <input type="text" id="chartName" data-i18n-placeholder="namePlaceholder" placeholder="Имя человека" autocomplete="off">
    </div>
  </div>
  <div class="row">
    <div class="field">
      <label data-i18n="birthDateLabel">Дата рождения</label>
      <input type="date" id="birthDate" autocomplete="off">
    </div>
    <div class="field">
      <label data-i18n="birthTimeLabel">Время (местное)</label>
      <input type="time" id="birthTime" autocomplete="off" value="12:00">
    </div>
  </div>
  <div class="row">
    <div class="field" id="geo-place-wrap">
      <label data-i18n="birthPlaceLabel">Место рождения</label>
      <input type="text" id="birthPlace" value="Москва" autocomplete="off" data-i18n-placeholder="cityPlaceholder" placeholder="Начните вводить город…">
      <div id="geo-dropdown"></div>
    </div>
  </div>
  <div class="row">
    <div class="field">
      <label data-i18n="latLabel">Широта</label>
      <input type="number" id="lat" step="0.0001" value="55.7558">
    </div>
    <div class="field">
      <label data-i18n="lonLabel">Долгота</label>
      <input type="number" id="lonVal" step="0.0001" value="37.6173">
    </div>
    <div class="field">
      <label data-i18n="utcOffsetLabel">UTC смещение, ч</label>
      <input type="number" id="utcOff" step="0.5" value="3">
    </div>
  </div>
  <div class="btn-row">
    <button id="calcBtn" disabled data-i18n="buildChart">Построить карту</button>
    <button id="cancelEditBtn" type="button" data-i18n="cancel">Отменить</button>
  </div>
  <div id="status">Загрузка Swiss Ephemeris…</div>
  <script>
  // Guard: с распилом на модули приложение не работает через file:// (CORS).
  // Обычный (не module) скрипт — выполняется даже когда модули заблокированы.
  if (location.protocol === 'file:') {
    document.addEventListener('DOMContentLoaded', function () {
      var s = document.getElementById('status');
      if (s) s.innerHTML =
        '⚠️ Приложение теперь состоит из нескольких файлов и не открывается двойным кликом ' +
        'по index.html (браузер блокирует модули с диска). Запустите в папке проекта: ' +
        '<code>python3 -m http.server 8000</code> и откройте ' +
        '<a href="http://localhost:8000">localhost:8000</a>.';
    });
  }
  </script>
  <div id="save-wrap">
    <button id="saveBtn" data-i18n="saveChartBtn">💾 Сохранить карту</button>
  </div>
</div>

<!-- ── Конструктор синастрии (композитный кейс, WORKSPACE_CONCEPT §8) ────────── -->
<div id="syn-form">
  <div id="syn-form-head" data-i18n="synTitle">Синастрия</div>
  <div id="syn-slots">
    <div class="syn-slot" data-slot="a">
      <div class="syn-slot-role" data-i18n="synSubjectA">Первый человек</div>
      <div class="field syn-pick-wrap">
        <input type="text" class="syn-search" data-i18n-placeholder="synPickSaved" placeholder="Выбрать из сохранённых…" autocomplete="off">
        <div class="syn-pick-dd"></div>
      </div>
      <div class="row">
        <div class="field"><label data-i18n="nameLabel">Имя</label><input type="text" class="syn-name" autocomplete="off"></div>
      </div>
      <div class="row">
        <div class="field"><label data-i18n="birthDateLabel">Дата рождения</label><input type="date" class="syn-date" autocomplete="off"></div>
        <div class="field"><label data-i18n="birthTimeLabel">Время (местное)</label><input type="time" class="syn-time" value="12:00" autocomplete="off"></div>
      </div>
      <div class="row">
        <div class="field syn-place-field"><label data-i18n="birthPlaceLabel">Место рождения</label><input type="text" class="syn-place" autocomplete="off"><div class="syn-geo-dd"></div></div>
      </div>
      <div class="row">
        <div class="field"><label data-i18n="latLabel">Широта</label><input type="number" step="0.0001" class="syn-lat"></div>
        <div class="field"><label data-i18n="lonLabel">Долгота</label><input type="number" step="0.0001" class="syn-lon"></div>
        <div class="field"><label data-i18n="utcOffsetLabel">UTC смещение, ч</label><input type="number" step="0.5" class="syn-utc"></div>
      </div>
    </div>
    <div class="syn-slot" data-slot="b">
      <div class="syn-slot-role" data-i18n="synSubjectB">Второй человек</div>
      <div class="field syn-pick-wrap">
        <input type="text" class="syn-search" data-i18n-placeholder="synPickSaved" placeholder="Выбрать из сохранённых…" autocomplete="off">
        <div class="syn-pick-dd"></div>
      </div>
      <div class="row">
        <div class="field"><label data-i18n="nameLabel">Имя</label><input type="text" class="syn-name" autocomplete="off"></div>
      </div>
      <div class="row">
        <div class="field"><label data-i18n="birthDateLabel">Дата рождения</label><input type="date" class="syn-date" autocomplete="off"></div>
        <div class="field"><label data-i18n="birthTimeLabel">Время (местное)</label><input type="time" class="syn-time" value="12:00" autocomplete="off"></div>
      </div>
      <div class="row">
        <div class="field syn-place-field"><label data-i18n="birthPlaceLabel">Место рождения</label><input type="text" class="syn-place" autocomplete="off"><div class="syn-geo-dd"></div></div>
      </div>
      <div class="row">
        <div class="field"><label data-i18n="latLabel">Широта</label><input type="number" step="0.0001" class="syn-lat"></div>
        <div class="field"><label data-i18n="lonLabel">Долгота</label><input type="number" step="0.0001" class="syn-lon"></div>
        <div class="field"><label data-i18n="utcOffsetLabel">UTC смещение, ч</label><input type="number" step="0.5" class="syn-utc"></div>
      </div>
    </div>
  </div>
  <div class="btn-row">
    <button id="syn-build-btn" data-i18n="synBuild">Построить синастрию</button>
    <button id="syn-cancel-btn" type="button" data-i18n="cancel">Отменить</button>
  </div>
  <div id="syn-status"></div>
</div>

<!-- ── Home dashboard ──────────────────────────────────────── -->
<div id="home-main">
  <div id="home-left">
    <div id="home-sky">
      <div id="home-sky-head">
        <span id="home-sky-title" data-i18n="skyNowTitle">Небо сейчас</span>
        <button id="home-sky-place" type="button">📍</button>
        <span id="home-sky-live"><span class="live-dot"></span>live</span>
      </div>
      <div id="home-sky-geo">
        <input type="text" id="homeSkyPlaceInput" data-i18n-placeholder="cityPlaceholder" placeholder="Начните вводить город…" autocomplete="off">
        <div id="home-sky-geo-dd"></div>
      </div>
      <div id="home-sky-chart"></div>
      <div id="home-sky-info">…</div>
    </div>
    <div id="home-events">
      <div class="home-block-title" data-i18n="homeEvents">События</div>
      <div id="home-events-list"></div>
    </div>
  </div>
  <div id="home-right">
    <div id="home-toolbar">
      <input type="text" id="home-search" data-i18n-placeholder="homeSearchPlaceholder" placeholder="Поиск по имени или городу…" autocomplete="off">
      <button id="newChartBtn" type="button" data-i18n="newChart">+ Новая карта</button>
    </div>
    <div id="home-groups"></div>
    <div id="home-charts">
      <div id="home-charts-list"></div>
    </div>
  </div>
</div>

</div><!-- /#page-body -->

<!-- ── Layout V2 ──────────────────────────────────────────────────────── -->
<div id="layout-v2">
  <div id="v2-top">
    <div id="v2-control-panel">
      <div id="v2-panel-head">
        <img src="Aspectus%20logo.png" id="v2-logo" alt="Aspectus">
        <div id="v2-chart-info">
          <div id="v2-chart-info-top">
            <span id="v2-chart-name"></span>
            <button class="v2-icon-btn" id="v2-edit-btn" title="Редактировать данные">✎</button>
            <button class="v2-icon-btn" id="v2-save-btn" title="Сохранить карту">💾</button>
            <span id="save-confirm"></span>
          </div>
          <span id="v2-chart-date"></span>
          <span id="v2-chart-place"></span>
          <span id="v2-case-type"></span>
          <select id="v2-house-sys" title="Система домов"></select>
          <div id="v2-outcome">
            <button class="outcome-chip" data-outcome="yes" data-i18n="outcomeYes">Сбылся</button>
            <button class="outcome-chip" data-outcome="no" data-i18n="outcomeNo">Нет</button>
            <button class="outcome-chip" data-outcome="partial" data-i18n="outcomePartial">Частично</button>
          </div>
        </div>
        <div id="v2-bottom-row">
          <button class="v2-icon-btn" id="v2-settings-btn" title="Настройки">⚙︎</button>
          <button class="v2-icon-btn" id="v2-exit-btn" title="Обычный вид">↩</button>
        </div>
      </div>
      <!-- Синастрия: две отдельные плашки данных (по одной на карту) -->
      <div id="v2-syn-subjects">
        <div class="v2-syn-card" data-syn="a">
          <span class="v2-syn-card-role" data-i18n="synSubjectA">Первый человек</span>
          <div class="v2-syn-card-top">
            <span class="v2-syn-card-name"></span>
            <button class="v2-icon-btn v2-syn-edit" data-syn="a" title="Редактировать данные">✎</button>
            <button class="v2-icon-btn v2-syn-save" data-syn="a" title="Сохранить">💾</button>
          </div>
          <span class="v2-syn-card-date"></span>
          <span class="v2-syn-card-place"></span>
        </div>
        <div class="v2-syn-card" data-syn="b">
          <span class="v2-syn-card-role" data-i18n="synSubjectB">Второй человек</span>
          <div class="v2-syn-card-top">
            <span class="v2-syn-card-name"></span>
            <button class="v2-icon-btn v2-syn-edit" data-syn="b" title="Редактировать данные">✎</button>
            <button class="v2-icon-btn v2-syn-save" data-syn="b" title="Сохранить">💾</button>
          </div>
          <span class="v2-syn-card-date"></span>
          <span class="v2-syn-card-place"></span>
        </div>
        <span id="v2-syn-case-type"></span>
        <span id="v2-syn-save-confirm"></span>
      </div>
      <div class="v2-ctrl-sep"></div>
      <div id="v2-panel-nav">
        <div class="v2-panel-cap" data-i18n="momentTitle">Момент</div>
        <div id="v2-navmode-row">
          <button class="v2-navmode-btn active" data-v2navmode="date" data-i18n="navModeDate">Дата</button>
          <button class="v2-navmode-btn" data-v2navmode="time" data-i18n="navModeTime">Время</button>
        </div>
        <button id="v2-nav-date-lbl" style="display:none">
          <span id="v2-nav-date-text"></span>
          <input type="date" id="nav-date-input" tabindex="-1">
        </button>
        <div class="v2-nav-row">
          <button class="v2-nav-btn" data-nav="prev-year">◀◀◀</button>
          <button class="v2-nav-btn" data-nav="next-year">▶▶▶</button>
        </div>
        <div class="v2-nav-row">
          <button class="v2-nav-btn" data-nav="prev-month">◀◀</button>
          <button class="v2-nav-btn" data-nav="next-month">▶▶</button>
        </div>
        <div class="v2-nav-row">
          <button class="v2-nav-btn" data-nav="prev-day">◀</button>
          <button class="v2-nav-btn" data-nav="next-day">▶</button>
        </div>
        <button class="v2-nav-btn v2-today-btn" data-nav="today">↺</button>
      </div>
      <div id="v2-snap-panel">
        <div id="v2-snap-head">
          <span id="v2-snap-title" data-i18n="snapshotsTitle">Снимки</span>
          <button id="v2-snap-add" type="button" title="Сохранить момент">+</button>
        </div>
        <div id="v2-snap-list"></div>
      </div>
      <div class="v2-ctrl-spacer"></div>
    </div>
    <div id="v2-chart-area">
      <div class="panel-head">
        <div class="panel-tabs" id="chart-mode-tabs"></div>
        <div class="panel-head-actions">
          <button class="panel-head-btn" id="chart-menu-btn" data-i18n-title="rpPanelMenu" title="Меню панели">☰</button>
        </div>
      </div>
      <div id="chart-dropdown"></div>
      <button id="v2-chart-expand-btn" title="Развернуть карту">⤢</button>
      <div id="chart-block"></div>
    </div>
    <div id="v2-aspect-panel">
      <div class="panel-head">
        <div class="panel-tabs" id="rp-tabs"></div>
        <div class="panel-head-actions">
          <button class="panel-head-btn" id="rp-add-btn" data-i18n-title="rpAddWidget" title="Добавить виджет">+</button>
          <button class="panel-head-btn" id="rp-menu-btn" data-i18n-title="rpPanelMenu" title="Меню панели">☰</button>
        </div>
      </div>
      <div id="rp-dropdown"></div>
      <div id="right-info-content" class="rp-grades" style="display:none">
        <table id="info-table">
          <tbody id="tableBody"></tbody>
        </table>
        <div id="aspect-grid"></div>
        <div id="dignities-view"></div>
        <div id="aspflow-view"></div>
      </div>
      <div id="v2-notes-view">
        <div id="notes-panel-head">
          <span id="notes-panel-title" data-i18n="panelTabNotes">Заметки</span>
          <button id="notes-panel-close" title="Закрыть">✕</button>
        </div>
        <div id="notes-inner">
        <div id="notes-msg"></div>
        <div id="notes-list-screen">
          <div id="notes-list"></div>
          <button id="note-add-btn" data-i18n="noteNew">+ Новая заметка</button>
        </div>

// «Большая тройка» — Солнце / Луна / ASC глифами; Луна и ASC только при известном времени
function computeBigThree(c) {
  if (!swe || !c.birth_date) return null;
  const key = `${c.id}|${c.birth_date}|${c.birth_time}|${c.lat}|${c.lon}|${c.utc_offset}`;
  if (_big3Cache.has(key)) return _big3Cache.get(key);
  let out = null;
  try {
    const [y, m, d] = c.birth_date.split('-').map(Number);
    const hasTime = !!c.birth_time;
    const [hr, mn] = (c.birth_time ?? '12:00').split(':').map(Number);
    const jd = swe.julday(y, m, d, hr + mn / 60 - (c.utc_offset ?? 0));
    const flags = swe.SEFLG_SWIEPH ?? 2;
    const signOf = lon => SIGNS[Math.floor((((lon % 360) + 360) % 360) / 30)];
    const parts = ['☉︎' + signOf(swe.calc_ut(jd, 0, flags)[0])];
    if (hasTime) {
      parts.push('☽︎' + signOf(swe.calc_ut(jd, 1, flags)[0]));
      if (isFinite(c.lat) && isFinite(c.lon) && c.lat !== null && c.lon !== null) {
        const asc = Array.from(swe.houses(jd, c.lat, c.lon, 'P').ascmc)[0];
        parts.push('As' + signOf(asc));
      }
    }
    out = parts.join(' ');
  } catch { out = null; }
  _big3Cache.set(key, out);
  return out;
}

function positionSettingsDropdown(anchorBtn) {
  const dd = document.getElementById('settings-dropdown');
  const r = anchorBtn.getBoundingClientRect();
  let top = r.bottom + 4;
  if (top + 220 > window.innerHeight - 8) top = r.top - 220 - 4;
  dd.style.top = Math.max(8, top) + 'px';
  if (r.left > window.innerWidth / 2) {
    // Button on the right half — right-align dropdown to button
    dd.style.left = 'auto';
    dd.style.right = Math.max(8, window.innerWidth - r.right) + 'px';
  } else {
    // Button on the left half — left-align dropdown to button
    dd.style.right = 'auto';
    dd.style.left = Math.max(8, r.left) + 'px';
  }
}

function openSettingsDropdown(anchorBtn, e) {
  if (e) e.stopPropagation();
  const isOpen = document.body.classList.toggle('settings-open');

function openFolderPicker(anchorBtn, currentFolder, onPick) {
  if (_fpClose) _fpClose();

  const folders = [...new Set(_allCharts.map(c => c.folder).filter(Boolean))];

  _fp.innerHTML = '';

  // Existing folders
  folders.forEach(name => {

    item.textContent = '📁 ' + name;

  const inp = document.createElement('input');

  const confirm = () => { const v = inp.value.trim(); if (v) { onPick(v); close(); } };
  ok.addEventListener('click', confirm);
  inp.addEventListener('keydown', e => { if (e.key === 'Enter') confirm(); if (e.key === 'Escape') close(); });
  row.append(inp, ok);

function sunSignFromDate(dateStr) {
  if (!dateStr) return 99;
  const [, m, d] = dateStr.split('-').map(Number);
  const md = m * 100 + d;
  if (md >= 321 && md <= 419) return 0;
  if (md >= 420 && md <= 520) return 1;
  if (md >= 521 && md <= 620) return 2;
  if (md >= 621 && md <= 722) return 3;
  if (md >= 723 && md <= 822) return 4;
  if (md >= 823 && md <= 922) return 5;
  if (md >= 923 && md <= 1022) return 6;
  if (md >= 1023 && md <= 1121) return 7;
  if (md >= 1122 && md <= 1221) return 8;
  if (md >= 1222 || md <= 119) return 9;
  if (md >= 120 && md <= 218) return 10;
  return 11;
}

function sortCharts(data) {
  return [...data].sort((a, b) => {
    if (_chartsSort === 'name') return (a.name ?? '').localeCompare(b.name ?? '', 'ru');
    if (_chartsSort === 'birth') return (a.birth_date ?? '').localeCompare(b.birth_date ?? '');
    if (_chartsSort === 'sign') return sunSignFromDate(a.birth_date) - sunSignFromDate(b.birth_date);
    return new Date(b.created_at) - new Date(a.created_at);
  });
}

function makeChartItem(c) {

    </div>
    <button class="chart-folder-btn" title="Папка">📁</button>
    <button class="chart-del" title="${tr('deleteTitle')}">🗑</button>`;
  div.querySelector('.chart-item-info').addEventListener('click', () => {
    loadChartFromDB(c); closeChartsPanel();
  });
  div.querySelector('.chart-folder-btn').addEventListener('click', async e => {
    e.stopPropagation();

async function loadChartsList() {
  const list = document.getElementById('charts-list');
  list.innerHTML = `<div class="charts-empty">${tr('chartsLoading')}</div>`;
  const { data, error } = await sb.from('charts').select('*').order('created_at', { ascending: false });
  if (error || !data?.length) {
    list.innerHTML = `<div class="charts-empty">${tr('noSavedCharts')}</div>`;
    return;
  }

  _allCharts = data;
  const filtered = _chartsSearch
    ? data.filter(c => (c.name ?? '').toLowerCase().includes(_chartsSearch) || (c.city ?? '').toLowerCase().includes(_chartsSearch))
    : data;

  if (!filtered.length) {
    list.innerHTML = `<div class="charts-empty">Ничего не найдено</div>`;
    return;
  }

  const sorted = sortCharts(filtered);
  list.innerHTML = '';

  const folders = new Map();
  const noFolder = [];
  for (const c of sorted) {
    if (c.folder) {
      if (!folders.has(c.folder)) folders.set(c.folder, []);
      folders.get(c.folder).push(c);
    } else {
      noFolder.push(c);
    }
  }

  for (const [name, charts] of folders) {
    const group = document.createElement('div');
    group.className = 'folder-group' + (_collapsedFolders.has(name) ? ' collapsed' : '');
    const hdr = document.createElement('div');
    hdr.className = 'folder-hdr';
    hdr.innerHTML = `<span class="folder-arrow">▼</span> 📁 ${name} <span class="folder-count">${charts.length}</span>`;
    hdr.addEventListener('click', () => {
      const collapsed = group.classList.toggle('collapsed');
      if (collapsed) _collapsedFolders.add(name); else _collapsedFolders.delete(name);
      localStorage.setItem('collapsedFolders', JSON.stringify([..._collapsedFolders]));
    });
    const items = document.createElement('div');
    items.className = 'folder-items';
    charts.forEach(c => items.appendChild(makeChartItem(c)));
    group.append(hdr, items);
    list.appendChild(group);
  }

  noFolder.forEach(c => list.appendChild(makeChartItem(c)));
}

function loadChartFromDB(c) {
  // Уже открыта в одной из вкладок — просто переключиться
  const ex = tabs.findIndex(t => t.chartId && t.chartId === c.id);
  if (ex >= 0) { switchTab(ex); markChartOpened(c); return; }
  if (c.case_type === 'synastry') { openSynastryTab(c); return; }
  markChartOpened(c);
  writeFormFields(rowToFields(c));
  openNewTabFromForm(c.id ?? null, c.case_type ?? 'natal', c.outcome ?? null, c.snapshots ?? null, c.house_system ?? null);
}

// Открыть сохранённую синастрию (композитный кейс) в новой вкладке из c.refs
function openSynastryTab(c) {
  const ex = tabs.findIndex(t => t.chartId && t.chartId === c.id);
  if (ex >= 0) { switchTab(ex); markChartOpened(c); return; }
  const refs = c.refs;
  if (!refs || !refs.a || !refs.b) { console.warn('synastry: нет refs у', c.id); return; }
  if (!swe) { _pendingChartLoad = c; return; }
  if (!dashboardOpen) snapshotActiveTab();
  markChartOpened(c);
  const t = { uid: ++_tabUid, chartId: c.id ?? null, fields: null, header: null, st: null,
              type: 'synastry', outcome: null, snapshots: [], refs };
  tabs.push(t);
  activeTab = tabs.length - 1;
  dashboardOpen = false;
  currentTransitJD = null; chartExpanded = false; layout2TlState = 0; tlYearScale = false;
  synView = 'both';
  if (!paintSynastryFromRefs(t)) { tabs.pop(); activeTab = tabs.length - 1; console.warn('synastry: расчёт не удался'); return; }
  t.header = readHeader();
  t.st     = captureState();
  resetNotesState();
  updateHashForActiveTab(true);
  persistTabs();
  renderTabBar();
}

// Отметка «последнего открытия» для сортировки базы (ошибки игнорируем —
// до миграции колонки last_opened_at может не быть)
function markChartOpened(c) {
  if (!c.id || !currentUser) return;
  const ts = new Date().toISOString();
  const row = _homeCharts.find(x => x.id === c.id);
  if (row) row.last_opened_at = ts;
  sb.from('charts').update({ last_opened_at: ts }).eq('id', c.id)
    .then(({ error }) => { if (error) console.warn('last_opened_at:', error.message); });
}

// Открыть карту: newTab=false — в текущей вкладке (replace), newTab=true — в новой.
// Если карта уже открыта в какой-то вкладке — просто фокус на неё.
function openChartInTab(c, newTab = false) {
  const ex = tabs.findIndex(t => t.chartId && t.chartId === c.id);
  if (ex >= 0) { switchTab(ex); markChartOpened(c); return; }
  if (c.case_type === 'synastry') { openSynastryTab(c); return; }   // композит — всегда своя вкладка
  if (newTab || dashboardOpen || activeTab < 0 || !tabs[activeTab]) {
    loadChartFromDB(c);            // нет активной вкладки или просили новую — создаём
    return;
  }
  // Заменить содержимое текущей активной вкладки
  markChartOpened(c);
  writeFormFields(rowToFields(c));
  currentChartId = c.id ?? null;
  currentTransitJD = null; chartExpanded = false; layout2TlState = 0; tlYearScale = false;
  const t = tabs[activeTab];
  delete t.kind;             // вкладка-палитра становится вкладкой кейса
  t.type    = c.case_type ?? 'natal';   // до расчёта: от типа зависит система домов
  t.houseSystem = c.house_system ?? null;
  t.outcome = c.outcome ?? null;
  t.snapshots = Array.isArray(c.snapshots) ? c.snapshots : [];   // варианты элекции
  if (!computeAndRenderNatal()) return;
  if (t.type === 'horary') applyHoraryRpPreset();
  else if (t.type === 'election') applyElectionRpPreset();
  t.chartId = c.id ?? null;
  t.fields  = readFormFields();
  t.header  = readHeader();
  t.st      = captureState();
  resetNotesState();
  updateHashForActiveTab(false);
  persistTabs();
  renderTabBar();
}

  folderItem.className = 'ctx-item';
  folderItem.textContent = tr('addToFolderTitle');
  folderItem.addEventListener('click', () => {

  delItem.addEventListener('click', () => { hideChartCtxMenu(); deleteChartFromCtx(c); });

  if (px + r.width  > window.innerWidth  - 8) px = window.innerWidth  - r.width  - 8;

}
function hideChartCtxMenu() {
  document.getElementById('chart-ctx-menu').classList.remove('open');
}
document.addEventListener('click', e => {
  if (Date.now() - _ctxOpenedAt < 300) return;          // не закрывать тем же кликом/тапом
  if (!e.target.closest('#chart-ctx-menu')) hideChartCtxMenu();
});
document.addEventListener('scroll', hideChartCtxMenu, true);
window.addEventListener('resize', hideChartCtxMenu);

// Навесить контекстное меню (правый клик + долгий тап) на строку карты
function attachChartCtxMenu(div, c) {
  div.addEventListener('contextmenu', e => {
    e.preventDefault();
    showChartCtxMenu(e.clientX, e.clientY, c);
  });
  let lpTimer = null;
  div.dataset.lpFired = '';
  div.addEventListener('touchstart', e => {
    div.dataset.lpFired = '';
    const t = e.touches[0];
    lpTimer = setTimeout(() => {
      div.dataset.lpFired = '1';
      showChartCtxMenu(t.clientX, t.clientY, c);
    }, 500);
  }, { passive: true });
  const cancelLP = () => { if (lpTimer) { clearTimeout(lpTimer); lpTimer = null; } };
  div.addEventListener('touchmove', cancelLP, { passive: true });
  div.addEventListener('touchend', e => {
    cancelLP();
    if (div.dataset.lpFired) e.preventDefault();   // подавить клик после долгого тапа
  });
}

async function renameChartFromCtx(c) {
  const name = prompt(tr('renamePrompt'), c.name ?? '');
  if (name === null) return;
  const trimmed = name.trim();
  if (!trimmed || trimmed === c.name) return;
  c.name = trimmed;
  const { error } = await sb.from('charts').update({ name: trimmed }).eq('id', c.id);
  if (error) { console.warn('rename failed:', error.message); return; }
  for (const t of tabs) {
    if (t.chartId === c.id) {
      if (t.header) t.header.name = trimmed;
      if (t.fields)  t.fields.name  = trimmed;
    }
  }
  const activeT = tabs[activeTab];
  if (activeT && activeT.chartId === c.id) {
    document.getElementById('v2-chart-name').textContent = trimmed;
  }
  renderTabBar();
  loadHomeCharts();
  loadChartsList();
}

async function deleteChartFromCtx(c) {
  if (!confirm(tr('deleteConfirm', { name: c.name }))) return;
  await sb.from('charts').delete().eq('id', c.id);
  const ex = tabs.findIndex(t => t.chartId === c.id);
  if (ex >= 0) closeTab(ex);
  loadHomeCharts();
  loadChartsList();
}

    birth_time: document.getElementById('birthTime').value  || null,
    city:       document.getElementById('birthPlace').value || null,
    lat:        parseFloat(document.getElementById('lat').value)     || null,
    lon:        parseFloat(document.getElementById('lonVal').value)  || null,
    utc_offset: parseFloat(document.getElementById('utcOff').value)  || null,
    timezone:   detectedTimezone ?? null,
  };
  let res = await sb.from('charts').insert({ ...baseRow, ...extra }).select().single();
  if (res.error && Object.keys(extra).length) {
    console.warn('charts insert with extras failed, retrying base row:', res.error.message);
    res = await sb.from('charts').insert(baseRow).select().single();
  }
  if (res.error) return res;
  const data = res.data;
  // Сохранённая карта сразу становится «открытой» — заметки доступны без переоткрытия
  currentChartId = data.id;
  if (activeTab >= 0 && tabs[activeTab]) { tabs[activeTab].chartId = data.id; persistTabs(); }
  const newHash = `#chart/${data.id}`;
  if (window.location.hash !== newHash) {
    history.pushState({ chartId: data.id }, '', newHash);
  }
  if (notesPanelOpen) openNotesTab();
  return res;
}

// Доп-колонки для сохранения по типу кейса
function caseExtraColumns(t) {
  const type = t?.type ?? 'natal';
  const extra = { case_type: type };
  // Фактическая система домов пишется в кейс всегда (кроме композитов):
  // смена глобального дефолта не должна тихо пересчитать сохранённые карты
  if (type !== 'synastry') extra.house_system = houseSysFor(t);
  if (type === 'horary') {
    extra.question = document.getElementById('chartName').value.trim() || null;
    extra.folder   = tr('horaryFolder');
    if (t?.outcome) extra.outcome = t.outcome;
  } else if (type === 'election') {
    extra.question = document.getElementById('chartName').value.trim() || null;  // что подбираем
    extra.folder   = tr('electionFolder');
    extra.snapshots = t?.snapshots ?? [];   // варианты (jsonb)
  } else if (type === 'synastry') {
    // Композитный кейс: ядро пустое, имя = «A × B», субъекты в refs (jsonb)
    extra.name   = synastryTitle(t?.refs);
    extra.folder = tr('synastryFolder');
    extra.refs   = t?.refs ?? null;
  }
  return extra;
}

// Заголовок синастрии: «Имя A × Имя B»
function synastryTitle(refs) {
  const a = refs?.a?.name || 'A', b = refs?.b?.name || 'B';
  return `${a} × ${b}`;
}

async function openNotesTab() {

  if (notesChartId === currentChartId && notesCache) { renderNotesList(); notesView.classList.remove('msg-only'); return; }

    .eq('chart_id', chartId).order('updated_at', { ascending: false });
  if (error) { console.error('notes load:', error); showNotesMsg(tr('notesError')); return; }

  notesCache = data;
  notesChartId = chartId;
  notesView.classList.remove('msg-only');

  if (notesCache.length === 1) openNoteEditor(notesCache[0]);

function renderNotesList() {
  const list = document.getElementById('notes-list');
  list.innerHTML = '';
  if (!notesCache?.length) {
    const empty = document.createElement('div');
    empty.id = 'notes-empty';
    empty.textContent = tr('notesEmpty');
    list.appendChild(empty);
    return;
  }
  for (const n of notesCache) {
    const item = document.createElement('div');
    item.className = 'note-item';
    const info = document.createElement('div');
    info.className = 'note-item-info';
    const title = document.createElement('div');
    title.className = 'note-item-title';
    title.textContent = noteDisplayTitle(n);
    const meta = document.createElement('div');
    meta.className = 'note-item-meta';
    meta.textContent = noteDateStr(n);
    info.append(title, meta);
    const del = document.createElement('button');
    del.className = 'note-del';
    del.title = tr('deleteTitle');
    del.textContent = '🗑';
    item.append(info, del);
    item.addEventListener('click', () => openNoteEditor(n));
    del.addEventListener('click', async e => {
      e.stopPropagation();
      if (!confirm(tr('noteDeleteConfirm', { name: noteDisplayTitle(n) }))) return;
      const { error } = await sb.from('notes').delete().eq('id', n.id);
      if (error) { console.error('note delete:', error); return; }
      notesCache = notesCache.filter(x => x.id !== n.id);
      if (currentNoteId === n.id) currentNoteId = null;
      renderNotesList();
    });
    list.appendChild(item);
  }

// Автосохранение: debounce 1200 мс после последнего ввода
function scheduleNoteSave() {

  clearTimeout(_noteSaveTimer);
  _noteSaveTimer = setTimeout(saveCurrentNote, 1200);
}

async function saveCurrentNote() {
  clearTimeout(_noteSaveTimer);
  if (!_noteDirty || !currentNoteId) return;
  _noteDirty = false;
  const id    = currentNoteId;
  const title = document.getElementById('note-title').value.trim() || null;

  const { error } = await sb.from('notes').update({ title, body, updated_at }).eq('id', id);
  if (error) { _noteDirty = true; console.error('note save:', error); }
}

function flushNoteSave() { if (_noteDirty) saveCurrentNote(); }

  const title = document.getElementById('note-title').value.trim();
  const body  = document.getElementById('note-body').value;
  const chartName = document.getElementById('v2-chart-name').textContent.trim();

// ── Мини-рендерер markdown ────────────────────────────────────────────────────
// Заголовки #..###, **жирный**, *курсив*, `код`, списки -/1., > цитата, ---, [ссылки](http…)
// Сначала экранируем HTML, потом подставляем теги — XSS невозможен.

function escapeHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function mdInline(s) {
  return s
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/\*([^*]+)\*/g, '<em>$1</em>')
    .replace(/\[([^\]]+)\]\((https?:\/\/[^)\s]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
}

function renderMarkdown(src) {
  const out = [];
  let listTag = null, para = [];
  const closeList = () => { if (listTag) { out.push(`</${listTag}>`); listTag = null; } };
  const closePara = () => { if (para.length) { out.push('<p>' + para.join('<br>') + '</p>'); para = []; } };
  for (const raw of (src || '').split('\n')) {
    const line = raw.trimEnd();
    let m;
    if (!line.trim()) { closePara(); closeList(); continue; }
    if (m = line.match(/^(#{1,3})\s+(.*)/)) {
      closePara(); closeList();
      const lvl = m[1].length;
      out.push(`<h${lvl}>${mdInline(escapeHtml(m[2]))}</h${lvl}>`);
    } else if (/^(-{3,}|\*{3,})$/.test(line)) {
      closePara(); closeList();
      out.push('<hr>');
    } else if (m = line.match(/^>\s?(.*)/)) {
      closePara(); closeList();
      out.push(`<blockquote>${mdInline(escapeHtml(m[1]))}</blockquote>`);
    } else if (m = line.match(/^[-*]\s+(.*)/)) {
      closePara();
      if (listTag !== 'ul') { closeList(); out.push('<ul>'); listTag = 'ul'; }
      out.push(`<li>${mdInline(escapeHtml(m[1]))}</li>`);
    } else if (m = line.match(/^\d+[.)]\s+(.*)/)) {
      closePara();
      if (listTag !== 'ol') { closeList(); out.push('<ol>'); listTag = 'ol'; }
      out.push(`<li>${mdInline(escapeHtml(m[1]))}</li>`);
    } else {
      closeList();
      para.push(mdInline(escapeHtml(line)));
    }
  }
  closePara(); closeList();
  return out.join('\n');
}

let _synEditSlot     = null;   // слот ('a'|'b'), редактируемый через #form-wrap, либо null

(async () => {
  try {
    swe = new SwissEph();
    await swe.initSwissEph();
    // Встроенные Swiss-файлы покрывают ~1800–2400 CE; для дат вне диапазона calc_ut
    // бросает исключение. Перехватываем и пересчитываем эфемеридой Мошье
    // (3000 BCE–3000 CE, без файлов данных). Обёртка покрывает все места вызова.
    {
      const _rawCalcUt = swe.calc_ut.bind(swe);
      const _SWIEPH = swe.SEFLG_SWIEPH ?? 2, _MOSEPH = swe.SEFLG_MOSEPH ?? 4;
      swe.calc_ut = (jd, id, flags) => {
        try { return _rawCalcUt(jd, id, flags); }
        catch (e) { return _rawCalcUt(jd, id, ((flags & ~_SWIEPH) | _MOSEPH)); }
      };
    }
    sweReady = true;
    setStatus(tr('ready'));
    document.getElementById('calcBtn').disabled = false;
    // Главный экран: теперь можно считать небо, большую тройку и транзиты
    startHomeSky();
    if (_homeCharts.length) { renderHomeList(); renderHomeEvents(); }
    // Восстановленные вкладки ждали инициализации — теперь отрисуем активную
    if (_pendingTabPaint) {
      _pendingTabPaint = false;
      if (!dashboardOpen && activeTab >= 0 && tabs[activeTab]) showTab(activeTab);
    }
    if (_pendingChartLoad) {
      const c = _pendingChartLoad;
      _pendingChartLoad = null;
      loadChartFromDB(c);
    }
  } catch (e) {
    setStatus(tr('sweError') + e.message);
  }
})();

// ── UTC offset helper ─────────────────────────────────────────────────────────

function getUTCOffsetHours(tzName, date) {
  const fmt = new Intl.DateTimeFormat('en', {
    timeZone: tzName, year: 'numeric', month: '2-digit', day: '2-digit',
    hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false,
  });
  const parts = Object.fromEntries(fmt.formatToParts(date).map(p => [p.type, p.value]));
  const localAsUTC = Date.UTC(
    +parts.year, +parts.month - 1, +parts.day,
    +parts.hour % 24, +parts.minute, +parts.second
  );
  return Math.round((localAsUTC - date.getTime()) / 36000) / 100;
}

function applyTimezoneOffset() {
  if (!detectedTimezone) return;
  const dateStr = document.getElementById('birthDate').value;
  const date = dateStr ? new Date(dateStr + 'T12:00:00Z') : new Date();
  try { document.getElementById('utcOff').value = getUTCOffsetHours(detectedTimezone, date); } catch {}
}

document.getElementById('birthDate').addEventListener('change', applyTimezoneOffset);

// ── Geocoding + Autocomplete ──────────────────────────────────────────────────

let _geoSynced = false;   // false — координаты в полях не подтверждены под текущий текст места

async function applyGeoResult(item) {
  const lat = parseFloat(item.lat), lon = parseFloat(item.lon);
  const parts = item.display_name.split(',');
  const shortName = parts.slice(0, 2).join(',').trim();
  document.getElementById('birthPlace').value = shortName;
  _geoSynced = true;
  document.getElementById('lat').value    = lat.toFixed(4);
  document.getElementById('lonVal').value = lon.toFixed(4);
  closeGeoDropdown();
  setStatus(tr('detectingTimezone'));
  const utcOffEl = document.getElementById('utcOff');
  utcOffEl.classList.add('tz-pending');
  try {
    const ctrl = new AbortController();
    const tid  = setTimeout(() => ctrl.abort(), 6000);
    const tz   = await fetch(`https://timeapi.io/api/timezone/coordinate?latitude=${lat.toFixed(4)}&longitude=${lon.toFixed(4)}`, { signal: ctrl.signal });
    clearTimeout(tid);
    const tzd  = await tz.json();
    const zone = tzd.timeZone;
    if (!zone) throw new Error('no timeZone field');
    detectedTimezone = zone;
    applyTimezoneOffset();
    setStatus(`${shortName}  •  ${detectedTimezone}`);
  } catch {
    setStatus(`${shortName} (${tr('timezoneNotDetected')})`);
  } finally {
    utcOffEl.classList.remove('tz-pending');
  }
}

function closeGeoDropdown() {
  document.getElementById('geo-dropdown').style.display = 'none';
}

function showGeoDropdown(items) {
  const dd = document.getElementById('geo-dropdown');
  if (!items.length) { closeGeoDropdown(); return; }
  dd.innerHTML = '';
  for (const item of items) {
    const parts   = item.display_name.split(',');
    const main    = parts[0].trim();
    const sub     = parts.slice(1, 3).join(',').trim();
    const div     = document.createElement('div');
    div.className = 'geo-item';
    div.innerHTML = `<div class="geo-main">${main}</div><div class="geo-sub">${sub}</div>`;
    div.addEventListener('mousedown', e => { e.preventDefault(); applyGeoResult(item); });
    dd.appendChild(div);
  }
  dd.style.display = 'block';
}

let _geoTimer = null;
document.getElementById('birthPlace').addEventListener('input', () => {
  _geoSynced = false;   // текст изменился — координаты в полях больше не гарантированно соответствуют ему
  clearTimeout(_geoTimer);
  const q = document.getElementById('birthPlace').value.trim();
  if (q.length < 2) { closeGeoDropdown(); return; }
  _geoTimer = setTimeout(async () => {
    try {
      const r = await fetch(
        `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=5`,
        { headers: { 'Accept-Language': `${currentLang},en` } }
      );
      showGeoDropdown(await r.json());
    } catch { closeGeoDropdown(); }
  }, 380);
});

// Один результат по тексту поля — общий фолбэк для Enter и для потери фокуса без выбора из списка
async function geocodePlaceFallback() {
  const q = document.getElementById('birthPlace').value.trim();
  if (!q) return;
  setStatus(tr('searching'));
  try {
    const r = await fetch(
      `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=1`,
      { headers: { 'Accept-Language': `${currentLang},en` } }
    );
    const d = await r.json();
    if (d.length) applyGeoResult(d[0]);
    else setStatus(tr('placeNotFound'));
  } catch { setStatus(tr('geocodingError')); }
}

// Потеря фокуса без явного выбора места — координаты рискуют остаться от предыдущего
// ввода (пример бага: текст «Прага», а lat/lon от прошлого запроса «Берлин»).
// Досчитываем по тексту поля тем же способом, что и Enter.
document.getElementById('birthPlace').addEventListener('blur', () => {
  setTimeout(() => {
    closeGeoDropdown();
    if (!_geoSynced) geocodePlaceFallback();
  }, 180);
});

// Enter key → pick first suggestion or search manually
document.getElementById('birthPlace').addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  e.preventDefault();
  const first = document.querySelector('#geo-dropdown .geo-item');
  if (first) { first.dispatchEvent(new MouseEvent('mousedown')); return; }

});

    lat:       document.getElementById('lat').value,
    lon:       document.getElementById('lonVal').value,
    utcOff:    document.getElementById('utcOff').value,
    timezone:  detectedTimezone ?? null,
  };
}
function writeFormFields(f) {
  if (!f) return;
  document.getElementById('chartName').value  = f.name      ?? '';
  document.getElementById('birthDate').value  = f.birthDate ?? '';
  document.getElementById('birthTime').value  = f.birthTime ?? '';
  document.getElementById('birthPlace').value = f.city      ?? '';
  document.getElementById('lat').value        = f.lat       ?? '';
  document.getElementById('lonVal').value     = f.lon       ?? '';
  document.getElementById('utcOff').value     = f.utcOff    ?? '';
  detectedTimezone = f.timezone ?? null;
}
function rowToFields(c) {
  return {
    name: c.name ?? '', birthDate: c.birth_date ?? '', birthTime: c.birth_time ?? '',
    city: c.city ?? '', lat: c.lat ?? '', lon: c.lon ?? '',
    utcOff: c.utc_offset ?? '', timezone: c.timezone ?? null,
  };
}
function readHeader() {
  return {
    name:     document.getElementById('v2-chart-name').textContent,
    dateTime: document.getElementById('v2-chart-date').textContent,
    city:     document.getElementById('v2-chart-place').textContent,
  };
}

// Снимок всех «карточных» глобалов в объект (с глубокими копиями коллекций)
// ── Контекст кейса (см. WORKSPACE_CONCEPT.md §5, MIGRATION.md инкр.1) ─────────
// Структурированная форма состояния кейса. Глобалы остаются рантаймом; контекст —
// сериализованный снимок. Форма:
//   { subjects:[{ role, chartId, data }], layers:[{ method, driven }], T, ui:{…} }
// subjects — самосущие карты (сейчас всегда одна, role:'natal'); layers — производные
// (transit/progressed/direction; natal = пустой массив); T — ось времени (currentTransitJD).
function captureState() {
  return {
    subjects: [{ role: 'natal', chartId: currentChartId ?? null, data: natalData }],
    synastryB,   // субъект B (только в синастрии; иначе null)
    layers: currentMode === 'natal' ? [] : [{ method: currentMode, driven: true }],
    T: currentTransitJD,
    ui: {
      cachedTimeline,
      tlPastYears, tlFutureYears,
      expandedRows: new Set(expandedRows),
      fastCache: { ...fastCache },
      hiddenTPlants: new Set(hiddenTPlants),
      moonBandCollapsed, tlYearScale, chartExpanded, layout2TlState,
      rightPanelTab,
      rightPanelTabs: [...rightPanelTabs],
      chartModeTabs: [...chartModeTabs],
      synView,   // вид карты синастрии
    },
  };
}
function applyState(s) {
  const natal = s.subjects && s.subjects.find(x => x.role === 'natal');
  const layer = s.layers && s.layers[0];
  const u     = s.ui || {};
  natalData        = natal ? natal.data : null;
  synastryB        = s.synastryB ?? null;
  currentMode      = layer ? layer.method : 'natal';
  currentTransitJD = s.T;
  cachedTimeline   = u.cachedTimeline;
  tlPastYears      = u.tlPastYears;
  tlFutureYears    = u.tlFutureYears;
  expandedRows     = u.expandedRows;
  fastCache        = u.fastCache;
  hiddenTPlants    = u.hiddenTPlants;
  moonBandCollapsed = u.moonBandCollapsed;
  tlYearScale      = u.tlYearScale;
  chartExpanded    = u.chartExpanded;
  layout2TlState   = u.layout2TlState;
  rightPanelTabs   = sanitizeRpTabs(u.rightPanelTabs);
  rightPanelTab    = u.rightPanelTab || 'grades';
  chartModeTabs    = sanitizeChartModeTabs(u.chartModeTabs);
  synView          = u.synView || 'both';
}

function snapshotActiveTab() {
  if (activeTab < 0 || !tabs[activeTab]) return;
  if (tabs[activeTab].kind === 'palette') return;   // у палитры нет состояния кейса
  const t = tabs[activeTab];
  t.chartId = currentChartId;
  t.st      = captureState();
  // fields/header НЕ перечитываем из формы: при составлении новой карты форма
  // уже содержит её данные. Источник вкладки фиксируется при создании/правке.
}

// Привести классы/кнопки V2 к текущему layout-состоянию и показать карту
function applyLayout2Classes() {
  const v2 = document.getElementById('layout-v2');
  hideHome();
  hidePaletteView();
  v2.classList.add('v2-visible');
  v2.classList.remove(...V2_TL_STATES, 'tl-hidden');
  if (chartExpanded) {
    v2.classList.add('tl-hidden');
    document.getElementById('v2-chart-expand-btn').textContent = '⤡';
  } else {
    v2.classList.add(V2_TL_STATES[layout2TlState]);
    document.getElementById('v2-chart-expand-btn').textContent = '⤢';
  }
  document.getElementById('v2-tl-toggle').textContent = V2_TL_LABELS[layout2TlState];
  layout2Active = true;
}

// Полная перерисовка V2 из текущих глобалов (natalData уже выставлен)
function paintActiveChart() {
  applyLayout2Classes();
  applyRightPanelTab();
  applyChartModeTabs();
  // Синастрия: совмещённое биколесо A+B, без слоёв/таймлайна (§6)
  if (currentCaseType === 'synastry') {
    fillSynSubjectCards(tabs[activeTab]?.refs);
    renderSynastry();
    skyTlHost = null;
    return;
  }
  switchToMode(currentMode);
  renderHoraryBlock();
  if (currentCaseType === 'horary') { skyTlHost = null; return; }   // пресет хорара — без таймлайна
  if (currentCaseType === 'election') { renderElectionTimeline(); _electionSnapActive = null; renderElectionSnaps(); return; }
  skyTlHost = null;   // натал/прогностика — таймлайн к наталу, не source=sky
  if (cachedTimeline) {
    const snap = { ...cachedTimeline, jdCursor: currentTransitJD ?? computeJDNow() };
    requestAnimationFrame(() => requestAnimationFrame(() => renderTimeline(snap)));
  } else if (natalData) {
    computeAndRenderTimeline(natalData.planets);
  }
}

function renderTabBar() {
  const bar = document.getElementById('tab-bar');
  bar.innerHTML = '';
  tabs.forEach((t, i) => {
    const tab = document.createElement('div');
    tab.className = 'app-tab' + (!dashboardOpen && i === activeTab ? ' active' : '');
    tab.innerHTML = `<span class="app-tab-name"></span><button class="app-tab-close" title="Закрыть">✕</button>`;
    tab.querySelector('.app-tab-name').textContent =
      t.kind === 'palette' ? tr('paletteNewTab') : (t.header?.name || t.fields?.name || '—');
    tab.addEventListener('click', () => switchTab(i));
    tab.querySelector('.app-tab-close').addEventListener('click', e => {
      e.stopPropagation();
      closeTab(i);
    });
    bar.appendChild(tab);
  });
}

// Показать вкладку i без снапшота текущей (низкоуровневое)
function showTab(i) {
  const t = tabs[i];
  if (!t) return;
  activeTab = i;
  dashboardOpen = false;
  if (t.kind === 'palette') {
    showPaletteView();
    updateHashForActiveTab(false);
    renderTabBar();
    persistTabs();
    return;
  }
  hidePaletteView();
  writeFormFields(t.fields);
  currentChartId = t.chartId ?? null;
  setV2ChartInfo(t.header?.name, t.header?.dateTime, t.header?.city);
  applyCaseType(t.type);
  if (t.st) {
    applyState(t.st);
    paintActiveChart();
  } else {
    rebuildTabFromFields(t);   // ленивая вкладка после перезагрузки
  }
  if (notesChartId !== currentChartId) resetNotesState();
  if (notesPanelOpen) openNotesTab();   // панель открыта — перегрузить заметки новой карты
  updateHashForActiveTab(false);
  renderTabBar();
  persistTabs();
}

function switchTab(i) {
  if (i < 0 || i >= tabs.length) return;
  if (!dashboardOpen && i === activeTab) return;
  if (!dashboardOpen) snapshotActiveTab();
  showTab(i);
}

function closeTab(i) {
  if (i < 0 || i >= tabs.length) return;
  const wasShown = !dashboardOpen && i === activeTab;
  tabs.splice(i, 1);
  if (activeTab > i) activeTab--;
  else if (activeTab === i) activeTab = Math.min(i, tabs.length - 1);
  if (tabs.length === 0) {
    activeTab = -1;
    fullExitToHome();
    return;
  }
  persistTabs();
  if (wasShown) showTab(activeTab);
  else renderTabBar();
}

// Создать новую вкладку из текущей формы и построить карту
function openNewTabFromForm(chartId, caseType = 'natal', outcome = null, snapshots = null, houseSystem = null) {
  if (!dashboardOpen) snapshotActiveTab();
  const t = { uid: ++_tabUid, chartId: chartId ?? null, fields: null, header: null, st: null,
              type: caseType, outcome, snapshots: Array.isArray(snapshots) ? snapshots : [],
              houseSystem: houseSystem ?? null };
  tabs.push(t);
  activeTab = tabs.length - 1;
  dashboardOpen = false;
  currentChartId = chartId ?? null;
  // Свежая карта — дефолтный layout и «сегодня»
  currentTransitJD = null;
  chartExpanded = false;
  layout2TlState = 0;
  tlYearScale = false;
  if (!computeAndRenderNatal()) {
    tabs.pop();
    activeTab = tabs.length - 1;
    if (!tabs.length) { activeTab = -1; fullExitToHome(); }
    else { dashboardOpen = false; showTab(activeTab); }
    return false;
  }
  if (caseType === 'horary') applyHoraryRpPreset();
  else if (caseType === 'election') applyElectionRpPreset();
  t.fields  = readFormFields();
  t.header  = readHeader();
  t.chartId = currentChartId ?? null;
  t.st      = captureState();
  resetNotesState();
  updateHashForActiveTab(true);
  persistTabs();
  renderTabBar();
  return true;
}

// Показать дашборд, не закрывая вкладки
function goDashboard(push = true) {
  if (!tabs.length) { fullExitToHome(push); return; }
  if (!dashboardOpen) snapshotActiveTab();
  dashboardOpen = true;
  document.getElementById('layout-v2').classList.remove('v2-visible', 'tl-hidden', ...V2_TL_STATES);
  layout2Active = false;
  hidePaletteView();
  closeNotesPanel();
  resetNotesState();
  showHome();
  if (push) history.pushState('', document.title, window.location.pathname + window.location.search);
  persistTabs();
  renderTabBar();
}

// Полный выход на дашборд без вкладок
function fullExitToHome(push = true) {
  closeNotesPanel();
  resetNotesState();
  hidePaletteView();
  currentChartId = null;
  if (push) history.pushState('', document.title, window.location.pathname + window.location.search);
  document.getElementById('layout-v2').classList.remove('v2-visible', 'tl-hidden', ...V2_TL_STATES);
  showHome();
  natalData = null;
  cachedTimeline = null;
  layout2Active = false;
  chartExpanded = false;
  layout2TlState = 0;
  dashboardOpen = true;
  persistTabs();
  renderTabBar();
}

// ── Палитра: пустая вкладка «создать или открыть» (WORKSPACE_CONCEPT §8) ──────
// Вкладка с kind:'palette' не имеет кейса; выбор команды или карты превращает её
// во вкладку кейса (kind снимается). Snapshot/hash для палитры не пишутся.
let _paletteKb = 0;         // индекс подсвеченного элемента списка (клавиатура)
let _paletteCtorType = 'natal';   // тип кейса, выбранный командой-конструктором

function openPaletteTab() {
  if (!dashboardOpen && activeTab >= 0) snapshotActiveTab();
  tabs.push({ uid: ++_tabUid, kind: 'palette' });
  showTab(tabs.length - 1);
}

function showPaletteView() {
  hideHome();
  document.getElementById('layout-v2').classList.remove('v2-visible', 'tl-hidden', ...V2_TL_STATES);
  layout2Active = false;
  document.getElementById('palette-view').classList.add('open');
  const inp = document.getElementById('palette-search');
  inp.value = '';
  _paletteKb = 0;
  renderPaletteList();
  if (currentUser && !_homeCharts.length) loadHomeCharts().then(renderPaletteList);
  setTimeout(() => inp.focus(), 0);
}

function hidePaletteView() {
  document.getElementById('palette-view')?.classList.remove('open');
}

function paletteFiltered() {
  const q = document.getElementById('palette-search').value.trim().toLowerCase();
  let arr = _homeCharts;
  if (q) arr = arr.filter(c =>
    (c.name ?? '').toLowerCase().includes(q) || (c.city ?? '').toLowerCase().includes(q));
  return [...arr]
    .sort((a, b) => (b.pinned === true) - (a.pinned === true) || homeChartTs(b) - homeChartTs(a))
    .slice(0, 30);
}

function renderPaletteList() {
  const list = document.getElementById('palette-list');
  list.innerHTML = '';
  const empty = msg => {
    const d = document.createElement('div');
    d.className = 'palette-empty';
    d.textContent = msg;
    list.appendChild(d);
  };
  if (!currentUser) { empty(tr('paletteLoginHint')); return; }
  const arr = paletteFiltered();
  if (!arr.length) { empty(tr('paletteNoResults')); return; }
  _paletteKb = Math.max(0, Math.min(_paletteKb, arr.length - 1));
  arr.forEach((c, i) => {
    const item = document.createElement('div');
    item.className = 'palette-item' + (i === _paletteKb ? ' kb-active' : '');
    if (c.pinned) {
      const pin = document.createElement('span');
      pin.className = 'palette-item-pin';
      pin.textContent = '★';
      item.appendChild(pin);
    }
    const name = document.createElement('span');
    name.className = 'palette-item-name';
    name.textContent = c.name || tr('chartFallback');
    const meta = document.createElement('span');
    meta.className = 'palette-item-meta';
    meta.textContent = [
      c.birth_date ? c.birth_date.split('-').reverse().join('.') : '',
      c.city || '',
    ].filter(Boolean).join(' · ');
    item.append(name, meta);
    item.addEventListener('click', () => choosePaletteChart(c));
    list.appendChild(item);
  });
}

// Выбор карты в палитре: открыть в этой же вкладке; если карта уже открыта
// в другой вкладке — перейти туда, а осиротевшую палитру закрыть.
function choosePaletteChart(c) {
  const cur = activeTab;
  const ex = tabs.findIndex(t => t.chartId && t.chartId === c.id);
  if (ex >= 0 && ex !== cur) {
    tabs.splice(cur, 1);
    hidePaletteView();
    markChartOpened(c);
    showTab(ex > cur ? ex - 1 : ex);
    return;
  }
  openChartInTab(c, false);
}

// Конструктор, запущенный из палитры: кейс рождается в той же вкладке
function computeIntoPaletteTab() {
  const t = tabs[activeTab];
  t.type = _paletteCtorType || 'natal';   // до расчёта: от типа зависит система домов
  currentChartId = null;
  currentTransitJD = null;
  chartExpanded = false;
  layout2TlState = 0;
  tlYearScale = false;
  if (!computeAndRenderNatal()) return;
  delete t.kind;
  t.chartId = null;
  if (t.type === 'horary') applyHoraryRpPreset();
  else if (t.type === 'election') applyElectionRpPreset();
  t.fields  = readFormFields();
  t.header  = readHeader();
  t.st      = captureState();
  resetNotesState();
  updateHashForActiveTab(true);
  persistTabs();
  renderTabBar();
  // Хорары и элекции автосохраняются в свою папку (толерантно к отсутствию колонок)
  if ((t.type === 'horary' || t.type === 'election') && currentUser) {
    saveCurrentChartToDb(caseExtraColumns(t)).then(({ error }) => {
      if (error) { showSaveConfirm(tr('saveError'), true); return; }
      showSaveConfirm(tr('saved'));
      loadHomeCharts();   // папка/список на главной и в палитре
    });
  }
}

document.getElementById('palette-cmds').addEventListener('click', e => {
  const btn = e.target.closest('.palette-cmd');
  if (!btn || btn.classList.contains('disabled')) return;
  if (btn.dataset.cmd === 'natal') {
    _paletteCtorType = 'natal';
    setFormMode('natal');
    openNewChartModal();
  } else if (btn.dataset.cmd === 'horary') {
    _paletteCtorType = 'horary';
    setFormMode('horary');
    openNewChartModal();
    prefillHoraryForm();
  } else if (btn.dataset.cmd === 'election') {
    _paletteCtorType = 'election';
    setFormMode('election');
    openNewChartModal();
    prefillHoraryForm();   // момент = сейчас, место = место астролога (skyPlace)
  } else if (btn.dataset.cmd === 'synastry') {
    openSynForm();
  }
});

// ── Конструктор синастрии: два слота субъектов (библиотека или ручной ввод) ────
const _synSlots = { a: { chartId: null, timezone: null }, b: { chartId: null, timezone: null } };

function synSlotEl(slot, sel) {
  return document.querySelector(`#syn-form .syn-slot[data-slot="${slot}"] ${sel}`);
}

function readSynSlot(slot) {

    birth_date: synSlotEl(slot, '.syn-date').value,

    city:       synSlotEl(slot, '.syn-place').value.trim(),
    lat:        synSlotEl(slot, '.syn-lat').value,
    lon:        synSlotEl(slot, '.syn-lon').value,
    utc_offset: synSlotEl(slot, '.syn-utc').value,
    timezone:   _synSlots[slot].timezone ?? null,
  };
}

// Субъект (refs) → поля для computeChartData
function subjToComputeFields(s) {
  return { birthDate: s.birth_date, birthTime: s.birth_time, lat: s.lat, lon: s.lon, utcOff: s.utc_offset };
}

function fillSynSlotFromChart(slot, c) {
  _synSlots[slot].chartId  = c.id ?? null;
  _synSlots[slot].timezone = c.timezone ?? null;
  _synSlots[slot].geoSynced = true;   // место и координаты пришли из библиотеки согласованно
  synSlotEl(slot, '.syn-name').value  = c.name ?? '';
  synSlotEl(slot, '.syn-date').value  = c.birth_date ?? '';
  synSlotEl(slot, '.syn-time').value  = c.birth_time ?? '12:00';
  synSlotEl(slot, '.syn-place').value = c.city ?? '';
  synSlotEl(slot, '.syn-lat').value   = c.lat ?? '';
  synSlotEl(slot, '.syn-lon').value   = c.lon ?? '';
  synSlotEl(slot, '.syn-utc').value   = c.utc_offset ?? '';
}

function setSynStatus(msg) {
  const el = document.getElementById('syn-status');
  if (el) el.textContent = msg || '';
}

function openSynForm() {
  hidePaletteView();
  const fw = document.getElementById('syn-form');
  document.getElementById('edit-backdrop').classList.add('visible');
  // сброс слотов
  ['a', 'b'].forEach(slot => {

function closeSynForm() {
  document.getElementById('syn-form').classList.remove('open');
  document.getElementById('edit-backdrop').classList.remove('visible');
  // осиротевшую палитру (вкладку) вернуть на экран
  if (!dashboardOpen && tabs[activeTab]?.kind === 'palette') showPaletteView();
}

// Список сохранённых карт для слота (натал/без типа — субъекты; не композиты)
function synPickFiltered(q) {
  const query = (q || '').trim().toLowerCase();
  let arr = _homeCharts.filter(c => (c.case_type ?? 'natal') === 'natal' && c.birth_date);
  if (query) arr = arr.filter(c =>
    (c.name ?? '').toLowerCase().includes(query) || (c.city ?? '').toLowerCase().includes(query));
  return arr
    .sort((a, b) => (b.pinned === true) - (a.pinned === true) || homeChartTs(b) - homeChartTs(a))
    .slice(0, 8);
}

// Автокомплит города для слота: geoSearch → выбор → lat/lon + часовой пояс → utc
async function synApplyGeo(slot, item) {
  const lat = parseFloat(item.lat), lon = parseFloat(item.lon);
  synSlotEl(slot, '.syn-place').value = item.display_name.split(',').slice(0, 2).join(',').trim();
  synSlotEl(slot, '.syn-lat').value   = lat.toFixed(4);
  synSlotEl(slot, '.syn-lon').value   = lon.toFixed(4);
  synSlotEl(slot, '.syn-geo-dd').style.display = 'none';
  _synSlots[slot].chartId = null;   // ручная правка места — уже не чистая ссылка
  _synSlots[slot].geoSynced = true;
  const utcEl = synSlotEl(slot, '.syn-utc');
  utcEl.classList.add('tz-pending');
  try {
    const ctrl = new AbortController();
    const tid  = setTimeout(() => ctrl.abort(), 6000);
    const tz   = await fetch(`https://timeapi.io/api/timezone/coordinate?latitude=${lat.toFixed(4)}&longitude=${lon.toFixed(4)}`, { signal: ctrl.signal });
    clearTimeout(tid);
    const zone = (await tz.json()).timeZone;
    if (zone) {
      _synSlots[slot].timezone = zone;
      const dateStr = synSlotEl(slot, '.syn-date').value;
      const date = dateStr ? new Date(dateStr + 'T12:00:00Z') : new Date();
      synSlotEl(slot, '.syn-utc').value = getUTCOffsetHours(zone, date);
    }
  } catch { /* оффлайн/таймаут — utc правит пользователь вручную */ }
  finally { utcEl.classList.remove('tz-pending'); }
}

function wireSynForm() {
  ['a', 'b'].forEach(slot => {
    const search = synSlotEl(slot, '.syn-search');
    const pickDd = synSlotEl(slot, '.syn-pick-dd');
    const place  = synSlotEl(slot, '.syn-place');
    const geoDd  = synSlotEl(slot, '.syn-geo-dd');

    // Поиск по библиотеке
    search.addEventListener('input', () => {
      const arr = synPickFiltered(search.value);
      pickDd.innerHTML = '';
      if (!search.value.trim() || !arr.length) { pickDd.style.display = 'none'; return; }
      arr.forEach(c => {
        const div = document.createElement('div');
        div.className = 'syn-pick-item';
        const dt = c.birth_date ? c.birth_date.split('-').reverse().join('.') : '';
        div.innerHTML = `<span class="syn-pick-item-name">${escapeHtml(c.name || tr('chartFallback'))}</span> ` +
                        `<span class="syn-pick-item-meta">${escapeHtml([dt, c.city || ''].filter(Boolean).join(' · '))}</span>`;
        div.addEventListener('mousedown', ev => {
          ev.preventDefault();
          fillSynSlotFromChart(slot, c);
          search.value = '';
          pickDd.style.display = 'none';
          setSynStatus('');
        });
        pickDd.appendChild(div);
      });
      pickDd.style.display = 'block';
    });
    search.addEventListener('blur', () => setTimeout(() => { pickDd.style.display = 'none'; }, 180));

    // Автокомплит города
    let geoTimer = null;
    place.addEventListener('input', () => {
      clearTimeout(geoTimer);
      _synSlots[slot].chartId = null;   // ручной ввод — ссылка сброшена
      _synSlots[slot].geoSynced = false;   // текст изменился — координаты больше не гарантированно соответствуют ему
      const q = place.value.trim();
      if (q.length < 2) { geoDd.style.display = 'none'; return; }
      geoTimer = setTimeout(async () => {
        try {
          const items = await geoSearch(q);
          geoDd.innerHTML = '';
          if (!items.length) { geoDd.style.display = 'none'; return; }
          items.forEach(item => {
            const parts = item.display_name.split(',');
            const div = document.createElement('div');
            div.className = 'geo-item';
            div.innerHTML = `<div class="geo-main">${escapeHtml(parts[0].trim())}</div><div class="geo-sub">${escapeHtml(parts.slice(1, 3).join(',').trim())}</div>`;
            div.addEventListener('mousedown', ev => { ev.preventDefault(); synApplyGeo(slot, item); });
            geoDd.appendChild(div);
          });
          geoDd.style.display = 'block';
        } catch { geoDd.style.display = 'none'; }
      }, 380);
    });
    // Потеря фокуса без выбора из списка — досчитываем место по тексту поля,
    // иначе lat/lon рискуют остаться от предыдущего запроса (см. birthPlace).
    place.addEventListener('blur', () => {
      setTimeout(async () => {
        geoDd.style.display = 'none';
        if (_synSlots[slot].geoSynced) return;
        const q = place.value.trim();
        if (!q) return;
        try {
          const items = await geoSearch(q);
          if (items.length) synApplyGeo(slot, items[0]);
        } catch { /* оффлайн — координаты правит пользователь вручную */ }
      }, 180);
    });

    // Ручная правка имени/даты сбрасывает ссылку на библиотечную карту
    ['.syn-name', '.syn-date', '.syn-time'].forEach(sel =>
      synSlotEl(slot, sel).addEventListener('input', () => { _synSlots[slot].chartId = null; }));
  });

  document.getElementById('syn-build-btn').addEventListener('click', computeSynastryIntoTab);
  document.getElementById('syn-cancel-btn').addEventListener('click', closeSynForm);
}
wireSynForm();

// Пересчитать данные обоих субъектов из refs в natalData / synastryB
function recomputeSynastry(t) {
  if (!swe || !t?.refs?.a || !t?.refs?.b) return false;
  const A = computeChartData(subjToComputeFields(t.refs.a), houseSysForType('natal'));
  const B = computeChartData(subjToComputeFields(t.refs.b), houseSysForType('natal'));
  if (!A || !B) return false;
  natalData = A; synastryB = B;
  return true;
}

// Полная настройка+отрисовка синастрии из t.refs. Общая точка для создания
// (конструктор), загрузки из БД и ленивого восстановления вкладки.
function paintSynastryFromRefs(t) {
  if (!recomputeSynastry(t)) return false;
  cachedTimeline = null;
  currentMode = 'natal';
  currentChartId = t.chartId ?? null;
  setV2ChartInfo(synastryTitle(t.refs), '', '');   // скрытая карточка — для имени вкладки
  applyCaseType('synastry');
  applySynastryRpPreset();
  applyChartModeTabs();
  applyLayout2Classes();
  fillSynSubjectCards(t.refs);
  renderSynastry();
  return true;
}

// Конструктор синастрии превращает активную вкладку-палитру в кейс синастрии
function computeSynastryIntoTab() {
  if (!swe) return;
  const subjA = readSynSlot('a');
  const subjB = readSynSlot('b');
  const t = tabs[activeTab];
  t.type = 'synastry';
  t.refs = { a: subjA, b: subjB };
  currentTransitJD = null;
  chartExpanded = false; layout2TlState = 0; tlYearScale = false;
  synView = 'both';

  if (!paintSynastryFromRefs(t)) { setSynStatus(tr('synFillBoth')); return; }
  delete t.kind;
  t.chartId = null;
  currentChartId = null;

  closeSynForm();
  t.header = readHeader();
  t.st     = captureState();
  resetNotesState();
  updateHashForActiveTab(true);
  persistTabs();
  renderTabBar();

  // Автосохранение в папку «Синастрии» (толерантно к отсутствию колонок)
  if (currentUser) saveSynastryToDb(t);
}

// Сохранить синастрию: композитная строка + refs (источник истины).
// Ядро строки заполняем данными субъекта A — это fallback, удовлетворяющий
// возможным NOT NULL на charts (как у хораров/элекций ядро заполнено из формы);
// на рендер/загрузку не влияет — там используется refs. См. WORKSPACE_CONCEPT §9.
async function saveSynastryToDb(t) {
  const extra = caseExtraColumns(t);   // { case_type, name, folder, refs }
  const a = t?.refs?.a || {};
  const num = v => (v != null && v !== '' ? parseFloat(v) : null);
  const baseRow = {
    user_id: currentUser.id, name: extra.name,
    birth_date: a.birth_date || null, birth_time: a.birth_time || null, city: a.city || null,
    lat: num(a.lat), lon: num(a.lon), utc_offset: num(a.utc_offset), timezone: a.timezone || null,
  };
  let res = await sb.from('charts').insert({ ...baseRow, ...extra }).select().single();
  if (res.error && extra.refs !== undefined) {
    // колонки refs нет — сохраняем без неё (кейс живёт в рамках сессии из t.refs)
    const { refs, ...noRefs } = extra;
    res = await sb.from('charts').insert({ ...baseRow, ...noRefs }).select().single();
  }
  if (res.error) { console.warn('synastry save:', res.error.message); showSynSaveConfirm(tr('saveError'), true); return; }
  const data = res.data;
  currentChartId = data.id;
  t.chartId = data.id;
  const newHash = `#chart/${data.id}`;
  if (window.location.hash !== newHash) history.pushState({ chartId: data.id }, '', newHash);
  persistTabs();
  renderTabBar();
  showSynSaveConfirm(tr('saved'));
  loadHomeCharts();
}

// Обновить refs уже сохранённой синастрии (после правки субъекта)
async function updateSynastryRefs(t) {
  if (!t?.chartId || !currentUser) return;
  const { error } = await sb.from('charts').update({ refs: t.refs, name: synastryTitle(t.refs) }).eq('id', t.chartId);
  if (error) { console.warn('synastry refs update:', error.message); return; }
  showSynSaveConfirm(tr('saved'));
  loadHomeCharts();
}

// 💾 на карточке субъекта: сохранить (новую) или обновить refs (уже сохранённой)
function saveSynastryComposite() {
  if (!currentUser) { openModal(); return; }
  const t = tabs[activeTab];
  if (!t || t.type !== 'synastry') return;
  if (t.chartId) updateSynastryRefs(t); else saveSynastryToDb(t);
}

function showSynSaveConfirm(msg, isErr) {
  const el = document.getElementById('v2-syn-save-confirm');
